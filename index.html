<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Series 65 — Interactive Learning Lab</title>
<script>
window.MathJax = {
  tex: { inlineMath: [['$', '$']], displayMath: [['$$', '$$']], processEscapes: true },
  svg: { fontCache: 'global' },
  startup: { typeset: false }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel2: #1e222b;
    --ink: #e7e9ee;
    --ink-dim: #9aa3b2;
    --line: #2a2f3a;
    --accent: #5b9dff;
    --accent2: #8b7cff;
    --term: #7cc4ff;
    --good: #46d39a;
    --bad: #ff6b6b;
    --warn: #ffcf5c;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); }

  /* ---------- Top bar ---------- */
  header {
    position: sticky; top: 0; z-index: 40;
    background: rgba(15,17,21,0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--line);
    padding: 10px 18px;
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  .brand { font-weight: 800; font-size: 16px; letter-spacing: .2px; white-space: nowrap; }
  .brand span { color: var(--accent); }
  .tabs { display: flex; gap: 6px; background: var(--panel); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
  .tab {
    border: 0; background: transparent; color: var(--ink-dim);
    padding: 7px 16px; border-radius: 999px; cursor: pointer; font-size: 13.5px; font-weight: 600;
  }
  .tab.active { background: var(--accent); color: #06122b; }
  .search { margin-left: auto; position: relative; }
  .search input {
    background: var(--panel); border: 1px solid var(--line); color: var(--ink);
    padding: 9px 14px 9px 34px; border-radius: 999px; width: 240px; font-size: 13.5px; outline: none;
  }
  .search input:focus { border-color: var(--accent); }
  .search::before { content: "⌕"; position: absolute; left: 12px; top: 7px; color: var(--ink-dim); font-size: 16px; }
  .search-results {
    position: absolute; top: 42px; right: 0; width: 340px; max-height: 60vh; overflow: auto;
    background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 6px;
    display: none; box-shadow: 0 18px 50px rgba(0,0,0,.5);
  }
  .search-results.show { display: block; }
  .sr-item { padding: 9px 11px; border-radius: 9px; cursor: pointer; }
  .sr-item:hover { background: var(--panel); }
  .sr-item .t { font-weight: 700; font-size: 13.5px; }
  .sr-item .d { color: var(--ink-dim); font-size: 12px; }

  main { max-width: 1040px; margin: 0 auto; padding: 22px 18px 120px; }

  /* ---------- Study (cards) ---------- */
  .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .chip {
    border: 1px solid var(--line); background: var(--panel); color: var(--ink-dim);
    padding: 6px 13px; border-radius: 999px; font-size: 12.5px; cursor: pointer; font-weight: 600;
  }
  .chip.active { color: var(--ink); border-color: var(--accent); background: rgba(91,157,255,.12); }
  .count { color: var(--ink-dim); font-size: 12.5px; margin-left: auto; }

  .flash {
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel2) 100%);
    border: 1px solid var(--line); border-radius: var(--radius);
    min-height: 320px; padding: 26px 30px; position: relative; cursor: pointer;
    display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(0,0,0,.35);
  }
  .flash .sec { font-size: 11px; text-transform: uppercase; letter-spacing: .09em; color: var(--accent); font-weight: 700; }
  .flash .face-label { position: absolute; top: 18px; right: 22px; font-size: 10.5px; color: var(--ink-dim); letter-spacing: .12em; text-transform: uppercase; }
  .flash .term-q { font-size: 26px; font-weight: 800; margin: auto 0; text-align: center; }
  .flash .ans { font-size: 15.5px; }
  .flash .ans ul { margin: 6px 0 6px 18px; padding: 0; }
  .flash .ans table { border-collapse: collapse; width: 100%; font-size: 13.5px; margin: 6px 0; }
  .flash .ans td, .flash .ans th { border: 1px solid var(--line); padding: 4px 8px; text-align: left; }
  .flash .hint { text-align: center; color: var(--ink-dim); font-size: 12.5px; margin-top: 14px; }
  .nav-row { display: flex; gap: 12px; align-items: center; justify-content: center; margin-top: 18px; }
  .btn {
    border: 1px solid var(--line); background: var(--panel); color: var(--ink);
    padding: 9px 18px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #06122b; border-color: var(--accent); }

  /* ---------- Explore (glossary grid) ---------- */
  .gloss-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
  .gloss-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px 15px; cursor: pointer;
  }
  .gloss-card:hover { border-color: var(--accent); transform: translateY(-2px); transition: .12s; }
  .gloss-card .gt { font-weight: 700; font-size: 14.5px; margin-bottom: 4px; }
  .gloss-card .gd { color: var(--ink-dim); font-size: 12.5px; }
  .gloss-card .badge { display: inline-block; margin-top: 9px; font-size: 10.5px; color: var(--accent2); border: 1px solid var(--line); border-radius: 999px; padding: 2px 8px; }
  .group-title { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-dim); margin: 26px 0 10px; font-weight: 700; }

  /* ---------- Test (quiz) ---------- */
  .quiz-wrap { max-width: 720px; margin: 0 auto; }
  .qcard { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 24px 26px; }
  .qmeta { color: var(--ink-dim); font-size: 12.5px; display: flex; justify-content: space-between; margin-bottom: 12px; }
  .qtext { font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .choice {
    display: block; width: 100%; text-align: left; border: 1px solid var(--line); background: var(--panel2);
    color: var(--ink); padding: 13px 16px; border-radius: 11px; margin-bottom: 10px; cursor: pointer; font-size: 14.5px;
  }
  .choice:hover { border-color: var(--accent); }
  .choice.correct { border-color: var(--good); background: rgba(70,211,154,.13); }
  .choice.wrong { border-color: var(--bad); background: rgba(255,107,107,.12); }
  .choice .mk { font-weight: 800; margin-right: 9px; color: var(--ink-dim); }
  .explain { margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 14px; font-size: 14px; display: none; }
  .explain.show { display: block; }
  .explain .why { color: var(--ink-dim); }
  .scorebar { display: flex; gap: 14px; align-items: center; margin-bottom: 14px; color: var(--ink-dim); font-size: 13px; }
  .progress { height: 6px; background: var(--panel); border-radius: 999px; overflow: hidden; flex: 1; }
  .progress > div { height: 100%; background: var(--accent); width: 0%; }

  /* ---------- Term links ---------- */
  .term {
    color: var(--term); border-bottom: 1.5px dotted rgba(124,196,255,.6);
    cursor: pointer; font-weight: 600;
  }
  .term:hover { background: rgba(124,196,255,.14); border-radius: 3px; }

  /* ---------- Tooltip ---------- */
  #tooltip {
    position: fixed; z-index: 60; max-width: 320px; background: #0c0e13; color: var(--ink);
    border: 1px solid var(--line); border-radius: 10px; padding: 11px 13px; font-size: 13px; line-height: 1.45;
    box-shadow: 0 16px 44px rgba(0,0,0,.6); pointer-events: none; opacity: 0; transition: opacity .12s; display: none;
  }
  #tooltip .tt-term { font-weight: 800; color: var(--term); display: block; margin-bottom: 3px; font-size: 13px; }
  #tooltip .tt-hint { color: var(--ink-dim); font-size: 11px; margin-top: 6px; font-style: italic; }

  /* ---------- Drill drawer ---------- */
  #scrim { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 70; opacity: 0; pointer-events: none; transition: opacity .2s; }
  #scrim.show { opacity: 1; pointer-events: auto; }
  #drawer {
    position: fixed; top: 0; right: 0; height: 100%; width: min(560px, 94vw); z-index: 80;
    background: var(--panel); border-left: 1px solid var(--line);
    transform: translateX(102%); transition: transform .26s cubic-bezier(.2,.8,.2,1);
    display: flex; flex-direction: column;
  }
  #drawer.show { transform: translateX(0); }
  .drawer-head { padding: 14px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; }
  .crumbs { font-size: 12px; color: var(--ink-dim); flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .crumbs .c { cursor: pointer; }
  .crumbs .c:hover { color: var(--ink); }
  .crumbs .sep { opacity: .5; margin: 0 5px; }
  .icon-btn { border: 1px solid var(--line); background: var(--panel2); color: var(--ink); width: 34px; height: 34px; border-radius: 9px; cursor: pointer; font-size: 16px; line-height: 1; }
  .icon-btn:hover { border-color: var(--accent); }
  .drawer-body { padding: 20px 22px 60px; overflow: auto; }
  .drawer-body h2 { margin: 0 0 4px; font-size: 23px; }
  .eli5 { color: var(--ink); background: rgba(91,157,255,.1); border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 8px; font-size: 15px; margin: 12px 0 18px; }
  .drawer-body p { margin: 0 0 12px; font-size: 14.5px; }
  .drawer-body ul, .drawer-body ol { margin: 6px 0 14px 20px; padding: 0; font-size: 14.5px; }
  .drawer-body li { margin-bottom: 5px; }
  .drawer-body strong { color: #fff; }
  .deeper { border: 1px solid var(--line); border-radius: 10px; margin: 14px 0; overflow: hidden; }
  .deeper > summary { cursor: pointer; padding: 11px 14px; font-weight: 700; font-size: 13.5px; background: var(--panel2); color: var(--ink); list-style: none; }
  .deeper > summary::-webkit-details-marker { display: none; }
  .deeper > summary::before { content: "▸ "; color: var(--accent); }
  .deeper[open] > summary::before { content: "▾ "; }
  .deeper .deeper-in { padding: 12px 15px; }
  .worked { background: var(--panel2); border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin: 12px 0; font-size: 13.5px; }
  .worked .wt { font-weight: 700; color: var(--warn); margin-bottom: 6px; }
  /* acronym expansion + equations + examples */
  .expand-sub { color: var(--ink-dim); font-size: 13px; margin: -4px 0 10px; font-style: italic; }
  .equation-block { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; margin: 14px 0; }
  .equation-block .eq-math { overflow-x: auto; overflow-y: hidden; text-align: center; font-size: 15px; }
  .eq-where { margin-top: 12px; border-top: 1px dashed var(--line); padding-top: 10px; }
  .eq-where-h { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-dim); margin-bottom: 7px; }
  .eq-where ul { margin: 0 0 0 2px; padding: 0; list-style: none; font-size: 13.5px; }
  .eq-where li { margin: 0 0 6px 0; display: flex; gap: 8px; align-items: baseline; }
  .eq-where .eq-sym { color: var(--term); min-width: 30px; flex-shrink: 0; }
  .examples { margin: 20px 0 6px; }
  .examples-h { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--accent2); font-weight: 700; margin-bottom: 11px; }
  .example-card { background: var(--panel2); border: 1px solid var(--line); border-left: 3px solid var(--accent2); border-radius: 10px; padding: 13px 15px; margin-bottom: 12px; }
  .ex-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .ex-scenario { font-size: 13.5px; margin-bottom: 8px; }
  .ex-given { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 6px; line-height: 1.8; }
  .ex-steps { overflow-x: auto; overflow-y: hidden; font-size: 14px; margin: 4px 0; }
  .ex-result { background: rgba(70,211,154,.12); border: 1px solid rgba(70,211,154,.4); border-radius: 8px; padding: 7px 11px; font-size: 14px; font-weight: 600; margin-top: 8px; }
  .minichart { margin-top: 12px; }
  .minichart .mc-title { font-size: 11.5px; color: var(--ink-dim); margin-bottom: 5px; }
  .minichart svg { width: 100%; height: auto; display: block; }
  .memory { background: rgba(139,124,255,.13); border-left: 3px solid var(--accent2); border-radius: 8px; padding: 8px 12px 8px 34px; font-size: 13px; margin: 0 0 14px; position: relative; }
  .memory::before { content: "🧠"; position: absolute; left: 11px; top: 8px; }
  .trap { background: rgba(255,107,107,.1); border: 1px solid rgba(255,107,107,.4); border-radius: 10px; padding: 10px 13px; font-size: 13.5px; margin: 16px 0; }
  .trap .trap-h { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--bad); font-weight: 700; margin-bottom: 4px; }
  .trap .trap-h::before { content: "\26A0  "; }
  .related { margin-top: 22px; }
  .related .rt { font-size: 11.5px; text-transform: uppercase; letter-spacing: .1em; color: var(--ink-dim); margin-bottom: 8px; }
  .rel-chip { display: inline-block; margin: 0 7px 7px 0; padding: 6px 12px; border: 1px solid var(--line); border-radius: 999px; font-size: 12.5px; cursor: pointer; color: var(--term); }
  .rel-chip:hover { border-color: var(--accent); background: rgba(124,196,255,.1); }

  /* ---------- Graphics ---------- */
  .graphic { background: var(--panel2); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin: 16px 0; }
  .graphic .g-title { font-weight: 700; font-size: 13.5px; margin-bottom: 4px; }
  .graphic .g-sub { color: var(--ink-dim); font-size: 12px; margin-bottom: 10px; }
  .graphic svg { width: 100%; height: auto; display: block; touch-action: none; }
  .readout { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .ro { background: var(--panel); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; }
  .ro .k { font-size: 10.5px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: .05em; }
  .ro .v { font-size: 16px; font-weight: 800; }
  .ctrls { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
  .ctrl { font-size: 12px; color: var(--ink-dim); display: flex; flex-direction: column; gap: 3px; min-width: 120px; }
  .ctrl input[type=range] { width: 150px; }
  .toggle-row { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .toggle-row button { font-size: 12px; padding: 5px 11px; border-radius: 8px; border: 1px solid var(--line); background: var(--panel); color: var(--ink-dim); cursor: pointer; }
  .toggle-row button.on { color: #06122b; background: var(--accent); border-color: var(--accent); }

  .empty { color: var(--ink-dim); text-align: center; padding: 60px 0; }
  kbd { background: var(--panel2); border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="brand">Series 65 <span>Learning Lab</span></div>
  <div class="tabs">
    <button class="tab active" data-mode="study">Study</button>
    <button class="tab" data-mode="explore">Explore</button>
    <button class="tab" data-mode="test">Quiz</button>
    <button class="tab" data-mode="exam">Exam</button>
  </div>
  <div class="search">
    <input id="searchBox" type="text" placeholder="Search any concept…" autocomplete="off">
    <div class="search-results" id="searchResults"></div>
  </div>
</header>

<main id="view"></main>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Drill drawer -->
<div id="scrim"></div>
<aside id="drawer">
  <div class="drawer-head">
    <button class="icon-btn" id="drawerBack" title="Back">‹</button>
    <div class="crumbs" id="crumbs"></div>
    <button class="icon-btn" id="drawerClose" title="Close">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</aside>

<script>
/* ============================================================================
   DATA STORES  (filled in chunks)
   ============================================================================ */
const GLOSSARY = {};   // id -> { term, eli5, full, deeper?, worked?, related?, graphic?, aliases?, group? }
const QUIZ = [];       // { q, choices:[...], answer:idx, explain (html), terms:[...] }
const CARDS = [];      // { sec, front, back }  (reused from the printable deck)
const SECTIONS = {};   // sec code -> display name

/* ============================================================================
   GRAPHICS REGISTRY  — dependency-free interactive SVG widgets
   Each fn receives a mount element and builds its own UI + interactivity.
   ============================================================================ */
const GRAPHICS = {};

/* ---- helper: format dollars ---- */
function usd(n){ return '$' + Math.round(n).toLocaleString(); }
function svgEl(tag, attrs){ const e = document.createElementNS('http://www.w3.org/2000/svg', tag); for(const k in attrs) e.setAttribute(k, attrs[k]); return e; }

/* ---------------------------------------------------------------------------
   FLAGSHIP: MACRS vs ADS depreciation, with draggable year + live AMT adjustment
   --------------------------------------------------------------------------- */
GRAPHICS['macrs-vs-ads'] = function(mount){
  // Illustrative percentages (each sums to 100% of cost => same TOTAL depreciation)
  const MACRS = [14.29,24.49,17.49,12.49,8.93,8.92,8.93,4.46,0,0,0];
  const ADS   = [5,10,10,10,10,10,10,10,10,10,5];
  const YEARS = MACRS.length;
  let cost = 100000;
  let yr = 2; // selected year index (0-based)

  mount.innerHTML =
    '<div class="g-title">MACRS vs. ADS — where the AMT adjustment comes from</div>'
  + '<div class="g-sub">Drag the scrubber across the years. Blue = fast regular-tax write-off. Orange = slower AMT write-off. The gap each year is the AMT adjustment — and it nets to <b>zero</b> over the asset\'s life.</div>';

  const W = 520, H = 230, padL = 46, padR = 14, padT = 14, padB = 28;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const maxPct = 26;
  const xOf = i => padL + (plotW * (i)/(YEARS-1));
  const yOf = p => padT + plotH * (1 - p/maxPct);

  const svg = svgEl('svg', { viewBox:'0 0 '+W+' '+H, role:'img' });

  // grid + axes
  for(let p=0; p<=maxPct; p+=5){
    svg.appendChild(svgEl('line', { x1:padL, y1:yOf(p), x2:W-padR, y2:yOf(p), stroke:'#2a2f3a', 'stroke-width':1 }));
    const tl = svgEl('text', { x:padL-6, y:yOf(p)+3, 'text-anchor':'end', fill:'#9aa3b2', 'font-size':9 }); tl.textContent = p+'%'; svg.appendChild(tl);
  }
  for(let i=0;i<YEARS;i++){
    const tx = svgEl('text', { x:xOf(i), y:H-10, 'text-anchor':'middle', fill:'#9aa3b2', 'font-size':9 }); tx.textContent = (i+1); svg.appendChild(tx);
  }

  function path(arr, color){
    let d = '';
    for(let i=0;i<YEARS;i++){ d += (i?'L':'M') + xOf(i) + ' ' + yOf(arr[i]) + ' '; }
    svg.appendChild(svgEl('path', { d, fill:'none', stroke:color, 'stroke-width':2.5, 'stroke-linejoin':'round' }));
    for(let i=0;i<YEARS;i++){ svg.appendChild(svgEl('circle', { cx:xOf(i), cy:yOf(arr[i]), r:2.6, fill:color })); }
  }
  // shaded gap (area between curves) for selected year handled by scrubber line
  path(ADS, '#ff9f43');
  path(MACRS, '#5b9dff');

  const scrub = svgEl('line', { x1:xOf(yr), y1:padT, x2:xOf(yr), y2:padT+plotH, stroke:'#fff', 'stroke-width':1.5, 'stroke-dasharray':'4 3', opacity:.8 });
  svg.appendChild(scrub);
  const dotM = svgEl('circle', { r:5, fill:'#5b9dff', stroke:'#fff', 'stroke-width':1.5 });
  const dotA = svgEl('circle', { r:5, fill:'#ff9f43', stroke:'#fff', 'stroke-width':1.5 });
  svg.appendChild(dotM); svg.appendChild(dotA);

  mount.appendChild(svg);

  // legend
  const legend = document.createElement('div');
  legend.className = 'toggle-row';
  legend.innerHTML = '<span style="color:#5b9dff;font-size:12px">● MACRS (regular tax)</span><span style="color:#ff9f43;font-size:12px">● ADS (AMT)</span>';
  mount.appendChild(legend);

  // readouts
  const ro = document.createElement('div'); ro.className = 'readout';
  ro.innerHTML =
    '<div class="ro"><div class="k">Year</div><div class="v" id="g-yr"></div></div>'
  + '<div class="ro"><div class="k">AMT adjustment this year</div><div class="v" id="g-adj"></div></div>'
  + '<div class="ro"><div class="k">MACRS deduction</div><div class="v" id="g-m" style="color:#5b9dff"></div></div>'
  + '<div class="ro"><div class="k">ADS deduction</div><div class="v" id="g-a" style="color:#ff9f43"></div></div>'
  + '<div class="ro"><div class="k">Cumulative AMT adj.</div><div class="v" id="g-cum"></div></div>'
  + '<div class="ro"><div class="k">Total written off (both)</div><div class="v" id="g-tot"></div></div>';
  mount.appendChild(ro);

  // cost control
  const ctrls = document.createElement('div'); ctrls.className = 'ctrls';
  ctrls.innerHTML = '<label class="ctrl">Asset cost: <b id="g-cost"></b><input id="g-costr" type="range" min="20000" max="500000" step="10000" value="100000"></label>';
  mount.appendChild(ctrls);

  function update(){
    scrub.setAttribute('x1', xOf(yr)); scrub.setAttribute('x2', xOf(yr));
    dotM.setAttribute('cx', xOf(yr)); dotM.setAttribute('cy', yOf(MACRS[yr]));
    dotA.setAttribute('cx', xOf(yr)); dotA.setAttribute('cy', yOf(ADS[yr]));
    const m = MACRS[yr]/100*cost, a = ADS[yr]/100*cost, adj = m - a;
    let cum = 0; for(let i=0;i<=yr;i++) cum += (MACRS[i]-ADS[i])/100*cost;
    document.getElementById('g-yr').textContent = 'Year ' + (yr+1);
    const adjEl = document.getElementById('g-adj');
    adjEl.textContent = (adj>=0?'+':'−') + usd(Math.abs(adj)) + (adj>=0?'  add-back':'  reduction');
    adjEl.style.color = adj>=0 ? '#46d39a' : '#ff6b6b';
    document.getElementById('g-m').textContent = usd(m);
    document.getElementById('g-a').textContent = usd(a);
    const cumEl = document.getElementById('g-cum'); cumEl.textContent = (cum>=0?'+':'−')+usd(Math.abs(cum));
    cumEl.style.color = Math.abs(cum)<1 ? '#9aa3b2' : (cum>=0?'#46d39a':'#ff6b6b');
    document.getElementById('g-tot').textContent = usd(cost);
    document.getElementById('g-cost').textContent = usd(cost);
  }
  update();

  // drag / click on svg to set year
  function pick(evt){
    const r = svg.getBoundingClientRect();
    const px = ((evt.touches?evt.touches[0].clientX:evt.clientX) - r.left) / r.width * W;
    let best=0, bd=1e9;
    for(let i=0;i<YEARS;i++){ const d=Math.abs(px - xOf(i)); if(d<bd){bd=d;best=i;} }
    yr = best; update();
  }
  let dragging=false;
  svg.addEventListener('pointerdown', e=>{ dragging=true; svg.setPointerCapture(e.pointerId); pick(e); });
  svg.addEventListener('pointermove', e=>{ if(dragging) pick(e); });
  svg.addEventListener('pointerup', ()=> dragging=false);
  document.getElementById('g-costr').addEventListener('input', e=>{ cost = +e.target.value; update(); });
};

/* ---------------------------------------------------------------------------
   ISO bargain element  — sliders for shares / strike / FMV; live spread + AMT
   --------------------------------------------------------------------------- */
GRAPHICS['iso-bargain-element'] = function(mount){
  let shares = 1000, strike = 10, fmv = 50;
  mount.innerHTML =
    '<div class="g-title">The "bargain element" (your on-paper discount)</div>'
  + '<div class="g-sub">You buy at the locked <b>strike price</b>; the stock is actually worth its <b>FMV</b>. The gap × shares is your bargain element — the number the AMT cares about.</div>';

  const W=520,H=120;
  const svg = svgEl('svg', { viewBox:'0 0 '+W+' '+H });
  const barY=40, barH=34, x0=20, x1=W-20;
  function draw(){
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    const max = Math.max(fmv, strike, 1);
    const scale = (x1-x0) / max;
    // worth (FMV) bar
    svg.appendChild(svgEl('rect',{x:x0,y:barY,width:fmv*scale,height:barH,rx:6,fill:'rgba(70,211,154,.25)',stroke:'#46d39a'}));
    // paid (strike) bar
    svg.appendChild(svgEl('rect',{x:x0,y:barY,width:strike*scale,height:barH,rx:6,fill:'rgba(91,157,255,.5)',stroke:'#5b9dff'}));
    // labels
    const l1=svgEl('text',{x:x0,y:30,fill:'#5b9dff','font-size':11,'font-weight':700}); l1.textContent='Strike (you pay): $'+strike; svg.appendChild(l1);
    const l2=svgEl('text',{x:x0+strike*scale+6,y:barY+barH+18,fill:'#46d39a','font-size':11,'font-weight':700}); l2.textContent='FMV (worth): $'+fmv; svg.appendChild(l2);
    // spread bracket
    const sx0=x0+strike*scale, sx1=x0+fmv*scale;
    svg.appendChild(svgEl('line',{x1:sx0,y1:barY-6,x2:sx1,y2:barY-6,stroke:'#ffcf5c','stroke-width':1.5}));
    const sl=svgEl('text',{x:(sx0+sx1)/2,y:barY-10,fill:'#ffcf5c','font-size':10,'text-anchor':'middle'}); sl.textContent='spread $'+(fmv-strike); svg.appendChild(sl);
  }
  draw(); mount.appendChild(svg);

  const ro=document.createElement('div'); ro.className='readout';
  ro.innerHTML =
    '<div class="ro"><div class="k">Spread / share</div><div class="v" id="i-sp" style="color:#ffcf5c"></div></div>'
  + '<div class="ro"><div class="k">Bargain element (AMT income)</div><div class="v" id="i-be" style="color:#46d39a"></div></div>';
  mount.appendChild(ro);

  const c=document.createElement('div'); c.className='ctrls';
  c.innerHTML =
    '<label class="ctrl">Shares: <b id="i-sh"></b><input id="i-shr" type="range" min="100" max="5000" step="100" value="1000"></label>'
  + '<label class="ctrl">Strike $: <b id="i-st"></b><input id="i-str" type="range" min="1" max="60" step="1" value="10"></label>'
  + '<label class="ctrl">FMV $: <b id="i-fm"></b><input id="i-fmr" type="range" min="1" max="120" step="1" value="50"></label>';
  mount.appendChild(c);

  function upd(){
    if(fmv<strike) fmv=strike;
    const sp=fmv-strike, be=sp*shares;
    document.getElementById('i-sp').textContent=usd(sp);
    document.getElementById('i-be').textContent=usd(be);
    document.getElementById('i-sh').textContent=shares.toLocaleString();
    document.getElementById('i-st').textContent=strike;
    document.getElementById('i-fm').textContent=fmv;
    draw();
  }
  upd();
  c.querySelector('#i-shr').addEventListener('input',e=>{shares=+e.target.value;upd();});
  c.querySelector('#i-str').addEventListener('input',e=>{strike=+e.target.value;upd();});
  c.querySelector('#i-fmr').addEventListener('input',e=>{fmv=+e.target.value;upd();});
};

/* ---------------------------------------------------------------------------

   --------------------------------------------------------------------------- */
GRAPHICS['option-payoff'] = function(mount){
  const K=50, prem=4, stockCost=50; let S=50;
  const strategies = {
    "Long call":      s=> Math.max(s-K,0)-prem,
    "Long put":       s=> Math.max(K-s,0)-prem,
    "Covered call":   s=> (s-stockCost) + (prem - Math.max(s-K,0)),
    "Protective put": s=> (s-stockCost) + (Math.max(K-s,0) - prem),
    "Long straddle":  s=> Math.max(s-K,0)+Math.max(K-s,0) - 2*prem
  };
  const notes={
    "Long call":"Bullish. Max loss = premium paid. Unlimited upside.",
    "Long put":"Bearish. Max loss = premium. Profits as the stock falls.",
    "Covered call":"Own stock + sell a call. Income now; upside capped at the strike.",
    "Protective put":"Own stock + buy a put. Insurance — caps your downside.",

  mount.appendChild(ro);
  const note=document.createElement('div'); note.style.cssText='margin-top:8px;font-size:12.5px;color:var(--ink-dim)'; mount.appendChild(note);
  function draw(){ const f=strategies[cur]; let d=''; for(let s=sMin;s<=sMax;s+=1){ const v=Math.max(vMin,Math.min(vMax,f(s))); d+=(d?'L':'M')+xOf(s)+' '+yOf(v)+' '; } line.setAttribute('d',d); note.textContent=notes[cur]; upd(); }
  function upd(){ const f=strategies[cur]; const v=f(S); dot.setAttribute('cx',xOf(S)); dot.setAttribute('cy',yOf(Math.max(vMin,Math.min(vMax,v))));
    document.getElementById('op-s').textContent='$'+S.toFixed(0);
    const vv=document.getElementById('op-v'); vv.textContent=(v>=0?'+':'−')+'$'+Math.abs(v).toFixed(0)+'/sh'; vv.style.color=v>=0?'#46d39a':'#ff6b6b'; }

  let drag=false; svg.addEventListener('pointerdown',e=>{drag=true;svg.setPointerCapture(e.pointerId);pick(e);}); svg.addEventListener('pointermove',e=>{if(drag)pick(e);}); svg.addEventListener('pointerup',()=>drag=false);

/* ---------------------------------------------------------------------------
   LIQUIDATION WATERFALL — who gets paid first in bankruptcy
   --------------------------------------------------------------------------- */
GRAPHICS['liquidation-waterfall'] = function(mount){
  const tiers=[
    {n:"Secured creditors",c:"#46d39a"},
    {n:"Unsecured w/ priority (admin, taxes, wages)",c:"#7cc4ff"},
    {n:"General creditors (debentures, trade)",c:"#5b9dff"},
    {n:"Subordinated debentures",c:"#8b7cff"},
    {n:"Preferred stockholders",c:"#ffcf5c"},
    {n:"Common stockholders (residual)",c:"#ff6b6b"}
  ];
  let avail=70; // % of claims that can be paid
  mount.innerHTML='<div class="g-title">Liquidation priority — the payout waterfall</div><div class="g-sub">In bankruptcy, money flows top to bottom. Drag the slider to set how much is recoverable: the lower tiers get wiped out first.</div>';
  const list=document.createElement('div');
  function draw(){
    let remaining=avail*tiers.length/100* (100/ tiers.length); // simple model: each tier "needs" one unit
    // model: total claims = tiers.length units; available = avail% of total
    let pool = avail/100*tiers.length;
    list.innerHTML = tiers.map((t,i)=>{
      const paid = Math.max(0, Math.min(1, pool - i));
      const pct = Math.round(paid*100);
      return '<div style="margin:6px 0"><div style="display:flex;justify-content:space-between;font-size:12.5px"><span>'+(i+1)+'. '+t.n+'</span><span style="color:'+(pct===100?'#46d39a':pct===0?'#ff6b6b':'#ffcf5c')+'">'+pct+'% paid</span></div>'
        +'<div style="height:14px;background:#0c0e13;border:1px solid var(--line);border-radius:6px;overflow:hidden;margin-top:3px"><div style="height:100%;width:'+pct+'%;background:'+t.c+'"></div></div></div>';
    }).join('');
  }
  mount.appendChild(list);
  const c=document.createElement('div'); c.className='ctrls';
  c.innerHTML='<label class="ctrl">Recoverable value: <b id="lw-v">70%</b><input id="lw-r" type="range" min="0" max="100" step="5" value="70"></label>';
  mount.appendChild(c);
  draw();
  c.querySelector('#lw-r').addEventListener('input',e=>{ avail=+e.target.value; c.querySelector('#lw-v').textContent=avail+'%'; draw(); });
};

/* ---------------------------------------------------------------------------

   --------------------------------------------------------------------------- */
GRAPHICS['business-cycle'] = function(mount){
  const phases=[
    {n:"Expansion",d:"Rising GDP, falling unemployment, rising profits & inflation. Cyclicals & small caps lead.",x:0.15},

    {n:"Contraction",d:"Falling GDP, rising unemployment, easing inflation. Treasuries & defensives hold up.",x:0.65},
    {n:"Trough",d:"The bottom; precedes recovery; Fed typically loose. Cyclicals about to lead again.",x:0.9}

/* ---------------------------------------------------------------------------

GRAPHICS['diversification'] = function(mount){

  mount.innerHTML='<div class="g-title">Why mixing assets cuts risk</div><div class="g-sub">Two assets: A (8% return, 12% risk) and B (6%, 18%). Slide the correlation — the lower it is, the more the curve bows left, meaning LESS risk for the same return. That bow IS diversification.</div>';
  const W=520,H=220,padL=42,padR=14,padT=14,padB=30, plotW=W-padL-padR, plotH=H-padT-padB;
  const xMin=0,xMax=22, yMin=4,yMax=9;
  const xOf=v=>padL+plotW*(v-xMin)/(xMax-xMin), yOf=v=>padT+plotH*(1-(v-yMin)/(yMax-yMin));
  const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H});
  for(let r=yMin;r<=yMax;r++){ svg.appendChild(svgEl('line',{x1:padL,y1:yOf(r),x2:W-padR,y2:yOf(r),stroke:'#2a2f3a'})); const t=svgEl('text',{x:padL-6,y:yOf(r)+3,'text-anchor':'end',fill:'#9aa3b2','font-size':9}); t.textContent=r+'%'; svg.appendChild(t); }
  for(let x=0;x<=xMax;x+=4){ const t=svgEl('text',{x:xOf(x),y:H-10,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); t.textContent=x+'%'; svg.appendChild(t); }
  const xlab=svgEl('text',{x:W/2,y:H-1,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); xlab.textContent='risk (standard deviation) →'; svg.appendChild(xlab);
  const curve=svgEl('path',{fill:'none',stroke:'#5b9dff','stroke-width':2.6}); svg.appendChild(curve);
  const ptA=svgEl('circle',{r:4,fill:'#46d39a'}), ptB=svgEl('circle',{r:4,fill:'#ff9f43'}); svg.appendChild(ptA); svg.appendChild(ptB);
  const labA=svgEl('text',{fill:'#46d39a','font-size':9}); labA.textContent='A'; const labB=svgEl('text',{fill:'#ff9f43','font-size':9}); labB.textContent='B'; svg.appendChild(labA); svg.appendChild(labB);
  const dot=svgEl('circle',{r:6,fill:'#fff',stroke:'#5b9dff','stroke-width':2}); svg.appendChild(dot);
  mount.appendChild(svg);
  const ro=document.createElement('div'); ro.className='readout';
  ro.innerHTML='<div class="ro"><div class="k">Mix (A / B)</div><div class="v" id="dv-w"></div></div><div class="ro"><div class="k">Portfolio return</div><div class="v" id="dv-r" style="color:#46d39a"></div></div><div class="ro"><div class="k">Portfolio risk</div><div class="v" id="dv-s" style="color:#5b9dff"></div></div><div class="ro"><div class="k">Correlation (ρ)</div><div class="v" id="dv-rho"></div></div>';
  mount.appendChild(ro);
  const c=document.createElement('div'); c.className='ctrls';
  c.innerHTML='<label class="ctrl">Weight in A: <b id="dv-wl"></b><input id="dv-wr" type="range" min="0" max="100" step="5" value="50"></label><label class="ctrl">Correlation ρ: <b id="dv-rl"></b><input id="dv-rr" type="range" min="-100" max="100" step="10" value="20"></label>';
  mount.appendChild(c);
  function portfolio(wv,rhov){ const ret=wv*rA+(1-wv)*rB; const v=wv*wv*sA*sA+(1-wv)*(1-wv)*sB*sB+2*wv*(1-wv)*sA*sB*rhov; return {ret, risk:Math.sqrt(v)}; }
  function draw(){
    let d=''; for(let ww=0; ww<=1.0001; ww+=0.02){ const p=portfolio(ww,rho); d+=(d?'L':'M')+xOf(p.risk)+' '+yOf(p.ret)+' '; }
    curve.setAttribute('d',d);
    const A=portfolio(1,rho), B=portfolio(0,rho);

    const p=portfolio(w,rho); dot.setAttribute('cx',xOf(p.risk)); dot.setAttribute('cy',yOf(p.ret));

    document.getElementById('dv-s').textContent=p.risk.toFixed(2)+'%';
    document.getElementById('dv-rho').textContent=rho.toFixed(1);
    document.getElementById('dv-wl').textContent=Math.round(w*100)+'%';
    document.getElementById('dv-rl').textContent=rho.toFixed(1);
  }
  draw();
  c.querySelector('#dv-wr').addEventListener('input',e=>{ w=+e.target.value/100; draw(); });
  c.querySelector('#dv-rr').addEventListener('input',e=>{ rho=+e.target.value/100; draw(); });
};

/* ---------------------------------------------------------------------------
   COMPOUND GROWTH — Rule of 72 made visual; drag rate & years
   --------------------------------------------------------------------------- */
GRAPHICS['compound-growth'] = function(mount){
  const P=10000; let rate=8, years=30;
  mount.innerHTML='<div class="g-title">The power of compounding (& the Rule of 72)</div><div class="g-sub">$10,000 growing at a fixed rate. Notice the curve bends upward — money makes money on money. The Rule of 72 estimates how fast it doubles.</div>';
  const W=520,H=220,padL=58,padR=14,padT=14,padB=28, plotW=W-padL-padR, plotH=H-padT-padB;
  const xMax=40;
  const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H}); mount.appendChild(svg);
  const ro=document.createElement('div'); ro.className='readout';
  ro.innerHTML='<div class="ro"><div class="k">After</div><div class="v" id="cg-yr"></div></div><div class="ro"><div class="k">Value</div><div class="v" id="cg-v" style="color:#46d39a"></div></div><div class="ro"><div class="k">Growth multiple</div><div class="v" id="cg-m"></div></div><div class="ro"><div class="k">Doubles every (Rule of 72)</div><div class="v" id="cg-d" style="color:#ffcf5c"></div></div>';
  mount.appendChild(ro);
  const c=document.createElement('div'); c.className='ctrls';
  c.innerHTML='<label class="ctrl">Annual rate: <b id="cg-rl"></b><input id="cg-rr" type="range" min="1" max="15" step="1" value="8"></label><label class="ctrl">Years: <b id="cg-yl"></b><input id="cg-yr2" type="range" min="1" max="40" step="1" value="30"></label>';
  mount.appendChild(c);
  function fv(t){ return P*Math.pow(1+rate/100,t); }
  function draw(){
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    const yMax=fv(xMax);
    const xOf=t=>padL+plotW*t/xMax, yOf=v=>padT+plotH*(1-v/yMax);
    for(let k=0;k<=4;k++){ const val=yMax*k/4; svg.appendChild(svgEl('line',{x1:padL,y1:yOf(val),x2:W-padR,y2:yOf(val),stroke:'#2a2f3a'})); const t=svgEl('text',{x:padL-6,y:yOf(val)+3,'text-anchor':'end',fill:'#9aa3b2','font-size':9}); t.textContent='$'+Math.round(val/1000)+'k'; svg.appendChild(t); }
    for(let x=0;x<=xMax;x+=10){ const t=svgEl('text',{x:xOf(x),y:H-10,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); t.textContent=x+'y'; svg.appendChild(t); }
    let d=''; for(let t=0;t<=xMax;t+=0.5){ d+=(d?'L':'M')+xOf(t)+' '+yOf(fv(t))+' '; } svg.appendChild(svgEl('path',{d,fill:'none',stroke:'#46d39a','stroke-width':2.6}));
    const dot=svgEl('circle',{cx:xOf(years),cy:yOf(fv(years)),r:6,fill:'#fff',stroke:'#46d39a','stroke-width':2}); svg.appendChild(dot);
    const scrub=svgEl('line',{x1:xOf(years),y1:padT,x2:xOf(years),y2:padT+plotH,stroke:'#fff','stroke-dasharray':'4 3',opacity:.5}); svg.appendChild(scrub);
    document.getElementById('cg-yr').textContent=years+' years';
    document.getElementById('cg-v').textContent=usd(fv(years));
    document.getElementById('cg-m').textContent=(fv(years)/P).toFixed(1)+'×';
    document.getElementById('cg-d').textContent='~'+(72/rate).toFixed(1)+' years';
    document.getElementById('cg-rl').textContent=rate+'%';
    document.getElementById('cg-yl').textContent=years;
  }
  draw();
  c.querySelector('#cg-rr').addEventListener('input',e=>{ rate=+e.target.value; draw(); });
  c.querySelector('#cg-yr2').addEventListener('input',e=>{ years=+e.target.value; draw(); });
};

  mount.innerHTML='<div class="g-title">Margin & the margin call</div><div class="g-sub">You bought $10,000 of stock with Reg T 50% — $5,000 your cash, $5,000 borrowed. The $5,000 loan (debit) is fixed. Slide the stock value: if your equity falls below the 25% maintenance line, you get a call.</div>';

    // maintenance marker (25% of value, measured from left)
    const mx=x0+maint*scale;

    const t2=svgEl('text',{x:x0+debit*scale+4,y:14,fill:'#5b9dff','font-size':9}); t2.textContent='equity'; svg.appendChild(t2);
  }
  function upd(){
    const eq=val-debit, maint=0.25*val, call=Math.max(0,maint-eq);

/* ---------------------------------------------------------------------------
   BOND YIELD HIERARCHY — slide price; watch Coupon / Current Yield / YTM reorder
   --------------------------------------------------------------------------- */
GRAPHICS['bond-yield-hierarchy'] = function(mount){
  const coupon=5, par=1000, years=10; let price=950;
  function bp(y){ const r=y/100; let p=0; for(let t=1;t<=years;t++) p+=(coupon/100*par)/Math.pow(1+r,t); p+=par/Math.pow(1+r,years); return p; }
  function ytm(P){ let lo=0.01, hi=25; for(let k=0;k<60;k++){ const mid=(lo+hi)/2; if(bp(mid)>P) lo=mid; else hi=mid; } return (lo+hi)/2; }
  mount.innerHTML='<div class="g-title">Premium vs. discount: the yield ordering</div><div class="g-sub">A 5% coupon, 10-year, $1,000 bond. Slide its price. When it trades above par (premium) the order is Coupon &gt; Current Yield &gt; YTM; below par (discount) it flips.</div>';
  const W=520,H=120;
  const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H}); mount.appendChild(svg);
  const verdict=document.createElement('div'); verdict.style.cssText='margin:8px 0;font-size:14px;font-weight:700;text-align:center'; mount.appendChild(verdict);
  const ro=document.createElement('div'); ro.className='readout';
  ro.innerHTML='<div class="ro"><div class="k">Coupon (nominal)</div><div class="v" id="yh-c" style="color:#ffcf5c"></div></div><div class="ro"><div class="k">Current yield</div><div class="v" id="yh-cy" style="color:#5b9dff"></div></div><div class="ro"><div class="k">Yield to maturity</div><div class="v" id="yh-y" style="color:#46d39a"></div></div><div class="ro"><div class="k">Price</div><div class="v" id="yh-p"></div></div>';
  mount.appendChild(ro);
  const c=document.createElement('div'); c.className='ctrls';
  c.innerHTML='<label class="ctrl">Bond price: <b id="yh-pl"></b><input id="yh-r" type="range" min="820" max="1200" step="10" value="950"></label>';
  mount.appendChild(c);
  function draw(){
    while(svg.firstChild) svg.removeChild(svg.firstChild);
    const cy=(coupon/100*par)/price*100, y=ytm(price);
    const vals=[{n:'Coupon',v:coupon,c:'#ffcf5c'},{n:'Current',v:cy,c:'#5b9dff'},{n:'YTM',v:y,c:'#46d39a'}];
    const x0=20,x1=W-20, vMin=3.5,vMax=6.5, scale=(x1-x0)/(vMax-vMin);
    vals.forEach((it,i)=>{ const yy=20+i*30; const w=Math.max(2,(it.v-vMin)*scale);
      svg.appendChild(svgEl('rect',{x:x0,y:yy,width:w,height:18,rx:4,fill:it.c,opacity:.8}));
      const t=svgEl('text',{x:x0+w+6,y:yy+13,fill:'#e7e9ee','font-size':10}); t.textContent=it.n+' '+it.v.toFixed(2)+'%'; svg.appendChild(t);
    });
    document.getElementById('yh-c').textContent=coupon.toFixed(2)+'%';
    document.getElementById('yh-cy').textContent=cy.toFixed(2)+'%';
    document.getElementById('yh-y').textContent=y.toFixed(2)+'%';
    document.getElementById('yh-p').textContent=usd(price);
    document.getElementById('yh-pl').textContent=usd(price);
    if(price>par+2){ verdict.textContent='PREMIUM → Coupon > Current Yield > YTM'; verdict.style.color='#ff9f43'; }
    else if(price<par-2){ verdict.textContent='DISCOUNT → Coupon < Current Yield < YTM'; verdict.style.color='#46d39a'; }
    else { verdict.textContent='PAR → all three are equal'; verdict.style.color='#9aa3b2'; }
  }
  draw();
  c.querySelector('#yh-r').addEventListener('input',e=>{ price=+e.target.value; draw(); });
};

/* ============================================================================
   AUTO-LINKER  — wrap known glossary terms in clickable spans, safely
   (walks text nodes only; never breaks HTML; links each term once per block)
   ============================================================================ */
let ALIAS = null;
function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
function buildAlias(){
  const pairs = [];
  for(const id in GLOSSARY){
    const g = GLOSSARY[id];
    const names = [g.term].concat(g.aliases||[]);
    for(const n of names){ if(n && n.length>=3) pairs.push([n, id]); }
  }
  pairs.sort((a,b)=> b[0].length - a[0].length);
  const map = {}; const toks = [];
  for(const [alias,id] of pairs){
    const key = alias.toLowerCase();
    if(!(key in map)){ map[key]=id; toks.push(escapeRegex(alias)); }
  }
  let re;
  try { re = new RegExp('(?<![\\w-])(' + toks.join('|') + ')(?![\\w-])', 'gi'); }
  catch(e){ re = new RegExp('\\b(' + toks.join('|') + ')\\b', 'gi'); }
  ALIAS = { re, map };
}
function autolink(root, opts){
  if(!ALIAS) return;
  opts = opts || {};
  const skip = opts.skip || null;
  const once = new Set(); if(skip) once.add(skip);
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
    acceptNode(node){
      if(!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
      let p = node.parentNode;
      while(p && p !== root){
        const tag = p.nodeName;
        if(tag==='A'||tag==='SCRIPT'||tag==='STYLE'||tag==='BUTTON'||tag==='SUMMARY') return NodeFilter.FILTER_REJECT;
        if(tag==='SVG'||tag==='svg'||tag.indexOf('MJX')===0) return NodeFilter.FILTER_REJECT;  // never touch rendered math or graphics
        if(p.classList && (p.classList.contains('term')||p.classList.contains('no-link'))) return NodeFilter.FILTER_REJECT;
        p = p.parentNode;
      }
      return NodeFilter.FILTER_ACCEPT;
    }
  });
  const nodes = []; while(walker.nextNode()) nodes.push(walker.currentNode);
  const { re, map } = ALIAS;
  for(const tn of nodes){
    const text = tn.nodeValue; re.lastIndex = 0;
    let m, last = 0, frag = null;
    while((m = re.exec(text))){
      const id = map[m[1].toLowerCase()];
      if(!id) continue;
      if(once.has(id)) continue;
      once.add(id);
      if(!frag) frag = document.createDocumentFragment();
      frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const s = document.createElement('span'); s.className='term'; s.dataset.term=id; s.textContent=m[1];
      frag.appendChild(s);
      last = m.index + m[1].length;
    }
    if(frag){ frag.appendChild(document.createTextNode(text.slice(last))); tn.parentNode.replaceChild(frag, tn); }
  }
}
/* typeset math first (so the linker can't corrupt LaTeX), THEN link terms */
/* escape literal currency dollars (e.g., $10) so MathJax treats them as text,
   not as inline-math delimiters. Only escapes "$" directly before a digit and
   NOT part of a "$$" display-math opener. Runs before MathJax typesets. */
function escapeCurrencyDollars(root){
  let re; try{ re = /(?<!\$)\$(?=\d)/g; }catch(e){ re = /\$(?=\d)/g; }
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes=[]; while(walker.nextNode()) nodes.push(walker.currentNode);
  for(const n of nodes){ if(n.nodeValue.indexOf('$')>=0 && /\$\d/.test(n.nodeValue)) n.nodeValue = n.nodeValue.replace(re, '\\$'); }
}
function typesetThenLink(el, opts){
  try{ escapeCurrencyDollars(el); }catch(e){}
  const done = ()=>{ try{ autolink(el, opts||{}); }catch(e){} };
  if(window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([el]).then(done).catch(done);
  else done();
}

let stack = [];

function openTerm(id, reset){
  if(!GLOSSARY[id]){ return; }
  if(reset) stack = [];
  if(stack[stack.length-1] !== id) stack.push(id);

  drawer.classList.add('show'); scrim.classList.add('show');

}

        multi worked-examples, and a generic per-example MINICHART ---- */
function renderEquation(eq){
  let h='<div class="equation-block"><div class="eq-math">$$'+eq.latex+'$$</div>';
  if(eq.where && eq.where.length){
    h+='<div class="eq-where"><div class="eq-where-h">where each term means</div><ul>'
      + eq.where.map(w=>'<li><span class="eq-sym no-link">$'+w.s+'$</span><span>'+w.d+'</span></li>').join('')
      + '</ul></div>';
  }
  return h+'</div>';
}
function renderExamples(list){
  let h='<div class="examples"><div class="examples-h">Worked Examples</div>';
  list.forEach((ex,i)=>{
    h+='<div class="example-card"><div class="ex-title no-link">'+(i+1)+'. '+ex.title+'</div>';
    if(ex.scenario) h+='<div class="ex-scenario">'+ex.scenario+'</div>';
    if(ex.given && ex.given.length) h+='<div class="ex-given no-link">'+ex.given.map(x=>'<span class="eq-sym">$'+x.s+'$</span> = '+x.d).join(' &nbsp;&middot;&nbsp; ')+'</div>';
    if(ex.steps && ex.steps.length) h+='<div class="ex-steps no-link">'+ex.steps.map(s=>'$$'+s+'$$').join('')+'</div>';
    if(ex.result) h+='<div class="ex-result">'+ex.result+'</div>';
    if(ex.chart) h+='<div class="minichart" data-chart="'+encodeURIComponent(JSON.stringify(ex.chart))+'"></div>';
    if(ex.graphicId && GRAPHICS[ex.graphicId]) h+='<div class="graphic" data-graphic="'+ex.graphicId+'"></div>';
    h+='</div>';
  });
  return h+'</div>';
}
function MINICHART(mount, spec){
  spec=spec||{}; const W=480; const unit=spec.unit||'';
  function fmt(v){ const r=Math.round(v*100)/100; if(unit==='$') return '$'+r.toLocaleString(); if(unit==='%') return r+'%'; return r+(unit?' '+unit:''); }
  if(spec.title){ const t=document.createElement('div'); t.className='mc-title'; t.textContent=spec.title; mount.appendChild(t); }
  if(spec.type==='bars'){
    const data=spec.data||[]; const max=spec.max || (Math.max.apply(null,data.map(d=>Math.abs(d.value)))*1.18) || 1;
    const rh=30, H=data.length*rh+8, x0=8, x1=W-160;
    const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H});
    data.forEach((d,i)=>{ const y=i*rh+6; const w=Math.max(2,Math.abs(d.value)/max*(x1-x0)); const col=d.color||'#5b9dff';
      svg.appendChild(svgEl('rect',{x:x0,y:y,width:w,height:18,rx:4,fill:col,opacity:.85}));
      const lab=svgEl('text',{x:x0+w+8,y:y+13,fill:'#e7e9ee','font-size':12}); lab.textContent=d.label+'  '+fmt(d.value); svg.appendChild(lab); });
    mount.appendChild(svg); return;
  }
  if(spec.type==='stack'){
    const seg=spec.segments||[]; const tot=seg.reduce((s,x)=>s+Math.abs(x.value),0)||1;
    const H=68, x0=8, x1=W-8; const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H}); let x=x0;
    seg.forEach(s=>{ const w=Math.abs(s.value)/tot*(x1-x0); svg.appendChild(svgEl('rect',{x:x,y:18,width:Math.max(1,w),height:24,fill:s.color||'#5b9dff',opacity:.85}));
      if(w>42){ const t=svgEl('text',{x:x+w/2,y:34,'text-anchor':'middle',fill:'#06122b','font-size':10,'font-weight':'700'}); t.textContent=fmt(s.value); svg.appendChild(t); }
      if(w>30){ const lab=svgEl('text',{x:x+w/2,y:57,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); lab.textContent=s.label; svg.appendChild(lab); } x+=w; });
    mount.appendChild(svg); return;
  }
  if(spec.type==='numberline'){
    const min=spec.min, max=spec.max, H=64, padL=16,padR=16; const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H});
    const xOf=v=>padL+(W-padL-padR)*(v-min)/((max-min)||1);
    svg.appendChild(svgEl('line',{x1:padL,y1:40,x2:W-padR,y2:40,stroke:'#2a2f3a','stroke-width':2}));
    [min,max].forEach(v=>{ const t=svgEl('text',{x:xOf(v),y:56,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); t.textContent=fmt(v); svg.appendChild(t); });
    (spec.marks||[]).forEach(m=>{ const x=xOf(m.value); svg.appendChild(svgEl('circle',{cx:x,cy:40,r:6,fill:m.color||'#5b9dff',stroke:'#fff','stroke-width':1.5}));
      const t=svgEl('text',{x:x,y:24,'text-anchor':'middle',fill:m.color||'#e7e9ee','font-size':10}); t.textContent=m.label+' '+fmt(m.value); svg.appendChild(t); });
    mount.appendChild(svg); return;
  }
  if(spec.type==='line'){
    const pts=spec.points||[]; if(!pts.length) return; const H=160,padL=44,padR=12,padT=12,padB=22, plotW=W-padL-padR, plotH=H-padT-padB;
    const xs=pts.map(p=>p[0]), ys=pts.map(p=>p[1]);
    const xmin=Math.min.apply(null,xs), xmax=Math.max.apply(null,xs), ymin=Math.min(0,Math.min.apply(null,ys)), ymax=(Math.max.apply(null,ys)*1.1)||1;
    const xOf=x=>padL+plotW*(x-xmin)/((xmax-xmin)||1), yOf=y=>padT+plotH*(1-(y-ymin)/((ymax-ymin)||1));
    const svg=svgEl('svg',{viewBox:'0 0 '+W+' '+H});
    svg.appendChild(svgEl('line',{x1:padL,y1:yOf(ymin),x2:W-padR,y2:yOf(ymin),stroke:'#2a2f3a'}));
    const yl=svgEl('text',{x:padL-6,y:yOf(ymax)+4,'text-anchor':'end',fill:'#9aa3b2','font-size':9}); yl.textContent=fmt(ymax); svg.appendChild(yl);
    let d=''; pts.forEach((p,i)=>{ d+=(i?'L':'M')+xOf(p[0])+' '+yOf(p[1])+' '; });
    svg.appendChild(svgEl('path',{d,fill:'none',stroke:spec.color||'#5b9dff','stroke-width':2.4}));
    (spec.marks||[]).forEach(m=>{ svg.appendChild(svgEl('circle',{cx:xOf(m[0]),cy:yOf(m[1]),r:4,fill:'#46d39a'})); });
    if(spec.xlabel){ const t=svgEl('text',{x:W/2,y:H-2,'text-anchor':'middle',fill:'#9aa3b2','font-size':9}); t.textContent=spec.xlabel; svg.appendChild(t); }
    mount.appendChild(svg); return;
  }
}

function renderDrawer(){
  const id = stack[stack.length-1];
  const g = GLOSSARY[id];
  // breadcrumbs
  const cr = document.getElementById('crumbs');
  cr.innerHTML = stack.map((sid,i)=>{
    const name = GLOSSARY[sid] ? GLOSSARY[sid].term : sid;
    return '<span class="c" data-i="'+i+'">'+name+'</span>' + (i<stack.length-1?'<span class="sep">›</span>':'');
  }).join('');

  let html = '<h2 class="no-link">'+g.term+'</h2>';
  if(g.expand) html += '<div class="expand-sub no-link">'+g.expand+'</div>';
  if(g.eli5) html += '<div class="eli5 no-link">'+g.eli5+'</div>';
  if(g.memory) html += '<div class="memory">'+g.memory+'</div>';
  if(g.equation) html += renderEquation(g.equation);
  if(g.full) html += g.full;
  if(g.graphic && GRAPHICS[g.graphic]) html += '<div class="graphic" data-graphic="'+g.graphic+'"></div>';
  if(g.examples && g.examples.length) html += renderExamples(g.examples);
  if(g.trap) html += '<div class="trap"><span class="trap-h">Exam trap</span>'+g.trap+'</div>';
  if(g.worked) html += '<div class="worked"><div class="wt">Worked example</div>'+g.worked+'</div>';
  if(g.deeper) html += '<details class="deeper"><summary>Go deeper</summary><div class="deeper-in">'+g.deeper+'</div></details>';
  if(g.related && g.related.length){
    html += '<div class="related"><div class="rt">Related concepts</div>'
      + g.related.map(r=> GLOSSARY[r] ? '<span class="rel-chip" data-term="'+r+'">'+GLOSSARY[r].term+'</span>' : '').join('')
      + '</div>';
  }
  const body = document.getElementById('drawerBody');
  body.innerHTML = html;
  body.scrollTop = 0;

  // mount graphics
  body.querySelectorAll('[data-graphic]').forEach(el=>{
    const fn = GRAPHICS[el.dataset.graphic]; if(fn) fn(el);
  });
  // mount per-example mini-charts
  body.querySelectorAll('[data-chart]').forEach(el=>{
    try{ MINICHART(el, JSON.parse(decodeURIComponent(el.dataset.chart))); }catch(e){}
  });
  // typeset math first, then autolink everything except the current term
  typesetThenLink(body, { skip:id });
}

const tooltip = document.getElementById('tooltip');
let ttTimer = null;
function showTooltip(el){
  const id = el.dataset.term; const g = GLOSSARY[id]; if(!g) return;
  tooltip.innerHTML = '<span class="tt-term">'+g.term+'</span>'+(g.eli5||'')+'<div class="tt-hint">click to explore →</div>';
  tooltip.style.display='block';
  const r = el.getBoundingClientRect();
  let top = r.bottom + 8, left = r.left;
  tooltip.style.left = '-9999px'; tooltip.style.top='0';
  requestAnimationFrame(()=>{
    const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
    if(left + tw > window.innerWidth - 12) left = window.innerWidth - tw - 12;
    if(top + th > window.innerHeight - 12) top = r.top - th - 8;
    tooltip.style.left = Math.max(12,left)+'px'; tooltip.style.top = Math.max(12,top)+'px'; tooltip.style.opacity='1';
  });
}
function hideTooltip(){ tooltip.style.opacity='0'; clearTimeout(ttTimer); setTimeout(()=>{ if(tooltip.style.opacity==='0') tooltip.style.display='none'; },150); }

document.addEventListener('mouseover', e=>{
  const t = e.target.closest('.term'); if(!t) return;
  clearTimeout(ttTimer); ttTimer = setTimeout(()=>showTooltip(t), 280);
});
document.addEventListener('mouseout', e=>{
  const t = e.target.closest('.term'); if(!t) return; hideTooltip();
});

/* ============================================================================
   MODES
   ============================================================================ */
let mode = 'study';
let studyIndex = 0;
let studyFilter = 'ALL';
let studyShowBack = false;

function setMode(m){
  mode = m;
  if(m!=='exam') clearInterval(examTimer);
  document.querySelectorAll('.tab').forEach(t=> t.classList.toggle('active', t.dataset.mode===m));
  render();
}
document.querySelectorAll('.tab').forEach(t=> t.onclick = ()=> setMode(t.dataset.mode));

function render(){
  const v = document.getElementById('view');
  if(mode==='study') renderStudy(v);
  else if(mode==='explore') renderExplore(v);
  else if(mode==='test') renderTest(v);
  else renderExam(v);
}

/* ---------- STUDY ---------- */
function studyDeck(){ return studyFilter==='ALL' ? CARDS : CARDS.filter(c=>c.sec===studyFilter); }
function renderStudy(v){
  const deck = studyDeck();
  if(studyIndex>=deck.length) studyIndex=0;
  const secs = Array.from(new Set(CARDS.map(c=>c.sec)));
  let chips = '<div class="chip '+(studyFilter==='ALL'?'active':'')+'" data-f="ALL">All ('+CARDS.length+')</div>';
  chips += secs.map(s=>'<div class="chip '+(studyFilter===s?'active':'')+'" data-f="'+s+'">'+(SECTIONS[s]||s)+'</div>').join('');

  const c = deck[studyIndex];
  let cardHtml;
  if(!c){ cardHtml = '<div class="empty">No cards in this filter.</div>'; }
  else {
    cardHtml =
      '<div class="flash" id="flash">'
      + '<div class="face-label">'+(studyShowBack?'Answer':'Term')+'</div>'
      + '<div class="sec">'+(SECTIONS[c.sec]||c.sec)+'</div>'
      + (studyShowBack
          ? '<div class="ans">'+c.back+'</div>'
          : '<div class="term-q">'+c.front+'</div>')
      + '<div class="hint">'+(studyShowBack?'Tap card for term · click any underlined word to learn it':'Tap card to flip')+'</div>'
      + '</div>';
  }

  v.innerHTML =
    '<div class="toolbar">'+chips+'<span class="count" id="scount"></span></div>'
    + cardHtml
    + '<div class="nav-row">'
    + '<button class="btn" id="prev">‹ Prev</button>'
    + '<button class="btn primary" id="flip">Flip</button>'
    + '<button class="btn" id="next">Next ›</button>'
    + '</div>';

  document.getElementById('scount').textContent = deck.length ? (studyIndex+1)+' / '+deck.length : '';
  v.querySelectorAll('.chip').forEach(ch=> ch.onclick=()=>{ studyFilter=ch.dataset.f; studyIndex=0; studyShowBack=false; renderStudy(v); });
  const flashEl = document.getElementById('flash');
  if(flashEl){
    flashEl.onclick = (e)=>{ if(e.target.closest('.term')) return; studyShowBack=!studyShowBack; renderStudy(v); };
    if(studyShowBack){ typesetThenLink(flashEl.querySelector('.ans'), {}); }
    else if(window.MathJax&&MathJax.typesetPromise){ MathJax.typesetPromise([flashEl]).catch(()=>{}); }
  }
  document.getElementById('flip').onclick = ()=>{ studyShowBack=!studyShowBack; renderStudy(v); };
  document.getElementById('prev').onclick = ()=>{ studyIndex=(studyIndex-1+deck.length)%deck.length; studyShowBack=false; renderStudy(v); };
  document.getElementById('next').onclick = ()=>{ studyIndex=(studyIndex+1)%deck.length; studyShowBack=false; renderStudy(v); };
}

/* ---------- EXPLORE ---------- */
function renderExplore(v){
  const ids = Object.keys(GLOSSARY);
  if(!ids.length){ v.innerHTML = '<div class="empty">Glossary loading…</div>'; return; }
  // group
  const groups = {};
  ids.forEach(id=>{ const g=GLOSSARY[id]; const grp=g.group||'General'; (groups[grp]=groups[grp]||[]).push(id); });
  let html = '<p style="color:var(--ink-dim);font-size:13.5px;margin-top:0">Click any concept to open it. Inside, every underlined word drills deeper — keep going until it makes sense. <b>'+ids.length+'</b> concepts and counting.</p>';
  Object.keys(groups).sort().forEach(grp=>{
    html += '<div class="group-title">'+grp+'</div><div class="gloss-grid">';
    groups[grp].sort((a,b)=>GLOSSARY[a].term.localeCompare(GLOSSARY[b].term)).forEach(id=>{
      const g=GLOSSARY[id];
      html += '<div class="gloss-card" data-term="'+id+'"><div class="gt">'+g.term+'</div><div class="gd">'+(g.eli5||'').replace(/<[^>]+>/g,'')+'</div>'
        + (g.graphic?'<span class="badge">interactive ▸</span>':'')+'</div>';
    });
    html += '</div>';
  });
  v.innerHTML = html;
  v.querySelectorAll('.gloss-card').forEach(card=> card.onclick=()=> openTerm(card.dataset.term, true));
}

/* ---------- TEST ---------- */
let quizOrder = [], quizPos = 0, quizScore = 0, quizAnswered = false;
function startQuiz(){
  quizOrder = QUIZ.map((_,i)=>i);
  // light shuffle (deterministic-free ok here)
  for(let i=quizOrder.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [quizOrder[i],quizOrder[j]]=[quizOrder[j],quizOrder[i]]; }
  quizPos=0; quizScore=0; quizAnswered=false;
}
function renderTest(v){
  if(!QUIZ.length){ v.innerHTML='<div class="empty">Question bank loading…</div>'; return; }
  if(!quizOrder.length) startQuiz();
  if(quizPos>=quizOrder.length){
    v.innerHTML = '<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
      + '<div class="qtext">Quiz complete</div>'
      + '<div style="font-size:42px;font-weight:800;color:var(--accent)">'+quizScore+' / '+quizOrder.length+'</div>'
      + '<p style="color:var(--ink-dim)">'+Math.round(quizScore/quizOrder.length*100)+'% — review any concept in Explore, then go again.</p>'
      + '<button class="btn primary" id="again">Restart</button></div></div>';
    document.getElementById('again').onclick=()=>{ startQuiz(); renderTest(v); };
    return;
  }
  const q = QUIZ[quizOrder[quizPos]];
  quizAnswered=false;
  v.innerHTML = '<div class="quiz-wrap">'
    + '<div class="scorebar"><span>Q'+(quizPos+1)+' / '+quizOrder.length+'</span><div class="progress"><div style="width:'+(quizPos/quizOrder.length*100)+'%"></div></div><span>Score '+quizScore+'</span></div>'
    + '<div class="qcard">'
    + '<div class="qmeta"><span>'+(SECTIONS[q.sec]||q.sec||'Series 65')+'</span></div>'
    + '<div class="qtext">'+q.q+'</div>'
    + '<div id="choices">'+ q.choices.map((ch,i)=>'<button class="choice" data-i="'+i+'"><span class="mk">'+String.fromCharCode(65+i)+'</span>'+ch+'</button>').join('') +'</div>'
    + '<div class="explain" id="explain"></div>'
    + '<div class="nav-row" style="justify-content:flex-end;margin-top:16px"><button class="btn primary" id="qnext" style="display:none">Next ›</button></div>'
    + '</div></div>';

  const choicesEl = v.querySelector('#choices');
  const explainEl = v.querySelector('#explain');
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([v]).catch(()=>{});
  choicesEl.querySelectorAll('.choice').forEach(btn=>{
    btn.onclick = ()=>{
      if(quizAnswered) return; quizAnswered=true;
      const pick = +btn.dataset.i;
      const correct = q.answer;
      choicesEl.querySelectorAll('.choice').forEach((b,i)=>{
        if(i===correct) b.classList.add('correct');
        else if(i===pick) b.classList.add('wrong');
        b.style.pointerEvents='none';
      });
      if(pick===correct) quizScore++;
      explainEl.innerHTML = '<div class="why">'+(pick===correct?'<b style="color:var(--good)">Correct.</b> ':'<b style="color:var(--bad)">Not quite.</b> ')+q.explain+'</div>';
      explainEl.classList.add('show');
      typesetThenLink(explainEl, {});
      const nx=v.querySelector('#qnext'); nx.style.display='inline-block';
      nx.onclick=()=>{ quizPos++; renderTest(v); };
    };
  });
}

/* ============================================================================
   EXAM SIMULATOR  — section-weighted, timed, auto-generated from all cards
   ============================================================================ */
const NASAA_AREAS = {
  "Economic Factors (15%)": { weight:0.15, secs:["ECON","IND","TVM","TECH"] },
  "Investment Vehicles (25%)": { weight:0.25, secs:["MM","FI","EQ","POOL","INS","DERIV","ALT"] },
  "Strategies (30%)": { weight:0.30, secs:["SUIT","RISK","RAR","MPT","STRAT","TAX","RET","EDU","ACCT","PERF"] },
  "Laws & Ethics (30%)": { weight:0.30, secs:["IAA","USA","FED","AML","REGBI","ETH"] }
};
function secArea(sec){ for(const a in NASAA_AREAS){ if(NASAA_AREAS[a].secs.indexOf(sec)>=0) return a; } return null; }
function stripHtml(h){ const d=document.createElement('div'); d.innerHTML=h; return (d.textContent||'').replace(/\s+/g,' ').trim(); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function firstSentence(txt){ const m=txt.match(/^.*?[.:](\s|$)/); let s=m?m[0]:txt; if(s.length<45) s=txt.slice(0,170); return s.trim(); }

function buildExam(n){
  const eligible = CARDS.filter(c=> secArea(c.sec));
  const byArea = {}; for(const a in NASAA_AREAS) byArea[a]=[];
  eligible.forEach(c=> byArea[secArea(c.sec)].push(c));
  const areas = Object.keys(NASAA_AREAS);
  let counts = areas.map(a=> Math.round(n*NASAA_AREAS[a].weight));
  counts[0] += n - counts.reduce((x,y)=>x+y,0);   // absorb rounding
  const qs=[];
  areas.forEach((a,idx)=>{
    const pool = shuffle(byArea[a]); const need = counts[idx];
    for(let k=0; k<need && k<pool.length; k++){
      const card = pool[k];
      const correct = card.front;
      const distract = shuffle(pool.filter(c=>c.front!==correct)).slice(0,3).map(c=>c.front);
      const choices = shuffle([correct].concat(distract));
      let sent = firstSentence(stripHtml(card.back));
      try { const r = new RegExp(stripHtml(correct).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'ig'); sent = sent.replace(r,'_____'); } catch(e){}
      qs.push({ stem:'Which concept best matches this description?  “'+sent+'”', choices, answer:choices.indexOf(correct), area:a, sec:card.sec, back:card.back, front:correct });
    }
  });
  return shuffle(qs);
}

  if(examState.pos>=examState.qs.length){ return renderExamResults(v); }
  const q=examState.qs[examState.pos];

    + '<div class="qtext">'+q.stem+'</div>'
    + '<div id="choices">'+q.choices.map((c,i)=>'<button class="choice" data-i="'+i+'"><span class="mk">'+String.fromCharCode(65+i)+'</span>'+c+'</button>').join('')+'</div>'
    + '<div class="nav-row" style="justify-content:space-between;margin-top:16px"><button class="btn" id="examSkip">Skip</button><button class="btn primary" id="examNext" disabled>Next ›</button></div>'
    + '</div></div>';
  if(window.MathJax&&MathJax.typesetPromise) MathJax.typesetPromise([v]).catch(()=>{});
  let chosen=null;
  v.querySelectorAll('.choice').forEach(b=> b.onclick=()=>{
    chosen=+b.dataset.i;
    v.querySelectorAll('.choice').forEach(x=> x.classList.remove('correct','wrong'));
    b.style.borderColor='var(--accent)';
    v.querySelector('#examNext').disabled=false;
  });
  v.querySelector('#examNext').onclick=()=>{ examState.answers[examState.pos]=chosen; examState.pos++; renderExam(v); };
  v.querySelector('#examSkip').onclick=()=>{ examState.answers[examState.pos]=(chosen==null?null:chosen); examState.pos++; renderExam(v); };
  startExamClock(v);
}
function startExamClock(v){
  clearInterval(examTimer);
  if(!examState.timed){ const c=document.getElementById('examClock'); if(c) c.textContent='untimed'; return; }
  function tick(){
    if(!examState || mode!=='exam'){ clearInterval(examTimer); return; }
    const mm=Math.floor(examState.remaining/60), ss=examState.remaining%60;
    const el=document.getElementById('examClock');
    if(el){ el.textContent='⏱ '+mm+':'+String(ss).padStart(2,'0'); el.style.color = examState.remaining<60?'var(--bad)':'var(--ink-dim)'; }
    if(examState.remaining<=0){ clearInterval(examTimer); examState.pos=examState.qs.length; renderExam(v); return; }
    examState.remaining--;
  }
  tick(); examTimer=setInterval(tick,1000);
}
function renderExamResults(v){
  clearInterval(examTimer);
  const qs=examState.qs, ans=examState.answers;
  let correct=0; const tally={};
  qs.forEach((q,i)=>{ const ok=ans[i]===q.answer; if(ok)correct++; (tally[q.area]=tally[q.area]||{c:0,t:0}); tally[q.area].t++; if(ok)tally[q.area].c++; });
  const pct=Math.round(correct/qs.length*100), pass=pct>=72;
  let html='<div class="quiz-wrap"><div class="qcard" style="text-align:center">'
    + '<div class="qtext">'+(pass?'<span style="color:var(--good)">PASS</span>':'<span style="color:var(--bad)">Below pass mark</span>')+'</div>'
    + '<div style="font-size:46px;font-weight:800;color:'+(pass?'var(--good)':'var(--bad)')+'">'+pct+'%</div>'
    + '<p style="color:var(--ink-dim)">'+correct+' / '+qs.length+' correct · pass mark 72%</p>'
    + '<div class="readout" style="text-align:left">';
  Object.keys(tally).forEach(a=>{ const t=tally[a]; html+='<div class="ro"><div class="k">'+a+'</div><div class="v">'+t.c+'/'+t.t+' · '+Math.round(t.c/t.t*100)+'%</div></div>'; });
  html += '</div><div class="nav-row"><button class="btn" id="examReview">Review misses</button><button class="btn primary" id="examAgain">New exam</button></div>'
    + '</div><div id="reviewArea"></div></div>';
  v.innerHTML=html;
  v.querySelector('#examAgain').onclick=()=>{ examState=null; renderExam(v); };
  v.querySelector('#examReview').onclick=()=>{
    const misses=qs.map((q,i)=>({q,i})).filter(x=> ans[x.i]!==x.q.answer);
    const ra=document.getElementById('reviewArea');
    if(!misses.length){ ra.innerHTML='<div class="empty">Perfect score — nothing to review.</div>'; return; }
    ra.innerHTML = misses.map(x=>{
      const q=x.q, your = (x.i in ans && ans[x.i]!=null) ? q.choices[ans[x.i]] : '(skipped)';
      return '<div class="qcard" style="margin-top:12px"><div class="qmeta"><span>'+q.area+'</span></div>'
        + '<div style="font-size:14.5px;margin-bottom:8px">'+q.stem+'</div>'
        + '<div style="font-size:13px;color:var(--bad)">You: '+your+'</div>'
        + '<div style="font-size:13px;color:var(--good);margin-bottom:8px">Correct: '+q.front+'</div>'
        + '<div class="explain show"><div class="why">'+q.back+'</div></div></div>';
    }).join('');
    typesetThenLink(ra,{});
    ra.scrollIntoView({behavior:'smooth'});
  };
}

/* ============================================================================
   SEARCH
   ============================================================================ */
const searchBox = document.getElementById('searchBox');
const searchResults = document.getElementById('searchResults');
searchBox.addEventListener('input', ()=>{
  const q = searchBox.value.trim().toLowerCase();
  if(!q){ searchResults.classList.remove('show'); return; }
  const hits = [];
  for(const id in GLOSSARY){
    const g = GLOSSARY[id];
    const hay = (g.term+' '+(g.aliases||[]).join(' ')+' '+(g.eli5||'')).toLowerCase();
    if(hay.includes(q)) hits.push(id);
    if(hits.length>=12) break;
  }
  if(!hits.length){ searchResults.innerHTML='<div class="sr-item"><div class="d">No concept found. Try Study or Test.</div></div>'; }
  else searchResults.innerHTML = hits.map(id=>'<div class="sr-item" data-term="'+id+'"><div class="t">'+GLOSSARY[id].term+'</div><div class="d">'+(GLOSSARY[id].eli5||'').replace(/<[^>]+>/g,'').slice(0,70)+'…</div></div>').join('');
  searchResults.classList.add('show');
  searchResults.querySelectorAll('.sr-item[data-term]').forEach(it=> it.onclick=()=>{ openTerm(it.dataset.term, true); searchResults.classList.remove('show'); searchBox.value=''; });
});
document.addEventListener('click', e=>{ if(!e.target.closest('.search')) searchResults.classList.remove('show'); });

/* ============================================================================
   BOOT
   ============================================================================ */
function boot(){
  Object.assign(SECTIONS, SECTIONS_DATA);
  CARDS.push(...CARDS_DATA);
  Object.assign(GLOSSARY, GLOSSARY_DATA);
  // merge enhancement layer (equations, multi-examples, acronym expansions) into existing concepts
  if(typeof ENHANCE !== 'undefined'){ for(const id in ENHANCE){ if(GLOSSARY[id]) Object.assign(GLOSSARY[id], ENHANCE[id]); else GLOSSARY[id]=ENHANCE[id]; } }
  QUIZ.push(...QUIZ_DATA);
  buildAlias();
  render();
}

<script>
const SECTIONS_DATA = {"ECON":"Economic Factors","IND":"Indicators / Yields","TVM":"TVM &amp; Financial Stmts","TECH":"Tech / Fundamental / EMH","MM":"Money Market","FI":"Fixed Income","EQ":"Equity Securities","POOL":"Pooled Investments","INS":"Insurance / Annuities","DERIV":"Derivatives","ALT":"Alternatives / Digital","SUIT":"Suitability","RISK":"Risk Types","RAR":"Risk-Adjusted Return","MPT":"Portfolio Theory / CAPM","STRAT":"Asset Allocation / Strategy","TAX":"Tax","RET":"Retirement Plans","EDU":"Education / Estate","ACCT":"Accounts / Trading","PERF":"Performance Measurement","IAA":"Investment Advisers Act","USA":"Uniform Securities Act","FED":"Federal Securities Laws","AML":"AML / Patriot Act","REGBI":"Reg BI / Form CRS","ETH":"Ethics / NASAA Practices","REF":"Threshold Reference","MNEM":"Mnemonics","TRAP":"Common Traps"};

/* CARDS_DATA — starter subset (we can port all 402 from the print deck next) */
const CARDS_DATA = [{"sec":"ECON","front":"GDP vs. GNP","back":"<strong>GDP</strong> = output produced <em>within a country's borders</em>, regardless of who owns the producer. <strong>GNP</strong> = output produced by a country's <em>residents and firms</em>, anywhere in the world.<br><br>Exam trap: a Toyota plant in Kentucky &rarr; counts in <strong>U.S. GDP</strong> but <strong>Japanese GNP</strong>."},{"sec":"ECON","front":"Nominal vs. Real GDP","back":"<strong>Nominal GDP</strong>: uses current prices.<br><strong>Real GDP</strong>: adjusted for inflation using a base-year price level &mdash; isolates actual change in output."},{"sec":"ECON","front":"Recession vs. Depression","back":"<strong>Recession</strong> &mdash; conventionally <strong>2 consecutive quarters</strong> of declining real GDP. (NBER uses a broader judgment-based definition incl. employment, production, sales.)<br><br><strong>Depression</strong> &mdash; ~<strong>6 consecutive quarters</strong> of GDP decline + widespread unemployment, deflation, credit contraction."},{"sec":"ECON","front":"The 4 phases of the business cycle","back":"<strong>1. Expansion (recovery)</strong> &mdash; rising GDP, falling unemployment, rising profits, rising inflation<br><strong>2. Peak</strong> &mdash; max output; inflation elevated; Fed often tightening<br><strong>3. Contraction (recession)</strong> &mdash; falling GDP, rising unemployment, easing inflation<br><strong>4. Trough</strong> &mdash; bottom; precedes recovery; Fed loose"},{"sec":"ECON","front":"Asset performance through the cycle","back":"<strong>Early expansion</strong>: cyclicals (cons. discretionary, industrials, financials, tech), small caps<br><strong>Late expansion / peak</strong>: defensives (staples, utilities, healthcare); commodities; precious metals<br><strong>Recession</strong>: Treasuries (flight to safety); high-quality fixed income; defensives<br><strong>Recovery</strong>: cyclicals lead again"},{"sec":"ECON","front":"CPI vs. PPI","back":"<strong>CPI</strong> &mdash; Consumer Price Index. Basket of consumer goods/services. Published monthly by BLS.<br><strong>PPI</strong> &mdash; Producer Price Index. Wholesale prices received by domestic producers. <strong>Leading indicator</strong> of consumer inflation."},{"sec":"ECON","front":"Demand-pull vs. Cost-push inflation","back":"<strong>Demand-pull</strong>: too much money chasing too few goods (excess demand).<br><strong>Cost-push</strong>: rising input costs (wages, raw materials) push final prices up."},{"sec":"ECON","front":"What is deflation, and why is it dangerous?","back":"Sustained <strong>falling</strong> general price level. Counterintuitively dangerous:<ul><li>Consumers defer purchases waiting for lower prices</li><li>Real debt burdens rise</li><li>Central banks have less ammunition (cannot meaningfully cut rates below zero indefinitely)</li></ul>"},{"sec":"ECON","front":"Stagflation","back":"Rare combination of <strong>stagnant growth + high unemployment + high inflation</strong> (1970s).<br><br>Policy-paralyzing: tightening worsens unemployment; easing worsens inflation."},{"sec":"ECON","front":"The Fed's dual mandate","back":"<strong>1. Maximum employment</strong><br><strong>2. Price stability</strong> (typically interpreted as 2% inflation target)<br><br>Set by the <strong>Federal Open Market Committee (FOMC)</strong>."},{"sec":"ECON","front":"FOMC composition","back":"<strong>12 voting members</strong>:<ul><li>7 Board of Governors</li><li>President of NY Fed (permanent)</li><li>4 of remaining 11 regional Fed Bank presidents (rotating annually)</li></ul>"},{"sec":"ECON","front":"The 4 monetary policy tools","back":"<strong>1. Open Market Operations (OMO)</strong> &mdash; primary tool; buy/sell Treasuries via NY Fed desk<br><strong>2. Discount Rate</strong> &mdash; rate Fed charges banks at the discount window (signaling)<br><strong>3. Reserve Requirements</strong> &mdash; % of deposits banks must hold (cut to <strong>0%</strong> in March 2020)<br><strong>4. Federal Funds Rate</strong> &mdash; <em>target</em> for overnight interbank rate; managed via OMO + IORB"},{"sec":"ECON","front":"How does the Fed loosen vs. tighten via OMO?","back":"<strong>Loose / Easy</strong>: Fed <strong>BUYS</strong> Treasuries &rarr; reserves added &rarr; rates &darr; &rarr; stimulus<br><strong>Tight</strong>: Fed <strong>SELLS</strong> Treasuries &rarr; reserves drained &rarr; rates &uarr; &rarr; restraint"},{"sec":"ECON","front":"M1 vs. M2 vs. M3","back":"<strong>M1</strong> &mdash; currency + demand deposits + checkable + traveler's checks (spendable now)<br><strong>M2</strong> &mdash; M1 + savings + small CDs (&lt;$100K) + retail money market funds<br><strong>M3</strong> &mdash; M2 + large CDs + institutional money market + repos + Eurodollars (Fed stopped publishing 2006)"},{"sec":"ECON","front":"Easy money: effects on rates, bonds, stocks, USD","back":"<table><tr><th>Variable</th><th>Easy</th><th>Tight</th></tr><tr><td>Rates</td><td>&darr;</td><td>&uarr;</td></tr><tr><td>Bond prices</td><td>&uarr;</td><td>&darr;</td></tr><tr><td>Stocks</td><td>generally &uarr;</td><td>generally &darr;</td></tr><tr><td>USD</td><td>&darr;</td><td>&uarr;</td></tr></table>"},{"sec":"ECON","front":"Fiscal policy &mdash; who, what tools?","back":"<strong>Set by Congress (legislation) + President (executive)</strong>. Two tools:<ul><li><strong>Government spending</strong> &mdash; expenditures, transfers, public investment</li><li><strong>Taxation</strong> &mdash; rates, brackets, credits, deductions</li></ul>Critique: <strong>crowding out</strong> &mdash; gov't borrowing raises rates &amp; displaces private investment."},{"sec":"ECON","front":"Budget surplus / deficit / national debt","back":"<strong>Surplus</strong> &mdash; revenues &gt; spending in a fiscal year (flow)<br><strong>Deficit</strong> &mdash; spending &gt; revenues in a fiscal year (flow)<br><strong>National debt</strong> &mdash; cumulative sum of past deficits less surpluses (<strong>stock</strong>)"},{"sec":"ECON","front":"Schools of economic thought","back":"<strong>Keynesian</strong>: aggregate demand drives short-run output; gov't deficits in downturns<br><strong>Monetarist (Friedman)</strong>: steady money-supply growth is the key; fiscal mostly impotent<br><strong>Supply-side</strong>: tax cuts + deregulation grow supply (Laffer curve)<br><strong>Classical</strong>: markets self-correct; gov't intervention counterproductive"},{"sec":"IND","front":"Leading economic indicators","back":"Turn <strong>before</strong> the economy. Includes:<ul><li>Avg weekly hours, manufacturing</li><li>Avg weekly <strong>initial</strong> unemployment claims</li><li>Mfrs' new orders (consumer + capital goods)</li><li>ISM New Orders</li><li>Building permits</li><li><strong>S&amp;P 500</strong></li><li>Leading Credit Index</li><li><strong>10Y &minus; Fed Funds spread</strong> (yield curve)</li><li>Avg consumer expectations</li></ul>"},{"sec":"IND","front":"Coincident economic indicators","back":"Move <strong>with</strong> the economy:<ul><li>Nonfarm payrolls</li><li>Personal income less transfer payments</li><li>Industrial production index</li><li>Manufacturing &amp; trade sales</li><li><strong>Real GDP</strong></li></ul>"},{"sec":"IND","front":"Lagging economic indicators","back":"Turn <strong>after</strong> the economy:<ul><li><strong>Avg duration of unemployment</strong></li><li>Inventories-to-sales ratio</li><li>Change in labor cost / unit output</li><li>Avg prime rate</li><li>C&amp;I loans outstanding</li><li>Consumer installment credit-to-income ratio</li><li>Change in CPI for services</li></ul>"},{"sec":"IND","front":"3 unemployment indicators &mdash; classify each","back":"All three measure unemployment, but at <em>different</em> moments:<ul><li><strong>Initial claims</strong> &rarr; <span class=\"hl\">LEADING</span></li><li><strong>Unemployment rate</strong> &rarr; <span class=\"hl\">COINCIDENT</span></li><li><strong>Avg duration of unemployment
