"qualified-purchaser":{ term:"Qualified Purchaser", group:"Laws", aliases:["qualified purchaser"],
  eli5:"An ultra-wealthy investor tier ($5M+ in investments) that lets funds skip even more regulation than 'accredited investor' allows.",
  full:`<p>A <b>qualified purchaser</b> generally holds <b>$5 million+</b> in investments (individuals) or $25M (institutions). Funds selling only to them use the 3(c)(7) exemption with no 100-investor cap — a higher bar than accredited investor.</p>`,
  related:["accredited-investor","qualified-client","hedge-fund"] }
});
</script>

<script>
/* ====================  CHUNK: COMPREHENSIVE LONG-TAIL  ==================== */
Object.assign(GLOSSARY_DATA, {
/* economics & analysis */
"economic-schools":{ term:"Schools of Economic Thought", group:"Economics", aliases:["Keynesian","Monetarist","supply-side","classical economics"],
  eli5:"Rival theories on how to run an economy. Keynesians want government spending in downturns; Monetarists focus on the money supply; supply-siders cut taxes.",
  full:`<p><b>Keynesian</b>: government should spend (deficit) to boost demand in recessions. <b>Monetarist</b> (Friedman): steady money-supply growth matters most. <b>Supply-side</b>: tax cuts and deregulation spur growth. <b>Classical</b>: markets self-correct; leave them alone.</p>`,
  related:["fiscal-policy","federal-reserve","gdp"] },
"yield-curve-theories":{ term:"Term Structure Theories", group:"Economics", aliases:["expectations theory","liquidity preference theory","market segmentation theory"],
  eli5:"Explanations for the yield curve's shape. Expectations theory says long rates reflect expected future short rates; liquidity preference says longer bonds need a bonus.",
  full:`<p><b>Expectations</b>: long rates = average of expected future short rates. <b>Liquidity preference</b>: investors demand a premium for tying up money longer (so the curve normally slopes up). <b>Market segmentation</b>: different maturities have separate supply/demand.</p>`,
  related:["yield-curve","ytm","federal-reserve"] },
"sector-rotation":{ term:"Sector Rotation (Cyclical vs Defensive)", group:"Strategies", aliases:["sector rotation","cyclical stocks","defensive stocks"],
  eli5:"Shifting money between industries as the economy turns. Cyclicals (cars, travel) soar in booms; defensives (utilities, staples) hold up in downturns.",
  full:`<p><b>Cyclical</b> sectors (consumer discretionary, industrials, tech) thrive in expansions; <b>defensive</b> sectors (utilities, consumer staples, healthcare) hold up in recessions. Rotating between them follows the business cycle.</p>`,
  related:["business-cycle","investment-styles","beta"] },
"currency-effects":{ term:"Strong vs. Weak Dollar", group:"Economics", aliases:["strong dollar","weak dollar","exchange rate"],
  eli5:"A strong dollar makes U.S. exports pricier abroad (bad for exporters) but imports cheaper. A weak dollar does the reverse.",
  full:`<p>A <b>strong dollar</b> hurts U.S. exporters and multinationals' foreign earnings but helps importers and travelers. A <b>weak dollar</b> boosts exporters and foreign earnings. Drives the trade balance and foreign-investment returns.</p>`,
  related:["balance-of-payments","currency-risk","adr"] },
"auditor-opinions":{ term:"Auditor Opinions", group:"Analysis", aliases:["unqualified opinion","qualified opinion","adverse opinion","disclaimer of opinion"],
  eli5:"An auditor's grade on financial statements. 'Unqualified' (clean) is best; 'adverse' means the statements are wrong.",
  full:`<p>Four opinions: <b>Unqualified</b> (clean — fairly presented), <b>Qualified</b> (fair except for one issue), <b>Adverse</b> (not fairly presented), <b>Disclaimer</b> (can't form an opinion). 'Unqualified' is the goal.</p>`,
  related:["balance-sheet","income-statement","sarbanes-oxley"] },
"working-capital":{ term:"Working Capital & Liquidity", group:"Analysis", aliases:["working capital","liquidity ratios"],
  eli5:"The cash cushion for short-term bills: current assets minus current liabilities. Positive means the company can cover near-term obligations.",
  full:`<p><b>Working capital</b> = current assets − current liabilities. The <b>current ratio</b> (CA ÷ CL) and <b>quick ratio</b> (excluding inventory) measure short-term solvency — can the company pay bills due within a year?</p>`,
  related:["financial-ratios","balance-sheet"] },
"total-return":{ term:"Total Return", group:"Performance", aliases:["total return"],
  eli5:"Your complete gain — price appreciation PLUS income (dividends/interest) — not just the price change.",
  full:`<p><b>Total return</b> combines capital appreciation and income (dividends, interest, distributions). It's the truest measure of performance; a flat-price stock paying a 4% dividend still returned 4%.</p>`,
  related:["holding-period-return","dividend-payout","real-nominal-return"] },
"dividend-payout":{ term:"Dividend Payout & Retention", group:"Analysis", aliases:["dividend payout ratio","retention ratio"],
  eli5:"How a company splits profits: the payout ratio is the share sent to shareholders as dividends; the rest (retention) is reinvested for growth.",
  full:`<p><b>Payout ratio</b> = dividends ÷ net income. The <b>retention ratio</b> (1 − payout) funds growth. Mature firms pay out more; growth firms retain more. Drives dividend yield and sustainability.</p>`,
  related:["financial-ratios","total-return","qualified-dividend"] },
"normal-distribution":{ term:"Normal Distribution (68-95-99.7)", group:"Portfolio", aliases:["normal distribution","bell curve","68-95-99.7"],
  eli5:"The bell-shaped pattern returns often follow. About 68% land within 1 standard deviation of the average, 95% within 2, 99.7% within 3.",
  full:`<p>In a <b>normal distribution</b>, ~68% of outcomes fall within ±1 standard deviation, ~95% within ±2, ~99.7% within ±3. It's why standard deviation is such a useful risk gauge. Use the bell curve below.</p>`,
  graphic:"normal-distribution", related:["standard-deviation","monte-carlo","correlation"] },
/* products */
"yield-hierarchy":{ term:"Yield Hierarchy (Premium/Discount)", group:"Fixed Income", aliases:["yield hierarchy","yield ordering"],
  eli5:"The order of a bond's yields depends on its price. Premium bonds: Coupon > Current Yield > YTM. Discount bonds: the reverse.",
  full:`<p>For a <b>premium</b> bond (price > par): <b>Coupon > Current Yield > YTM > YTC</b>. For a <b>discount</b> bond: the order flips. At par, all are equal. Slide the price below to see it reorder live.</p>`,
  graphic:"bond-yield-hierarchy", related:["premium-discount","ytm","current-yield","coupon"] },
"convexity":{ term:"Convexity", group:"Fixed Income", aliases:["convexity"],
  eli5:"A refinement to duration. Because the price-yield curve bends, bonds gain a little more when rates fall than they lose when rates rise (good for you).",
  full:`<p><b>Convexity</b> captures the curvature duration misses. Positive convexity means prices rise faster than duration predicts when rates fall, and fall slower when rates rise — a benefit. Callable bonds can have negative convexity.</p>`,
  related:["duration","bond-price-rate","interest-rate-risk"] },
"yield-to-worst":{ term:"Yield to Call & Yield to Worst", group:"Fixed Income", aliases:["yield to call","YTC","yield to worst"],
  eli5:"For a bond that can be called early, yield to call uses the call date; yield to worst is just the lowest of all the possible yields — the cautious number.",
  full:`<p><b>Yield to call</b> computes return assuming the issuer redeems at the first call date. <b>Yield to worst</b> is the lowest of YTM and all YTCs — the conservative figure for callable bonds.</p>`,
  related:["ytm","callable-bond","yield-hierarchy"] },
"voting-methods":{ term:"Statutory vs. Cumulative Voting", group:"Equity", aliases:["statutory voting","cumulative voting"],
  eli5:"How shareholders elect directors. Statutory spreads your votes one-per-seat; cumulative lets you pile all your votes on one candidate (helps small holders).",
  full:`<p><b>Statutory voting</b>: one vote per share per board seat — favors big holders. <b>Cumulative voting</b>: total votes (shares × seats) can be concentrated on a single nominee — helps minority shareholders win a seat.</p>`,
  related:["common-stock","preferred-stock"] },
"preferred-types":{ term:"Preferred Stock Types", group:"Equity", aliases:["cumulative preferred","participating preferred","convertible preferred","callable preferred"],
  eli5:"Flavors of preferred stock: cumulative (missed dividends build up and must be paid first), participating, convertible (into common), and callable.",
  full:`<p><b>Cumulative</b>: skipped dividends accrue and must be paid before common dividends. <b>Participating</b>: shares in extra profits. <b>Convertible</b>: exchangeable for common shares. <b>Callable</b>: issuer can redeem. Adjustable-rate ties the dividend to a benchmark.</p>`,
  related:["preferred-stock","convertible-bond","common-stock"] },
"corporate-actions":{ term:"Corporate Actions (Tender/Proxy)", group:"Equity", aliases:["tender offer","proxy","spin-off","stock dividend"],
  eli5:"Major company events shareholders vote on or respond to: tender offers (buy your shares), proxy votes, spin-offs, and stock dividends.",
  full:`<p><b>Tender offer</b>: a bid to buy shares at a premium. <b>Proxy</b>: voting by mail/online when you can't attend. <b>Spin-off</b>: a division becomes a separate company. <b>Stock dividend</b>: extra shares instead of cash. Splits adjust share count and price.</p>`,
  related:["common-stock","stock-split","ex-dividend"] },
"share-classes":{ term:"Mutual Fund Share Classes (A/B/C)", group:"Pooled", aliases:["Class A shares","Class B shares","Class C shares","front-end load","back-end load","CDSC"],
  eli5:"How you pay a fund's sales charge. Class A charges up front (best for long-term big investors); Class C charges ongoing (best for short horizons).",
  full:`<p><b>Class A</b>: front-end load, lower ongoing fees, breakpoint discounts — best for long-term/large investors. <b>Class B</b>: back-end load (CDSC) that declines over time. <b>Class C</b>: small/no load but high ongoing 12b-1 — best for shorter holds.</p>`,
  related:["mutual-fund","sales-charge","breakpoint","twelve-b-1"] },
"sales-charge":{ term:"Sales Charge (NAV & POP)", group:"Pooled", aliases:["public offering price","POP","sales charge","sales load"],
  eli5:"A front-end fund fee. You buy at the public offering price (POP), which is the NAV plus the sales charge. Max load is 8.5%.",
  full:`<p>For load funds, you buy at the <b>POP</b> = NAV ÷ (1 − sales charge %). The sales charge % = (POP − NAV) ÷ POP. The max allowed is <b>8.5%</b>, reduced if the fund doesn't offer breakpoints, rights of accumulation, and reinvestment.</p>`,
  related:["nav","share-classes","breakpoint"] },
"drip":{ term:"Dividend Reinvestment (DRIP)", group:"Strategies", aliases:["DRIP","dividend reinvestment"],
  eli5:"Automatically using your dividends to buy more shares instead of taking cash — compounding your position over time.",
  full:`<p>A <b>DRIP</b> reinvests cash dividends into additional (often fractional) shares automatically, harnessing compounding. Note: reinvested dividends are still taxable and they raise your cost basis.</p>`,
  related:["compound-growth-concept","basis","qualified-dividend"] },
"keogh-solo":{ term:"Keogh & Solo 401(k)", group:"Retirement", aliases:["Keogh","HR-10","Solo 401(k)","individual 401k"],
  eli5:"Retirement plans for the self-employed. A Keogh (HR-10) and a Solo 401(k) let business owners with no employees save large amounts.",
  full:`<p><b>Keogh (HR-10)</b>: a qualified plan for self-employed/unincorporated businesses. <b>Solo 401(k)</b>: for owner-only businesses, allowing both employee deferrals and employer contributions for high total savings.</p>`,
  related:["sep-ira","401k","traditional-ira"] },
"hsa":{ term:"Health Savings Account (HSA)", group:"Strategies", aliases:["HSA","health savings account"],
  eli5:"A triple-tax-advantaged account paired with a high-deductible health plan: deductible going in, tax-free growth, tax-free out for medical costs.",
  full:`<p>An <b>HSA</b> offers a rare <b>triple tax benefit</b>: contributions are deductible, growth is tax-deferred, and withdrawals for qualified medical expenses are tax-free. Requires a high-deductible health plan; unused funds roll over and can be invested.</p>`,
  related:["traditional-ira","roth-ira"] },
"holding-period":{ term:"Holding Period (Short vs Long Term)", group:"Strategies", aliases:["holding period","short-term gain","long-term gain"],
  eli5:"How long you owned an asset decides your tax rate. One year or less = high ordinary rates; more than a year = low long-term rates.",
  full:`<p>The <b>holding period</b> sets the capital-gains rate: <b>≤1 year</b> = short-term, taxed as ordinary income (up to 37%); <b>>1 year</b> = long-term, taxed at 0/15/20%. Crossing the one-year line can dramatically cut taxes — see the cliff below.</p>`,
  graphic:"capital-gains-holding", related:["capital-gains","ordinary-income","cost-basis-methods"] },
"blue-sky-laws":{ term:"Blue Sky Laws", group:"Laws", aliases:["blue sky laws","blue sky"],
  eli5:"A nickname for state securities laws — meant to protect investors from speculative schemes 'with no more basis than so many feet of blue sky.'",
  full:`<p><b>Blue sky laws</b> are state-level securities regulations (embodied in the Uniform Securities Act). The name comes from a court describing fraudulent ventures backed by nothing but 'blue sky.' They govern state registration and anti-fraud.</p>`,
  related:["uniform-securities-act","administrator","registration-methods"] },
"fdic":{ term:"FDIC vs. SIPC", group:"Laws", aliases:["FDIC"],
  eli5:"FDIC insures BANK deposits up to $250,000 if the bank fails. SIPC protects BROKERAGE customers if the firm fails — different things.",
  full:`<p><b>FDIC</b> insures bank deposits (checking, savings, CDs) up to <b>$250,000</b> per depositor per bank. <b>SIPC</b> covers brokerage customers ($500K, $250K cash) if the broker fails. Neither covers investment/market losses.</p>`,
  related:["sipc","negotiable-cd"] },
/* laws/markets */
"best-execution":{ term:"Best Execution", group:"Laws", aliases:["best execution"],
  eli5:"An adviser's duty to get clients the best overall deal on trades — price, speed, and cost — not just route orders for the adviser's convenience.",
  full:`<p><b>Best execution</b> requires seeking the most favorable terms reasonably available for client trades. It's independent of soft-dollar arrangements — having research credits doesn't excuse poor execution.</p>`,
  related:["soft-dollars","fiduciary-duty","investment-adviser"] },
"wrap-fee":{ term:"Wrap-Fee & Fee-Based Accounts", group:"Laws", aliases:["wrap fee","wrap account","fee-based account"],
  eli5:"An account that bundles advice, trading, and custody into one flat fee (usually a % of assets) instead of per-trade commissions.",
  full:`<p>A <b>wrap-fee account</b> charges a single asset-based fee covering advice, execution, and custody. It requires a special wrap-fee brochure (Form ADV Appendix 1) and can make a broker-dealer an investment adviser (special compensation).</p>`,
  related:["investment-adviser","form-adv","broker-dealer"] },
"hedge-clause":{ term:"Hedge Clause", group:"Laws", aliases:["hedge clause"],
  eli5:"A contract clause trying to waive an adviser's liability. Mostly prohibited — you can't sign away an adviser's fiduciary duty.",
  full:`<p>A <b>hedge clause</b> attempts to limit or disclaim an adviser's liability. Regulators generally prohibit them because they can mislead clients into thinking they've waived rights under the antifraud provisions — you can't contract away fiduciary duty.</p>`,
  related:["fiduciary-duty","investment-adviser"] },
"settlement":{ term:"Trade Settlement (T+1)", group:"Trading", aliases:["settlement","T+1","regular way settlement"],
  eli5:"The day cash and securities actually change hands after a trade. Most stocks and bonds now settle one business day later (T+1).",
  full:`<p><b>Settlement</b> is when ownership and payment finalize. 'Regular way' for stocks/corporate/muni bonds is now <b>T+1</b> (one business day after the trade). It determines who's the owner of record for dividends and the ex-dividend date.</p>`,
  related:["ex-dividend","order-types","accrued-interest"] }
});
</script>

<script>
/* ====================  CHUNK: VALUATION & FIXED-INCOME STRATEGY  ==================== */
Object.assign(GLOSSARY_DATA, {
"dividend-discount-model":{ term:"Dividend Discount Model (DDM)", group:"Analysis", aliases:["dividend discount model","DDM","Gordon growth model"],
  eli5:"A way to value a stock from its dividends: it's worth next year's dividend divided by (required return − growth rate).",
  full:`<p>The <b>Gordon growth DDM</b> values a share as: price = D₁ ÷ (r − g), where D₁ is next year's dividend, r is the required return, and g is the dividend growth rate. As g approaches r, value rises sharply — and the model breaks if g ≥ r.</p>`,
  graphic:"gordon-ddm", related:["valuation-ratios","cost-of-capital","dividend-payout","capm"] },
"valuation-ratios":{ term:"Valuation Ratios (P/E, PEG, P/B)", group:"Analysis", aliases:["P/E ratio","PEG ratio","price-to-book","price-to-sales","EV/EBITDA"],
  eli5:"Quick gauges of whether a stock is cheap or pricey. P/E compares price to earnings; PEG adjusts it for growth; P/B compares to book value.",
  full:`<p><b>P/E</b> = price ÷ EPS (lower can mean cheaper). <b>PEG</b> = P/E ÷ growth (under 1 may signal value). <b>P/B</b> = price ÷ book value (key for financials). <b>P/S</b> = price ÷ sales (for unprofitable firms). <b>EV/EBITDA</b> values the whole enterprise.</p>`,
  related:["dividend-discount-model","eps","financial-ratios","fundamental-analysis"] },
"cost-of-capital":{ term:"Cost of Capital (WACC)", group:"Analysis", aliases:["cost of capital","WACC","weighted average cost of capital"],
  eli5:"The blended rate a company pays for its money (debt + equity). Investments should earn more than this hurdle to create value.",
  full:`<p>The <b>WACC</b> blends the after-tax cost of debt and the cost of equity, weighted by how much of each the firm uses. It's the minimum return (hurdle rate) a project must beat — and the discount rate in valuation models.</p>`,
  related:["dividend-discount-model","npv-irr","capm","leverage-types"] },
"leverage-types":{ term:"Operating vs. Financial Leverage", group:"Analysis", aliases:["operating leverage","financial leverage","leverage"],
  eli5:"Two kinds of amplifiers. Operating leverage comes from fixed business costs; financial leverage comes from using debt. Both magnify profits — and losses.",
  full:`<p><b>Operating leverage</b>: high fixed costs make profits swing more with sales. <b>Financial leverage</b>: borrowing magnifies returns to equity (and risk). High leverage boosts good years and deepens bad ones.</p>`,
  related:["cost-of-capital","margin","financial-ratios"] },
"bond-strategies":{ term:"Bond Strategies (Ladder/Barbell/Bullet)", group:"Fixed Income", aliases:["bond ladder","barbell strategy","bullet strategy","laddering"],
  eli5:"Ways to arrange bond maturities. A ladder spreads them evenly; a barbell clusters short and long; a bullet aims them all at one date.",
  full:`<p><b>Ladder</b>: evenly staggered maturities — smooths reinvestment and rate risk. <b>Barbell</b>: short + long, nothing in between — liquidity plus yield. <b>Bullet</b>: all maturing near one target date — for a known future need. See the layouts below.</p>`,
  graphic:"bond-strategies", related:["immunization","duration","reinvestment-risk","interest-rate-risk"] },
"immunization":{ term:"Immunization (Duration Matching)", group:"Fixed Income", aliases:["immunization","duration matching"],
  eli5:"Building a bond portfolio whose duration matches when you need the money, so interest-rate moves cancel out and your goal is protected.",
  full:`<p><b>Immunization</b> matches a portfolio's duration to an investment horizon, so price risk and reinvestment risk offset — locking in a target return regardless of rate moves. A pension matching liabilities is the classic case.</p>`,
  related:["duration","bond-strategies","interest-rate-risk","reinvestment-risk"] },
"options-greeks":{ term:"Option Greeks (Delta, Theta)", group:"Derivatives", aliases:["delta","theta","gamma","vega","option greeks","time decay"],
  eli5:"Letters measuring what moves an option's price. Delta = sensitivity to the stock; theta = how much value bleeds away each day as expiration nears.",
  full:`<p>The <b>Greeks</b>: <b>delta</b> (price change per $1 stock move), <b>gamma</b> (how delta changes), <b>theta</b> (daily time decay — accelerates near expiry), and <b>vega</b> (sensitivity to volatility). Theta is why options are 'wasting assets.'</p>`,
  graphic:"theta-decay", related:["option","intrinsic-time-value","straddle"] }
});
</script>

<script>
/* ====================  CHUNK: TAX, ESTATE & RETIREMENT DEPTH  ==================== */
Object.assign(GLOSSARY_DATA, {
"taxable-equivalent-yield":{ term:"Taxable-Equivalent Yield (TEY)", group:"Strategies", aliases:["taxable-equivalent yield","TEY","tax-equivalent yield"],
  eli5:"How to fairly compare a tax-free muni to a taxable bond: divide the muni's yield by (1 − your tax rate) to see what a taxable bond would need to pay.",
  full:`<p><b>TEY</b> = tax-free yield ÷ (1 − tax rate). A 3.5% muni for a 32% taxpayer = 3.5% ÷ 0.68 ≈ 5.15% — so a taxable bond must beat 5.15% to win. The higher your bracket, the better munis look. Use the calculator below.</p>`,
  graphic:"tax-equiv-yield", related:["munis","marginal-tax-rate","non-amt-munis","yield"] },
"marginal-tax-rate":{ term:"Marginal vs. Effective Tax Rate", group:"Strategies", aliases:["marginal tax rate","effective tax rate","tax bracket"],
  eli5:"Your marginal rate is the tax on your NEXT dollar (your top bracket); your effective rate is the average across all your income — always lower.",
  full:`<p>The U.S. uses progressive brackets. Your <b>marginal rate</b> applies to your last dollar (used for decisions like TEY); your <b>effective rate</b> is total tax ÷ total income (always lower). Don't confuse the two.</p>`,
  related:["taxable-equivalent-yield","ordinary-income","capital-gains"] },
"tax-credit-deduction":{ term:"Tax Credit vs. Deduction", group:"Strategies", aliases:["tax credit","tax deduction"],
  eli5:"A deduction lowers the income you're taxed on; a credit lowers the tax bill directly. A $1 credit usually beats a $1 deduction.",
  full:`<p>A <b>deduction</b> reduces taxable income (worth your marginal rate — a $1,000 deduction at 24% saves $240). A <b>credit</b> reduces tax owed dollar-for-dollar (a $1,000 credit saves $1,000). Credits are generally more valuable.</p>`,
  related:["marginal-tax-rate","ordinary-income"] },
"like-kind-exchange":{ term:"1031 Like-Kind Exchange", group:"Strategies", aliases:["1031 exchange","like-kind exchange"],
  eli5:"A way to swap one investment real estate for another and defer the capital-gains tax — rolling your gain into the new property.",
  full:`<p>A <b>1031 exchange</b> lets investors defer capital-gains tax by swapping one investment/business <b>real estate</b> property for another like-kind property (strict timing rules apply). It no longer covers stocks or other personal property.</p>`,
  related:["capital-gains","step-up-basis","reit"] },
"constructive-receipt":{ term:"Constructive Receipt", group:"Strategies", aliases:["constructive receipt"],
  eli5:"You're taxed on money once it's available to you — even if you don't physically take it. You can't dodge tax just by leaving it in the account.",
  full:`<p><b>Constructive receipt</b> means income is taxable when it's credited or made available, not only when you withdraw it. A December dividend you let sit is still taxed that year.</p>`,
  related:["ordinary-income","qualified-dividend"] },
"inherited-ira":{ term:"Inherited IRA (10-Year Rule)", group:"Retirement", aliases:["inherited IRA","stretch IRA","beneficiary IRA"],
  eli5:"Rules for IRAs you inherit. Most non-spouse heirs must now empty the account within 10 years (the old lifetime 'stretch' is mostly gone).",
  full:`<p>Under the SECURE Act, most <b>non-spouse beneficiaries</b> must withdraw an inherited IRA's full balance within <b>10 years</b>. Spouses and certain 'eligible designated beneficiaries' can still stretch over their life expectancy.</p>`,
  related:["traditional-ira","roth-ira","rmd","secure-act"] },
"marital-deduction":{ term:"Unlimited Marital Deduction", group:"Estates", aliases:["marital deduction","portability"],
  eli5:"You can leave any amount to your spouse completely free of estate and gift tax. 'Portability' lets a widow(er) use the late spouse's unused exemption too.",
  full:`<p>The <b>unlimited marital deduction</b> lets spouses transfer unlimited assets to each other tax-free. <b>Portability</b> lets a surviving spouse add the deceased's unused estate-tax exemption to their own — together shielding a large estate.</p>`,
  related:["gift-estate-tax","qtip-trust","step-up-basis"] },
"will-intestacy":{ term:"Wills & Intestacy", group:"Estates", aliases:["will","intestate","intestacy","testator"],
  eli5:"A will directs who gets your assets and names guardians. Die without one ('intestate') and the state's default rules decide — maybe not as you'd wish.",
  full:`<p>A <b>will</b> directs asset distribution and names an executor and guardians for minors. Dying <b>intestate</b> (without a will) hands distribution to state default rules. Wills go through probate; trusts can avoid it.</p>`,
  related:["probate","executor-trustee","per-stirpes-capita"] },
"executor-trustee":{ term:"Executor, Trustee & Fiduciary Roles", group:"Estates", aliases:["executor","administrator","trustee","fiduciary roles"],
  eli5:"The people who carry out an estate plan. An executor settles a will; a trustee manages a trust; both must act in beneficiaries' best interest.",
  full:`<p>An <b>executor</b> (named in a will) or <b>administrator</b> (court-appointed if none) settles the estate. A <b>trustee</b> manages trust assets. All are fiduciaries — bound to act prudently in beneficiaries' interests (the Prudent Investor standard).</p>`,
  related:["will-intestacy","probate","fiduciary-duty","power-of-attorney"] },
"generation-skipping-tax":{ term:"Generation-Skipping Transfer Tax", group:"Estates", aliases:["generation-skipping tax","GSTT"],
  eli5:"An extra tax that stops the wealthy from skipping a generation (e.g., giving straight to grandchildren) to avoid one round of estate tax.",
  full:`<p>The <b>generation-skipping transfer tax</b> applies to transfers to people two+ generations below (grandchildren or unrelated people 37½+ years younger), preventing families from dodging a layer of estate tax. It has its own exemption.</p>`,
  related:["gift-estate-tax","marital-deduction"] },
"able-account":{ term:"ABLE Account", group:"Strategies", aliases:["ABLE account"],
  eli5:"A 529-style tax-free savings account for people with disabilities — letting them save without losing means-tested government benefits.",
  full:`<p>An <b>ABLE account</b> lets individuals with qualifying disabilities save and invest with tax-free growth for disability expenses, without jeopardizing Medicaid/SSI eligibility (up to limits). A cousin of the 529 plan.</p>`,
  related:["529-plan","qtip-trust"] }
});
</script>

<script>
/* ====================  CHUNK: MARKET MECHANICS & REGISTRATION  ==================== */
Object.assign(GLOSSARY_DATA, {
"separate-account":{ term:"General vs. Separate Account", group:"Insurance", aliases:["separate account","general account"],
  eli5:"Where an insurer holds your money. The general account backs guaranteed products (fixed annuities); the separate account holds variable products you invest yourself.",
  full:`<p>An insurer's <b>general account</b> backs guaranteed products (whole life, fixed annuities) — the insurer bears the risk. The <b>separate account</b> holds variable-product subaccounts where the policyholder bears the investment risk — which is why variable products are securities.</p>`,
  related:["variable-annuity","fixed-annuity","life-insurance"] },
"u4-u5":{ term:"Forms U4 / U5 & CRD", group:"Laws", aliases:["Form U4","Form U5","CRD","registration form"],
  eli5:"The paperwork for registering (U4) and terminating (U5) reps. CRD is the central database tracking their history and any complaints.",
  full:`<p><b>Form U4</b> registers an agent/IAR (disclosures, employment, exams); <b>Form U5</b> reports termination. The <b>CRD</b> (Central Registration Depository) and IARD store these records, viewable through BrokerCheck.</p>`,
  related:["iar","agent","finra-sro"] },
"finra-sro":{ term:"FINRA & SROs", group:"Laws", aliases:["FINRA","SRO","self-regulatory organization"],
  eli5:"FINRA is the industry's self-regulator for broker-dealers — writing rules, running exams, and disciplining firms under SEC oversight.",
  full:`<p><b>FINRA</b> is a <b>self-regulatory organization (SRO)</b> overseeing broker-dealers: it administers exams, enforces conduct rules, and runs arbitration — all under the SEC's authority. Exchanges like the NYSE are also SROs.</p>`,
  related:["broker-dealer","securities-exchange-act-1934","u4-u5"] },
"net-capital":{ term:"Net Capital Rule", group:"Laws", aliases:["net capital","net capital rule"],
  eli5:"A rule forcing broker-dealers to keep a minimum cushion of liquid assets so they can always pay customers what they're owed.",
  full:`<p>The <b>net capital rule</b> requires broker-dealers to maintain minimum liquid net capital relative to their obligations — a financial-stability buffer protecting customers from a firm's insolvency.</p>`,
  related:["broker-dealer","customer-protection","sipc"] },
"customer-protection":{ term:"Customer Protection & Segregation", group:"Laws", aliases:["customer protection rule","segregation of assets"],
  eli5:"Rules requiring brokers to keep customer cash and securities SEPARATE from the firm's own — so customers are protected if the firm fails.",
  full:`<p>The <b>customer protection rule</b> (15c3-3) requires broker-dealers to <b>segregate</b> customer cash and fully-paid securities from firm assets and hold reserves, so customer property is safe even in a failure. SIPC backstops shortfalls.</p>`,
  related:["net-capital","sipc","broker-dealer"] },
"markup-policy":{ term:"Markups & the 5% Policy", group:"Laws", aliases:["markup","markdown","5% policy","FINRA 5% policy"],
  eli5:"A guideline that broker-dealer markups, markdowns, and commissions should generally be fair and reasonable — around 5% as a rule of thumb, not a hard cap.",
  full:`<p>FINRA's <b>5% policy</b> is a guideline (not a rule) that markups, markdowns, and commissions be <b>fair and reasonable</b>. It considers price, security type, and effort. Must be disclosed; excessive charges are a prohibited practice.</p>`,
  related:["broker-dealer","prohibited-practices","trade-confirmation"] },
"trade-confirmation":{ term:"Trade Confirmation", group:"Trading", aliases:["trade confirmation","confirmation"],
  eli5:"The written receipt you get at or before settlement of a trade, showing what was bought/sold, the price, and any fees.",
  full:`<p>A <b>trade confirmation</b> must be delivered at or before completion (settlement). It details the security, quantity, price, capacity (agent vs principal), commission/markup, and settlement date — your official record of the transaction.</p>`,
  related:["settlement","markup-policy","order-types"] },
"regulation-s":{ term:"Regulation S (Offshore Offerings)", group:"Laws", aliases:["Regulation S","Reg S"],
  eli5:"A safe harbor letting companies sell securities to investors OUTSIDE the U.S. without registering them with the SEC.",
  full:`<p><b>Regulation S</b> exempts securities sold in <b>offshore transactions</b> to non-U.S. persons from SEC registration. It's the international counterpart to the domestic private-placement exemptions.</p>`,
  related:["reg-d","reg-a","rule-144a"] },
"rule-147":{ term:"Rule 147 (Intrastate)", group:"Laws", aliases:["Rule 147","intrastate offering"],
  eli5:"A safe harbor for raising money entirely within ONE state — the company and all buyers are in-state, so only state law applies.",
  full:`<p><b>Rule 147</b> is the intrastate-offering safe harbor: an in-state issuer sells only to residents of that state, exempting it from federal registration (state blue-sky law still applies). Resale to out-of-staters is restricted for a period.</p>`,
  related:["reg-d","blue-sky-laws","exempt-transaction"] },
"regulation-crowdfunding":{ term:"Regulation Crowdfunding", group:"Laws", aliases:["Regulation Crowdfunding","Reg CF","crowdfunding"],
  eli5:"Rules letting startups raise small amounts from the general public online through approved portals — democratized early-stage investing.",
  full:`<p><b>Regulation Crowdfunding (Reg CF)</b> lets companies raise limited amounts from ordinary investors via registered funding portals, with investment caps tied to income/net worth. A modern exemption alongside Reg A and Reg D.</p>`,
  related:["reg-a","reg-d","accredited-investor"] },
"chart-patterns":{ term:"Chart Patterns", group:"Analysis", aliases:["head and shoulders","double top","chart patterns","candlestick"],
  eli5:"Recognizable shapes technicians read as signals — like 'head and shoulders' (a reversal warning) or 'double top.'",
  full:`<p>Technicians watch <b>chart patterns</b>: head-and-shoulders (trend reversal), double tops/bottoms (reversals), and triangles/flags (continuations). Candlestick charts add detail on each period's open/close. All are pattern-recognition, not fundamentals.</p>`,
  related:["technical-analysis","support-resistance","moving-average"] },
"macd":{ term:"MACD & Bollinger Bands", group:"Analysis", aliases:["MACD","Bollinger Bands"],
  eli5:"Popular technical indicators. MACD tracks momentum from moving averages; Bollinger Bands show when price is unusually high or low versus recent volatility.",
  full:`<p><b>MACD</b> (Moving Average Convergence Divergence) signals momentum shifts from the gap between two moving averages. <b>Bollinger Bands</b> plot bands a couple standard deviations from a moving average — touches suggest overbought/oversold conditions.</p>`,
  related:["technical-analysis","rsi","moving-average","normal-distribution"] },
"cash-accrual-accounting":{ term:"Cash vs. Accrual Accounting", group:"Analysis", aliases:["cash basis","accrual basis","accrual accounting"],
  eli5:"Two ways to record money. Cash basis logs it when cash moves; accrual logs revenue when earned and expenses when incurred (what most public firms use).",
  full:`<p><b>Cash basis</b> records transactions when cash changes hands. <b>Accrual basis</b> (required for most public companies under GAAP) records revenue when <i>earned</i> and expenses when <i>incurred</i>, regardless of cash timing — giving a truer picture of performance.</p>`,
  related:["income-statement","cash-flow-statement","auditor-opinions"] },
"viatical-settlement":{ term:"Viatical & Life Settlements", group:"Insurance", aliases:["viatical settlement","life settlement"],
  eli5:"Selling your life insurance policy to an investor for a lump sum now. The investor pays the premiums and collects the death benefit later.",
  full:`<p>A <b>viatical settlement</b> (terminally ill) or <b>life settlement</b> lets a policyholder sell their life insurance to a third party for immediate cash. The buyer keeps paying premiums and receives the death benefit — often analyzed as a security.</p>`,
  related:["life-insurance","howey-test"] },
"stagflation":{ term:"Stagflation & Deflation", group:"Economics", aliases:["stagflation","deflation"],
  eli5:"Two ugly scenarios. Stagflation is high inflation WITH stagnant growth/high unemployment; deflation is broadly falling prices (which can stall an economy).",
  full:`<p><b>Stagflation</b> combines high inflation with stagnant growth and high unemployment — painful because the usual fixes conflict. <b>Deflation</b> is sustained falling prices; it sounds nice but can freeze spending and deepen downturns.</p>`,
  related:["inflation","gdp","federal-reserve","recession"] }
});
</script>

  { sec:"TAX",
