</strong> &rarr; <span class=\"hl\">LAGGING</span></li></ul>Frequently tested distinction."},{"sec":"IND","front":"Yield curve shapes","back":"<strong>Normal (positive)</strong>: long &gt; short. Healthy growth + term premium.<br><strong>Inverted (negative)</strong>: short &gt; long. Has preceded every post-WWII U.S. recession.<br><strong>Flat</strong>: minimal spread; transitional / uncertainty.<br><strong>Humped</strong>: intermediate &gt; both ends; rare; high uncertainty."},{"sec":"IND","front":"Theories of the term structure of interest rates","back":"<strong>Expectations theory</strong> &mdash; long rates = avg of expected future short rates.<br><strong>Liquidity preference theory</strong> &mdash; investors demand a term premium for longer maturities (explains normal upward slope).<br><strong>Market segmentation theory</strong> &mdash; different maturity buckets demanded by different investor classes; rates set by supply/demand within each segment."},{"sec":"IND","front":"Effect when interest rates RISE","back":"<ul><li>Bond prices &darr;</li><li>Long-duration bonds fall most</li><li>Growth stocks underperform value (future CFs discounted more)</li><li>REITs/real estate suffer (financing cost &uarr;)</li><li>USD typically strengthens (capital inflows)</li></ul>"},{"sec":"IND","front":"Balance of Payments &mdash; two components","back":"BOP = comprehensive accounting of all economic transactions between a country and the rest of the world.<br><br><strong>Current account</strong> &mdash; trade in goods/services + net investment income + net unilateral transfers.<br><strong>Capital &amp; financial account</strong> &mdash; cross-border investment flows (FDI, portfolio, official reserves).<br><br>A trade deficit (current account deficit) must be financed by capital inflows."},{"sec":"IND","front":"Strong USD vs. weak USD &mdash; who wins?","back":"<strong>Strong dollar</strong>:<ul><li>Hurts U.S. exporters (goods more expensive abroad)</li><li>Hurts U.S. multinationals' foreign earnings (translation)</li><li>Helps importers, U.S. travelers</li></ul><strong>Weak dollar</strong>: opposite."},{"sec":"TVM","front":"Present Value formula","back":"$$PV = \\frac{FV}{(1+r)^n}$$<br>Discounting a future amount back to today at rate <em>r</em> for <em>n</em> periods."},{"sec":"TVM","front":"Future Value formula","back":"$$FV = PV \\times (1+r)^n$$<br><br>Ex: $50K @ 7% for 20 yrs &rarr; $50K &times; 3.8697 = <strong>$193,484</strong>."},{"sec":"TVM","front":"Net Present Value &mdash; formula &amp; rule","back":"$$NPV = \\sum_{t=0}^{n} \\frac{CF_t}{(1+r)^t}$$<br><strong>Rule</strong>: accept if NPV &gt; 0.<br><br>IRR is the rate where NPV = 0; accept project if IRR &gt; required return."},{"sec":"TVM","front":"Rule of 72","back":"$$\\text{Years to double} \\approx \\frac{72}{\\text{annual rate (\\%)}}$$<br>At 8% &rarr; ~9 yrs. At 6% &rarr; ~12 yrs."},{"sec":"TVM","front":"The 3 financial statements (and what each shows)","back":"<strong>Balance sheet</strong> &mdash; snapshot at a point in time. Assets = Liabilities + Stockholders' Equity.<br><strong>Income statement</strong> &mdash; performance over a period (Revenue &rarr; Net Income).<br><strong>Statement of cash flows</strong> &mdash; reconciles NI to actual cash; sections: Operating, Investing, Financing."},{"sec":"TVM","front":"Income statement hierarchy","back":"Revenue<br>&minus; COGS<br>= <strong>Gross Profit</strong><br>&minus; Operating Expenses (SG&amp;A, R&amp;D, depreciation)<br>= <strong>Operating Income (EBIT)</strong><br>&minus; Interest Expense<br>= Pre-tax Income<br>&minus; Income Tax<br>= <strong>Net Income</strong>"},{"sec":"TVM","front":"4 auditor opinions (UQAD)","back":"<strong>U</strong>nqualified (clean) &mdash; statements fairly present per GAAP<br><strong>Q</strong>ualified &mdash; except for a specific item or limitation, fair<br><strong>A</strong>dverse &mdash; statements do NOT fairly present<br><strong>D</strong>isclaimer &mdash; auditor cannot express an opinion (insufficient evidence)"},{"sec":"TVM","front":"Cash basis vs. accrual basis accounting","back":"<strong>Cash</strong>: recognize when cash changes hands.<br><strong>Accrual</strong> (GAAP for most public co's): recognize when revenue is <em>earned</em> and expenses <em>incurred</em>, regardless of cash timing."},{"sec":"TVM","front":"Liquidity ratios","back":"<table><tr><th>Ratio</th><th>Formula</th></tr><tr><td>Current</td><td>CA / CL</td></tr><tr><td>Quick (acid)</td><td>(CA &minus; Inventory) / CL</td></tr><tr><td>Cash</td><td>(Cash + MS) / CL</td></tr><tr><td>Working capital</td><td>CA &minus; CL ($)</td></tr></table>Current &ge; 1 adequate; &ge; 2 strong."},{"sec":"TVM","front":"Profitability ratios","back":"<table><tr><th>Ratio</th><th>Formula</th></tr><tr><td>Gross margin</td><td>Gross Profit / Rev</td></tr><tr><td>Operating margin</td><td>Op Income / Rev</td></tr><tr><td>Net margin</td><td>NI / Rev</td></tr><tr><td>ROA</td><td>NI / Total Assets</td></tr><tr><td>ROE</td><td>NI / Equity</td></tr><tr><td>ROI</td><td>(Gain &minus; Cost) / Cost</td></tr></table>"},{"sec":"TVM","front":"Valuation ratios","back":"<table><tr><th>Ratio</th><th>Formula</th></tr><tr><td>P/E</td><td>Price / EPS</td></tr><tr><td>PEG</td><td>P/E &divide; growth rate</td></tr><tr><td>P/B</td><td>Price / Book/sh</td></tr><tr><td>P/S</td><td>Price / Rev/sh</td></tr><tr><td>Div yield</td><td>Annual div / Price</td></tr><tr><td>Payout</td><td>Div / NI</td></tr></table>"},{"sec":"TVM","front":"Solvency / leverage ratios","back":"<table><tr><th>Ratio</th><th>Formula</th></tr><tr><td>Debt-to-equity</td><td>Total Debt / Equity</td></tr><tr><td>Debt-to-assets</td><td>Total Debt / Total Assets</td></tr><tr><td>Interest coverage (TIE)</td><td>EBIT / Interest Expense</td></tr></table>"},{"sec":"TVM","front":"Basic vs. Diluted EPS","back":"<strong>Basic EPS</strong> = (NI &minus; Preferred Div) / Weighted-avg shares outstanding.<br><br><strong>Diluted EPS</strong> &mdash; includes impact of all potentially dilutive securities (convertibles, options, warrants) as if converted/exercised. <strong>Always &le; Basic EPS.</strong>"},{"sec":"TVM","front":"EBIT vs. EBITDA","back":"<strong>EBIT</strong> = Operating Income (earnings before interest &amp; taxes).<br><strong>EBITDA</strong> = EBIT + Depreciation + Amortization. Proxy for cash operating earnings; widely used in valuation.<br><br>Critique: EBITDA ignores capex required to maintain the business."},{"sec":"TVM","front":"Liquidation priority order","back":"<ol><li><strong>Secured</strong> creditors (mortgage bonds, equip trust, collateral trust)</li><li>Unsecured creditors w/ priority (admin, taxes, wages)</li><li>General unsecured (debentures, trade)</li><li><strong>Subordinated</strong> debentures</li><li><strong>Preferred</strong> stockholders</li><li><strong>Common</strong> stockholders (residual)</li></ol>Memory: <em>Some Unfortunate Souls Pay Cash</em>."},{"sec":"TECH","front":"Fundamental analysis &mdash; top-down vs. bottom-up","back":"<strong>Fundamental</strong> = derive intrinsic value from financial statements, economic conditions, industry, management.<br><br><strong>Top-down</strong> &mdash; macro &rarr; sector &rarr; specific securities.<br><strong>Bottom-up</strong> &mdash; individual company first; macro indifferent."},{"sec":"TECH","front":"Technical analysis &mdash; the 3 assumptions","back":"Studies <strong>price and volume</strong> patterns. Assumes:<ol><li>Prices reflect all relevant information</li><li>Prices move in trends</li><li>History repeats due to investor psychology</li></ol>"},{"sec":"TECH","front":"50-day vs. 200-day moving averages","back":"<strong>50-day MA</strong> &mdash; short-term trend.<br><strong>200-day MA</strong> &mdash; long-term trend.<br><br><strong>Golden cross</strong>: 50-day crosses ABOVE 200-day &rarr; bullish.<br><strong>Death cross</strong>: 50-day BELOW 200-day &rarr; bearish."},{"sec":"TECH","front":"RSI (Relative Strength Index)","back":"Oscillates between <strong>0 and 100</strong>.<br><br>Above <strong>70</strong> &rarr; <span class=\"hl\">overbought</span>.<br>Below <strong>30</strong> &rarr; <span class=\"hl\">oversold</span>."},{"sec":"TECH","front":"Dow Theory","back":"Charles Dow's framework: a primary trend is <strong>confirmed</strong> when both the <strong>Dow Industrials</strong> and the <strong>Dow Transports</strong> move in the same direction to new highs (or lows). Without confirmation, the move is suspect."},{"sec":"TECH","front":"Efficient Market Hypothesis &mdash; 3 forms","back":"<strong>Weak</strong> &mdash; prices reflect all past price/volume. Technical analysis can't generate excess returns.<br><strong>Semi-strong</strong> &mdash; prices reflect all <em>publicly</em> available info. Neither technical nor fundamental can systematically win; only insider info could. <em>Most academically supported.</em><br><strong>Strong</strong> &mdash; prices reflect ALL info incl. insider. No one outperforms. Generally rejected."},{"sec":"TECH","front":"Random walk theory &mdash; implication?","back":"Price changes are <strong>unpredictable</strong>; closely related to EMH.<br><br>Implies <strong>passive (index) investing</strong> as the rational strategy."},{"sec":"TECH","front":"Sentiment indicators &mdash; usually contrarian","back":"<ul><li><strong>Odd-lot theory</strong>: small investors trade odd lots (&lt;100 sh); their net position is contrarian</li><li><strong>Short interest ratio</strong>: bearish sentiment OR future buying pressure (short squeeze)</li><li><strong>Advance-decline line</strong>: cumulative advancing &minus; declining issues</li><li><strong>Put/call ratio</strong>: high = bearish (potential contrarian buy)</li></ul>"},{"sec":"MM","front":"T-bills &mdash; key facts","back":"<ul><li>Maturities: 4, 8, 13, 17, 26, 52 weeks</li><li>Sold at <strong>discount</strong>; redeemed at face (no coupon)</li><li>Min denomination: <strong>$100</strong></li><li>Tax: <strong>federal taxable; state/local EXEMPT</strong></li><li>Backed by full faith &amp; credit of U.S. Treasury &mdash; the &quot;risk-free&quot; benchmark</li></ul>"},{"sec":"MM","front":"Commercial Paper &mdash; key facts","back":"<ul><li><strong>Unsecured</strong> short-term corporate debt</li><li>Max maturity: <strong>270 days</strong> (Sec. 3(a)(3) registration exemption)</li><li>Sold at discount</li><li>Used for working capital, inventory financing</li><li>Issued by financially strong corps (typically rated A-1 / P-1)</li></ul>"},{"sec":"MM","front":"Banker's Acceptances","back":"Time drafts drawn on a bank, used to finance <strong>international trade</strong>. The bank &quot;accepts&quot; (guarantees) the obligation.<br><br>Typically <strong>30&ndash;180 days</strong>; max 270.<br>Sold at discount."},{"sec":"MM","front":"CDs &mdash; negotiable vs. non-negotiable vs. brokered","back":"<strong>Negotiable</strong>: &ge; $100K (often $1M+); tradeable in secondary mkt; &quot;jumbo CDs&quot;<br><strong>Non-negotiable</strong>: retail; not tradeable; <strong>FDIC up to $250K</strong><br><strong>Brokered</strong>: sold via BDs; can be non-negotiable but tradeable"},{"sec":"MM","front":"Eurodollars (despite the name)","back":"<strong>USD-denominated deposits held in banks OUTSIDE the United States.</strong><br><br>NOT &quot;European&quot; specifically &mdash; means USD held offshore <em>anywhere</em>. Eurodollar CDs are non-negotiable but trade in a deep wholesale market."},{"sec":"MM","front":"Repurchase Agreement (Repo)","back":"Short-term <strong>collateralized loan</strong> &mdash; one party sells securities to another with agreement to <strong>repurchase</strong> at a slightly higher price. Price difference = implicit interest.<br><br><strong>Reverse repo</strong> = same transaction from the other side. Used heavily by Fed for monetary policy."},{"sec":"FI","front":"Treasury securities &mdash; maturity ladder","back":"<table><tr><th>Security</th><th>Maturity</th></tr><tr><td>T-bills</td><td>4, 8, 13, 17, 26, 52 wks</td></tr><tr><td>T-notes</td><td>2, 3, 5, 7, 10 yrs</td></tr><tr><td>T-bonds</td><td>20, 30 yrs</td></tr><tr><td>TIPS</td><td>5, 10, 30 yrs</td></tr></table>All federal taxable; state/local exempt. Notes/bonds pay semiannual coupons."},{"sec":"FI","front":"TIPS &mdash; mechanism &amp; tax trap","back":"<strong>Treasury Inflation-Protected Securities</strong>. Principal adjusts semiannually based on CPI. Fixed coupon rate is applied to <strong>adjusted principal</strong>, so dollar interest grows with inflation. At maturity, holder gets <em>greater of</em> adjusted principal or original face.<br><br><span class=\"hl\"><strong>Trap:</strong> the annual increase in principal is taxed as interest in year of accrual (&quot;phantom income&quot;) &mdash; even though no cash received.</span> Best held in <strong>tax-deferred</strong> accounts."},{"sec":"FI","front":"STRIPS &mdash; what are they?","back":"<strong>Separate Trading of Registered Interest and Principal Securities.</strong><br><br>Treasury bonds with coupons and principal &quot;stripped&quot; and traded as separate <strong>zero-coupon</strong> instruments. Implied accruing interest taxed annually as ordinary income (OID treatment) &mdash; <strong>phantom income</strong>."},{"sec":"FI","front":"Series EE vs. Series I savings bonds","back":"<strong>EE</strong>: fixed rate at issuance; <strong>guaranteed to double in 20 years</strong>; max $10K/yr per SSN; state/local exempt; federal tax deferred until redemption; <strong>education exclusion</strong> (income-limited).<br><strong>I</strong>: fixed rate + variable inflation rate (semiannual, CPI-U). Same purchase limits, tax treatment, education exclusion."},{"sec":"FI","front":"Ginnie Mae (GNMA) &mdash; key distinction","back":"Agency of HUD. <strong>Backed by full faith &amp; credit of U.S. government.</strong> Issues mortgage-backed pass-throughs; investors receive monthly principal + interest. Subject to prepayment risk.<br><br><strong>Tax: federal taxable AND state/local taxable</strong> &mdash; unlike Treasuries (frequently tested distinction)."},{"sec":"FI","front":"Fannie Mae &amp; Freddie Mac","back":"<strong>Fannie Mae (FNMA)</strong> &amp; <strong>Freddie Mac (FHLMC)</strong> are <strong>GSEs</strong>, publicly traded.<br><br><strong>NOT</strong> backed by full faith &amp; credit (only implicit federal backing). Federal/state/local <strong>taxable</strong>."},{"sec":"FI","front":"Agency tax-status comparison","back":"<table><tr><th>Issuer</th><th>Backing</th><th>State/Local</th></tr><tr><td>U.S. Treasury</td><td>Full F&amp;C</td><td>Exempt</td></tr><tr><td>Ginnie Mae</td><td>Full F&amp;C</td><td><strong>Taxable</strong></td></tr><tr><td>Fannie Mae</td><td>Implicit only</td><td>Taxable</td></tr><tr><td>Freddie Mac</td><td>Implicit only</td><td>Taxable</td></tr><tr><td>FHLB</td><td>Implicit only</td><td><strong>Exempt</strong></td></tr></table>"},{"sec":"FI","front":"MBS: prepayment risk vs. extension risk","back":"<strong>Prepayment risk</strong>: when rates <strong>fall</strong>, homeowners refinance; principal returns faster than expected, forcing reinvestment at lower rates.<br><br><strong>Extension risk</strong>: when rates <strong>rise</strong>, prepayments slow; principal returned slower, locking investor into below-market yields longer."},{"sec":"FI","front":"CMO tranches &mdash; PAC vs. TAC vs. Companion","back":"<strong>PAC</strong> (Planned Amort. Class): predictable cash flow; protected within a PSA band by companions. <span class=\"hl\">Lowest risk; lowest yield.</span><br><strong>TAC</strong> (Targeted Amort. Class): protects vs. <em>prepayment</em> risk only, NOT extension. Intermediate.<br><strong>Companion (Support)</strong>: absorbs the prepayment volatility that would otherwise hit PAC/TAC. <strong>Highest risk + highest yield.</strong>"},{"sec":"FI","front":"CMO tranches &mdash; Z, IO, PO","back":"<strong>Z-tranche (accrual)</strong>: receives no interest until prior tranches retire; interest accrues to principal. Highest duration.<br><strong>IO (Interest Only)</strong>: receives only interest; benefits when rates <strong>rise</strong> (slower prepayments &rarr; more interest). Inverse to bond prices.<br><strong>PO (Principal Only)</strong>: receives only principal; benefits when rates <strong>fall</strong> (faster return at par)."},{"sec":"FI","front":"REMIC","back":"<strong>Real Estate Mortgage Investment Conduit</strong> &mdash; the tax form most CMOs have used since the 1986 Tax Reform Act. REMICs avoid double taxation at the entity level. CMO interest is taxable at federal, state, and local levels."},{"sec":"FI","front":"Secured corporate bonds &mdash; 3 types","back":"<ul><li><strong>Mortgage bonds</strong> &mdash; secured by real estate (utility plants)</li><li><strong>Equipment trust certificates</strong> &mdash; secured by transport equipment (railcars, aircraft); title held by trustee until repaid; common in airlines/railroads</li><li><strong>Collateral trust bonds</strong> &mdash; secured by other securities held by trustee</li></ul>"},{"sec":"FI","front":"Unsecured corporate bonds &mdash; types","back":"<ul><li><strong>Debentures</strong> &mdash; backed only by general credit</li><li><strong>Subordinated debentures</strong> &mdash; junior to senior debentures; higher yield</li><li><strong>Guaranteed bonds</strong> &mdash; guaranteed by another entity (e.g., parent)</li><li><strong>Income / adjustment bonds</strong> &mdash; interest paid only if corporation earns sufficient income; rare; reorganization use</li></ul>"},{"sec":"FI","front":"Convertible bond &mdash; conversion ratio &amp; parity","back":"<strong>Conversion ratio</strong> = Par value / Conversion price<br><strong>Conversion parity (price)</strong> = Bond price / Conversion ratio (the implied stock price for break-even)<br><strong>Conversion value</strong> = Stock price &times; Conversion ratio<br><br>Convertibles typically yield <em>less</em> than non-convertibles of equivalent credit; the conversion option has value."},{"sec":"FI","front":"Callable vs. putable bonds &mdash; who benefits?","back":"<strong>Callable</strong> &mdash; <em>issuer</em> can redeem before maturity at a specified call price. <strong>Detrimental to investor.</strong> Issuers call when rates fall.<br><br><strong>Putable</strong> &mdash; <em>holder</em> can sell back to issuer before maturity. <strong>Beneficial to investor.</strong> Rare; lower yielding because of this benefit."},{"sec":"FI","front":"GO bonds vs. Revenue bonds","back":"<strong>GO bonds</strong> &mdash; backed by full faith, credit, and <strong>taxing power</strong> of issuer. Voter approval often required. Repayment: ad valorem (property) tax (local); income/sales tax (state). Lower default risk, lower yield.<br><br><strong>Revenue bonds</strong> &mdash; backed by specific project revenues (toll roads, hospitals, airports, water/sewer). No taxing power. Higher yield. Subject to a <strong>rate covenant</strong>."},{"sec":"FI","front":"Muni variants &mdash; double-barreled, BAB, IDR, special tax/assessment","back":"<strong>Double-barreled</strong>: backed by both project revenues AND general taxing power.<br><strong>Build America Bonds (BABs)</strong>: taxable munis with federal interest subsidy (2009&ndash;2010 only).<br><strong>Industrial Development Revenue / Private Activity Bonds</strong>: proceeds used for private business; interest may be subject to <strong>AMT</strong>.<br><strong>Special tax / special assessment</strong>: backed by specific tax or property assessment."},{"sec":"FI","front":"Muni anticipation notes (5 types)","back":"Short-term munis:<ul><li><strong>TANs</strong> &mdash; Tax Anticipation Notes</li><li><strong>RANs</strong> &mdash; Revenue Anticipation Notes</li><li><strong>BANs</strong> &mdash; Bond Anticipation Notes</li><li><strong>GANs</strong> &mdash; Grant Anticipation Notes</li><li><strong>TRANs</strong> &mdash; Tax &amp; Revenue Anticipation Notes</li></ul>"},{"sec":"FI","front":"Muni tax treatment &mdash; including Triple Tax-Free","back":"<ul><li>Interest <strong>exempt from federal</strong> income tax (most munis)</li><li>State exempt if owner resides in issuing state</li><li><strong>Triple tax-free</strong> = federal + state + local exempt (typical for in-state local bonds; <strong>PR/Guam/USVI</strong> bonds are triple tax-free for ALL U.S. residents)</li><li><strong>Capital gains</strong> on muni sales NOT exempt</li><li>Some PAB interest is an <strong>AMT preference item</strong></li></ul>"},{"sec":"FI","front":"Taxable Equivalent Yield formula","back":"$$TEY = \\frac{\\text{Tax-free yield}}{1 - \\text{marginal tax rate}}$$<br><strong>Ex:</strong> 4% muni, 32% bracket: 0.04 / 0.68 = <strong>5.88%</strong><br><br>Reverse: After-tax yield = Yield &times; (1 &minus; tax rate)"},{"sec":"FI","front":"International bonds &mdash; Eurobond / Yankee / Samurai / Bulldog","back":"<strong>Eurobond</strong> &mdash; bonds issued in a currency outside that currency's home country (USD bonds in London = Eurodollar bonds).<br><strong>Yankee</strong> &mdash; non-U.S. issuer, USD, in U.S.<br><strong>Samurai</strong> &mdash; non-Japanese issuer, JPY, in Japan.<br><strong>Bulldog</strong> &mdash; non-UK issuer, GBP, in UK.<br><br>Foreign bond investors face <strong>currency risk</strong> on top of credit + rate."},{"sec":"FI","front":"Bond ratings: investment grade cutoff","back":"<strong>Lowest investment grade:</strong><ul><li>Moody's: <strong>Baa3</strong></li><li>S&amp;P / Fitch: <strong>BBB&minus;</strong></li></ul><strong>BB+ / Ba1</strong> and below = <strong>junk / high yield / speculative</strong>."},{"sec":"FI","front":"Bond pricing &mdash; quote conventions","back":"Bonds quoted as % of par ($1,000):<ul><li><strong>Par</strong> = 100 ($1,000)</li><li><strong>Premium</strong> &gt; 100</li><li><strong>Discount</strong> &lt; 100</li></ul><strong>Corporate / muni</strong>: 1/8ths ($1.25 per 1/8).<br><strong>Treasuries</strong>: 1/32nds ($0.3125 per 1/32).<br>Munis often quoted on a <em>yield</em> basis."},{"sec":"FI","front":"Day count + settlement for bonds","back":"<strong>Corporate &amp; muni</strong>: <strong>30/360</strong> (every month = 30 days, year = 360).<br><strong>Treasury</strong>: <strong>actual/actual</strong>.<br><br>Settlement typically <strong>T+2</strong> for corp/muni/Treasury.<br><br>Accrued interest: buyer pays seller for interest accrued from last coupon to settlement."},{"sec":"FI","front":"Yield definitions &mdash; nominal, current, YTM, YTC","back":"<strong>Nominal (coupon) yield</strong> = annual coupon / par. Fixed at issue.<br><strong>Current yield</strong> = annual coupon / market price.<br><strong>YTM</strong> = IRR of holding to maturity (uses face).<br><strong>YTC</strong> = same calc but using call price &amp; call date.<br><strong>Yield to Worst</strong> = lower of YTM and YTC. Conservative measure for callables."},{"sec":"FI","front":"Yield hierarchy &mdash; PREMIUM bond","back":"<strong>Coupon &gt; Current &gt; YTM &gt; YTC</strong><br><br>Logic: price &gt; par means a capital LOSS to par at maturity, dragging YTM below current yield."},{"sec":"FI","front":"Yield hierarchy &mdash; DISCOUNT bond","back":"<strong>Coupon &lt; Current &lt; YTM &lt; YTC</strong><br><br>Logic: price &lt; par means a capital GAIN at maturity, lifting YTM above current yield.<br><br>(Par bond: all four equal.)"},{"sec":"FI","front":"Macaulay vs. Modified vs. Effective Duration","back":"<strong>Macaulay</strong>: weighted-avg time to receive a bond's cash flows (in years).<br><strong>Modified</strong>: $$D_{mod} = \\frac{D_{Mac}}{1 + y/m}$$ Estimates price sensitivity.<br><strong>Effective</strong>: used for bonds with embedded options (callable, putable, MBS); accounts for changes in expected cash flows."},{"sec":"FI","front":"Price-sensitivity approximation using duration","back":"$$\\frac{\\Delta P}{P} \\approx -D_{mod} \\times \\Delta y$$<br><strong>Ex:</strong> Bond with $D_{mod}$ = 7.5 and rates rise 50 bp:<br>= &minus;7.5 &times; 0.005 = <strong>&minus;3.75%</strong>"},{"sec":"FI","front":"Duration relationships","back":"Duration is <strong>HIGHER</strong> for: longer maturity, lower coupon, lower yield.<br>Duration is <strong>LOWER</strong> for: shorter maturity, higher coupon, higher yield.<br><br><span class=\"hl\"><strong>Zero-coupon bond duration = its maturity.</strong></span><br><br>Higher duration &rarr; greater interest-rate sensitivity."},{"sec":"FI","front":"Convexity &mdash; what does it correct?","back":"Second-order correction term capturing the <strong>curvature</strong> of the price-yield relationship.<br><br><strong>Positive convexity</strong>: price rises MORE than duration predicts when rates fall, and falls LESS than predicted when rates rise. Most option-free bonds have positive convexity. Callables / MBS at low yields can have <strong>negative</strong> convexity.<br><br>Refined: $\\Delta P/P \\approx -D \\Delta y + \\tfrac{1}{2} C (\\Delta y)^2$"},{"sec":"FI","front":"Bond risks &mdash; the comprehensive list","back":"<ul><li><strong>Interest rate</strong> &mdash; price falls when rates rise</li><li><strong>Reinvestment</strong> &mdash; coupons reinvest at lower rates (mitigated by zeros)</li><li><strong>Credit/default</strong> &mdash; issuer fails to pay</li><li><strong>Call</strong> &mdash; called when rates fall</li><li><strong>Prepayment / extension</strong> (MBS)</li><li><strong>Liquidity</strong></li><li><strong>Inflation / purchasing power</strong></li><li><strong>Currency</strong> (foreign)</li><li><strong>Legislative / political</strong> (munis)</li></ul>"},{"sec":"EQ","front":"Common stock &mdash; rights of holders","back":"<ul><li><strong>Residual claim</strong> on assets &amp; earnings (after creditors + preferred)</li><li><strong>Voting</strong> &mdash; typically 1 vote/share</li><li><strong>Preemptive</strong> rights to maintain proportional ownership</li><li><strong>Limited liability</strong> &mdash; max loss = investment</li><li>Right to <strong>inspect books</strong> + receive annual reports</li><li>Right to receive <strong>dividends</strong> when declared</li></ul>"},{"sec":"EQ","front":"Statutory vs. Cumulative voting","back":"<strong>Statutory</strong> &mdash; 1 vote/share/seat. Favors majority shareholders (sweep every seat).<br><br><strong>Cumulative</strong> &mdash; total votes = shares &times; seats; can concentrate on a single nominee. Favors minority shareholders.<br><br><strong>Ex:</strong> 100 sh, 5 seats &rarr; statutory 100/seat max; cumulative 500 total &rarr; all 500 to one nominee."},{"sec":"EQ","front":"Preferred stock &mdash; key features","back":"Hybrid: legal equity, functionally fixed-income.<ul><li><strong>Fixed dividend</strong> (% of par or $ amount); paid before common</li><li><strong>Senior to common</strong> in liquidation</li><li>Generally <strong>non-voting</strong> (activates if dividends missed)</li><li>Typically <strong>callable</strong></li></ul>"},{"sec":"EQ","front":"Preferred stock variations","back":"<ul><li><strong>Cumulative</strong> &mdash; missed dividends accrue and must be paid before any common dividend</li><li><strong>Non-cumulative</strong> &mdash; missed dividends lost forever (rare)</li><li><strong>Participating</strong> &mdash; stated div + extra when common exceeds threshold</li><li><strong>Convertible</strong> &mdash; convertible into common</li><li><strong>Callable</strong> &mdash; redeemable at issuer's option</li><li><strong>Adjustable-rate</strong> &mdash; div tied to a benchmark</li></ul>"},{"sec":"EQ","front":"ADRs &mdash; what are they?","back":"<strong>American Depositary Receipts</strong> &mdash; negotiable certificates issued by U.S. banks, representing ownership of foreign-corp shares.<ul><li>Trade in <strong>USD</strong> on U.S. exchanges/OTC</li><li>Pay dividends in USD (foreign tax often withheld)</li><li>Subject to <strong>currency risk</strong> (underlying is foreign-denominated)</li><li>Holder has ownership rights, but <strong>voting may be restricted</strong></li><li>Sponsored vs. unsponsored</li></ul>"},{"sec":"EQ","front":"Rights vs. Warrants","back":"<table><tr><th></th><th>Rights</th><th>Warrants</th></tr><tr><td>Term</td><td>Short (30&ndash;60 days)</td><td>Long (years; some perpetual)</td></tr><tr><td>To whom</td><td>Existing shareholders (preemptive)</td><td>Often attached to bond/preferred</td></tr><tr><td>Strike</td><td><strong>Below</strong> market (ITM)</td><td><strong>Above</strong> market (OTM)</td></tr></table><strong>R</strong>ights are <strong>R</strong>eally short; <strong>W</strong>arrants are <strong>W</strong>ay longer."},{"sec":"EQ","front":"Dividend dates &mdash; declaration / ex / record / payment","back":"<strong>Declaration</strong>: board announces.<br><strong>Ex-dividend</strong>: buyers on/after this date do NOT receive the dividend; price drops by approx the dividend amount that morning.<br><strong>Record</strong>: shareholders of record receive.<br><strong>Payment</strong>: dividend actually paid.<br><br>Ex-date is <strong>1 business day</strong> before record date (T+1 era)."},{"sec":"EQ","front":"Stock split mechanics","back":"<strong>Forward split</strong> (e.g., 2-for-1): doubles shares, halves price. Market cap unchanged. Cost basis per share reduced; total basis unchanged.<br><br><strong>Reverse split</strong>: opposite; share count down, price up. Often used by struggling companies to maintain listing requirements.<br><br><strong>Stock dividend</strong>: small additional shares (e.g., 5%); reduces basis per share without affecting total."},{"sec":"EQ","front":"Rule 144 &mdash; restricted vs. control stock","back":"<strong>Restricted stock</strong>: acquired in unregistered, private transactions.<br><strong>Control stock</strong>: held by an <strong>affiliate</strong> (officer, director, 10%+ holder).<br><br><strong>Holding period</strong>: <strong>6 mo</strong> (SEC-reporting issuer); <strong>12 mo</strong> (non-reporting). Applies to restricted; control has no holding period if registered."},{"sec":"EQ","front":"Rule 144 &mdash; volume limit for affiliates","back":"In any 3-month period, may not sell more than the <strong>greater of</strong>:<ul><li><strong>1% of outstanding shares</strong>, OR</li><li><strong>Avg weekly trading volume</strong> over past 4 weeks</li></ul><strong>Form 144</strong> filed with SEC at time of order if sale exceeds <strong>5,000 sh OR $50,000</strong> in any 3-month period."},{"sec":"POOL","front":"Open-end mutual fund &mdash; NAV calc &amp; pricing rule","back":"$$NAV = \\frac{\\text{Total Assets} - \\text{Total Liabilities}}{\\text{Shares Outstanding}}$$<br>Calculated <strong>once daily</strong>, usually at 4:00 PM ET.<br><br><strong>Forward pricing rule</strong>: orders during the day execute at the <em>next</em> computed NAV (today's close). Prevents arbitrage on intraday news."},{"sec":"POOL","front":"Open-end fund &mdash; redemption requirement","back":"Mutual fund must redeem investor's shares <strong>within 7 days</strong> at NAV. Continuous offering and redemption; unlimited shares can be issued."},{"sec":"POOL","front":"Mutual fund share classes A/B/C/I/R","back":"<strong>A</strong>: front-end load (5.75% typ); breakpoints; LOW 12b-1 (~0.25%); best for long-term + large $.<br><strong>B</strong>: no front; CDSC declining; converts to A in ~6&ndash;8 yrs; HIGH 12b-1; mostly phased out.<br><strong>C</strong>: small CDSC ~1 yr; ongoing HIGH 12b-1 (~1%); short-medium term.<br><strong>I</strong>: no load; high min; institutional.<br><strong>R</strong>: retirement plan accounts."},{"sec":"POOL","front":"12b-1 fees &mdash; caps","back":"Under Rule 12b-1 (1940 Act):<ul><li><strong>Distribution</strong>: max 0.75%/yr</li><li><strong>Service</strong>: max 0.25%/yr</li><li><strong>Total max: 1.00%/yr</strong></li></ul>Fund cannot call itself <strong>&quot;no-load&quot;</strong> if 12b-1 &gt; <strong>0.25%</strong>.<br><br>If 12b-1 = 1% max, max sales load drops from 8.5% to <strong>7.25%</strong>."},{"sec":"POOL","front":"Maximum mutual fund sales charge","back":"<strong>Max total front-end load = 8.5% of POP</strong> (not NAV).<br><br>To charge full 8.5%, fund must offer:<ol><li>Breakpoints</li><li>Rights of accumulation</li><li>Reinvestment of div/CG at NAV</li></ol>Failing any &rarr; max load drops."},{"sec":"POOL","front":"Letter of Intent &mdash; rules","back":"Non-binding statement of intent to invest a sufficient amount over <strong>13 months</strong> to qualify for a breakpoint.<br><br>Can be <strong>backdated up to 90 days</strong>.<br><br>If investor fails to invest the stated amount, additional sales charge collected."},{"sec":"POOL","front":"Rights of Accumulation (ROA)","back":"Combines <strong>current holdings (at current NAV) + new purchase</strong> to qualify for breakpoint. <strong>No time limit.</strong><br><br>Ex: investor with $90K already in fund family who buys $15K more qualifies for the $100K breakpoint on the new purchase."},{"sec":"POOL","front":"Breakpoint sale (unethical)","back":"Recommending a purchase <strong>just below a breakpoint</strong> (e.g., $24K when next breakpoint is $25K) to avoid the lower sales charge and generate higher commission. <span class=\"hl\"><strong>Prohibited.</strong></span> Unethical regardless of investor instruction."},{"sec":"POOL","front":"Closed-end funds &mdash; key features","back":"<ul><li>Issue a <strong>fixed</strong> number of shares via IPO; trade on exchanges like stocks</li><li>Trade at <strong>premium or discount to NAV</strong> (often discount)</li><li>NO continuous redemption &mdash; sell on secondary mkt</li><li>Can use <strong>leverage</strong> to amplify returns</li><li>Often pay attractive distributions (some return of capital)</li></ul>Still investment companies under the 1940 Act."},{"sec":"POOL","front":"Unit Investment Trusts &mdash; defining features","back":"<ul><li><strong>Fixed portfolio</strong> (typically bonds, sometimes stocks)</li><li><strong>NO active management</strong> &mdash; buy and hold</li><li>Self-liquidating: terminates at preset date</li><li><strong>NO board of directors</strong></li><li>Investors own &quot;units&quot;; UITs are <strong>redeemable</strong></li></ul>"},{"sec":"POOL","front":"ETF mechanism &mdash; APs &amp; creation units","back":"<strong>Authorized Participants (APs)</strong> = large institutions that create or redeem ETF shares in large blocks called <strong>creation units</strong> (typically 50,000 sh).<br><br>Creation/redemption is <strong>in-kind</strong> &mdash; APs deliver basket of underlying for ETF shares (or vice versa). Arbitrage keeps ETF price near NAV."},{"sec":"POOL","front":"ETF advantages over mutual funds","back":"<ul><li><strong>Intraday trading</strong> at market prices</li><li><strong>Tax efficiency</strong> (in-kind redemption avoids triggering CGs)</li><li>Generally <strong>lower expense ratios</strong></li><li><strong>Transparency</strong> (most disclose holdings daily)</li></ul>"},{"sec":"POOL","front":"Leveraged / Inverse ETFs &mdash; the daily-reset trap","back":"2x / 3x or inverse ETFs use derivatives to amplify <strong>daily</strong> returns.<br><br><strong>Daily reset</strong> means returns over multiple days suffer <span class=\"hl\">path-dependent decay</span>; unsuitable for buy-and-hold. A 2x ETF on a flat-but-volatile index <strong>loses value</strong> over time."},{"sec":"POOL","front":"ETN vs. ETF &mdash; critical distinction","back":"<strong>ETNs are unsecured debt obligations of an issuer</strong> (typically a bank). They are NOT funds; own no underlying assets. Issuer promises returns linked to an index.<ul><li>Subject to <strong>issuer credit risk</strong> (Lehman ETNs &rarr; $0)</li><li>Tax: typically no annual taxable distributions; deferred to sale</li><li>Tracking is exact (contractual promise)</li></ul>"},{"sec":"POOL","front":"REIT requirements (the 4 tests)","back":"To qualify as REIT and avoid corp-level tax:<ol><li>Distribute <strong>&ge; 90%</strong> of taxable income annually</li><li><strong>&ge; 75% of assets</strong> in real estate, cash, or gov't securities</li><li><strong>&ge; 75% of gross income</strong> from real estate (rents, mortgage interest, gains)</li><li>At least <strong>100 shareholders</strong></li></ol><strong>5/50 test</strong> &mdash; 5 or fewer individuals can't own &gt; 50% in last half of year."},{"sec":"POOL","front":"REIT types","back":"<strong>Equity REITs</strong> &mdash; own &amp; operate income-producing real estate (apartments, offices, malls, hotels, warehouses, data centers, cell towers); income from rents.<br><strong>Mortgage REITs</strong> &mdash; invest in mortgages &amp; MBS; income from interest spread; rate-sensitive.<br><strong>Hybrid REITs</strong> &mdash; both.<br><br>Distributions taxed as <strong>ordinary income</strong> (not qualified div rate). 20% QBI deduction (Sec. 199A) through 2025."},{"sec":"POOL","front":"Hedge fund characteristics","back":"<ul><li>LP or LLC structure</li><li><strong>Sec. 3(c)(1)</strong>: up to 100 owners, all <strong>accredited</strong></li><li><strong>Sec. 3(c)(7)</strong>: only qualified purchasers ($5M ind / $25M inst); no investor count limit</li><li><strong>Lockup</strong> periods, <strong>gates</strong>, <strong>high-water marks</strong></li><li><strong>&quot;2 and 20&quot;</strong> fee structure (2% mgmt + 20% perf)</li><li>Use leverage, shorts, derivatives, illiquid investments</li></ul>"},{"sec":"POOL","front":"DPP &mdash; key tax rules","back":"Limited partnerships passing income, gains, losses, deductions, credits through to investors (no entity-level tax).<br><br><span class=\"hl\"><strong>Passive losses</strong> can ONLY offset passive income</span> (post-1986 Tax Reform Act). Unused losses suspend until disposition.<br><br><strong>Recapture</strong> &mdash; accelerated depreciation taken is recaptured as ordinary income on disposition."},{"sec":"INS","front":"Term vs. Whole vs. Universal life","back":"<strong>Term</strong>: pure death benefit for set term; no cash value; lowest premiums.<br><strong>Whole life</strong>: lifetime coverage; level premium; <strong>guaranteed</strong> cash value at fixed rate; insurer bears investment risk.<br><strong>Universal life (UL)</strong>: flexible premium &amp; death benefit; cash value earns interest credited by insurer (general account)."},{"sec":"INS","front":"Variable life vs. Variable Universal Life","back":"<strong>Variable Life (VL)</strong>: fixed scheduled premium; death benefit varies w/ separate-account performance (with guaranteed minimum); cash value in subaccounts chosen by holder. <strong>IS A SECURITY</strong> &mdash; needs Series 6/7 + state insurance license.<br><br><strong>VUL</strong>: combines UL flexibility + VL separate accounts; NO guaranteed minimum death benefit. Also a security."},{"sec":"INS","front":"Annuities by investment type","back":"<strong>Fixed</strong>: insurer guarantees rate; NOT a security; insurance regulated only.<br><strong>Variable</strong>: separate-account subaccounts; investor bears risk; <strong>IS A SECURITY</strong> &mdash; needs Series 6/7 + state insurance license.<br><strong>Equity-Indexed (EIA)</strong>: return tied to index with floor + cap (e.g., 0% to 8%); insurance regulated; not federally a security (state varies)."},{"sec":"INS","front":"Annuity payout (settlement) options","back":"<strong>Life only (straight life)</strong>: payments for life; <strong>HIGHEST</strong> per payment; ends at death.<br><strong>Life with period certain</strong>: life or specified period (e.g., 10 yrs), whichever longer.<br><strong>Joint &amp; survivor</strong>: life of two annuitants; lower per payment.<br><strong>Unit refund</strong>: guarantees at least the premium amount paid out."},{"sec":"INS","front":"1035 Exchange &mdash; what's allowed?","back":"Tax-free exchange of insurance/annuity contracts:<ul><li>Life &rarr; Life: &#10003;</li><li>Life &rarr; Annuity: &#10003;</li><li>Annuity &rarr; Annuity: &#10003;</li><li><span class=\"hl\"><strong>Annuity &rarr; Life: NOT ALLOWED</strong> (one-way street)</span></li></ul>Existing cost basis carries over."},{"sec":"INS","front":"Non-qualified annuity tax treatment","back":"<ul><li>Contributions: after-tax (no deduction)</li><li>Growth: <strong>tax-deferred</strong></li><li>Withdrawals: <strong>LIFO</strong> &mdash; earnings out first, taxed as ordinary income; basis returned tax-free after</li><li><strong>10% penalty</strong> on earnings withdrawn before age 59&frac12;</li><li>Death benefit to beneficiary is taxable (less basis); NO step-up in basis</li></ul>"},{"sec":"INS","front":"AIR &mdash; Assumed Interest Rate (variable annuity)","back":"Rate used to compute the <strong>first variable payment</strong>. Subsequent payments adjust based on whether separate account performs above, equal to, or below AIR:<ul><li>Return &gt; AIR &rarr; next payment <strong>&uarr;</strong></li><li>Return = AIR &rarr; next payment <strong>same</strong></li><li>Return &lt; AIR &rarr; next payment <strong>&darr;</strong></li></ul>"},{"sec":"DERIV","front":"Call vs. Put option &mdash; basics","back":"<strong>Call</strong>: right to <strong>BUY</strong> underlying at strike by expiration.<br><strong>Put</strong>: right to <strong>SELL</strong> underlying at strike by expiration.<br><br>Holder has the <em>right</em>; writer has the <em>obligation</em> if assigned.<br><br>Standard contract = <strong>100 shares</strong>. Equity options expire <strong>3rd Friday</strong>."},{"sec":"DERIV","front":"Long/Short option max gain &amp; max loss","back":"<strong>Long call</strong>: bullish; max loss = premium; max gain = unlimited<br><strong>Short call (naked)</strong>: bearish/neutral; max gain = premium; max loss = <strong>unlimited</strong><br><strong>Long put</strong>: bearish; max loss = premium; max gain = (Strike) &times; 100 &minus; premium<br><strong>Short put</strong>: bullish/neutral; max gain = premium; max loss = (Strike &times; 100) &minus; premium"},{"sec":"DERIV","front":"Moneyness &mdash; ITM / ATM / OTM","back":"<strong>Call ITM</strong>: stock &gt; strike. <strong>Call OTM</strong>: stock &lt; strike.<br><strong>Put ITM</strong>: stock &lt; strike. <strong>Put OTM</strong>: stock &gt; strike.<br><strong>ATM</strong>: stock &approx; strike.<br><br>Premium = Intrinsic Value + Time Value. Intrinsic = ITM amount (never negative). Time value decays toward expiration."},{"sec":"DERIV","front":"Covered call &mdash; structure &amp; use","back":"<strong>Long stock + Short call.</strong><br><br>Generates income; caps upside at strike + premium. Max loss = stock decline, partially offset by premium received.<br><br><strong>Use case</strong>: moderately bullish; willing to sell at strike; income generation."},{"sec":"DERIV","front":"Protective put &mdash; structure &amp; use","back":"<strong>Long stock + Long put.</strong><br><br>Insurance against downside. Max loss = (stock cost &minus; put strike) + put premium.<br><br><strong>Use case</strong>: holds stock long-term, fears short-term decline."},{"sec":"DERIV","front":"Long straddle vs. Long strangle","back":"<strong>Long straddle</strong>: long call + long put, <strong>SAME strike, SAME expiration</strong>. Profits from large move in either direction. Loss if stock stays near strike. Use: expect volatility, uncertain direction.<br><br><strong>Long strangle</strong>: long call + long put, <strong>DIFFERENT strikes</strong> (typically both OTM), same expiration. Cheaper than straddle; needs LARGER move."},{"sec":"DERIV","front":"Vertical spreads &mdash; bull/bear, debit/credit","back":"Same expiration, different strikes:<ul><li><strong>Bull call spread</strong>: long lower-strike call + short higher-strike call (debit; bullish)</li><li><strong>Bear put spread</strong>: long higher-strike put + short lower-strike put (debit; bearish)</li><li><strong>Bear call spread</strong>: short lower + long higher call (credit; bearish)</li><li><strong>Bull put spread</strong>: short higher + long lower put (credit; bullish)</li></ul>"},{"sec":"DERIV","front":"Calendar / Diagonal / Collar spreads","back":"<strong>Calendar (horizontal)</strong>: same strike, different expirations.<br><strong>Diagonal</strong>: different strikes AND different expirations.<br><strong>Collar</strong>: long stock + protective put + short OTM call. Short call premium finances put. Caps upside but cheap downside protection."},{"sec":"DERIV","front":"Futures vs. Forwards","back":"<strong>Futures</strong>: <strong>standardized exchange-traded</strong>; marked-to-market daily; cash margin required. Used for commodities, interest rates, indices, currencies.<br><br><strong>Forwards</strong>: <strong>OTC and customized</strong>; counterparty credit risk; no daily mark-to-market.<br><br>Both are <strong>obligations</strong> (unlike options)."},{"sec":"ALT","front":"Collectibles tax rate","back":"Long-term capital gains on <strong>collectibles</strong> (art, antiques, wine, coins, etc.) taxed at <strong>maximum 28%</strong> rate &mdash; vs. 20% for most assets."},{"sec":"ALT","front":"Structured products &mdash; types &amp; concerns","back":"Hybrid securities = debt + embedded derivative.<ul><li><strong>Principal-protected notes</strong> &mdash; guarantee return of principal at maturity (subject to issuer credit); upside linked to index</li><li><strong>Reverse convertibles</strong> &mdash; high coupon; principal returned in shares (not cash) if underlying declines below trigger</li></ul>Concerns: issuer credit risk, complexity, illiquidity, embedded fees."},{"sec":"ALT","front":"Howey Test (Series 65 testable since 6/2023)","back":"&quot;Investment contract&quot; (and thus a security) exists if all four prongs met:<ol><li><strong>I</strong>nvestment of money</li><li>In a <strong>C</strong>ommon enterprise</li><li>With <strong>E</strong>xpectation of profits</li><li><strong>P</strong>redominantly from efforts of others</li></ol>Heavily applied to ICOs, tokens, novel structures."},{"sec":"ALT","front":"Digital assets &mdash; SEC view + tax","back":"<ul><li><strong>Bitcoin</strong>: generally a commodity, not a security</li><li><strong>Ethereum</strong>: SEC has indicated decentralized enough to not be a security (ETH staking products may be)</li><li>Most ICO tokens: securities (per Howey)</li><li>Stablecoins: varies by structure</li></ul><strong>Tax</strong>: digital assets are <strong>property</strong> per IRS Notice 2014-21. Sales trigger CG/CL."},{"sec":"SUIT","front":"Required client information","back":"<strong>Financial</strong>: income, expenses, net worth, liquid NW, holdings, insurance, debt.<br><strong>Investment objectives</strong> (in increasing risk): capital preservation &rarr; current income &rarr; growth &rarr; aggressive growth &rarr; speculation.<br><strong>Risk tolerance</strong>, <strong>time horizon</strong>, <strong>tax considerations</strong>, <strong>liquidity needs</strong>, <strong>experience</strong>, <strong>restrictions</strong>, behavioral factors."},{"sec":"SUIT","front":"Investment objectives &mdash; in increasing risk","back":"<ol><li><strong>Capital preservation</strong> &mdash; protect principal; older investors, short horizons</li><li><strong>Current income</strong> &mdash; bonds, div stocks, REITs</li><li><strong>Growth</strong> &mdash; equities; longer horizon</li><li><strong>Aggressive growth</strong> &mdash; small caps, EM, sector funds</li><li><strong>Speculation</strong> &mdash; options, leveraged products</li><li><strong>Total return</strong> &mdash; income + appreciation</li><li><strong>Tax minimization</strong> &mdash; munis, tax-deferred</li></ol>"},{"sec":"SUIT","front":"Time horizon classifications","back":"<strong>Short-term</strong> (&lt;3 yrs) &mdash; money market, short bonds<br><strong>Intermediate</strong> (3&ndash;10 yrs) &mdash; balanced<br><strong>Long-term</strong> (10+ yrs) &mdash; growth-oriented; can tolerate volatility"},{"sec":"SUIT","front":"Behavioral biases (commonly tested)","back":"<ul><li><strong>Anchoring</strong> &mdash; over-reliance on initial information</li><li><strong>Loss aversion</strong> &mdash; Kahneman/Tversky: losses hurt ~2x as much as equivalent gains feel good</li><li><strong>Confirmation bias</strong></li><li><strong>Herding</strong></li><li><strong>Overconfidence</strong></li><li><strong>Recency bias</strong></li><li><strong>Framing effects</strong></li></ul>"},{"sec":"SUIT","front":"Suitability vs. Best Interest vs. Fiduciary","back":"<strong>Suitable</strong> &mdash; reasonable basis to believe appropriate based on profile.<br><strong>IA's fiduciary duty</strong> &mdash; recommendation must be in client's <strong>best interest</strong>.<br><strong>BDs &amp; Reg BI</strong> (eff 6/30/2020) &mdash; comparable best-interest standard, but BDs are NOT &quot;fiduciaries&quot; in the technical advisory sense."},{"sec":"RISK","front":"Systematic (non-diversifiable) risks &mdash; PRIME","back":"Cannot be eliminated by diversification:<ul><li><strong>P</strong>urchasing power (inflation)</li><li><strong>R</strong>einvestment</li><li><strong>I</strong>nterest rate</li><li><strong>M</strong>arket</li><li><strong>E</strong>xchange rate (currency)</li></ul>Plus: geopolitical risk."},{"sec":"RISK","front":"Non-systematic (diversifiable) risks &mdash; BCLR + P","back":"Can be reduced via diversification:<ul><li><strong>B</strong>usiness / management</li><li><strong>C</strong>redit / default</li><li><strong>L</strong>iquidity (marketability)</li><li><strong>R</strong>egulatory / legislative</li><li><strong>P</strong>olitical (specific country/industry)</li></ul>Plus: opportunity cost."},{"sec":"RISK","front":"Diversification &mdash; the math","back":"$$\\sigma_p^2 = \\sum_i w_i^2 \\sigma_i^2 + \\sum_i\\sum_{j \\ne i} w_i w_j \\sigma_i \\sigma_j \\rho_{ij}$$Covariance term shrinks as correlation falls.<br><br><strong>Maximum benefit at $\\rho$ = &minus;1.</strong><br>~20&ndash;30 stocks captures most diversification benefit.<br>As N grows, only systematic risk remains."},{"sec":"RAR","front":"Sharpe Ratio &mdash; formula &amp; when to use","back":"$$S = \\frac{R_p - R_f}{\\sigma_p}$$<br>Uses <strong>total risk</strong> (standard deviation).<br><br>Appropriate when the portfolio represents the <strong>client's entire holdings</strong>.<br><br>Higher = better risk-adjusted return per unit of total risk."},{"sec":"RAR","front":"Treynor Ratio &mdash; formula &amp; when to use","back":"$$T = \\frac{R_p - R_f}{\\beta_p}$$<br>Uses <strong>systematic risk only</strong> (beta).<br><br>Appropriate when the portfolio is <strong>one of several</strong> the investor holds (so non-systematic risk is already diversified away).<br><br>Higher = better risk-adjusted return per unit of market risk."},{"sec":"RAR","front":"Jensen's Alpha &mdash; formula &amp; meaning","back":"$$\\alpha = R_p - [R_f + \\beta_p (R_m - R_f)]$$<br>Excess return <em>over</em> what CAPM predicts given the portfolio's beta.<br><br><strong>Positive alpha</strong> &mdash; manager added value above market-implied return.<br><strong>Negative alpha</strong> &mdash; underperformance."},{"sec":"RAR","front":"Sortino Ratio &mdash; how it differs from Sharpe","back":"$$\\text{Sortino} = \\frac{R_p - R_f}{\\sigma_d}$$<br>Like Sharpe but uses <strong>downside deviation only</strong> ($\\sigma_d$) &mdash; penalizes only negative returns.<br><br>Appropriate when investors care about downside risk specifically (asymmetric utility)."},{"sec":"RAR","front":"Information Ratio","back":"$$IR = \\frac{R_p - R_b}{\\text{Tracking Error}}$$<br>where $R_b$ = benchmark return; tracking error = standard deviation of $(R_p - R_b)$.<br><br>Measures <strong>consistency of outperformance relative to benchmark</strong>."},{"sec":"RAR","front":"Decision rules &mdash; which ratio when?","back":"<table><tr><th>Question</th><th>Use</th></tr><tr><td>Portfolio is entire investment?</td><td><strong>Sharpe</strong></td></tr><tr><td>Piece of diversified whole?</td><td><strong>Treynor</strong></td></tr><tr><td>Did manager beat the model?</td><td><strong>Alpha</strong></td></tr><tr><td>Beat benchmark consistently?</td><td><strong>Information ratio</strong></td></tr><tr><td>Care only about downside?</td><td><strong>Sortino</strong></td></tr></table>"},{"sec":"RAR","front":"Worked example &mdash; Sharpe / Treynor / Alpha","back":"Portfolio P: return 12%, $\\sigma$ = 15%, $\\beta$ = 1.2. $R_f$ = 3%, market = 10%.<br><br><strong>Sharpe</strong> = (12 &minus; 3) / 15 = <strong>0.60</strong><br><strong>Treynor</strong> = (12 &minus; 3) / 1.2 = <strong>7.5</strong><br><strong>Alpha</strong> = 12 &minus; [3 + 1.2(10 &minus; 3)] = 12 &minus; 11.4 = <strong>+0.6%</strong> (outperformance)"},{"sec":"MPT","front":"Beta &mdash; meaning of values","back":"$$\\beta_i = \\frac{\\text{Cov}(R_i, R_m)}{\\text{Var}(R_m)}$$<ul><li>$\\beta$ = 1.0: moves with market</li><li>$\\beta$ &gt; 1.0: more volatile (growth, cyclicals)</li><li>$\\beta$ &lt; 1.0: less volatile (utilities, staples)</li><li>$\\beta$ = 0: uncorrelated (risk-free)</li><li>$\\beta$ &lt; 0: inversely correlated (rare)</li></ul>Portfolio beta = $\\sum w_i \\beta_i$"},{"sec":"MPT","front":"R-squared &mdash; what does it tell you?","back":"R&sup2; measures the <strong>% of a portfolio's movements explained by the benchmark</strong>, on a scale of 0 to 100.<br><br><strong>R&sup2; &gt; 70</strong>: beta is meaningful.<br><strong>R&sup2; &lt; 70</strong>: non-market factors dominate &mdash; beta less reliable.<br><br>Pure index fund tracking S&amp;P 500 has R&sup2; near 100."},{"sec":"MPT","front":"Correlation coefficient","back":"$\\rho$ bounded $-1$ to $+1$:<ul><li>$\\rho$ = +1: perfect positive</li><li>$\\rho$ = 0: no linear relationship</li><li>$\\rho$ = &minus;1: perfect negative</li></ul><strong>Diversification benefit emerges whenever $\\rho$ &lt; 1; max at $\\rho$ = &minus;1.</strong>"},{"sec":"MPT","front":"Geometric vs. Arithmetic mean &mdash; which is lower?","back":"<strong>Geometric mean (compound) &le; Arithmetic mean.</strong><br><br>Difference grows with volatility:<br>$$G \\approx A - \\frac{\\sigma^2}{2}$$<br>Use <strong>geometric</strong> for multi-period investment returns."},{"sec":"MPT","front":"Efficient Frontier &mdash; Markowitz","back":"Markowitz: investors should care about <strong>portfolio</strong> risk and return, not individual security R/R.<br><br><strong>Efficient frontier</strong> = set of portfolios that maximize expected return for each level of risk."},{"sec":"MPT","front":"Capital Market Line (CML)","back":"When risk-free asset is added, all efficient portfolios become combinations of the <strong>market portfolio</strong> (tangent) and the risk-free asset.<br><br>$$E(R_p) = R_f + \\frac{E(R_m) - R_f}{\\sigma_m} \\times \\sigma_p$$<br>Uses <strong>total risk</strong> ($\\sigma$). Applies ONLY to <strong>efficient</strong> portfolios."},{"sec":"MPT","front":"Security Market Line (SML) &amp; CAPM","back":"SML plots expected return vs. <strong>beta</strong> (systematic risk only). Applies to <strong>any</strong> security or portfolio.<br><br><strong>CAPM:</strong>$$E(R_i) = R_f + \\beta_i \\times [E(R_m) - R_f]$$<br><strong>Ex:</strong> $R_f$=3%, $R_m$=9%, $\\beta$=1.5: 3% + 1.5(9% &minus; 3%) = <strong>12%</strong>. Actual return 14% &rarr; alpha = +2%."},{"sec":"MPT","front":"CML vs. SML &mdash; key distinction","back":"<table><tr><th></th><th>CML</th><th>SML</th></tr><tr><td>X-axis</td><td>Total risk ($\\sigma$)</td><td>Systematic risk ($\\beta$)</td></tr><tr><td>Applies to</td><td>Efficient portfolios only</td><td>ANY security/portfolio</td></tr></table>"},{"sec":"STRAT","front":"Asset allocation frameworks","back":"<strong>Strategic</strong>: long-term target weights; periodic rebalancing.<br><strong>Tactical</strong>: short-term shifts within ranges, exploiting market views.<br><strong>Dynamic</strong>: systematic adjustment by rules (e.g., target-date funds).<br><strong>Constant-dollar</strong>: fixed $ in stocks; mechanical contrarian.<br><strong>Constant-ratio</strong>: fixed % allocation; rebalance to maintain.<br><strong>100 (or 110/120) minus age</strong> in stocks &mdash; heuristic."},{"sec":"STRAT","front":"Investment styles","back":"<strong>By philosophy</strong>: Active vs. Passive (indexing).<br><strong>By stock selection</strong>:<ul><li><strong>Growth</strong> &mdash; above-avg earnings growth; high P/E, P/B; low div</li><li><strong>Value</strong> &mdash; undervalued; low P/E, P/B; higher div</li><li><strong>Blend / Core</strong> &mdash; combination</li><li><strong>GARP</strong> &mdash; growth at reasonable price</li></ul>"},{"sec":"STRAT","front":"Market cap classifications","back":"<table><tr><th>Cap</th><th>Range</th></tr><tr><td>Mega</td><td>&gt; $200B</td></tr><tr><td>Large</td><td>$10B &ndash; $200B</td></tr><tr><td>Mid</td><td>$2B &ndash; $10B</td></tr><tr><td>Small</td><td>$300M &ndash; $2B</td></tr><tr><td>Micro</td><td>$50M &ndash; $300M</td></tr><tr><td>Nano</td><td>&lt; $50M</td></tr></table>"},{"sec":"STRAT","front":"Dollar-Cost Averaging vs. Value Averaging","back":"<strong>DCA</strong>: invest a fixed $ at regular intervals. Mathematical result: avg <strong>cost per share &lt; avg price per share</strong> (more shares bought when low).<br><br><strong>Value Averaging</strong>: adjust contributions to hit a target portfolio value at each interval. More mechanical contrarian than DCA."},{"sec":"TAX","front":"Cost basis methods","back":"<strong>FIFO</strong> (default): oldest shares sold first.<br><strong>Specific identification</strong>: taxpayer designates lots at sale (must specify <em>at time of sale</em>); typically maximizes after-tax outcome.<br><strong>Average cost</strong>: total basis / total shares; available for <strong>mutual funds and ETFs only</strong>."},{"sec":"TAX","front":"Capital gains holding period &amp; rates","back":"<strong>Short-term</strong> (held &le; 1 yr): <strong>ordinary income</strong> rates.<br><strong>Long-term</strong> (held &gt; 1 yr): preferential <strong>0% / 15% / 20%</strong>.<br><br>Plus <strong>3.8% NIIT</strong> for MAGI &gt; $200K single / $250K MFJ.<br><br>Special: collectibles max 28%; Sec. 1250 unrecaptured depreciation 25%."},{"sec":"TAX","front":"Capital loss netting hierarchy","back":"<ol><li>Net short-term gains &amp; losses</li><li>Net long-term gains &amp; losses</li><li>Net the two if opposite signs</li><li>Net capital loss can offset up to <strong>$3,000 of ordinary income</strong> ($1,500 if MFS)</li><li>Remaining loss carries forward <strong>indefinitely</strong></li></ol>"},{"sec":"TAX","front":"Wash Sale Rule","back":"Prevents claiming a loss when you repurchase a &quot;substantially identical&quot; security within <strong>30 days BEFORE OR AFTER</strong> the loss sale (61-day window total).<br><br>Disallowed loss is <strong>added to the basis</strong> of the replacement security; holding period carries.<br><br><span class=\"hl\"><strong>Critical:</strong> wash sale applies even <em>across accounts</em></span>. Selling in taxable + replacing in IRA &rarr; loss disallowed AND basis adjustment lost permanently."},{"sec":"TAX","front":"Qualified vs. Non-qualified dividends","back":"<strong>Qualified</strong> (LTCG rates) require:<ul><li>Paid by U.S. corp (or qualified foreign)</li><li>Held &gt; 60 days during the 121-day period beginning 60 days before ex-div</li></ul><strong>Non-qualified</strong> (ordinary income rates):<ul><li>REIT distributions</li><li>MLPs</li><li>Money market funds</li><li>Foreign companies that don't qualify</li></ul>"},{"sec":"TAX","front":"AMT preference items","back":"Parallel tax system. AMT preference items (added back):<ul><li><strong>Interest on certain private-activity municipal bonds</strong> (testable!)</li><li>Accelerated depreciation</li><li>ISO bargain element</li></ul>Investors with AMT exposure may prefer <strong>non-AMT munis</strong> (&quot;AMT-free&quot;)."},{"sec":"TAX","front":"Annual gift tax exclusion (2024-2026)","back":"<strong>2024</strong>: <strong>$18,000</strong> per recipient<br><strong>2025</strong>: <strong>$19,000</strong> per recipient<br><strong>2026</strong>: $19,000 per recipient<br><br>Married couples can split (combined $36K / $38K).<br><br><strong>529 superfunding</strong>: front-load up to <strong>5 years</strong> of annual exclusion ($90K single / $180K joint in 2024)."},{"sec":"TAX","front":"Lifetime estate &amp; gift exemption","back":"<strong>2024</strong>: <strong>$13.61M</strong> per individual<br><strong>2025</strong>: <strong>$13.99M</strong> per individual<br>TCJA sunset end of 2025; may revert to ~$7M in 2026 (subject to legislation).<br><br><strong>Top federal estate tax rate: 40%.</strong><br><br><strong>Portability</strong>: surviving spouse can use deceased spouse's unused exemption (DSUE) &mdash; effectively doubles for couples (Form 706 election required)."},{"sec":"TAX","front":"Step-up in basis at death","back":"Heir's basis = <strong>FMV at decedent's date of death</strong> (or alternate valuation date 6 months later, if elected).<br><br>Eliminates pre-death appreciation from capital gains tax."},{"sec":"TAX","front":"Kiddie Tax (2024)","back":"Unearned income of children:<ul><li>First <strong>$1,300</strong> &mdash; tax-free</li><li>Next <strong>$1,300</strong> &mdash; child's rate</li><li>Above <strong>$2,600</strong> &mdash; <strong>parent's marginal rate</strong></li></ul>Applies to children under 18, or full-time students under 24. (2025: thresholds up slightly.)"},{"sec":"TAX","front":"Account type tax summary","back":"<table><tr><th>Account</th><th>Contrib</th><th>Withdrawal</th></tr><tr><td>Trad IRA / 401(k)</td><td>Pre-tax</td><td>Ord inc; 10% &lt; 59&frac12;</td></tr><tr><td>Roth IRA / 401(k)</td><td>After-tax</td><td>Tax-free if qualified</td></tr><tr><td>Brokerage</td><td>After-tax</td><td>CG/CL on sale</td></tr><tr><td>Munis</td><td>n/a</td><td>Fed exempt int</td></tr><tr><td>Annuity (non-q)</td><td>After-tax</td><td>LIFO; 10% &lt; 59&frac12;</td></tr><tr><td>529</td><td>After-tax</td><td>Tax-free qual ed</td></tr><tr><td>HSA</td><td>Pre-tax</td><td>Tax-free qual med</td></tr></table>"},{"sec":"RET","front":"IRA contribution limits 2024-2026","back":"<table><tr><th>Year</th><th>&lt;50</th><th>Catch-up</th><th>Total 50+</th></tr><tr><td>2024</td><td>$7,000</td><td>$1,000</td><td>$8,000</td></tr><tr><td>2025</td><td>$7,000</td><td>$1,000</td><td>$8,000</td></tr><tr><td>2026</td><td>$7,500</td><td>$1,100</td><td>$8,600</td></tr></table>"},{"sec":"RET","front":"401(k) / 403(b) / 457 / TSP limits 2024-2026","back":"<table><tr><th>Year</th><th>&lt;50</th><th>50+ catch</th><th>60-63 super</th></tr><tr><td>2024</td><td>$23,000</td><td>$7,500</td><td>n/a</td></tr><tr><td>2025</td><td>$23,500</td><td>$7,500</td><td><strong>$11,250</strong></td></tr><tr><td>2026</td><td>$24,500</td><td>$8,000</td><td>$11,250</td></tr></table><strong>Super catch-up</strong> (SECURE 2.0, ages 60-63): greater of $10K or 150% of regular catch-up. Drops back at 64."},{"sec":"RET","front":"SIMPLE IRA &amp; SEP limits","back":"<strong>SIMPLE IRA</strong>:<ul><li>2024: $16,000 (catch-up $3,500)</li><li>2025: $16,500 (catch-up $3,500)</li><li>2026: $17,000 (catch-up $4,000)</li></ul><strong>SEP IRA</strong>: lesser of 25% comp or:<ul><li>2024: $69,000 / 2025: $70,000 / 2026: $72,000</li></ul><strong>Comp cap</strong>: $345K (2024); $350K (2025).<br><strong>DB benefit</strong>: $275K (2024); $280K (2025)."},{"sec":"RET","front":"Roth IRA income phase-outs (2025)","back":"<strong>Single</strong>: $150K&ndash;$165K<br><strong>MFJ</strong>: $236K&ndash;$246K<br><strong>MFS (lived w/ spouse)</strong>: $0&ndash;$10K<br><br><strong>Roth conversions</strong>: NO income limit; converted amount taxable as ord inc in year.<br><strong>Backdoor Roth</strong>: non-deductible Trad IRA contribution + immediate conversion."},{"sec":"RET","front":"RMD rules &mdash; SECURE 2.0","back":"<ul><li><strong>Beginning age 73</strong> (rises to 75 in 2033)</li><li>First RMD by <strong>April 1</strong> of year following turning 73</li><li>Subsequent: by <strong>December 31</strong> annually</li><li><strong>Penalty for missed RMD: 25%</strong> (10% if corrected within 2 yrs) &mdash; reduced from 50%</li><li><strong>Roth IRA: NO RMDs</strong> during owner's lifetime</li><li><strong>Roth 401(k): NO RMDs starting 2024</strong> (eliminated by SECURE 2.0)</li></ul>"},{"sec":"RET","front":"10% early withdrawal penalty exceptions","back":"<ul><li>Death, disability</li><li>SEPP / 72(t) substantially equal periodic pmts</li><li>Medical expenses &gt; 7.5% AGI</li><li>Health insurance during unemployment (IRA only)</li><li>Qual higher ed (IRA only)</li><li>First-time home up to <strong>$10K</strong> lifetime (IRA only)</li><li>Birth/adoption up to <strong>$5K</strong> per child</li><li>Qualified disaster up to $22K</li><li>Terminal illness, domestic abuse ($10K or 50%)</li><li>IRS levy</li><li><strong>457(b)</strong>: NO penalty on separation from service</li></ul>"},{"sec":"RET","front":"60-day rollover rule","back":"Rollover within <strong>60 days</strong> to avoid taxation.<br><br><strong>Once-per-year limit</strong> applies to IRA-to-IRA 60-day rollovers.<br><br>Does NOT apply to:<ul><li>Direct trustee-to-trustee transfers</li><li>Qualified plan rollovers to IRA</li></ul>"},{"sec":"RET","front":"Employer-sponsored plan types","back":"<strong>401(k)</strong> &mdash; for-profit; pre-tax (Trad) or Roth.<br><strong>403(b)</strong> &mdash; non-profit and public schools (TSAs).<br><strong>457(b)</strong> &mdash; gov't and tax-exempt employers; <strong>NO 10% early penalty on separation</strong>; can &quot;double up&quot; final 3 yrs (govt'l plans).<br><strong>DB plan</strong> &mdash; PBGC-insured; employer bears risk.<br><strong>DC plan</strong> &mdash; participant bears risk.<br><strong>ESOP</strong> &mdash; primarily employer stock; diversification rights at 55+ with 10+ yrs.<br><strong>Keogh / HR-10</strong> &mdash; self-employed.<br><strong>Solo 401(k)</strong> &mdash; owner-only."},{"sec":"RET","front":"ERISA fiduciary duties (LPDF)","back":"Section 404:<ul><li><strong>L</strong>oyalty &mdash; solely in interest of participants/beneficiaries</li><li><strong>P</strong>rudence &mdash; &quot;prudent expert&quot; standard (familiar w/ such matters)</li><li><strong>D</strong>iversification &mdash; minimize risk of large losses</li><li><strong>F</strong>ollow plan documents</li></ul>"},{"sec":"RET","front":"ERISA eligibility &amp; vesting","back":"<strong>Eligibility</strong>: age <strong>21</strong> + <strong>1 year service</strong> (1,000 hrs / 12 mos). SECURE 2.0: long-term part-time after 2 consecutive years of 500+ hrs.<br><br><strong>Vesting</strong> (employer contributions):<ul><li><strong>DC</strong>: 3-yr cliff OR 2-to-6-yr graded</li><li><strong>DB</strong>: 5-yr cliff OR 3-to-7-yr graded</li></ul>Employee contributions: always 100% vested immediately."},{"sec":"RET","front":"404(c) safe harbor &amp; QDIA","back":"<strong>Section 404(c)</strong> safe harbor for participant-directed accounts requires:<ul><li>&ge; 3 diversified investment alternatives w/ materially diff R/R</li><li>Adequate disclosure</li><li>Ability to change investments at least <strong>quarterly</strong></li></ul><strong>QDIA</strong> (Qualified Default Investment Alternative): target-date funds, balanced funds, managed accounts. <strong>Capital preservation funds only valid for first 120 days.</strong>"},{"sec":"RET","front":"SECURE 2.0 &mdash; key changes","back":"<ul><li>RMD age 73 (2023) &rarr; 75 (2033)</li><li>Missed RMD penalty 50% &rarr; <strong>25%</strong> (10% if timely)</li><li>Roth 401(k) RMDs eliminated (2024)</li><li><strong>529-to-Roth IRA rollover</strong>: up to <strong>$35K lifetime</strong>; account 15+ yrs old (2024+)</li><li><strong>Super catch-up (60-63)</strong>: $11,250 (2025)</li><li>Mandatory Roth catch-up for high earners (&gt;$145K) &mdash; delayed to <strong>2026</strong></li><li>Auto-enrollment for new plans (2025)</li><li>Emergency savings within 401(k) up to $2,500</li><li>Student loan matching</li></ul>"},{"sec":"RET","front":"529 plan &mdash; qualified expenses","back":"<ul><li>Tuition, fees, books, supplies, required equipment</li><li>Room and board (if half-time enrolled)</li><li>Computers, software, internet (used by beneficiary)</li><li><strong>K-12 tuition up to $10,000/yr</strong></li><li>Apprenticeship programs (DOL-registered)</li><li>Student loan repayment up to <strong>$10,000 lifetime</strong> per beneficiary (additional $10K for siblings)</li></ul>"},{"sec":"RET","front":"529 plan &mdash; tax + financial aid impact","back":"<strong>Federal</strong>: contributions not deductible; growth tax-deferred; qualified withdrawals tax-free.<br>Many states offer income tax deduction for in-state plan contributions.<br>Non-qualified withdrawals: earnings taxed as ordinary income + 10% penalty.<br><br><strong>Financial aid</strong>: counted as parental asset (~5.64% of value); much less impact than UGMA/UTMA."},{"sec":"EDU","front":"Coverdell ESA &mdash; key facts","back":"<ul><li><strong>$2,000/yr</strong> contribution limit per beneficiary (combined across all contributors)</li><li>Income phase-outs: <strong>Single $95K-$110K; MFJ $190K-$220K</strong></li><li>Contributions until <strong>age 18</strong>; account must be used by <strong>age 30</strong> (special-needs exception)</li><li>K-12 + higher ed</li><li>Self-directed (broad investment options)</li><li>Workaround: high-income parents can gift to child who contributes</li></ul>"},{"sec":"EDU","front":"UGMA vs. UTMA","back":"<strong>UGMA</strong>: limited to securities and cash.<br><strong>UTMA</strong>: broader (real estate, art, IP).<br><br>Both: <strong>irrevocable gift</strong> to minor; <strong>custodian</strong> manages until age of majority (18, 21, or 25 depending on state).<br>Subject to <strong>kiddie tax</strong>.<br><span class=\"hl\"><strong>Heavy financial aid impact</strong> (~20% of student assets)</span> &mdash; far more than 529.<br>No contribution limits (subject to gift tax exclusion)."},{"sec":"EDU","front":"Education savings comparison","back":"<table><tr><th>Feature</th><th>529</th><th>Coverdell</th><th>UGMA/UTMA</th></tr><tr><td>Annual contrib</td><td>State limits</td><td>$2K</td><td>Gift tax limits</td></tr><tr><td>Income phase-out</td><td>None</td><td>Yes</td><td>None</td></tr><tr><td>Tax-free growth</td><td>Yes</td><td>Yes</td><td>No</td></tr><tr><td>Donor control</td><td>Yes</td><td>Yes</td><td>No</td></tr><tr><td>Aid impact</td><td>Low</td><td>Low</td><td><strong>High</strong></td></tr></table>"},{"sec":"EDU","front":"Property ownership forms","back":"<strong>Sole</strong> &mdash; passes through will/probate.<br><strong>JTWROS</strong> &mdash; equal ownership; survivor takes all; bypasses probate.<br><strong>Tenants in Common</strong> &mdash; unequal OK; deceased's interest passes through estate.<br><strong>Tenants by the Entirety</strong> &mdash; married couples (some states); survivorship; creditor protection.<br><strong>Community Property</strong> (9 states): spouses each own 50%; both spouses get step-up at first death.<br><strong>TOD/POD</strong> &mdash; beneficiary designation; bypasses probate."},{"sec":"EDU","front":"Revocable vs. Irrevocable Trust","back":"<strong>Revocable Living Trust (Inter Vivos)</strong>: created during grantor's lifetime; can revoke or amend.<ul><li>Assets included in grantor's estate (no estate tax savings)</li><li><strong>Avoids probate</strong></li><li>Becomes irrevocable at grantor's death</li></ul><strong>Irrevocable Trust</strong>: cannot be amended.<ul><li>Removes assets from grantor's estate (tax savings)</li><li>Possible creditor protection</li><li>Loss of control</li></ul>"},{"sec":"EDU","front":"Charitable trusts &mdash; CRT vs. CLT","back":"<strong>CRT (Charitable Remainder Trust)</strong>: donor receives income for life/term; remainder to charity.<ul><li><strong>CRAT</strong>: annuity (fixed) payments</li><li><strong>CRUT</strong>: unitrust (% of value)</li></ul><strong>CLT (Charitable Lead Trust)</strong>: opposite &mdash; charity receives income; remainder to heirs."},{"sec":"EDU","front":"Specialized trusts","back":"<ul><li><strong>Bypass / Credit Shelter</strong>: funded with deceased spouse's exemption</li><li><strong>QTIP</strong>: surviving spouse income for life; grantor designates remainder; qualifies for marital deduction</li><li><strong>GRAT</strong>: grantor receives annuity for term; remainder to beneficiaries</li><li><strong>Crummey</strong>: temporary withdrawal right (~30 days) makes gift &quot;present interest&quot; for annual exclusion</li><li><strong>Special Needs Trust</strong>: preserves means-tested benefits</li><li><strong>Spendthrift</strong>: protects beneficiary from creditors</li></ul>"},{"sec":"EDU","front":"Probate &mdash; what is it &amp; how to avoid","back":"<strong>Probate</strong>: court-supervised process: validating will, paying debts, distributing assets. Time-consuming (6-18 mo); expensive (3-8% of estate); public record.<br><br><strong>Avoidance techniques</strong>:<ul><li>Joint tenancy / TBE / community property w/ ROS</li><li>TOD/POD designations</li><li>Beneficiary designations on retirement &amp; life insurance</li><li>Living trusts</li><li>Lifetime gifts</li></ul>"},{"sec":"EDU","front":"Power of Attorney types","back":"<strong>Durable POA</strong>: continues if principal becomes incapacitated &mdash; most common for incapacity planning.<br><strong>Springing POA</strong>: effective only upon a triggering event.<br><strong>General POA</strong>: terminates upon incapacity.<br><br><strong>All POAs terminate at principal's death.</strong>"},{"sec":"EDU","front":"Per stirpes vs. Per capita","back":"<strong>Per stirpes</strong>: if a beneficiary predeceases, their share passes to <strong>their descendants</strong> (by family branch).<br><br><strong>Per capita</strong>: surviving beneficiaries share <strong>equally regardless of generation</strong>."},{"sec":"EDU","front":"QDRO &mdash; what is it?","back":"<strong>Qualified Domestic Relations Order</strong> &mdash; court order in divorce dividing ERISA-qualified retirement benefits without triggering early withdrawal penalty.<br><br>Recipient (alternate payee) treated as plan participant for tax purposes."},{"sec":"ACCT","front":"Account types &mdash; cash / margin / discretionary","back":"<strong>Cash</strong>: settlement in full; no leverage.<br><strong>Margin</strong>: securities purchased on credit; Reg T + FINRA rules.<br><strong>Discretionary</strong>: agent/adviser trades without prior client consent each trade.<ul><li><strong>Agents (BD)</strong>: written authorization required <em>before</em> first discretionary trade</li><li><strong>IAs</strong>: written required, but NASAA Model Rule allows <strong>oral authorization for up to 10 days</strong> while waiting for written</li></ul>"},{"sec":"ACCT","front":"Wrap account &amp; Form ADV Schedule H","back":"<strong>Wrap account</strong>: single fee covers advisory, custody, trading. Subject to special disclosure (<strong>Schedule H of Form ADV</strong>)."},{"sec":"ACCT","front":"Order types &mdash; by execution price","back":"<strong>Market</strong>: execute immediately at best available price.<br><strong>Limit</strong>: execute only at specified price or better.<br><strong>Stop (stop-loss)</strong>: becomes a market order when stock trades at or through stop.<br><strong>Stop-limit</strong>: becomes a limit order when stock trades at stop."},{"sec":"ACCT","front":"Order types &mdash; by time in force","back":"<ul><li><strong>Day</strong>: expires end of day</li><li><strong>GTC</strong>: Good Till Cancelled</li><li><strong>IOC</strong>: Immediate or Cancel &mdash; fill what you can, cancel rest</li><li><strong>FOK</strong>: Fill or Kill &mdash; fill entire order immediately or cancel</li><li><strong>AON</strong>: All or None &mdash; fill entire order or no fill</li></ul>"},{"sec":"ACCT","front":"Margin requirements (50/25/30)","back":"<strong>Reg T initial</strong> on equity = <strong>50%</strong>.<br><strong>FINRA maintenance long</strong> = <strong>25%</strong>.<br><strong>FINRA maintenance short</strong> = <strong>30%</strong>.<br><br>Margin call when equity falls below maintenance.<br><strong>Hypothecation</strong>: pledging customer securities as collateral.<br><strong>Rehypothecation</strong>: broker pledges to bank; limited to 140% of customer's debit balance.<br><strong>SMA</strong>: line of credit from excess equity."},{"sec":"ACCT","front":"Margin worked example","back":"Buy $10,000 stock on margin: Reg T 50% &rarr; deposit $5K, broker lends $5K. LMV $10K, debit $5K, equity $5K.<br><br><strong>Stock falls to $7,000:</strong> equity = $2,000; required = 25% &times; $7,000 = $1,750. $2,000 &gt; $1,750 &rarr; no call.<br><br><strong>Stock falls to $6,000:</strong> equity = $1,000; required = $1,500 &rarr; <strong>margin call for $500</strong>."},{"sec":"ACCT","front":"Short selling &mdash; risks","back":"Borrow shares, sell now, hope to buy back lower.<ul><li><strong>Theoretically unlimited loss</strong></li><li>Buy-in risk (lender recalls)</li><li><strong>Dividend obligation</strong> &mdash; short seller owes dividends to lender</li><li><strong>Reg SHO locate requirement</strong> &mdash; broker must locate shares before short</li><li>30% maintenance margin (vs. 25% long)</li></ul>"},{"sec":"PERF","front":"Holding Period Return + Annualized","back":"$$HPR = \\frac{(P_1 - P_0) + \\text{Income}}{P_0}$$<br>$$\\text{Annualized} = (1 + R_{cum})^{1/n} - 1$$"},{"sec":"PERF","front":"Time-Weighted vs. Dollar-Weighted Return","back":"<strong>TWR</strong>: eliminates effect of cash flows; appropriate for evaluating <strong>manager skill</strong>.<br><br><strong>DWR (= IRR)</strong>: accounts for timing of cash flows; reflects investor's actual experience.<br><br><strong>Exam point</strong>: if the <strong>investor</strong> controls cash flow timing &rarr; <strong>DWR</strong>. Evaluating <strong>manager skill</strong> &rarr; <strong>TWR</strong>."},{"sec":"PERF","front":"Real vs. Nominal return (Fisher equation)","back":"<strong>Approximation</strong>: $r_{real} \\approx r_{nominal} - \\text{inflation}$<br><br><strong>Precise (Fisher)</strong>:$$1 + r_{real} = \\frac{1 + r_{nominal}}{1 + \\text{inflation}}$$"},{"sec":"PERF","front":"Common benchmarks &mdash; what do they cover?","back":"<table><tr><th>Index</th><th>Coverage</th></tr><tr><td>S&amp;P 500</td><td>500 large-cap U.S.</td></tr><tr><td>Russell 1000</td><td>1000 largest U.S.</td></tr><tr><td>Russell 2000</td><td>2000 small-cap</td></tr><tr><td>Russell 3000</td><td>1000 + 2000</td></tr><tr><td>Wilshire 5000</td><td>Total U.S. mkt</td></tr><tr><td>DJIA</td><td>30 large-cap (price-weighted)</td></tr><tr><td>Nasdaq Comp</td><td>All Nasdaq-listed</td></tr><tr><td>MSCI EAFE</td><td>Dev mkts ex-US/Canada</td></tr><tr><td>MSCI EM</td><td>Emerging mkts</td></tr></table>"},{"sec":"PERF","front":"Index weighting methods","back":"<strong>Price-weighted</strong> (DJIA): high-priced stocks dominate.<br><strong>Market-cap-weighted</strong> (S&amp;P 500, most others): large companies dominate.<br><strong>Equal-weighted</strong>: each stock equal weight; rebalanced periodically."},{"sec":"PERF","front":"NAV / POP / Sales charge formulas","back":"$$NAV = \\frac{Assets - Liabilities}{Shares\\ Outstanding}$$<br>$$POP = \\frac{NAV}{1 - \\text{Sales Charge \\%}}$$<br>$$\\text{Sales Charge \\%} = \\frac{POP - NAV}{POP}$$"},{"sec":"IAA","front":"Investment Adviser &mdash; the ABC Test","back":"From SEC Release IA-1092. All three required:<br><br><strong>A &mdash; Advice</strong>: provides advice/analyses concerning securities (broadly construed).<br><strong>B &mdash; Business</strong>: as part of a regular business; not just incidental; &quot;holds out&quot;; receives separate comp
