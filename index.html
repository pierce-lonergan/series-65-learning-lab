 be required of:<ul><li>BDs</li><li>State-registered IAs (with custody or discretion)</li></ul>Amount typically tied to the net-worth requirement (e.g., $35K bond instead of $35K NW for IAs with custody).<br><br>Provides a source of recovery for clients harmed by misconduct."},{"sec":"REGBI","front":"Form CRS &mdash; mandated content order","back":"<ol><li>Introduction (firm name, registration status)</li><li>Relationships and services offered</li><li>Fees, costs, conflicts, and standard of conduct</li><li>Disciplinary history (yes/no with reference)</li><li>Key questions to ask</li><li>Where to find more information</li></ol>"},{"sec":"AML","front":"OFAC &mdash; what is it &amp; what do firms do?","back":"<strong>Office of Foreign Assets Control</strong> &mdash; Treasury bureau administering economic sanctions.<br><br>Firms must <strong>screen customers</strong> against:<ul><li>Specially Designated Nationals (SDN) list</li><li>Other sanctioned-party lists</li></ul>Required at account opening and periodically thereafter. Hits trigger reporting and asset blocking."},{"sec":"TVM","front":"Discount rate vs. required rate of return","back":"In NPV: <strong>discount rate</strong> = the <strong>required rate of return</strong> (cost of capital, hurdle rate).<br><br>Higher required return &rarr; lower NPV.<br>If IRR &gt; discount rate &rarr; NPV positive &rarr; accept project."},{"sec":"MPT","front":"Standard deviation vs. variance","back":"<strong>Variance</strong> = avg squared deviation from the mean.<br><strong>Standard deviation</strong> = $\\sqrt{variance}$.<br><br>Both measure dispersion / total volatility. Standard deviation is in the same units as returns (more interpretable).<br><br>Used as the denominator of <strong>Sharpe</strong> ratio."},{"sec":"FED","front":"Underwriting &mdash; firm commitment vs. best efforts","back":"<strong>Firm commitment</strong>: underwriter buys all securities from issuer and resells to public. Underwriter bears risk of unsold securities. Most large IPOs.<br><br><strong>Best efforts</strong>: underwriter sells what it can; unsold returned to issuer. Issuer bears the risk.<br><br>Variants: <strong>all-or-none</strong> (deal cancelled if not fully subscribed); <strong>mini-max</strong> (minimum threshold)."},{"sec":"FI","front":"Original Issue Discount (OID) bond &mdash; tax","back":"Bonds issued at a <strong>discount</strong> to face. Examples: zero-coupon bonds, TIPS in some cases, Treasury STRIPS.<br><br><strong>Annual accretion of the discount is taxed as interest income</strong> in the year accrued (phantom income), even though no cash received.<br><br>Cost basis steps up annually by the accreted amount; less or no capital gain at maturity."},{"sec":"EQ","front":"Cumulative voting math example","back":"100 shares, <strong>5 board seats</strong> up for election:<ul><li>Statutory: 100 votes per seat (max 100 for any one nominee)</li><li>Cumulative: <strong>500 total votes</strong>, can all go to one nominee</li></ul>Cumulative favors minority shareholders &mdash; the math lets a small block elect at least one director."},{"sec":"RET","front":"Top-heavy plan &amp; key employees","back":"<strong>Top-heavy plan</strong>: more than <strong>60% of plan benefits/contributions accrue to key employees</strong>.<br><br><strong>Key employee</strong>: officer earning &gt; $230K (2025), &gt; 5% owner, or &gt; 1% owner earning &gt; $150K.<br><br>Top-heavy plans must provide minimum benefits/contributions to non-key employees (typically 3% of pay)."},{"sec":"USA","front":"Securities Act vs. Uniform Securities Act &mdash; key distinction","back":"<strong>Securities Act of 1933</strong>: federal law governing primary market issuance &amp; registration with the SEC.<br><br><strong>Uniform Securities Act</strong>: model state law; each state adopts its own version. Governs state-level BD/agent/IA/IAR registration, exempt securities/transactions, Administrator powers."},{"sec":"IAA","front":"&quot;Custody&quot; via fee deduction &mdash; what gives relief?","code":"","back":"Authority to <strong>deduct fees from client account</strong> = deemed custody.<br><br>Relief from full custody requirements (no surprise audit) if:<ul><li>Limited to fee deduction</li><li>Disclosed in Form ADV</li><li>Client receives statements directly from qualified custodian</li><li>Adviser sends invoice or notice of fee</li></ul>"},{"sec":"MNEM","front":"&quot;90 / 120 / 5 / 2&quot; &mdash; recordkeeping &amp; brochure","back":"<ul><li><strong>90 days</strong> &mdash; Form ADV annual updating amendment after FYE</li><li><strong>120 days</strong> &mdash; annual brochure delivery after FYE</li><li><strong>5 years</strong> &mdash; total books-and-records retention</li><li><strong>2 years</strong> &mdash; first portion easily accessible at principal office</li></ul>"}];

  aliases:["AMT preference item","preference item","tax preference item"],
  eli5: "A type of income or deduction that's fine under the normal tax rules, but gets <b>added back</b> when you run the second, stricter tax calculation (the AMT). It can push you into owing AMT.",
  full: `<p>The U.S. has <b>two</b> parallel ways of figuring your income tax. You compute both and pay whichever is higher. The second one — the Alternative Minimum Tax — disallows or "adds back" certain perks that the regular system lets you enjoy. Those add-backs are called <b>preference items</b>.</p>
  <p>The three the Series 65 cares about:</p>
  <ul>
    <li>Interest from certain Private Activity Bonds (a kind of muni)</li>
    <li>Accelerated depreciation taken on business assets</li>
    <li>The bargain element when you exercise an ISO</li>
  </ul>
  <p>If you have a lot of these, you may prefer investments that avoid them — for example, non-AMT munis.</p>`,
  related:["amt","pab","accelerated-depreciation","iso","non-amt-munis"]

"amt": {

  aliases:["AMT","Alternative Minimum Tax"],
  eli5:"A second, stricter tax calculation that runs alongside the normal one. You pay whichever number comes out higher. It exists so high earners can't erase their whole tax bill with deductions.",
  full:`<p>Think of the AMT as a <b>tax safety net for the government</b>. Congress noticed that some high-income people stacked up so many deductions and special breaks that they paid almost no tax. The AMT fixes that.</p>
  <p><b>How it works:</b> you calculate your tax twice —</p>
  <ol>
    <li>Once the <b>normal</b> way (with all your usual deductions).</li>
    <li>Once the <b>AMT</b> way (which strips out many deductions and adds back certain preference items).</li>
  </ol>
  <p>You then pay <b>whichever is larger</b>. If the AMT number is bigger, the difference is your "alternative minimum tax."</p>
  <p>The classic trap: exercising an ISO creates a big bargain element that is invisible to the regular tax but very visible to the AMT — so you can owe tax on profit you haven't actually cashed out yet.</p>`,
  worked:`<p>Regular tax says you owe $30,000. The AMT calculation (after adding back preference items) says $38,000. You pay <b>$38,000</b> — the extra <b>$8,000</b> is your AMT.</p>`,
  related:["amt-preference-item","iso","bargain-element","accelerated-depreciation","pab","mtc","ordinary-income"]
},

"iso": {
  term:"Incentive Stock Option (ISO)", group:"Tax",
  aliases:["ISO","Incentive Stock Option","incentive stock options","ISOs"],
  eli5:"A perk some companies give employees: the right to buy company stock later at a price locked in today. If the stock climbs, you buy cheap. ISOs get special tax treatment — but can trigger AMT.",
  full:`<p>An <b>ISO</b> is one specific flavor of employee stock option. The company gives you the <b>right</b> (not obligation) to buy a set number of its shares at a locked-in price — the strike price — set on the day the options are granted.</p>
  <p><b>Why people like ISOs:</b> if you follow the IRS holding rules, you pay <b>no ordinary income tax</b> when you exercise. You only pay the lower capital gains tax when you eventually sell. (A different option type, the NSO, doesn't get this break.)</p>
  <p><b>The catch:</b> even though regular tax ignores your exercise, the <b>bargain element</b> counts as income for AMT purposes. A big exercise can hand you a surprise AMT bill on money you haven't received in cash.</p>`,
  related:["nso","strike-price","fmv","exercise","spread","bargain-element","amt","capital-gains","ordinary-income"],
  graphic:"iso-bargain-element"
},

"nso": {
  term:"Non-Qualified Stock Option (NSO)", group:"Tax",
  aliases:["NSO","NSOs","Non-Qualified Stock Option","non-qualified stock option"],
  eli5:"The ordinary kind of employee stock option. Simpler than an ISO, but the discount you get is taxed as regular income the moment you exercise.",
  full:`<p>An <b>NSO</b> is the plain-vanilla employee stock option. Like an ISO it lets you buy stock at a locked strike price. The difference is purely tax:</p>
  <ul>
    <li><b>NSO:</b> the bargain element is taxed as ordinary income <i>at exercise</i> — no AMT gymnastics, but a higher rate.</li>
    <li><b>ISO:</b> no ordinary tax at exercise (only AMT to watch), and potential capital-gains treatment later.</li>
  </ul>`,
  related:["iso","strike-price","bargain-element","ordinary-income","capital-gains"]
},

"strike-price": {
  term:"Strike (Exercise) Price", group:"Tax",
  aliases:["strike price","strike","exercise price"],
  eli5:"The locked-in price you're allowed to pay for one share when you use a stock option — set on the day the option is granted and frozen forever after.",
  full:`<p>The <b>strike price</b> (a.k.a. exercise price) is the price your option lets you buy the stock for. It's fixed on the grant date and never changes, no matter what the stock does.</p>
  <p>Example: your strike is $10. The market price soars to $100. You can still buy at <b>$10</b>. That $90 gap is the whole point of an option.</p>`,
  related:["iso","exercise","fmv","spread","bargain-element"]
},

"fmv": {
  term:"Fair Market Value (FMV)", group:"Tax",
  aliases:["FMV","Fair Market Value","fair market value"],
  eli5:"What one share is actually worth on the open market right now. For public companies it's the trading price; for private ones it's set by a yearly independent appraisal (a 409A valuation).",
  full:`<p><b>FMV</b> is the current real-world value of one share.</p>
  <ul>
    <li><b>Public company:</b> simply the price the stock is trading at on the exchange (NYSE, Nasdaq) at that moment.</li>
    <li><b>Private company:</b> there's no public market, so an independent firm appraises the shares at least once a year — a <b>409A valuation</b>.</li>
  </ul>
  <p>FMV on the <i>day you exercise</i> is what the IRS uses to measure the benefit you received.</p>`,
  related:["409a","strike-price","spread","bargain-element","exercise"]
},

"409a": {
  term:"409A Valuation", group:"Tax",
  aliases:["409A valuation","409A"],
  eli5:"An independent appraisal of a private company's share price, done at least once a year, so options can be priced fairly. It sets the FMV when there's no public market.",
  full:`<p>Private-company shares don't trade on an exchange, so there's no obvious price. A <b>409A valuation</b> is a third-party appraisal (named after the tax-code section) that establishes the official FMV per share. Companies refresh it roughly annually or after big events, and use it to set option strike prices defensibly.</p>`,
  related:["fmv","strike-price","iso"]
},

"exercise": {
  term:"Exercising Options", group:"Tax",
  aliases:["exercise","exercising","exercise your options"],
  eli5:"The act of actually using your option to buy the shares at the strike price. The day you exercise is when you flip from holding a right into owning real stock.",
  full:`<p>To <b>exercise</b> means to pull the trigger: you pay the strike price and the shares become yours.</p>
  <p>The <i>day</i> you exercise matters because stock prices move constantly. The IRS uses the <b>FMV on that exact day</b> to measure the bargain element — the benefit you received.</p>`,
  related:["strike-price","fmv","iso","bargain-element","spread"]
},

"spread": {
  term:"The Spread", group:"Tax",
  aliases:["the spread","spread"],
  eli5:"In options, simply the gap between what the stock is worth (FMV) and what you can buy it for (strike). FMV minus strike.",
  full:`<p>A "spread" is just a difference between two prices. For options it's:</p>
  <p>$$\\text{Spread} = \\text{FMV} - \\text{Strike Price}$$</p>
  <p>If FMV is $50 and your strike is $10, the spread is <b>$40 per share</b>. Multiply by your number of shares and you get the bargain element.</p>`,
  related:["fmv","strike-price","bargain-element"]
},

"bargain-element": {
  term:"Bargain Element", group:"Tax",
  aliases:["bargain element"],
  eli5:"Your total on-paper discount when you exercise: the spread (FMV − strike) multiplied by the number of shares. For an ISO, this is the figure the AMT taxes — even before you sell.",
  full:`<p>The <b>bargain element</b> is the full value of the deal you got. If something worth $50 (FMV) can be bought for $10 (strike), you scored a $40 "bargain" per share.</p>
  <p>$$\\text{Bargain Element} = (\\text{FMV} - \\text{Strike}) \\times \\text{Shares}$$</p>
  <p>It's "paper" profit — you own valuable stock but haven't sold for cash. Yet for an ISO it counts as income under the AMT, which is how people get taxed on wealth they can't spend.</p>`,
  worked:`<p>1,000 ISOs, strike $10, FMV at exercise $50.<br>Spread = $50 − $10 = <b>$40</b>/share.<br>Bargain element = $40 × 1,000 = <b>$40,000</b>.<br>You bought $50,000 of stock for $10,000 — and that $40,000 is an AMT preference item.</p>`,
  related:["spread","fmv","strike-price","iso","amt","amt-preference-item"],
  graphic:"iso-bargain-element"
},

"accelerated-depreciation": {
  term:"Accelerated Depreciation", group:"Tax",
  aliases:["accelerated depreciation"],
  eli5:"Writing off the cost of business equipment faster in the early years instead of evenly. Great for cutting taxes now — but the AMT makes you slow it down, creating an AMT adjustment.",
  full:`<p><b>Depreciation</b> spreads the cost of a business asset across its useful life. <b>Accelerated</b> depreciation front-loads those deductions — big write-offs early, smaller ones later — so you save tax sooner.</p>
  <p>The regular tax system lets you use a fast method (MACRS). The AMT system makes you use a slower method (ADS). Because the two disagree each year, you get an <b>AMT adjustment</b>: you add income back in the early years and subtract it in the later years.</p>
  <p>Crucially it's only a <b>timing difference</b> — over the asset's whole life the two methods write off the <i>same total</i>; the AMT just makes you wait.</p>`,
  related:["depreciation","macrs","ads","amt-adjustment","timing-difference","section-179","bonus-depreciation","mtc","amt"],
  graphic:"macrs-vs-ads"
},

"depreciation": {
  term:"Depreciation", group:"Tax",
  aliases:["depreciation","depreciate"],
  eli5:"Spreading the cost of something a business buys (a truck, machine, computer) across the years it's used, taking a piece of the cost as a tax deduction each year instead of all at once.",
  full:`<p>When a business buys equipment that lasts for years, the tax code usually won't let it deduct the whole cost immediately. Instead it <b>depreciates</b> the asset — deducting a slice of the cost each year over the asset's "useful life."</p>
  <p>How fast you take those slices depends on the method: <b>straight-line</b> (even), <b>declining-balance</b> (front-loaded), and systems like MACRS and ADS that bundle these rules.</p>`,
  related:["accelerated-depreciation","straight-line","declining-balance","macrs","ads"]
},

"straight-line": {
  term:"Straight-Line Depreciation", group:"Tax",
  aliases:["straight-line","straight line depreciation","straight-line depreciation"],
  eli5:"The simplest method: deduct the same equal amount every year over the asset's life.",
  full:`<p><b>Straight-line</b> spreads the cost evenly. A $10,000 asset over 10 years = $1,000 deducted each year. It's the slowest, steadiest method — and the one the AMT's ADS system leans on.</p>`,
  related:["depreciation","declining-balance","ads"]
},

"declining-balance": {
  term:"Declining-Balance Depreciation", group:"Tax",
  aliases:["declining balance","declining-balance","double-declining balance","200% declining balance","150% declining balance"],
  eli5:"An accelerated method that takes a fixed percentage of the asset's remaining value each year, so deductions are big early and shrink over time.",
  full:`<p><b>Declining-balance</b> applies a constant rate to the shrinking book value, front-loading deductions. "200% declining balance" (double-declining) is twice the straight-line rate — very fast — and is what MACRS uses for many assets. The AMT's ADS caps you at the gentler "150% declining balance."</p>`,
  related:["depreciation","straight-line","macrs","ads","accelerated-depreciation"]
},

"macrs": {
  term:"MACRS", group:"Tax",
  aliases:["MACRS","Modified Accelerated Cost Recovery System"],
  eli5:"The fast depreciation system used for regular taxes. It front-loads deductions (often 200% declining balance) so businesses save tax in the early years.",
  full:`<p><b>MACRS</b> (Modified Accelerated Cost Recovery System) is the default depreciation system for U.S. regular income tax. It uses accelerated methods — frequently <b>200% declining balance</b> — giving big deductions in an asset's early years.</p>
  <p>Because MACRS is so front-loaded, it clashes with the AMT's slower system (ADS). Drag the year on the chart below to see the gap that becomes the AMT adjustment.</p>`,
  related:["ads","accelerated-depreciation","declining-balance","amt-adjustment","depreciation"],
  graphic:"macrs-vs-ads"
},

"ads": {
  term:"ADS (Alternative Depreciation System)", group:"Tax",
  aliases:["ADS","Alternative Depreciation System"],
  eli5:"The slower depreciation system the AMT forces you to use. It stretches deductions over a longer life (often straight-line or 150% declining balance), so early-year write-offs are smaller.",
  full:`<p><b>ADS</b> is the depreciation system the AMT requires for many assets. Compared with MACRS it:</p>
  <ul>
    <li>Uses gentler methods (often <b>150% declining balance</b> or straight-line), and</li>
    <li>Often stretches the write-off over a <b>longer recovery period</b>.</li>
  </ul>
  <p>Smaller early deductions than MACRS → you report more income early under the AMT → an upward AMT adjustment. Later it flips the other way.</p>`,
  related:["macrs","accelerated-depreciation","straight-line","amt-adjustment","depreciation"],
  graphic:"macrs-vs-ads"
},

"amt-adjustment": {
  term:"AMT Adjustment", group:"Tax",
  aliases:["AMT adjustment"],
  eli5:"The yearly difference between your fast (MACRS) and slow (ADS) depreciation. Early years you add income back; later years you subtract it. Over the asset's life it nets to zero.",
  full:`<p>Because regular tax (MACRS) and AMT (ADS) depreciate at different speeds, each year there's a difference — the <b>AMT adjustment</b>.</p>
  <ul>
    <li><b>Early years:</b> MACRS deduction &gt; ADS deduction → you <b>add the difference back</b> to income (upward adjustment), which can trigger AMT.</li>
    <li><b>Later years:</b> ADS deduction &gt; MACRS → you <b>subtract</b> (downward adjustment).</li>
  </ul>
  <p>Add up every year's adjustment and it equals <b>zero</b> — proof it's a timing difference, not a permanent extra tax. The chart shows this directly.</p>`,
  related:["macrs","ads","accelerated-depreciation","timing-difference","mtc","amt"],
  graphic:"macrs-vs-ads"
},

"timing-difference": {
  term:"Timing Difference (Deferral Item)", group:"Tax",
  aliases:["timing difference","deferral item"],
  eli5:"A difference between two tax systems that's only about <i>when</i> you take a deduction, not <i>how much</i>. It reverses itself over time and nets to zero.",
  full:`<p>A <b>timing difference</b> means regular tax and AMT both let you deduct the same total amount eventually — they just disagree on the schedule. Accelerated depreciation is the classic example: fast under MACRS, slow under ADS, but identical totals across the asset's life. Because the AMT you paid was only due to timing, it isn't lost — it becomes a Minimum Tax Credit.</p>`,
  related:["amt-adjustment","mtc","accelerated-depreciation","amt"]
},

"section-179": {
  term:"Section 179 Expensing", group:"Tax",
  aliases:["Section 179","Sec. 179","section 179"],
  eli5:"A rule that lets a business deduct 100% of qualifying equipment in the year it's bought (up to a limit) — and it counts the same for both regular tax and AMT, so no AMT adjustment.",
  full:`<p><b>Section 179</b> lets a business immediately expense the full cost of qualifying equipment in year one, up to an annual cap, instead of depreciating it slowly.</p>
  <p>Key for the exam: Section 179 is allowed <b>identically</b> for regular tax and AMT, so it creates <b>no AMT depreciation adjustment</b>. It's a clean way to write things off fast without the AMT clawing it back.</p>`,
  related:["bonus-depreciation","accelerated-depreciation","amt-adjustment","depreciation"]
},

"bonus-depreciation": {
  term:"Bonus Depreciation", group:"Tax",
  aliases:["bonus depreciation","Section 168(k)"],
  eli5:"Another fast write-off (under §168(k)) that, like Section 179, matches for regular tax and AMT — so it creates no AMT adjustment.",
  full:`<p><b>Bonus depreciation</b> (tax-code §168(k)) allows a large up-front deduction on qualifying assets. Like Section 179, the deduction is the <b>same</b> under regular tax and AMT, so there's no add-back on the AMT form. Front-loaded write-offs without the AMT penalty.</p>`,
  related:["section-179","accelerated-depreciation","amt-adjustment"]
},

"mtc": {
  term:"Minimum Tax Credit (MTC)", group:"Tax",
  aliases:["Minimum Tax Credit","MTC","AMT credit","AMT Credit"],
  eli5:"A credit you earn when you pay AMT because of a timing difference. In a future year when regular tax is higher, you use the credit to lower your bill — so the AMT wasn't truly lost.",
  full:`<p>When you pay AMT purely because of a <b>timing difference</b> (like accelerated depreciation or an ISO bargain element), the tax code gives it back over time as a <b>Minimum Tax Credit</b>.</p>
  <ul>
    <li>Paying AMT generates the credit.</li>
    <li>It carries forward <b>indefinitely</b>.</li>
    <li>In a later year where regular tax &gt; AMT, you apply the credit to cut your regular tax.</li>
  </ul>
  <p>So timing-driven AMT is really a prepayment, not a permanent loss.</p>`,
  related:["amt","timing-difference","amt-adjustment","iso","accelerated-depreciation"]
},

"munis": {
  term:"Municipal Bonds (Munis)", group:"Fixed Income",
  aliases:["munis","muni","municipal bond","municipal bonds"],
  eli5:"Loans you make to a state or local government (for schools, roads, water systems). They pay you interest that's usually free from federal income tax.",
  full:`<p>A <b>municipal bond</b> is debt issued by a state, city, county, or local agency to fund public projects. You lend them money; they pay you interest (usually twice a year) and return your principal at maturity.</p>
  <p><b>The headline benefit:</b> the interest is generally <b>exempt from federal income tax</b> — and often state/local tax too if you live where it was issued. That's why we compare them to taxable bonds using taxable-equivalent yield.</p>
  <p>One wrinkle: a sub-type called a Private Activity Bond can be taxable under the AMT.</p>`,
  related:["pab","non-amt-munis","amt","principal-bond","yield"]
},

"pab": {
  term:"Private Activity Bond (PAB)", group:"Fixed Income",
  aliases:["Private Activity Bond","private activity bond","PAB","private-activity municipal bonds","private-activity bonds"],
  eli5:"A municipal bond that funds something with a public benefit but used heavily by a private business — like an airport, stadium, or industrial project. Its interest can be taxed under the AMT.",
  full:`<p>Most munis are fully tax-free. A <b>Private Activity Bond</b> is the exception: it funds projects that benefit private parties (airports, sports stadiums, industrial developments) even though a government issues them.</p>
  <p>The IRS treats PAB interest as an <b>AMT preference item</b>. So a high earner who triggers the AMT must pay tax on PAB interest — unlike ordinary munis.</p>`,
  related:["munis","non-amt-munis","amt","amt-preference-item"]
},

"non-amt-munis": {
  term:"Non-AMT Munis", group:"Fixed Income",
  aliases:["non-AMT munis","non-AMT muni","AMT-free munis"],
  eli5:"Municipal bonds whose interest is free from BOTH regular federal tax and the AMT. They fund essential public stuff (schools, water, roads), so high earners love them for guaranteed tax-free income.",
  full:`<p><b>Non-AMT munis</b> are municipal bonds whose interest escapes <i>both</i> the regular income tax and the AMT — no matter how high your income. They typically fund <b>essential public purposes</b>: public schools, municipal water/sewer/power, parks, and roads.</p>
  <p><b>The trade-off:</b> because their tax-free status is bulletproof, they're in demand and usually pay a slightly <b>lower</b> yield than AMT-exposed Private Activity Bonds, which must offer a bit more to compensate for AMT risk.</p>`,
  related:["munis","pab","amt","amt-preference-item","yield"]
},

"capital-gains": {
  term:"Capital Gains", group:"Tax",
  aliases:["capital gains","capital gain","capital gains tax"],
  eli5:"The profit when you sell an investment for more than you paid. Held over a year, it's taxed at lower 'long-term' rates than your salary.",
  full:`<p>A <b>capital gain</b> is the profit from selling an asset above its cost (its basis).</p>
  <ul>
    <li><b>Long-term</b> (held &gt; 1 year): taxed at preferential rates (0% / 15% / 20%).</li>
    <li><b>Short-term</b> (held ≤ 1 year): taxed as ordinary income — the same as wages.</li>
  </ul>
  <p>ISOs aim to convert your gain into the cheaper long-term form.</p>`,
  related:["ordinary-income","basis","iso"]
},

"ordinary-income": {
  term:"Ordinary Income", group:"Tax",
  aliases:["ordinary income","ordinary income tax","ordinary-income"],
  eli5:"Income taxed at the regular progressive rates — wages, interest, short-term gains. It's the higher-rate bucket compared with long-term capital gains.",
  full:`<p><b>Ordinary income</b> is everyday income — salary, bonuses, interest, and short-term trading profits — taxed at the standard graduated brackets (which top out higher than long-term capital-gains rates). An NSO's bargain element is ordinary income; an ISO's may avoid that.</p>`,
  related:["capital-gains","nso","iso"]
},

"basis": {
  term:"Cost Basis", group:"Tax",
  aliases:["cost basis","basis","tax basis"],
  eli5:"What you paid for an investment, used to figure your taxable gain when you sell. Sale price minus basis = your capital gain.",
  full:`<p><b>Basis</b> is your investment's cost for tax purposes — usually what you paid, plus adjustments. When you sell: Sale price − basis = capital gain (or loss). Lower basis → bigger taxable gain. Things like reinvested dividends and the bargain element can raise your basis.</p>`,
  related:["capital-gains","bargain-element"]
},

  term:"Yield", group:"Fixed Income",
  aliases:["yield"],
  eli5:"The annual return a bond pays as a percentage. Roughly, the interest you collect each year divided by what you paid for the bond.",
  full:`<p><b>Yield</b> expresses a bond's income as a percentage. The simplest version, current yield, is annual interest ÷ market price. Tax-free munis quote lower yields than taxable bonds — to compare fairly you gross them up with taxable-equivalent yield.</p>`,
  related:["munis","non-amt-munis","principal-bond"]

  full:`<p>The <b>principal</b> (also "face" or "par") is the sum the issuer borrows from you and promises to repay at maturity, typically $1,000 per bond. Your interest payments are calculated on this amount; getting it back at the end (assuming no default) is the deal.</p>`,

"business-cycle":{ term:"Business Cycle", group:"Economics", aliases:["business cycle"],
  eli5:"The economy's repeating rhythm of growing and shrinking: expansion → peak → contraction → trough, then around again.",
  full:`<p>Economies don't grow in a straight line — they breathe in and out through four phases. Knowing the phase hints at what investments tend to do well.</p>`,

"gdp":{ term:"GDP (Gross Domestic Product)", group:"Economics", aliases:["GDP","Gross Domestic Product"],
  eli5:"The total dollar value of everything a country produces in a period. The headline scoreboard for economic size and growth.",
  full:`<p><b>GDP</b> adds up the market value of all final goods and services made <i>within a country's borders</i>. Rising GDP = growth; two straight quarters of falling real GDP is the common definition of a recession.</p><p><b>Real</b> GDP strips out inflation; <b>nominal</b> GDP doesn't.</p>`,

"recession":{ term:"Recession", group:"Economics", aliases:["recession"],
  eli5:"A meaningful, broad decline in economic activity — classically two quarters in a row of shrinking real GDP.",
  full:`<p>A <b>recession</b> is the contraction phase of the business cycle: falling output, rising unemployment, weaker profits. An inverted yield curve has historically warned of one.</p>`,

"inflation":{ term:"Inflation", group:"Economics", aliases:["inflation","purchasing power risk","inflation risk"],
  eli5:"A general rise in prices over time, which quietly eats the buying power of your money and of fixed payments like bond coupons.",
  full:`<p><b>Inflation</b> means each dollar buys less than before. It's the enemy of fixed-income investors (a 5% coupon hurts if prices rise 6%) and a key reason to hold growth assets or inflation-protected bonds.</p>`,
  related:["federal-reserve","gdp","yield"] },
"federal-reserve":{ term:"The Federal Reserve (the Fed)", group:"Economics", aliases:["Federal Reserve","the Fed","FOMC","monetary policy"],
  eli5:"America's central bank. It steers the economy mainly by raising or lowering interest rates to balance jobs and inflation.",
  full:`<p>The <b>Fed</b> runs <b>monetary policy</b> with a dual mandate: maximum employment and stable prices (~2% inflation). Its main lever is buying/selling Treasuries (open market operations) to push interest rates down (stimulus) or up (restraint).</p><p>Lower rates → bond prices up, stocks generally up. Higher rates → the reverse.</p>`,
  graphic:"monetary-policy", related:["inflation","fiscal-policy","yield-curve","bond-price-rate","monetary-aggregates"] },
"fiscal-policy":{ term:"Fiscal Policy", group:"Economics", aliases:["fiscal policy"],
  eli5:"The government's use of spending and taxes (set by Congress and the President) to influence the economy — separate from the Fed's interest rates.",
  full:`<p><b>Fiscal policy</b> = government spending and taxation. Spending more / taxing less is expansionary; the opposite is contractionary. Compare with the Fed's <b>monetary policy</b> (interest rates and money supply).</p>`,
  related:["federal-reserve","gdp"] },
"yield-curve":{ term:"Yield Curve", group:"Economics", aliases:["yield curve","inverted yield curve","normal yield curve"],
  eli5:"A graph of bond yields from short to long maturities. Its shape — especially when it 'inverts' — is a famous economic signal.",
  full:`<p>The <b>yield curve</b> plots yield against maturity for equal-quality bonds. Normally it slopes up. When it <b>inverts</b> (short rates above long), it has preceded every post-WWII U.S. recession. Toggle the shapes below.</p>`,
  graphic:"yield-curve", related:["recession","federal-reserve","yield","interest-rate-risk"] },
"leading-indicators":{ term:"Leading Indicators", group:"Economics", aliases:["leading indicators","leading economic indicators"],
  eli5:"Data that tends to turn BEFORE the economy does — used to predict where things are heading. (e.g., building permits, stock prices, initial jobless claims.)",
  full:`<p><b>Leading indicators</b> move ahead of the economy: building permits, new orders, the S&P 500, the 10-year-minus-fed-funds spread, and <b>initial</b> jobless claims. Contrast with coincident (move with) and lagging (move after) indicators.</p><p>Tricky trio: initial claims = leading; the unemployment <i>rate</i> = coincident; <i>duration</i> of unemployment = lagging.</p>`,
  related:["business-cycle","gdp"] },

"bond":{ term:"Bond", group:"Fixed Income", aliases:["bond","bonds"],
  eli5:"An IOU. You lend money to a government or company; they pay you interest and return your principal at the end.",
  full:`<p>A <b>bond</b> is a loan you make as the investor. The issuer pays periodic interest (the coupon) and repays the face value (par) at maturity. Bond prices move <i>opposite</i> to interest rates.</p>`,
  related:["coupon","par-value","yield","duration","bond-price-rate","credit-rating"] },
"coupon":{ term:"Coupon (Nominal Yield)", group:"Fixed Income", aliases:["coupon","coupon rate","nominal yield"],
  eli5:"The fixed interest rate a bond pays on its face value, set when it's issued and never changing.",
  full:`<p>The <b>coupon</b> is the annual interest as a % of par. A 5% coupon on a $1,000 bond pays $50/year, forever, regardless of what the bond later trades for. Because it's fixed, the bond's <i>price</i> must move to keep its yield competitive.</p>`,
  related:["bond","par-value","yield","current-yield","ytm"] },
"par-value":{ term:"Par Value (Face)", group:"Fixed Income", aliases:["par value","par","face value"],
  eli5:"A bond's official sticker price — usually $1,000 — which is what you're repaid at maturity. Bonds trade above (premium) or below (discount) it.",
  full:`<p><b>Par</b> (face) is the amount repaid at maturity, typically $1,000, quoted as 100. Above 100 = <b>premium</b>; below = <b>discount</b>. Coupons are calculated on par.</p>`,
  related:["coupon","bond","premium-discount","principal-bond"] },
"current-yield":{ term:"Current Yield", group:"Fixed Income", aliases:["current yield"],
  eli5:"A bond's annual coupon divided by its current market price — the income return at today's price.",
  full:`<p><b>Current yield</b> = annual coupon ÷ market price. If price drops below par, current yield rises above the coupon; above par, it falls below. It ignores the gain/loss to par at maturity (that's what YTM captures).</p>`,
  related:["coupon","ytm","yield","premium-discount"] },
"ytm":{ term:"Yield to Maturity (YTM)", group:"Fixed Income", aliases:["YTM","yield to maturity","yield to call","YTC"],
  eli5:"The total annual return if you buy a bond now and hold it to maturity — counting both the coupons AND any gain or loss to par.",
  full:`<p><b>YTM</b> is the bond's all-in return to maturity. For a <b>premium</b> bond: coupon > current yield > YTM (you'll lose to par). For a <b>discount</b> bond the order flips. <b>Yield to call</b> does the same math to the call date.</p>`,
  related:["current-yield","coupon","premium-discount","callable-bond"] },
"premium-discount":{ term:"Premium vs. Discount Bond", group:"Fixed Income", aliases:["premium bond","discount bond","premium vs discount"],
  eli5:"A bond trading above par is a 'premium' (its coupon beats current rates); below par is a 'discount' (its coupon lags). Rates drive which it is.",
  full:`<p>When market rates fall below a bond's coupon, buyers bid it above par → <b>premium</b>. When rates rise above the coupon, it sinks below par → <b>discount</b>. Yield order — premium: coupon>current>YTM; discount: coupon<current<YTM.</p>`,
  related:["par-value","ytm","current-yield","bond-price-rate"] },
"bond-price-rate":{ term:"Bond Price ↔ Interest Rate Seesaw", group:"Fixed Income", aliases:["bond prices fall when rates rise","inverse relationship","price-yield"],
  eli5:"The single most important bond fact: when interest rates go UP, existing bond prices go DOWN, and vice versa.",
  full:`<p>New bonds at higher rates make old, lower-coupon bonds less attractive, so their prices fall until their yield matches the market. Drag the yield below and watch the price move the opposite way. Longer-duration bonds swing more.</p>`,
  graphic:"bond-price-yield", related:["duration","interest-rate-risk","ytm","premium-discount"] },
"duration":{ term:"Duration", group:"Fixed Income", aliases:["duration","modified duration","Macaulay duration"],
  eli5:"A bond's sensitivity to interest rates. Higher duration = bigger price swings when rates move. A zero-coupon bond's duration equals its maturity.",
  full:`<p><b>Duration</b> estimates how much a bond's price moves for a 1% rate change. Rule: ΔP/P ≈ −duration × Δrate. Duration is higher for longer maturity, lower coupon, lower yield. It's the headline measure of <b>interest-rate risk</b>.</p>`,
  related:["bond-price-rate","interest-rate-risk","coupon","bond"] },
"interest-rate-risk":{ term:"Interest-Rate Risk", group:"Fixed Income", aliases:["interest rate risk","interest-rate risk"],
  eli5:"The risk that rising rates push your bond's price down. Measured by duration; worst for long-term, low-coupon bonds.",
  full:`<p><b>Interest-rate risk</b> is the danger that rates rise and your existing bond loses market value. It's a <b>systematic</b> risk (can't be diversified away). Shorten duration or use floating-rate notes to reduce it.</p>`,
  graphic:"bond-price-yield", related:["duration","bond-price-rate","systematic-risk"] },
"credit-rating":{ term:"Credit Rating / Investment Grade", group:"Fixed Income", aliases:["credit rating","investment grade","junk bond","high yield","speculative grade"],
  eli5:"A letter grade for how likely a bond is to be repaid. BBB−/Baa3 and above is 'investment grade'; below that is 'junk' (high yield).",
  full:`<p>Agencies (S&P, Moody's, Fitch) grade default risk. The key line: <b>BBB−/Baa3</b> is the lowest <b>investment grade</b>; <b>BB+/Ba1</b> and below is <b>junk / high yield</b> — riskier, higher-yielding.</p>`,
  related:["bond","credit-risk","yield"] },
"callable-bond":{ term:"Callable Bond", group:"Fixed Income", aliases:["callable bond","callable","call risk"],
  eli5:"A bond the issuer can buy back early — usually when rates fall, which is bad for you (you must reinvest at lower rates).",
  full:`<p>A <b>callable</b> bond lets the issuer redeem early at a set price. Issuers call when rates drop, leaving you to reinvest at less. You're compensated with a higher yield; analyze with yield-to-call.</p>`,
  related:["ytm","reinvestment-risk","bond"] },
"treasury":{ term:"U.S. Treasury Securities", group:"Fixed Income", aliases:["Treasury","Treasuries","T-bill","T-note","T-bond","T-bills"],
  eli5:"Bonds issued by the U.S. government — the safest dollar investments. Interest is exempt from state and local tax.",
  full:`<p><b>Treasuries</b> are backed by the full faith and credit of the U.S. — the 'risk-free' benchmark. T-bills (≤1yr, sold at a discount), T-notes (2–10yr), T-bonds (20–30yr). Interest is federally taxable but <b>state/local tax-exempt</b>.</p>`,
  related:["bond","yield","munis"] },
"go-revenue-bond":{ term:"GO vs. Revenue Bonds", group:"Fixed Income", aliases:["general obligation bond","GO bond","revenue bond"],
  eli5:"Two kinds of muni. A GO bond is backed by the issuer's taxing power; a revenue bond is backed only by a specific project's income (like a toll road).",
  full:`<p><b>GO (general obligation)</b> bonds are backed by the issuer's full faith, credit, and <b>taxing power</b> — lower risk, lower yield. <b>Revenue</b> bonds are repaid only from a specific project (toll road, hospital) — higher yield, no taxing power behind them.</p>`,
  related:["munis","bond"] },

/* ---- EQUITY ---- */
"common-stock":{ term:"Common Stock", group:"Equity", aliases:["common stock","common shares"],
  eli5:"Ownership in a company. You get voting rights and a share of growth, but you're last in line if the company fails.",
  full:`<p><b>Common stock</b> = ownership equity. Perks: voting, potential dividends, unlimited upside, limited liability (you can't lose more than you invested). Catch: you're the <b>residual</b> claimant — paid last in a liquidation.</p>`,
  related:["preferred-stock","liquidation-priority","capital-gains"] },
"preferred-stock":{ term:"Preferred Stock", group:"Equity", aliases:["preferred stock","preferred shares"],
  eli5:"A hybrid: legally stock, but acts like a bond. Pays a fixed dividend, ranks ahead of common, usually no voting.",
  full:`<p><b>Preferred stock</b> pays a fixed dividend and sits above common stock for dividends and in liquidation, but below all bonds. Usually non-voting. Variants: cumulative (missed dividends accrue), convertible, callable, participating.</p>`,
  related:["common-stock","liquidation-priority","bond"] },
"adr":{ term:"ADR (American Depositary Receipt)", group:"Equity", aliases:["ADR","American Depositary Receipt","ADRs"],
  eli5:"A way to own a foreign company's stock on a U.S. exchange, in dollars, without dealing with foreign markets directly.",
  full:`<p>An <b>ADR</b> is a certificate issued by a U.S. bank representing shares of a foreign company. It trades in USD on U.S. markets and pays dividends in USD — but you still carry <b>currency risk</b> because the underlying is foreign.</p>`,
  related:["common-stock","currency-risk"] },

/* ---- POOLED ---- */
"mutual-fund":{ term:"Mutual Fund (Open-End)", group:"Pooled", aliases:["mutual fund","open-end fund","open-end mutual fund"],
  eli5:"A pool of many investors' money run by a manager. You buy/sell directly with the fund once a day at its NAV.",
  full:`<p>An open-end <b>mutual fund</b> continuously issues and redeems shares at <b>NAV</b>, priced once daily after close (forward pricing). It must redeem within 7 days. Share classes (A/B/C) differ by how you pay the sales charge.</p>`,
  related:["nav","etf","expense-ratio","breakpoint","twelve-b-1"] },
"nav":{ term:"Net Asset Value (NAV)", group:"Pooled", aliases:["NAV","Net Asset Value"],
  eli5:"A fund's per-share value: everything it owns minus what it owes, divided by shares outstanding. Calculated once a day.",
  full:`<p><b>NAV</b> = (total assets − total liabilities) ÷ shares outstanding. Mutual funds price at NAV once daily; ETFs trade all day at market prices that stay close to NAV via arbitrage.</p>`,
  related:["mutual-fund","etf"] },
"etf":{ term:"ETF (Exchange-Traded Fund)", group:"Pooled", aliases:["ETF","exchange-traded fund","ETFs"],
  eli5:"A fund that trades on an exchange like a stock — all day, at market prices — usually cheaper and more tax-efficient than a mutual fund.",
  full:`<p><b>ETFs</b> trade intraday on exchanges. A creation/redemption mechanism with big institutions ('authorized participants') keeps the price near NAV. Advantages: intraday trading, low fees, tax efficiency. Watch out for leveraged/inverse ETFs — daily reset causes decay over time.</p>`,
  related:["mutual-fund","nav","expense-ratio"] },
"closed-end-fund":{ term:"Closed-End Fund", group:"Pooled", aliases:["closed-end fund","CEF"],
  eli5:"A fund with a fixed number of shares that trades on an exchange — often at a premium or discount to what it actually holds.",
  full:`<p>A <b>closed-end fund</b> raises money once via IPO, then its shares trade on an exchange like a stock. Unlike open-end funds, it doesn't redeem shares, so the price can drift to a <b>premium or discount</b> to NAV. May use leverage.</p>`,
  related:["mutual-fund","nav","etf"] },
"uit":{ term:"Unit Investment Trust (UIT)", group:"Pooled", aliases:["UIT","unit investment trust"],
  eli5:"A fixed, unmanaged basket of securities with an end date. Buy it, hold it, it self-liquidates at maturity. No manager picking and choosing.",
  full:`<p>A <b>UIT</b> holds a fixed portfolio (often bonds) with <b>no active management</b> and <b>no board of directors</b>. It has a preset termination date and is redeemable. Think 'set-and-forget basket.'</p>`,
  related:["mutual-fund","etf"] },
"twelve-b-1":{ term:"12b-1 Fee", group:"Pooled", aliases:["12b-1 fee","12b-1"],
  eli5:"An annual marketing/distribution fee baked into some mutual funds, capped at 1%. Above 0.25% and the fund can't call itself 'no-load.'",
  full:`<p>A <b>12b-1 fee</b> pays for distribution (max 0.75%) and service (max 0.25%) — total max <b>1.00%</b>/yr, deducted from fund assets. A fund with 12b-1 above 0.25% cannot advertise as 'no-load.'</p>`,
  related:["mutual-fund","expense-ratio","breakpoint"] },
"expense-ratio":{ term:"Expense Ratio", group:"Pooled", aliases:["expense ratio"],
  eli5:"The yearly percentage a fund charges to cover its costs. Lower is better — it comes straight out of your return.",
  full:`<p>The <b>expense ratio</b> is annual operating costs as a % of assets (management fee + 12b-1 + other). Index funds/ETFs are typically cheapest. Over decades, small differences compound into big money.</p>`,
  related:["mutual-fund","etf","twelve-b-1"] },
"breakpoint":{ term:"Breakpoint (Sales Charge Discount)", group:"Pooled", aliases:["breakpoint","breakpoints"],
  eli5:"A volume discount on a mutual fund's front-end sales charge: invest more, pay a lower %. Steering someone just below one is unethical.",
  full:`<p><b>Breakpoints</b> reduce the front-end load at investment thresholds ($25K, $50K, $100K…). A <b>Letter of Intent</b> (13 months, backdatable 90 days) or <b>Rights of Accumulation</b> can reach them. Recommending a purchase just under a breakpoint to keep a higher commission is a prohibited <b>breakpoint sale</b>.</p>`,
  related:["mutual-fund","twelve-b-1"] },

/* ---- DERIVATIVES ---- */
"option":{ term:"Option (Call & Put)", group:"Derivatives", aliases:["option","options","call option","put option"],
  eli5:"A contract giving the RIGHT (not obligation) to buy (call) or sell (put) a stock at a set price by a deadline. One contract = 100 shares.",
  full:`<p>A <b>call</b> is the right to buy at the strike; a <b>put</b> is the right to sell at the strike. The buyer pays a premium and risks only that premium; the seller (writer) takes on the obligation if assigned. Use the payoff tool below.</p>`,
  graphic:"option-payoff", related:["covered-call","protective-put","strike-price","straddle"] },
"covered-call":{ term:"Covered Call", group:"Derivatives", aliases:["covered call"],
  eli5:"Own a stock and sell a call on it. You collect income now, but you've capped how high you can profit.",
  full:`<p><b>Covered call</b> = long stock + short call. You pocket the premium (income) but agree to sell at the strike, capping upside. Best when you're mildly bullish and happy to sell at the strike.</p>`,
  graphic:"option-payoff", related:["option","protective-put"] },
"protective-put":{ term:"Protective Put", group:"Derivatives", aliases:["protective put"],
  eli5:"Own a stock and buy a put as insurance. If the stock crashes, the put limits your loss.",
  full:`<p><b>Protective put</b> = long stock + long put. The put is downside insurance: your max loss is capped at (stock cost − strike) + premium. Best when you want to hold a stock but fear a near-term drop.</p>`,
  graphic:"option-payoff", related:["option","covered-call"] },
"straddle":{ term:"Long Straddle", group:"Derivatives", aliases:["straddle","long straddle"],
  eli5:"Buy a call AND a put at the same strike. You win if the stock makes a BIG move — up or down — and lose if it sits still.",
  full:`<p>A <b>long straddle</b> buys a call and a put at the same strike/expiration. It profits from large moves in either direction (e.g., around earnings) and loses if the stock stays near the strike. A <b>strangle</b> uses different strikes (cheaper, needs a bigger move).</p>`,
  graphic:"option-payoff", related:["option"] },

/* ---- PORTFOLIO THEORY ---- */
"beta":{ term:"Beta", group:"Portfolio", aliases:["beta"],
  eli5:"How much a stock moves relative to the overall market. Beta 1 = moves with the market; >1 = more volatile; <1 = calmer.",
  full:`<p><b>Beta</b> measures <b>systematic</b> (market) risk. Beta 1.5 means it tends to move 50% more than the market. Utilities are low-beta; high-growth names are high-beta. Beta drives CAPM's required return and the Treynor ratio.</p>`,
  graphic:"capm-sml", related:["capm","systematic-risk","treynor","standard-deviation"] },
"standard-deviation":{ term:"Standard Deviation", group:"Portfolio", aliases:["standard deviation","total risk","volatility"],
  eli5:"A measure of how much an investment's returns bounce around — its total volatility. Bigger = riskier.",
  full:`<p><b>Standard deviation</b> captures <b>total risk</b> (both market and company-specific). It's the denominator of the <b>Sharpe ratio</b> — use it when the portfolio is the investor's entire holdings.</p>`,
  related:["sharpe","beta","diversification","correlation"] },
"correlation":{ term:"Correlation", group:"Portfolio", aliases:["correlation","correlation coefficient"],
  eli5:"How two investments move relative to each other, from −1 (opposite) to +1 (lockstep). Low or negative correlation is the secret to diversification.",
  full:`<p><b>Correlation</b> ranges −1 to +1. You get diversification benefit whenever it's below +1; the most benefit at −1 (assets that zig when others zag). It's why mixing different asset classes lowers portfolio risk.</p>`,
  related:["diversification","standard-deviation"] },
"diversification":{ term:"Diversification", group:"Portfolio", aliases:["diversification","diversify"],
  eli5:"Not putting all your eggs in one basket. Spreading across many investments cancels out company-specific risk.",
  full:`<p><b>Diversification</b> reduces <b>non-systematic</b> (company-specific) risk — about 20–30 holdings captures most of the benefit. What remains is <b>systematic</b> (market) risk, which diversification can't remove. Lower correlations help most.</p>`,
  related:["correlation","systematic-risk","standard-deviation"] },
"systematic-risk":{ term:"Systematic vs. Non-Systematic Risk", group:"Portfolio", aliases:["systematic risk","non-systematic risk","market risk","diversifiable risk"],
  eli5:"Systematic = market-wide risk you can't diversify away (rates, recessions). Non-systematic = company-specific risk you CAN diversify away.",
  full:`<p><b>Systematic</b> risk hits everything (interest rates, inflation, market crashes) — measured by beta, can't be diversified. <b>Non-systematic</b> risk is specific to one company/industry — diversification erases it. CAPM only pays you for systematic risk.</p>`,
  related:["beta","diversification","capm","interest-rate-risk"] },
"capm":{ term:"CAPM (Capital Asset Pricing Model)", group:"Portfolio", aliases:["CAPM","Capital Asset Pricing Model","Security Market Line","SML"],
  eli5:"A formula for the return an investment SHOULD earn given its market risk (beta). More risk → higher required return.",
  full:`<p><b>CAPM:</b> Required return = risk-free rate + beta × (market return − risk-free). Plotted against beta it's the <b>Security Market Line</b>. If a stock's actual expected return is above the line, it has positive <b>alpha</b> (a bargain). Drag beta below.</p>`,
  graphic:"capm-sml", related:["beta","alpha","systematic-risk","treynor"] },
"alpha":{ term:"Alpha (Jensen's Alpha)", group:"Portfolio", aliases:["alpha","Jensen's alpha"],
  eli5:"The return a manager earned ABOVE what CAPM said to expect for the risk taken. Positive alpha = genuine skill (or luck).",
  full:`<p><b>Alpha</b> = actual return − CAPM-predicted return. Positive means outperformance for the risk taken; negative means underperformance. It's the scoreboard for active management.</p>`,
  related:["capm","beta","sharpe","treynor"] },
"sharpe":{ term:"Sharpe Ratio", group:"Portfolio", aliases:["Sharpe ratio","Sharpe"],
  eli5:"Return earned per unit of TOTAL risk. Higher is better. Use it when the portfolio is someone's whole investment.",
  full:`<p><b>Sharpe</b> = (portfolio return − risk-free) ÷ standard deviation. Because it uses <b>total risk</b>, it's the right measure when the portfolio is the client's entire holdings. Compare with <b>Treynor</b>, which uses beta.</p>`,
  related:["treynor","standard-deviation","alpha","capm"] },
"treynor":{ term:"Treynor Ratio", group:"Portfolio", aliases:["Treynor ratio","Treynor"],
  eli5:"Return earned per unit of MARKET risk (beta). Use it when the portfolio is just one slice of a bigger diversified pile.",
  full:`<p><b>Treynor</b> = (portfolio return − risk-free) ÷ beta. It uses only <b>systematic</b> risk, so it fits when non-systematic risk is already diversified away — i.e., the portfolio is one of several. Sharpe uses total risk instead.</p>`,
  related:["sharpe","beta","capm","systematic-risk"] },

/* ---- RETIREMENT ---- */
"traditional-ira":{ term:"Traditional IRA", group:"Retirement", aliases:["Traditional IRA","traditional IRA"],
  eli5:"A retirement account where you may deduct contributions now, grow tax-deferred, and pay ordinary income tax when you withdraw later.",
  full:`<p><b>Traditional IRA</b>: contributions may be pre-tax (deductible), growth is tax-deferred, and withdrawals are taxed as ordinary income. A 10% penalty applies before age 59½ (with exceptions). RMDs begin at 73.</p>`,
  related:["roth-ira","rmd","ordinary-income"] },
"roth-ira":{ term:"Roth IRA", group:"Retirement", aliases:["Roth IRA","Roth"],
  eli5:"A retirement account funded with after-tax money. Growth and qualified withdrawals are completely tax-free, and there are no RMDs.",
  full:`<p><b>Roth IRA</b>: you contribute after-tax dollars; qualified withdrawals (5-year rule + age 59½) are <b>tax-free</b>. No required minimum distributions during the owner's life. Great when you expect higher taxes later.</p>`,
  related:["traditional-ira","rmd","capital-gains"] },
"rmd":{ term:"Required Minimum Distribution (RMD)", group:"Retirement", aliases:["RMD","required minimum distribution","RMDs"],
  eli5:"The minimum amount you MUST start withdrawing from tax-deferred accounts at age 73, so the IRS can finally tax it.",
  full:`<p><b>RMDs</b> begin at age <b>73</b> (rising to 75 in 2033) for Traditional IRAs/401(k)s. Miss one and the penalty is 25% (10% if corrected promptly). <b>Roth IRAs have no RMDs</b> during the owner's lifetime.</p>`,
  related:["traditional-ira","roth-ira"] },
"erisa":{ term:"ERISA", group:"Retirement", aliases:["ERISA"],
  eli5:"The 1974 federal law that protects employees in private retirement plans — setting rules for fairness, vesting, and fiduciary duty.",
  full:`<p><b>ERISA</b> governs private employer retirement plans. Fiduciaries must act with loyalty, prudence (the 'prudent expert' standard), diversification, and follow plan documents. Sets eligibility (age 21 + 1 year) and vesting schedules.</p>`,
  related:["fiduciary-duty","traditional-ira"] },

/* ---- LAWS ---- */
"investment-adviser":{ term:"Investment Adviser (IA)", group:"Laws", aliases:["investment adviser","investment advisers","IA"],
  eli5:"A person or firm that, for compensation, is in the business of advising others about securities. They owe clients a fiduciary duty.",
  full:`<p>The <b>ABC test</b> defines an IA: gives <b>A</b>dvice about securities, as a <b>B</b>usiness, for <b>C</b>ompensation. All three required. IAs owe a <b>fiduciary duty</b> — the highest standard, client's best interest first. Contrast with a broker-dealer.</p>`,
  related:["broker-dealer","iar","fiduciary-duty","custody-rule","accredited-investor"] },
"broker-dealer":{ term:"Broker-Dealer (BD)", group:"Laws", aliases:["broker-dealer","broker dealer","BD"],
  eli5:"A firm in the business of buying and selling securities — as agent for customers (broker) or for its own account (dealer).",
  full:`<p>A <b>broker-dealer</b> effects securities transactions. Since 2020, when making recommendations to retail customers it must meet <b>Regulation Best Interest</b> — a best-interest standard, though technically not the same 'fiduciary' label IAs carry. If a BD charges special fees for advice, it can be pulled into IA registration.</p>`,
  related:["investment-adviser","agent","fiduciary-duty"] },
"agent":{ term:"Agent (Registered Rep)", group:"Laws", aliases:["agent","registered representative"],
  eli5:"An individual person who represents a broker-dealer in securities transactions. Always a human, never a firm.",
  full:`<p>An <b>agent</b> is the individual who works for a broker-dealer effecting trades. (The firm is the BD; the person is the agent.) There's no '5-client de minimis' for agents — a single retail customer in a state triggers registration there.</p>`,
  related:["broker-dealer","iar"] },
"iar":{ term:"Investment Adviser Representative (IAR)", group:"Laws", aliases:["IAR","investment adviser representative"],
  eli5:"The individual person who gives advice on behalf of an investment adviser firm. The human face of the IA.",
  full:`<p>An <b>IAR</b> is the natural person who provides advice, manages accounts, or solicits for an IA firm. IARs of federal-covered advisers register only in states where they have a <b>place of business</b>.</p>`,
  related:["investment-adviser","agent","fiduciary-duty"] },
"fiduciary-duty":{ term:"Fiduciary Duty", group:"Laws", aliases:["fiduciary duty","fiduciary","best interest"],
  eli5:"The legal obligation to put the client's interests above your own — full disclosure, no hidden conflicts. The gold standard of trust.",
  full:`<p>A <b>fiduciary</b> must act in the client's <b>best interest</b>, disclose all material conflicts, seek best execution, and avoid unauthorized profit. Investment advisers are fiduciaries under the Advisers Act (Section 206 anti-fraud applies to all advisers).</p>`,
  related:["investment-adviser","custody-rule","soft-dollars"] },
"howey-test":{ term:"Howey Test", group:"Laws", aliases:["Howey test","Howey","investment contract"],
  eli5:"The Supreme Court's 4-part test for whether something counts as a 'security' (and thus is regulated) — now central to crypto cases.",
  full:`<p>An <b>investment contract</b> (a security) exists if there's: (1) an <b>investment of money</b>, (2) in a <b>common enterprise</b>, (3) with an <b>expectation of profits</b>, (4) <b>from the efforts of others</b>. Used to judge ICOs and tokens.</p>`,
  related:["accredited-investor","investment-adviser"] },
"accredited-investor":{ term:"Accredited Investor", group:"Laws", aliases:["accredited investor","accredited"],
  eli5:"Someone wealthy or sophisticated enough to invest in riskier private deals: $1M net worth (excluding home) or $200K+ income.",
  full:`<p><b>Accredited investor</b> (Rule 501): net worth over <b>$1M</b> excluding primary residence, OR income over <b>$200K single / $300K joint</b> for two years, OR holding a Series 7/65/82. Lets you into private placements (Reg D).</p>`,
  related:["reg-d","howey-test","qualified-client"] },
"reg-d":{ term:"Regulation D (Private Placements)", group:"Laws", aliases:["Regulation D","Reg D","Rule 506","private placement"],
  eli5:"The rules letting companies raise money privately — skipping full SEC registration — mostly by selling to accredited investors.",
  full:`<p><b>Reg D</b> exempts private offerings from full registration. <b>Rule 506(b)</b>: unlimited accredited + up to 35 sophisticated, no general solicitation. <b>Rule 506(c)</b>: accredited only, but advertising allowed with verification. These become 'federal covered securities.'</p>`,
  related:["accredited-investor","howey-test","federal-covered"] },
"custody-rule":{ term:"Custody (Adviser)", group:"Laws", aliases:["custody","custody rule","qualified custodian"],
  eli5:"When an adviser holds or can access client money/securities. It triggers strict safeguards — like using a qualified custodian and surprise audits.",
  full:`<p><b>Custody</b> means holding client assets or having authority to obtain them (including deducting fees). It requires a <b>qualified custodian</b>, quarterly statements to clients, and often a surprise annual audit. State IAs with custody face higher net-worth/bond requirements ($35,000).</p>`,
  related:["investment-adviser","fiduciary-duty"] },
"soft-dollars":{ term:"Soft Dollars (Sec. 28(e))", group:"Laws", aliases:["soft dollars","soft dollar","Section 28(e)"],
  eli5:"When an adviser uses client trading commissions to pay for research/brokerage services. There's a safe harbor — but only for research, not perks.",
  full:`<p><b>Soft dollars</b>: paying for research and brokerage services with client commissions. Section 28(e) provides a safe harbor for <b>research and brokerage</b> only — NOT travel, rent, salaries, or hardware. Must still seek best execution and disclose the arrangement.</p>`,
  related:["fiduciary-duty","investment-adviser"] },
"federal-covered":{ term:"Federal Covered Security/Adviser", group:"Laws", aliases:["federal covered","federal covered security","federal covered adviser"],
  eli5:"Things regulated mainly at the federal (SEC) level instead of by states — like exchange-listed stocks, mutual funds, and big advisers.",
  full:`<p><b>Federal covered securities</b> (NSMIA) — exchange-listed stocks, mutual fund shares, Rule 506 offerings — are exempt from state registration (states get a notice filing + anti-fraud only). <b>Federal covered advisers</b> are SEC-registered (generally $100M+ AUM).</p>`,
  related:["reg-d","investment-adviser"] },
"qualified-client":{ term:"Qualified Client", group:"Laws", aliases:["qualified client"],
  eli5:"A wealthy client an adviser is allowed to charge performance fees to: $1.1M under management or $2.2M net worth.",
  full:`<p>Advisers generally can't charge <b>performance fees</b> — except to a <b>qualified client</b>: at least <b>$1.1M</b> managed by the adviser, or net worth over <b>$2.2M</b> (excluding home), or a qualified purchaser. Protects smaller investors from fee risk-taking.</p>`,
  related:["accredited-investor","investment-adviser","fiduciary-duty"] },

/* ---- shared risk terms referenced above ---- */
"credit-risk":{ term:"Credit (Default) Risk", group:"Fixed Income", aliases:["credit risk","default risk"],
  eli5:"The risk that a bond issuer fails to pay you back. Higher for lower-rated 'junk' bonds; near-zero for Treasuries.",
  full:`<p><b>Credit risk</b> is the chance the issuer defaults. It's a <b>non-systematic</b> risk you can diversify. Rating agencies grade it; investment-grade is safer, junk is riskier with higher yield to compensate.</p>`,
  related:["credit-rating","bond","diversification"] },
"reinvestment-risk":{ term:"Reinvestment Risk", group:"Fixed Income", aliases:["reinvestment risk"],
  eli5:"The risk that when your bond pays coupons (or matures), rates have fallen and you must reinvest at a lower return.",
  full:`<p><b>Reinvestment risk</b> bites when rates fall: those coupon payments now earn less. Zero-coupon bonds avoid it (no coupons to reinvest). It's the mirror image of interest-rate risk.</p>`,
  related:["callable-bond","interest-rate-risk","bond"] },
"currency-risk":{ term:"Currency Risk", group:"Portfolio", aliases:["currency risk","exchange rate risk"],
  eli5:"The risk that foreign-investment returns shrink when exchange rates move against you, even if the investment itself did fine.",
  full:`<p><b>Currency risk</b> affects foreign holdings (and ADRs): a falling foreign currency reduces your dollar return. It's a <b>systematic</b> risk; hedge with forwards or buy USD-denominated assets.</p>`,
  related:["adr","systematic-risk"] },
"liquidation-priority":{ term:"Liquidation Priority", group:"Equity", aliases:["liquidation priority","order of liquidation","liquidation"],
  eli5:"The pecking order for who gets paid when a company goes bankrupt: secured lenders first, common stockholders dead last.",
  full:`<p>In bankruptcy, claims are paid top-down: <b>secured creditors → unsecured w/ priority → general creditors → subordinated → preferred stock → common stock</b>. Common shareholders are 'residual' — they get only what's left. Drag the recovery slider below.</p>`,
  graphic:"liquidation-waterfall", related:["common-stock","preferred-stock","bond"] }

});
</script>

<script>
/* ====================  CHUNK: LAWS & ETHICS DEEP DIVE  ==================== */
Object.assign(GLOSSARY_DATA, {
"securities-act-1933":{ term:"Securities Act of 1933", group:"Laws", aliases:["Securities Act of 1933","1933 Act","Securities Act"],
  eli5:"The 'paper act.' Governs brand-new securities being SOLD to the public — requiring registration and a prospectus so buyers get the facts.",
  full:`<p>The <b>1933 Act</b> covers the <b>primary market</b> (issuing new securities). Companies must register with the SEC and deliver a <b>prospectus</b>, or qualify for an exemption (like Reg D). Its goal: full disclosure so investors aren't sold blind.</p>`,
  related:["securities-exchange-act-1934","reg-d","accredited-investor","federal-covered"] },
"securities-exchange-act-1934":{ term:"Securities Exchange Act of 1934", group:"Laws", aliases:["Securities Exchange Act of 1934","1934 Act","Exchange Act"],
  eli5:"Governs TRADING of securities after they're issued, and created the SEC — the federal markets regulator.",
  full:`<p>The <b>1934 Act</b> covers the <b>secondary market</b> (trading). It created the <b>SEC</b>, regulates exchanges and broker-dealers, mandates company reporting (10-K, 10-Q, 8-K), and is the basis for insider-trading enforcement (Rule 10b-5).</p>`,
  related:["securities-act-1933","broker-dealer","insider-trading","rule-10b5"] },
"investment-advisers-act":{ term:"Investment Advisers Act of 1940", group:"Laws", aliases:["Investment Advisers Act of 1940","Investment Advisers Act","Advisers Act"],
  eli5:"The federal law that defines and regulates investment advisers — including their fiduciary duty and anti-fraud rules.",
  full:`<p>The <b>Advisers Act</b> defines who's an IA (the ABC test), requires SEC registration for larger advisers, and imposes anti-fraud duties under <b>Section 206</b> that apply to <i>all</i> advisers — even unregistered ones.</p>`,
  related:["investment-adviser","fiduciary-duty","custody-rule","form-adv"] },
"investment-company-act":{ term:"Investment Company Act of 1940", group:"Laws", aliases:["Investment Company Act of 1940","Investment Company Act"],
  eli5:"The law regulating mutual funds, closed-end funds, and UITs — the 'pooled investment' rulebook.",
  full:`<p>The <b>Investment Company Act</b> regulates funds: it defines open-end, closed-end, and UIT structures, the 7-day redemption rule, the 75/5/10 diversification test, and 12b-1 plans. Hedge funds dodge it via 3(c)(1)/3(c)(7) exemptions.</p>`,
  related:["mutual-fund","closed-end-fund","uit","hedge-fund"] },
"trust-indenture-act":{ term:"Trust Indenture Act of 1939", group:"Laws", aliases:["Trust Indenture Act of 1939","Trust Indenture Act"],
  eli5:"Requires public corporate bond deals over $50M to have a trustee and a contract (indenture) protecting bondholders.",
  full:`<p>The <b>Trust Indenture Act</b> requires a qualified independent <b>trustee</b> (usually a bank) and a protective <b>indenture</b> for public corporate bond issues over <b>$50 million</b>. Government and muni bonds are exempt.</p>`,
  related:["bond","securities-act-1933"] },
"sipc":{ term:"SIPC (Securities Investor Protection)", group:"Laws", aliases:["SIPC","Securities Investor Protection"],
  eli5:"Insurance for customers if their BROKERAGE FIRM fails — up to $500K (incl. $250K cash). It does NOT cover market losses.",
  full:`<p><b>SIPC</b> (from the 1970 Act) protects customers when a broker-dealer fails: up to <b>$500,000</b> per separate customer, with a <b>$250,000</b> cash sublimit. It is NOT FDIC and does NOT cover bad investments or market losses — only the firm's failure.</p>`,
  related:["broker-dealer"] },
"uniform-securities-act":{ term:"Uniform Securities Act (USA)", group:"Laws", aliases:["Uniform Securities Act"],
  eli5:"The model law that states adopt to regulate securities at the STATE level — registration, fraud, and the powers of the state Administrator.",
  full:`<p>The <b>USA</b> is model legislation each state adapts. It governs state registration of broker-dealers, agents, advisers, and IARs; defines exempt securities and transactions; and empowers the state <b>Administrator</b>. NSMIA later split authority between states and the SEC.</p>`,
  related:["administrator","exempt-security","exempt-transaction","nsmia","de-minimis"] },
"nsmia":{ term:"NSMIA (1996)", group:"Laws", aliases:["NSMIA","National Securities Markets Improvement Act"],
  eli5:"The 1996 law that split regulatory turf: big advisers and exchange-listed securities go federal (SEC); smaller ones stay with states.",
  full:`<p><b>NSMIA</b> created the <b>federal covered</b> categories — preempting state registration for exchange-listed stocks, mutual funds, and Rule 506 offerings (states keep notice filing + anti-fraud). It also set the AUM line between state and SEC adviser registration.</p>`,
  related:["federal-covered","uniform-securities-act","investment-adviser"] },
"dodd-frank":{ term:"Dodd-Frank Act (2010)", group:"Laws", aliases:["Dodd-Frank"],
  eli5:"The post-2008 reform law. For the exam: it reshuffled adviser registration so firms with $100M+ go to the SEC, smaller stay with states.",
  full:`<p><b>Dodd-Frank</b> reallocated adviser oversight: under $100M AUM → state; $100M+ → SEC (mandatory at $110M). It created the 'mid-size' adviser category and the <b>Exempt Reporting Adviser</b> for private-fund/VC advisers.</p>`,
  related:["investment-adviser","federal-covered"] },
"form-adv":{ term:"Form ADV", group:"Laws", aliases:["Form ADV"],
  eli5:"An adviser's registration and disclosure form. Part 2A is the plain-English 'brochure' clients receive.",
  full:`<p><b>Form ADV</b>: Part 1 = check-the-box regulatory info; <b>Part 2A = the Brochure</b> (narrative disclosures clients get); Part 2B = info on the individual IAR; Part 3 = Form CRS. Annual updating amendment is due within 90 days of fiscal year-end.</p>`,
  related:["investment-adviser","brochure-delivery","form-crs"] },
"brochure-delivery":{ term:"Brochure Delivery Rule", group:"Laws", aliases:["brochure delivery","brochure rule"],
  eli5:"When advisers must hand clients the disclosure brochure. States: 48 hours before signing, OR at signing with a 5-day right to cancel.",
  full:`<p><b>State (NASAA)</b>: deliver Part 2A at least <b>48 hours before</b> the contract, OR at signing with a <b>5-business-day</b> right to rescind. <b>Federal</b>: before or at signing (no 48-hour/5-day rule). Annual delivery within 120 days of fiscal year-end.</p>`,
  related:["form-adv","investment-adviser"] },
"form-crs":{ term:"Form CRS", group:"Laws", aliases:["Form CRS","customer relationship summary"],
  eli5:"A short (2-page) plain-English summary firms give retail clients explaining their relationship, fees, and conflicts.",
  full:`<p><b>Form CRS</b> (Client Relationship Summary) is a max 2-page (4 for dual registrants) document both BDs and IAs give retail investors. It uses the term 'best interest' and discloses services, fees, conflicts, and discipline. Effective June 30, 2020.</p>`,
  related:["reg-bi","form-adv"] },
"reg-bi":{ term:"Regulation Best Interest (Reg BI)", group:"Laws", aliases:["Regulation Best Interest","Reg BI"],
  eli5:"The 2020 rule requiring broker-dealers to act in a retail customer's best interest when recommending — without quite calling them fiduciaries.",
  full:`<p><b>Reg BI</b> imposes four obligations on BDs: <b>Disclosure, Care, Conflict of Interest, Compliance</b>. It's a best-interest standard (not the IA 'fiduciary' label) and applies only to BDs' recommendations to retail customers.</p>`,
  related:["broker-dealer","form-crs","fiduciary-duty"] },
"exempt-security":{ term:"Exempt Security", group:"Laws", aliases:["exempt security","exempt securities"],
  eli5:"A security that doesn't need state registration because of WHAT it is — like government bonds, bank stock, or muni bonds.",
  full:`<p><b>Exempt securities</b> skip state registration based on the instrument itself: U.S./municipal/foreign government bonds, bank and insurance company securities, and exchange-listed (federal covered) securities. Anti-fraud rules still apply.</p>`,
  related:["exempt-transaction","uniform-securities-act","federal-covered"] },
"exempt-transaction":{ term:"Exempt Transaction", group:"Laws", aliases:["exempt transaction","exempt transactions","unsolicited order"],
  eli5:"A trade that skips registration because of HOW it happens — like a customer-initiated (unsolicited) order or a sale to a big institution.",
  full:`<p><b>Exempt transactions</b> are exempt based on the manner of sale: <b>unsolicited</b> customer orders, private placements (≤10 offerees), sales to institutions, fiduciary/estate sales, and underwriter transactions. The most-tested is the unsolicited order.</p>`,
  related:["exempt-security","uniform-securities-act","reg-d"] },
"de-minimis":{ term:"De Minimis Exemption", group:"Laws", aliases:["de minimis","de minimis exemption","snowbird"],
  eli5:"A small-scale pass from state registration. Advisers get one (≤5 retail clients, no office in-state); broker-dealers do NOT.",
  full:`<p><b>De minimis</b>: an IA with <b>no place of business</b> in a state and <b>5 or fewer</b> retail clients there needn't register in that state. Note the trap — there's <b>no</b> 5-client de minimis for broker-dealers/agents; a single retail customer triggers registration.</p>`,
  related:["investment-adviser","broker-dealer","administrator"] },
"administrator":{ term:"State Administrator", group:"Laws", aliases:["Administrator","state Administrator"],
  eli5:"The state's top securities regulator. Can investigate, subpoena, issue cease-and-desist orders, and revoke registrations — but can't issue injunctions.",
  full:`<p>The <b>Administrator</b> enforces the state's Uniform Securities Act: makes rules, investigates (in or out of state), subpoenas, issues summary cease-and-desist orders, and denies/suspends/revokes registrations for cause. Key limit: <b>cannot issue injunctions</b> — must ask a court.</p>`,
  related:["uniform-securities-act","statute-of-limitations","de-minimis"] },
"marketing-rule":{ term:"Marketing Rule (206(4)-1)", group:"Laws", aliases:["Marketing Rule","testimonials","endorsements"],
  eli5:"The 2022 rule modernizing adviser advertising. It now allows testimonials and endorsements — with disclosures.",
  full:`<p>The <b>Marketing Rule</b> (effective Nov 4, 2022) replaced the old advertising and cash-solicitation rules. It permits <b>testimonials</b> (clients) and <b>endorsements</b> (non-clients) with clear disclosures (paid? client? conflicts?), requires fair/balanced performance presentation, and has a $1,000/12-month de minimis for promoter agreements.</p>`,
  related:["investment-adviser","fiduciary-duty"] },
"pay-to-play":{ term:"Pay-to-Play Rule", group:"Laws", aliases:["pay-to-play","Pay-to-Play"],
  eli5:"Stops advisers from winning government clients by making political donations. A big contribution = 2-year ban on paid advisory work for that government.",
  full:`<p><b>Pay-to-play</b> (Rule 206(4)-5): if a 'covered associate' contributes to an official who can influence adviser selection, the firm can't take compensation from that government client for <b>2 years</b>. De minimis: $350/election if eligible to vote, $150 if not.</p>`,
  related:["investment-adviser","code-of-ethics"] },
"code-of-ethics":{ term:"Code of Ethics (204A-1)", group:"Laws", aliases:["Code of Ethics","access person","access persons"],
  eli5:"A written ethics policy every registered adviser must have — including rules for employees ('access persons') reporting their personal trades.",
  full:`<p>Every registered IA must adopt a <b>Code of Ethics</b>: standards of conduct, compliance with securities laws, and personal-trade reporting by <b>access persons</b> (initial + annual holdings, quarterly transactions), plus pre-clearance for IPOs and private placements.</p>`,
  related:["investment-adviser","fiduciary-duty","prohibited-practices"] },
"aml":{ term:"Anti-Money Laundering (AML)", group:"Laws", aliases:["anti-money laundering","AML","Bank Secrecy Act","Patriot Act"],
  eli5:"Rules to stop criminals from 'washing' dirty money through financial firms — requiring customer ID checks and reporting suspicious activity.",
  full:`<p><b>AML</b> (Bank Secrecy Act + USA Patriot Act): firms need a written program, a compliance officer, training, independent testing, and a <b>Customer Identification Program</b>. They file CTRs for big cash and SARs for suspicious activity, and screen against OFAC's sanctions list.</p>`,
  related:["ctr","sar"] },
"ctr":{ term:"Currency Transaction Report (CTR)", group:"Laws", aliases:["Currency Transaction Report","CTR"],
  eli5:"A report firms must file for cash transactions over $10,000 — automatic, no suspicion needed.",
  full:`<p>A <b>CTR</b> is filed for cash transactions <b>over $10,000</b> (or same-day aggregates), within 15 days. It's mechanical — no suspicion required. 'Structuring' deposits to dodge it is itself a crime.</p>`,
  related:["aml","sar"] },
"sar":{ term:"Suspicious Activity Report (SAR)", group:"Laws", aliases:["Suspicious Activity Report","SAR"],
  eli5:"A confidential report firms file when they suspect money laundering or fraud — and they must NEVER tell the customer.",
  full:`<p>A <b>SAR</b> is filed (BDs) at <b>$5,000+</b> when activity looks suspicious, within 30 days. <b>Confidential</b> — telling the customer a SAR was filed is a felony.</p>`,
  related:["aml","ctr"] },
"insider-trading":{ term:"Insider Trading", group:"Laws", aliases:["insider trading","material non-public information","MNPI"],
  eli5:"Trading on important secret information, or tipping someone who does. Illegal — penalties include treble damages and prison.",
  full:`<p><b>Insider trading</b> = trading on <b>material non-public information</b> in breach of a duty (classical or misappropriation theory), or tipping. Penalties: up to 3× the profit/loss avoided (civil), millions in fines, and up to 20 years (criminal). Enforced via Rule 10b-5.</p>`,
  related:["rule-10b5","securities-exchange-act-1934"] },
"rule-10b5":{ term:"Rule 10b-5", group:"Laws", aliases:["Rule 10b-5","10b-5"],
  eli5:"The broad anti-fraud rule under the 1934 Act — the main legal hook for prosecuting insider trading and securities fraud.",
  full:`<p><b>Rule 10b-5</b> makes it unlawful to defraud, misstate material facts, or deceive in connection with buying/selling securities. It's the backbone of insider-trading and fraud cases. (10b5-1 plans give insiders a pre-set-trade defense.)</p>`,
  related:["insider-trading","securities-exchange-act-1934"] },
"prohibited-practices":{ term:"Prohibited / Unethical Practices", group:"Laws", aliases:["churning","front-running","selling away","commingling","unethical practices"],
  eli5:"The classic no-no's: churning (over-trading for commissions), front-running, selling away, commingling client and firm money, guaranteeing against loss.",
  full:`<p>NASAA's list of dishonest practices includes <b>churning</b> (excessive trading), <b>front-running</b>, <b>selling away</b> (trading outside the firm), <b>commingling</b> client and firm assets, guaranteeing against loss, and unauthorized/unsuitable trades. IARs may never share in client accounts.</p>`,
  related:["code-of-ethics","fiduciary-duty","discretionary-account"] },
"discretionary-account":{ term:"Discretionary Account", group:"Laws", aliases:["discretionary account","discretionary authority","discretion"],
