  equation:{ latex:"S = \\frac{R_p - R_f}{\\sigma_p}", where:[
    {s:"S", d:"Sharpe ratio — return per unit of TOTAL risk (higher is better)"},
    {s:"R_p", d:"the portfolio's return"},
    {s:"R_f", d:"the risk-free rate"},
    {s:"R_p - R_f", d:"the excess return (reward above a riskless investment)"},
    {s:"\\sigma_p", d:"the portfolio's standard deviation (total volatility)"} ]},
  examples:[
    { title:"A single portfolio", scenario:"A portfolio returns 12% with a standard deviation of 15%. The risk-free rate is 3%.",
      given:[{s:"R_p",d:"12%"},{s:"R_f",d:"3%"},{s:"\\sigma_p",d:"15%"}],
      steps:["S = \\frac{12\\% - 3\\%}{15\\%} = \\frac{9}{15} = 0.60"],
      result:"<b>Sharpe = 0.60</b> — 0.6 units of excess return for every unit of total risk." },
    { title:"Which fund is better risk-adjusted?", scenario:"Fund A returns 12% with σ = 15%. Fund B returns 10% with σ = 8%. Risk-free = 3%.",
      steps:["S_A = \\frac{12-3}{15} = 0.60","S_B = \\frac{10-3}{8} = 0.875"],
      result:"<b>Fund B wins (0.875 &gt; 0.60)</b> — it earns more return per unit of risk, even though A had a higher raw return.",
      chart:{ type:"bars", title:"Sharpe ratio", data:[{label:"Fund A",value:0.60,color:"#5b9dff"},{label:"Fund B",value:0.875,color:"#46d39a"}] } } ] },

"treynor":{
  equation:{ latex:"T = \\frac{R_p - R_f}{\\beta_p}", where:[
    {s:"T", d:"Treynor ratio — excess return per unit of MARKET risk"},
    {s:"R_p", d:"portfolio return"},
    {s:"R_f", d:"risk-free rate"},
    {s:"\\beta_p", d:"the portfolio's beta (systematic/market risk only)"} ]},
  examples:[
    { title:"One slice of a diversified whole", scenario:"A fund returns 12%, has beta 1.2, and the risk-free rate is 3%. (Use Treynor because this fund is just one piece of the client's larger portfolio.)",
      given:[{s:"R_p",d:"12%"},{s:"R_f",d:"3%"},{s:"\\beta_p",d:"1.2"}],
      steps:["T = \\frac{12\\% - 3\\%}{1.2} = \\frac{9}{1.2} = 7.5"],
      result:"<b>Treynor = 7.5.</b> Sharpe uses total risk (σ); Treynor uses only beta — right when non-market risk is already diversified away." } ] },

"duration":{
  equation:{ latex:"\\frac{\\Delta P}{P} \\approx -\\,D \\times \\Delta y", where:[
    {s:"\\Delta P/P", d:"the approximate percent change in the bond's price"},
    {s:"D", d:"modified duration (years) — the bond's rate sensitivity"},
    {s:"\\Delta y", d:"the change in yield, as a decimal (e.g., +0.5% = 0.005)"} ]},
  examples:[
    { title:"Rates rise half a percent", scenario:"A bond has a modified duration of 7.5. Market yields rise by 0.50%. What happens to its price?",
      given:[{s:"D",d:"7.5"},{s:"\\Delta y",d:"+0.005"}],
      steps:["\\frac{\\Delta P}{P} \\approx -7.5 \\times 0.005 = -0.0375"],
      result:"<b>Price falls about 3.75%.</b> Higher rates, lower price — and longer duration means a bigger drop.",
      chart:{ type:"numberline", unit:"%", min:-8, max:2, marks:[{value:-3.75,label:"price change",color:"#ff6b6b"}] } },
    { title:"Short vs. long duration, same shock", scenario:"Rates jump +1%. Compare a short bond (D = 3) with a long bond (D = 10).",
      steps:["short: -3 \\times 0.01 = -3\\%","long: -10 \\times 0.01 = -10\\%"],
      result:"The long bond loses <b>10%</b> vs. just <b>3%</b> for the short one — duration is the master dial of interest-rate risk.",
      chart:{ type:"bars", unit:"%", title:"Price drop on a +1% move", data:[{label:"Duration 3",value:-3,color:"#5b9dff"},{label:"Duration 10",value:-10,color:"#ff6b6b"}] } } ] },

"dividend-discount-model":{
  expand:"DDM (Gordon Growth Model) — values a stock as next year's dividend divided by (required return minus growth).",
  equation:{ latex:"P = \\frac{D_1}{r - g}", where:[
    {s:"P", d:"the stock's intrinsic (fair) value today"},
    {s:"D_1", d:"the dividend expected next year"},
    {s:"r", d:"the required rate of return (often from CAPM)"},
    {s:"g", d:"the constant dividend growth rate"},
    {s:"r-g", d:"the gap that drives value — a smaller gap means a much higher price"} ]},
  examples:[
    { title:"A steady dividend payer", scenario:"A stock will pay a $2 dividend next year, dividends grow 4% a year, and investors require 9%.",
      given:[{s:"D_1",d:"$2"},{s:"r",d:"9% = 0.09"},{s:"g",d:"4% = 0.04"}],
      steps:["P = \\frac{2}{0.09 - 0.04} = \\frac{2}{0.05} = 40"],
      result:"<b>Fair value = $40.</b> If it trades below $40 it may be undervalued." },
    { title:"Why faster growth explodes the value", scenario:"Same stock, but growth rises from 4% to 6%.",
      steps:["P = \\frac{2}{0.09 - 0.06} = \\frac{2}{0.03} = 66.67"],
      result:"Value jumps from <b>$40 to $66.67</b> — as growth nears the required return, the denominator shrinks and value soars.",
      chart:{ type:"bars", unit:"$", title:"Value vs. growth assumption", data:[{label:"g = 4%",value:40,color:"#5b9dff"},{label:"g = 6%",value:66.67,color:"#46d39a"}] } } ],
  graphic:"gordon-ddm" },

"rule-of-72":{
  equation:{ latex:"t_{double} \\approx \\frac{72}{r}", where:[
    {s:"t_{double}", d:"approximate years for money to double"},
    {s:"r", d:"the annual return, in whole-number percent (use 8, not 0.08)"} ]},
  examples:[
    { title:"How long to double at 8%?", scenario:"You earn a steady 8% per year.",
      steps:["t_{double} \\approx \\frac{72}{8} = 9 \\text{ years}"],
      result:"<b>~9 years to double.</b> At 6% it takes ~12 years; at 9%, ~8 years.",
      chart:{ type:"bars", unit:" yrs", title:"Years to double", data:[{label:"6% return",value:12,color:"#ff9f43"},{label:"8% return",value:9,color:"#5b9dff"},{label:"12% return",value:6,color:"#46d39a"}] } } ],
  graphic:"compound-growth" },

"time-value-of-money":{
  expand:"TVM — a dollar today is worth more than a dollar later, because today's dollar can be invested and grow.",
  equation:{ latex:"FV = PV\\,(1+r)^{n} \\qquad PV = \\frac{FV}{(1+r)^{n}}", where:[
    {s:"FV", d:"future value — what an amount grows to"},
    {s:"PV", d:"present value — what a future amount is worth today"},
    {s:"r", d:"the periodic interest/growth rate"},
    {s:"n", d:"the number of periods"} ]},
  examples:[
    { title:"Growing a lump sum (future value)", scenario:"You invest $10,000 at 7% for 10 years.",
      given:[{s:"PV",d:"$10,000"},{s:"r",d:"0.07"},{s:"n",d:"10"}],
      steps:["FV = 10000\\,(1.07)^{10} = 10000 \\times 1.9672 = 19{,}672"],
      result:"<b>$19,672</b> — it nearly doubles (the Rule of 72 predicted ~10.3 years to double at 7%).",
      chart:{ type:"line", unit:"$", title:"$10,000 at 7%", xlabel:"years", points:[[0,10000],[2,11449],[4,13108],[6,15007],[8,17182],[10,19672]], marks:[[10,19672]] } },
    { title:"Discounting back (present value)", scenario:"How much must you invest today at 6% to have $50,000 in 20 years?",
      given:[{s:"FV",d:"$50,000"},{s:"r",d:"0.06"},{s:"n",d:"20"}],
      steps:["PV = \\frac{50000}{(1.06)^{20}} = \\frac{50000}{3.207} = 15{,}590"],
      result:"<b>$15,590 today</b> grows to $50,000 in 20 years — the power of compounding in reverse." } ],
  graphic:"compound-growth" },

"npv-irr":{
  expand:"NPV (Net Present Value) and IRR (Internal Rate of Return) — tools to judge whether an investment's future cash is worth its cost today.",
  equation:{ latex:"NPV = \\sum_{t=0}^{n} \\frac{CF_t}{(1+r)^{t}}", where:[
    {s:"NPV", d:"net present value — accept the project if this is positive"},
    {s:"CF_t", d:"the cash flow in period t (the initial cost is a negative CF at t = 0)"},
    {s:"r", d:"the discount rate / required return"},
    {s:"n", d:"the number of periods"} ]},
  examples:[
    { title:"Is the project worth it?", scenario:"Invest $1,000 today; receive $1,200 in 2 years. Your required return is 8%.",
      given:[{s:"CF_0",d:"-$1,000"},{s:"CF_2",d:"+$1,200"},{s:"r",d:"0.08"}],
      steps:["NPV = -1000 + \\frac{1200}{(1.08)^{2}}","NPV = -1000 + \\frac{1200}{1.1664} = -1000 + 1028.81 = +28.81"],
      result:"<b>NPV = +$28.81 → accept.</b> The discounted inflow exceeds the cost. (The IRR — the rate making NPV = 0 — is about 9.5%, above the 8% hurdle, which agrees.)",
      chart:{ type:"bars", unit:"$", title:"Discounted value vs. cost", data:[{label:"Cost today",value:1000,color:"#ff9f43"},{label:"PV of the $1,200",value:1028.81,color:"#46d39a"}] } } ] },

"holding-period-return":{
  expand:"HPR — your total return over the time you held an investment, including any income.",
  equation:{ latex:"HPR = \\frac{(P_1 - P_0) + D}{P_0}", where:[
    {s:"HPR", d:"holding period return"},
    {s:"P_0", d:"the price you paid (beginning value)"},
    {s:"P_1", d:"the price you sold for (ending value)"},
    {s:"D", d:"income received while holding (dividends/interest)"} ]},
  examples:[
    { title:"Stock plus a dividend", scenario:"You buy a stock at $50, sell it at $56, and collected $2 in dividends along the way.",
      given:[{s:"P_0",d:"$50"},{s:"P_1",d:"$56"},{s:"D",d:"$2"}],
      steps:["HPR = \\frac{(56 - 50) + 2}{50} = \\frac{8}{50} = 0.16"],
      result:"<b>HPR = 16%</b> — and note that $2 of dividend lifted it from a 12% price gain to a 16% total return.",
      chart:{ type:"stack", unit:"$", title:"Where the $8 gain came from", segments:[{label:"capital gain",value:6,color:"#5b9dff"},{label:"dividend",value:2,color:"#46d39a"}] } } ] },

"sales-charge":{
  expand:"POP (Public Offering Price) — the price you pay for a load mutual fund: its NAV plus the sales charge.",
  equation:{ latex:"POP = \\frac{NAV}{1 - SC} \\qquad SC\\% = \\frac{POP - NAV}{POP}", where:[
    {s:"POP", d:"public offering price — what you actually pay per share"},
    {s:"NAV", d:"net asset value — the fund's per-share worth"},
    {s:"SC", d:"the sales charge (load), as a decimal of the POP"} ]},
  examples:[
    { title:"Finding the offering price", scenario:"A fund has a NAV of $9.40 and a 6% sales charge.",
      given:[{s:"NAV",d:"$9.40"},{s:"SC",d:"0.06"}],
      steps:["POP = \\frac{9.40}{1 - 0.06} = \\frac{9.40}{0.94} = 10.00"],
      result:"<b>POP = $10.00.</b> The $0.60 difference is the sales charge — note it is 6% of the $10 POP, not of the $9.40 NAV.",
      chart:{ type:"stack", unit:"$", title:"What you pay ($10 POP)", segments:[{label:"NAV (your investment)",value:9.40,color:"#5b9dff"},{label:"sales charge",value:0.60,color:"#ff9f43"}] } } ] },

"real-nominal-return":{
  equation:{ latex:"r_{real} \\approx r_{nom} - i \\qquad 1+r_{real} = \\frac{1+r_{nom}}{1+i}", where:[
    {s:"r_{real}", d:"the real return — your true gain in buying power"},
    {s:"r_{nom}", d:"the nominal (stated) return"},
    {s:"i", d:"the inflation rate"} ]},
  examples:[
    { title:"Inflation eats your return", scenario:"Your portfolio returns 6% in a year when inflation is 4%.",
      given:[{s:"r_{nom}",d:"6%"},{s:"i",d:"4%"}],
      steps:["\\text{quick: } 6\\% - 4\\% = 2\\%","\\text{precise: } \\frac{1.06}{1.04} - 1 = 1.92\\%"],
      result:"<b>Real return ≈ 1.9%.</b> Nominally you made 6%, but your actual buying power grew under 2%.",
      chart:{ type:"bars", unit:"%", title:"Nominal vs. real", data:[{label:"Nominal return",value:6,color:"#5b9dff"},{label:"Real (after 4% inflation)",value:1.92,color:"#46d39a"}] } } ] },

"margin":{
  equation:{ latex:"Equity = MV - Debit \\qquad Maint = 0.25 \\times MV", where:[
    {s:"MV", d:"current market value of the securities"},
    {s:"Debit", d:"the loan from the broker (fixed in dollars)"},
    {s:"Equity", d:"your own stake = market value minus the loan"},
    {s:"Maint", d:"FINRA maintenance requirement = 25% of market value (long)"} ]},
  examples:[
    { title:"Does a margin call hit?", scenario:"You bought $10,000 of stock with Reg T 50% (you put in $5,000, borrowed $5,000). The stock falls so market value is now $6,000.",
      given:[{s:"MV",d:"$6,000"},{s:"Debit",d:"$5,000"}],
      steps:["Equity = 6000 - 5000 = 1000","Maint = 0.25 \\times 6000 = 1500","Call = 1500 - 1000 = 500"],
      result:"<b>Margin call for $500.</b> Equity ($1,000) fell below the $1,500 maintenance requirement.",
      chart:{ type:"stack", unit:"$", title:"The $6,000 position", segments:[{label:"broker loan (debit)",value:5000,color:"#ff6b6b"},{label:"your equity",value:1000,color:"#5b9dff"}] } } ],
  graphic:"margin-call" },

"beta":{
  equation:{ latex:"\\beta_i = \\frac{Cov(R_i, R_m)}{Var(R_m)} \\qquad \\beta_p = \\sum w_i\\,\\beta_i", where:[
    {s:"\\beta_i", d:"the security's beta (1 = moves with the market)"},
    {s:"Cov(R_i,R_m)", d:"how the security and market move together"},
    {s:"Var(R_m)", d:"the market's own variance"},
    {s:"\\beta_p", d:"portfolio beta — the weighted average of the parts"},
    {s:"w_i", d:"each holding's weight in the portfolio"} ]},
  examples:[
    { title:"Blending a portfolio's beta", scenario:"Half your money is in a β = 1.4 growth stock and half in a β = 0.6 utility.",
      given:[{s:"w_1",d:"0.5, β = 1.4"},{s:"w_2",d:"0.5, β = 0.6"}],
      steps:["\\beta_p = 0.5(1.4) + 0.5(0.6) = 0.7 + 0.3 = 1.0"],
      result:"<b>Portfolio beta = 1.0</b> — it now moves roughly in line with the market.",
      chart:{ type:"bars", title:"Beta", data:[{label:"Growth stock",value:1.4,color:"#ff9f43"},{label:"Utility",value:0.6,color:"#5b9dff"},{label:"Blended portfolio",value:1.0,color:"#46d39a"}] } } ],
  graphic:"capm-sml" }

});
</script>
<script>
/* ====================  ACRONYM SWEEP: spell out every bare acronym  ==================== */
enh({
"able-account":{ expand:"ABLE — Achieving a Better Life Experience Act: a tax-free savings account for people with disabilities." },
"amt-adjustment":{ expand:"AMT — Alternative Minimum Tax. The 'adjustment' is the yearly difference between fast (regular) and slow (AMT) depreciation." },
"amt-preference-item":{ expand:"AMT — Alternative Minimum Tax: a second, parallel tax calculation you compare against your regular tax." },
"capital-market-line":{ expand:"CML — Capital Market Line (uses total risk); SML — Security Market Line (uses beta)." },
"cmo":{ expand:"CMO — Collateralized Mortgage Obligation: a mortgage bond sliced into risk layers called tranches." },
"compliance-program":{ expand:"CCO — Chief Compliance Officer, the person every registered adviser must designate." },
"coverdell":{ expand:"ESA — Education Savings Account (the 'Coverdell' is named after the senator who sponsored it)." },
"ebitda":{ expand:"EBIT — Earnings Before Interest and Taxes; EBITDA additionally adds back Depreciation and Amortization." },
"erisa":{ expand:"ERISA — Employee Retirement Income Security Act of 1974, the federal law protecting private retirement plans." },
"erisa-vesting":{ expand:"ERISA — Employee Retirement Income Security Act. QDIA — Qualified Default Investment Alternative." },
"fdic":{ expand:"FDIC — Federal Deposit Insurance Corporation (banks); SIPC — Securities Investor Protection Corporation (brokerages)." },
"finra-sro":{ expand:"FINRA — Financial Industry Regulatory Authority; SRO — Self-Regulatory Organization." },
"form-adv":{ expand:"ADV — the Uniform Application for Investment Adviser Registration filed with regulators." },
"form-crs":{ expand:"CRS — Client (Customer) Relationship Summary, a short plain-English disclosure for retail clients." },
"gnp":{ expand:"GNP — Gross National Product (by a nation's residents); GDP — Gross Domestic Product (within its borders)." },
"go-revenue-bond":{ expand:"GO — General Obligation bond, backed by the issuer's full taxing power." },
"ia-net-worth":{ expand:"IA — Investment Adviser (the firm)." },
"iar-ce":{ expand:"IAR — Investment Adviser Representative; CE — Continuing Education." },
"leveraged-etf":{ expand:"ETF — Exchange-Traded Fund. Leveraged/inverse versions multiply or reverse an index's daily move." },
"macd":{ expand:"MACD — Moving Average Convergence Divergence, a momentum indicator." },
"macrs":{ expand:"MACRS — Modified Accelerated Cost Recovery System, the fast depreciation method used for regular taxes." },
"non-amt-munis":{ expand:"AMT — Alternative Minimum Tax; munis — municipal bonds. These are free of both regular tax and AMT." },
"qdro":{ expand:"QDRO — Qualified Domestic Relations Order, used to split retirement assets in a divorce." },
"qtip-trust":{ expand:"QTIP — Qualified Terminable Interest Property trust." },
"roth-ira":{ expand:"IRA — Individual Retirement Account; the Roth version is funded with after-tax dollars." },
"rule-144a":{ expand:"QIB — Qualified Institutional Buyer, an institution managing $100M+ in securities." },
"savings-bonds":{ expand:"Series EE and Series I — nonmarketable U.S. Treasury savings bonds sold to individuals." },
"secure-act":{ expand:"SECURE — Setting Every Community Up for Retirement Enhancement Act." },
"sep-ira":{ expand:"SEP — Simplified Employee Pension; SIMPLE — Savings Incentive Match Plan for Employees." },
"strips":{ expand:"STRIPS — Separate Trading of Registered Interest and Principal of Securities (zero-coupon Treasuries)." },
"tod-pod":{ expand:"TOD — Transfer on Death (securities); POD — Pay on Death (bank accounts)." },
"traditional-ira":{ expand:"IRA — Individual Retirement Account (the traditional version uses pre-tax dollars)." },
"u4-u5":{ expand:"Form U4 registers a rep; Form U5 reports termination; CRD — Central Registration Depository." },
"ugma-utma":{ expand:"UGMA — Uniform Gifts to Minors Act; UTMA — Uniform Transfers to Minors Act." }
});

/* ====================  TWEAK: memory hooks + exam traps for Wave 1 concepts  ==================== */
enh({
"taxable-equivalent-yield":{ memory:"Tax-free yield on top, (1 &minus; tax rate) on the bottom.", trap:"Use your <b>marginal</b> (top-bracket) rate, not your average rate. And the muni only beats the corporate if its taxable-equivalent yield is <i>higher</i> than what the taxable bond actually pays." },
"capm":{ memory:"Required return = risk-free + beta &times; (market &minus; risk-free).", trap:"CAPM rewards only <b>systematic</b> risk (beta). It gives zero extra return for company-specific risk, because that can be diversified away." },
"sharpe":{ memory:"<b>S</b>harpe uses <b>S</b>tandard deviation (total risk).", trap:"Use Sharpe when the portfolio is the client's <b>entire</b> holdings. If it is just one of several, use Treynor (which uses beta) instead." },
"treynor":{ memory:"Treynor uses beta &mdash; for one piece of a diversified whole.", trap:"The classic mix-up: total risk (&sigma;) &rarr; Sharpe; market risk (&beta;) &rarr; Treynor." },
"duration":{ memory:"Prices move <i>opposite</i> to rates; duration is how big the move is.", trap:"A <b>zero-coupon bond's duration equals its maturity</b> &mdash; the most rate-sensitive bond for its maturity. Longer maturity and lower coupon both raise duration." },
"dividend-discount-model":{ memory:"Next dividend &divide; (r &minus; g).", trap:"Growth <b>g must be less than</b> the required return r, or the value is infinite (invalid). Use <i>next</i> year's dividend, D&#8321;." },
"rule-of-72":{ memory:"72 &divide; rate = years to double.", trap:"Use the whole-number rate (8, not 0.08), and remember it estimates <b>doubling</b>, not tripling." },
"time-value-of-money":{ memory:"Grow forward with (1+r)&#8319;; discount back by dividing by it.", trap:"A dollar today always beats a dollar later. More compounding periods and higher rates both increase future value." },
"npv-irr":{ memory:"NPV &gt; 0 &rarr; accept. IRR &gt; required return &rarr; accept.", trap:"The upfront cost is a <b>negative</b> cash flow at t = 0. Don't forget to discount every future cash flow before subtracting the cost." },
"holding-period-return":{ memory:"(price change + income) &divide; what you paid.", trap:"Include the <b>income</b> (dividends/interest) in the numerator &mdash; leaving it out understates your real return." },
"sales-charge":{ memory:"POP = NAV &divide; (1 &minus; load).", trap:"The sales charge is a percent of the <b>POP</b>, not the NAV. Maximum load is 8.5%, and only if the fund offers breakpoints, rights of accumulation, and reinvestment at NAV." },
"real-nominal-return":{ memory:"Real &asymp; nominal &minus; inflation.", trap:"A high nominal return can hide a tiny &mdash; or negative &mdash; real return once inflation is subtracted." },
"margin":{ memory:"Equity = market value &minus; loan; call if equity falls below 25% of value.", trap:"Reg T <b>initial</b> margin is 50%; FINRA <b>maintenance</b> is 25% long / 30% short. The loan (debit) stays fixed in dollars as the stock moves." },
"beta":{ memory:"Beta 1 = market; &gt;1 = jumpier; &lt;1 = calmer. Portfolio beta is a weighted average.", trap:"Beta measures only <b>systematic</b> (market) risk, not total risk. A high-beta stock isn't 'bad' &mdash; just more market-sensitive." }
});
</script>
<script>
/* ====================  ENHANCEMENT WAVE 2: QUANTITATIVE (bonds, ratios, options, tax)  ==================== */
enh({

"current-yield":{
  equation:{ latex:"CY = \\frac{C}{P}", where:[
    {s:"CY", d:"current yield — the income return at today's price"},
    {s:"C", d:"the annual coupon in dollars (coupon rate &times; par)"},
    {s:"P", d:"the bond's current market price"} ]},
  examples:[
    { title:"A premium bond", scenario:"A bond pays a 6% coupon ($60/year on $1,000 par) and currently trades at $1,200.",
      given:[{s:"C",d:"$60"},{s:"P",d:"$1,200"}],
      steps:["CY = \\frac{60}{1200} = 0.05 = 5.0\\%"],
      result:"<b>Current yield = 5.0%</b> — below the 6% coupon, because you paid a premium.",
      chart:{ type:"bars", unit:"%", title:"Premium: current yield dips below coupon", data:[{label:"Coupon (nominal)",value:6,color:"#ffcf5c"},{label:"Current yield",value:5,color:"#5b9dff"}] } },
    { title:"The same bond at a discount", scenario:"Now the bond trades at $800.",
      given:[{s:"P",d:"$800"}],
      steps:["CY = \\frac{60}{800} = 0.075 = 7.5\\%"],
      result:"<b>Current yield = 7.5%</b> — above the coupon, because you paid a discount." } ],
  memory:"Current yield = coupon dollars &divide; today's price.",
  trap:"Current yield ignores the gain or loss back to par at maturity &mdash; that is what YTM captures. Premium &rarr; CY below coupon; discount &rarr; CY above coupon." },

"yield-hierarchy":{
  equation:{ latex:"\\text{Premium: } NY > CY > YTM > YTC", where:[
    {s:"NY", d:"nominal yield (the fixed coupon rate)"},
    {s:"CY", d:"current yield (coupon &divide; price)"},
    {s:"YTM", d:"yield to maturity (total return if held to maturity)"},
    {s:"YTC", d:"yield to call (total return if called early)"} ]},
  examples:[
    { title:"Order the yields for a discount bond", scenario:"A bond bought below par will gain value up to par at maturity, which lifts its total-return measures above its coupon.",
      steps:["\\text{Discount: } NY < CY < YTM < YTC"],
      result:"For a <b>discount</b> bond the order flips: Coupon &lt; Current &lt; YTM &lt; YTC. At par, all four are equal." } ],
  memory:"&lsquo;Premium puts you DOWN to par&rsquo; &mdash; the yields descend (Coupon highest).",
  trap:"Very easy to flip under time pressure. Lock it in: premium &rarr; Coupon is HIGHEST; discount &rarr; Coupon is LOWEST." },

"convertible-bond":{
  equation:{ latex:"CR = \\frac{Par}{CP} \\qquad CV = CR \\times P_{stock}", where:[
    {s:"CR", d:"conversion ratio — shares you get per bond"},
    {s:"Par", d:"the bond's par value (usually $1,000)"},
    {s:"CP", d:"the conversion price set in the bond's terms"},
    {s:"CV", d:"conversion value — what the shares are worth if you convert now"},
    {s:"P_{stock}", d:"the current stock price"} ]},
  examples:[
    { title:"Shares per bond, and is it worth converting?", scenario:"A $1,000 bond is convertible at $50. The stock now trades at $60.",
      given:[{s:"Par",d:"$1,000"},{s:"CP",d:"$50"},{s:"P_{stock}",d:"$60"}],
      steps:["CR = \\frac{1000}{50} = 20 \\text{ shares}","CV = 20 \\times 60 = 1200"],
      result:"Each bond converts to <b>20 shares worth $1,200</b>. If the bond trades below $1,200, converting (or arbitraging) is attractive.",
      chart:{ type:"bars", unit:"$", title:"Convert vs. hold", data:[{label:"Conversion value",value:1200,color:"#46d39a"},{label:"Bond at par",value:1000,color:"#5b9dff"}] } } ],
  memory:"Ratio = par &divide; conversion price; value = ratio &times; stock price.",
  trap:"Compare conversion value to the bond's market price to decide. Convertibles <b>yield less</b> than comparable straight bonds &mdash; you pay for the equity upside." },

"financial-ratios":{
  equation:{ latex:"\\text{Current} = \\frac{CA}{CL} \\quad \\text{Quick} = \\frac{CA - Inv}{CL} \\quad ROE = \\frac{NI}{E}", where:[
    {s:"CA", d:"current assets (cash, receivables, inventory)"},
    {s:"CL", d:"current liabilities (bills due within a year)"},
    {s:"Inv", d:"inventory (removed in the stricter quick ratio)"},
    {s:"NI", d:"net income"},
    {s:"E", d:"shareholders' equity"} ]},
  examples:[
    { title:"Liquidity check", scenario:"A firm has $200,000 current assets (of which $60,000 is inventory) and $100,000 current liabilities.",
      given:[{s:"CA",d:"$200,000"},{s:"Inv",d:"$60,000"},{s:"CL",d:"$100,000"}],
      steps:["\\text{Current} = \\frac{200000}{100000} = 2.0","\\text{Quick} = \\frac{200000 - 60000}{100000} = 1.4"],
      result:"<b>Current ratio 2.0 (strong), quick ratio 1.4 (healthy).</b> It can cover short-term bills even without selling inventory.",
      chart:{ type:"bars", title:"Liquidity ratios", data:[{label:"Current ratio",value:2.0,color:"#46d39a"},{label:"Quick ratio",value:1.4,color:"#5b9dff"}] } },
    { title:"Profitability (ROE)", scenario:"Net income is $50,000 on shareholders' equity of $250,000.",
      steps:["ROE = \\frac{50000}{250000} = 0.20 = 20\\%"],
      result:"<b>ROE = 20%</b> — the company earns 20 cents of profit per dollar of equity." } ],
  memory:"Liquidity = assets &divide; what's due soon; ROE = profit &divide; what owners put in.",
  trap:"The <b>quick</b> ratio removes inventory (slowest to turn into cash). Current ratio &ge; 1 is adequate, &ge; 2 strong." },

"eps":{
  equation:{ latex:"EPS = \\frac{NI - PD}{S}", where:[
    {s:"EPS", d:"earnings per (common) share"},
    {s:"NI", d:"net income"},
    {s:"PD", d:"preferred dividends (paid before common)"},
    {s:"S", d:"weighted-average common shares outstanding"} ]},
  examples:[
    { title:"Earnings behind each share", scenario:"Net income is $10,000,000, preferred dividends are $1,000,000, and there are 4,000,000 common shares.",
      given:[{s:"NI",d:"$10,000,000"},{s:"PD",d:"$1,000,000"},{s:"S",d:"4,000,000"}],
      steps:["EPS = \\frac{10{,}000{,}000 - 1{,}000{,}000}{4{,}000{,}000} = \\frac{9{,}000{,}000}{4{,}000{,}000} = 2.25"],
      result:"<b>EPS = $2.25.</b> This is the figure the P/E ratio divides into the share price." } ],
  memory:"Take out preferred dividends first, then divide by common shares.",
  trap:"Always subtract <b>preferred</b> dividends from net income. <b>Diluted</b> EPS (assuming options/convertibles convert) is always &le; basic EPS." },

"valuation-ratios":{
  equation:{ latex:"P/E = \\frac{Price}{EPS} \\qquad PEG = \\frac{P/E}{g}", where:[
    {s:"P/E", d:"price-to-earnings — price paid per dollar of earnings"},
    {s:"Price", d:"the current share price"},
    {s:"EPS", d:"earnings per share"},
    {s:"g", d:"the earnings growth rate (in percent)"} ]},
  examples:[
    { title:"Is a high P/E expensive?", scenario:"A stock trades at $50 with EPS of $2.50 and is growing earnings 25% a year.",
      given:[{s:"Price",d:"$50"},{s:"EPS",d:"$2.50"},{s:"g",d:"25"}],
      steps:["P/E = \\frac{50}{2.50} = 20","PEG = \\frac{20}{25} = 0.8"],
      result:"<b>P/E = 20, PEG = 0.8.</b> A PEG below 1 suggests the 20&times; multiple is reasonable given fast growth." } ],
  memory:"P/E = price per $1 of earnings; PEG divides that by growth.",
  trap:"A high P/E is not automatically &lsquo;expensive&rsquo; if growth is high &mdash; that's what PEG adjusts for. PEG &lt; 1 may signal undervaluation." },

"cost-of-capital":{
  equation:{ latex:"WACC = w_d\\,r_d\\,(1-t) + w_e\\,r_e", where:[
    {s:"WACC", d:"weighted-average cost of capital (the hurdle rate)"},
    {s:"w_d, w_e", d:"the weights of debt and equity in the capital structure"},
    {s:"r_d", d:"the pre-tax cost of debt (interest rate)"},
    {s:"t", d:"the tax rate (interest is tax-deductible, so debt is cheaper after tax)"},
    {s:"r_e", d:"the cost of equity (often from CAPM)"} ]},
  examples:[
    { title:"Blending debt and equity", scenario:"A firm is 40% debt (6% interest), 60% equity (10% required), with a 25% tax rate.",
      given:[{s:"w_d",d:"0.40"},{s:"r_d",d:"6%"},{s:"t",d:"0.25"},{s:"w_e",d:"0.60"},{s:"r_e",d:"10%"}],
      steps:["WACC = 0.40\\times 6\\%\\times(1-0.25) + 0.60\\times 10\\%","WACC = 1.8\\% + 6.0\\% = 7.8\\%"],
      result:"<b>WACC = 7.8%.</b> A project must earn more than 7.8% to add value.",
      chart:{ type:"stack", unit:"%", title:"What makes up the 7.8%", segments:[{label:"after-tax debt",value:1.8,color:"#5b9dff"},{label:"equity",value:6.0,color:"#8b7cff"}] } } ],
  memory:"Weight the after-tax cost of debt and the cost of equity, then add.",
  trap:"Debt is multiplied by (1 &minus; tax rate) because interest is deductible &mdash; forgetting this overstates WACC. The result is the minimum acceptable return." },

"nav":{
  equation:{ latex:"NAV = \\frac{Assets - Liabilities}{Shares}", where:[
    {s:"NAV", d:"net asset value per share"},
    {s:"Assets", d:"total market value of everything the fund owns"},
    {s:"Liabilities", d:"what the fund owes"},
    {s:"Shares", d:"shares outstanding"} ]},
  examples:[
    { title:"A fund's per-share value", scenario:"A fund holds $50,000,000 in assets, owes $2,000,000, and has 4,000,000 shares.",
      given:[{s:"Assets",d:"$50,000,000"},{s:"Liabilities",d:"$2,000,000"},{s:"Shares",d:"4,000,000"}],
      steps:["NAV = \\frac{50{,}000{,}000 - 2{,}000{,}000}{4{,}000{,}000} = \\frac{48{,}000{,}000}{4{,}000{,}000} = 12.00"],
      result:"<b>NAV = $12.00 per share.</b>" } ],
  memory:"What the fund owns minus owes, per share.",
  trap:"Mutual funds price NAV <b>once daily</b> (forward pricing). For a load fund the price you pay is POP = NAV &divide; (1 &minus; load)." },

"correlation":{
  equation:{ latex:"\\rho_{XY} = \\frac{Cov(X,Y)}{\\sigma_X\\,\\sigma_Y}, \\quad -1 \\le \\rho \\le +1", where:[
    {s:"\\rho_{XY}", d:"the correlation coefficient between assets X and Y"},
    {s:"Cov(X,Y)", d:"how the two assets move together"},
    {s:"\\sigma_X, \\sigma_Y", d:"each asset's standard deviation"} ]},
  examples:[
    { title:"Why low correlation is the goal", scenario:"Compare combining two assets at different correlations.",
      steps:["\\rho = +1 \\Rightarrow \\text{no diversification benefit}","\\rho = -1 \\Rightarrow \\text{maximum benefit (risks can fully offset)}"],
      result:"Any &rho; below +1 reduces portfolio risk; the lower it goes, the bigger the benefit. Use the correlation slider in the graphic to feel it." } ],
  graphic:"diversification",
  memory:"Correlation runs &minus;1 to +1; the lower, the better for diversifying.",
  trap:"&rho; = 0 means no <i>linear</i> relationship, not &lsquo;no relationship.&rsquo; Diversification helps whenever &rho; &lt; +1, and is maximized at &minus;1." },

"standard-deviation":{
  equation:{ latex:"\\sigma = \\sqrt{Var}, \\quad \\text{68% within } \\pm 1\\sigma", where:[
    {s:"\\sigma", d:"standard deviation — total volatility, in the same units as returns"},
    {s:"Var", d:"variance — the average squared deviation from the mean"} ]},
  examples:[
    { title:"Turning σ into a range of outcomes", scenario:"A fund averages an 8% return with a standard deviation of 12%.",
      given:[{s:"mean",d:"8%"},{s:"\\sigma",d:"12%"}],
      steps:["\\pm 1\\sigma: \\; 8\\% \\pm 12\\% \\Rightarrow (-4\\%,\\, +20\\%)"],
      result:"About <b>68% of years</b> should land between &minus;4% and +20%; about 95% within &plusmn;2&sigma; (&minus;16% to +32%)." } ],
  graphic:"normal-distribution",
  memory:"Standard deviation = total volatility; &plusmn;1&sigma; &asymp; 68% of outcomes.",
  trap:"Standard deviation is <b>total</b> risk (used in Sharpe). Beta is only <b>market</b> risk (used in Treynor). Don't swap them." },

"diversification":{
  equation:{ latex:"\\sigma_p^2 = w_1^2\\sigma_1^2 + w_2^2\\sigma_2^2 + 2\\,w_1 w_2\\,\\sigma_1\\sigma_2\\,\\rho", where:[
    {s:"\\sigma_p^2", d:"the portfolio's variance (risk, squared)"},
    {s:"w_1, w_2", d:"the weights of each asset"},
    {s:"\\sigma_1, \\sigma_2", d:"each asset's standard deviation"},
    {s:"\\rho", d:"the correlation between them — the lever that lowers risk"} ]},
  examples:[
    { title:"The covariance term is the free lunch", scenario:"When &rho; is below 1, the last term shrinks, pulling portfolio risk BELOW the weighted average of the two risks.",
      steps:["\\text{if } \\rho = 1: \\; \\sigma_p = w_1\\sigma_1 + w_2\\sigma_2 \\text{ (no benefit)}","\\text{if } \\rho < 1: \\; \\sigma_p < w_1\\sigma_1 + w_2\\sigma_2"],
      result:"That gap below the straight-line average <b>is</b> diversification. Slide the correlation in the graphic to watch the curve bow." } ],
  graphic:"diversification",
  memory:"Lower correlation shrinks the covariance term &mdash; that's the free lunch.",
  trap:"Diversification erases only <b>non-systematic</b> (company-specific) risk. <b>Systematic</b> (market) risk stays no matter how many names you add." },

"sortino":{
  equation:{ latex:"Sortino = \\frac{R_p - R_f}{\\sigma_d}", where:[
    {s:"R_p - R_f", d:"the portfolio's excess return over the risk-free rate"},
    {s:"\\sigma_d", d:"downside deviation — volatility of NEGATIVE returns only"} ]},
  examples:[
    { title:"Penalizing only the bad volatility", scenario:"A portfolio earns 12%, the risk-free rate is 3%, and its downside deviation is 9%.",
      given:[{s:"R_p",d:"12%"},{s:"R_f",d:"3%"},{s:"\\sigma_d",d:"9%"}],
      steps:["Sortino = \\frac{12 - 3}{9} = 1.0"],
      result:"<b>Sortino = 1.0.</b> It rewards return per unit of <i>harmful</i> volatility, ignoring upside swings." } ],
  memory:"Sortino = Sharpe, but only DOWNSIDE risk in the denominator.",
  trap:"Use Sortino when investors care only about losses. Because it ignores upside volatility, it is usually <i>higher</i> than the Sharpe ratio." },

"information-ratio":{
  equation:{ latex:"IR = \\frac{R_p - R_b}{TE}", where:[
    {s:"R_p", d:"the portfolio's return"},
    {s:"R_b", d:"the benchmark's return"},
    {s:"R_p - R_b", d:"the active return (how much you beat the benchmark)"},
    {s:"TE", d:"tracking error — the volatility of that active return"} ]},
  examples:[
    { title:"Consistency of beating the benchmark", scenario:"A manager returns 11% vs a 9% benchmark, with a tracking error of 4%.",
      given:[{s:"R_p",d:"11%"},{s:"R_b",d:"9%"},{s:"TE",d:"4%"}],
      steps:["IR = \\frac{11 - 9}{4} = 0.5"],
      result:"<b>Information ratio = 0.5.</b> Higher means more reliable, repeatable outperformance for the risk taken vs the benchmark." } ],
  memory:"Active return &divide; tracking error = how consistently you beat the benchmark.",
  trap:"The information ratio measures excess return over a <b>benchmark</b> &mdash; not over the risk-free rate (that's Sharpe)." },

"rmd":{
  equation:{ latex:"RMD = \\frac{B_{prior}}{F_{life}}", where:[
    {s:"RMD", d:"required minimum distribution for the year"},
    {s:"B_{prior}", d:"the account balance on December 31 of the prior year"},
    {s:"F_{life}", d:"the IRS Uniform Lifetime Table factor for your age"} ]},
  examples:[
    { title:"First RMD at 73", scenario:"An IRA was worth $500,000 at last year-end. The age-73 life-expectancy factor is about 26.5.",
      given:[{s:"B_{prior}",d:"$500,000"},{s:"F_{life}",d:"26.5"}],
      steps:["RMD = \\frac{500{,}000}{26.5} = 18{,}868"],
      result:"<b>RMD ≈ $18,868</b> must be withdrawn (and taxed as ordinary income) this year." } ],
  memory:"Last year's ending balance &divide; your IRS life-expectancy factor.",
  trap:"RMDs begin at <b>73</b> (SECURE 2.0). <b>Roth IRAs have no lifetime RMD.</b> Missing one is a 25% penalty (10% if corrected promptly)." },

"gift-estate-tax":{
  equation:{ latex:"\\text{529 front-load} = 5 \\times \\text{annual exclusion}", where:[
    {s:"\\text{annual exclusion}", d:"the amount you may gift each recipient each year gift-tax-free ($19,000 in 2025)"} ]},
  examples:[
    { title:"Tax-free giving, and supercharging a 529", scenario:"In 2025 the annual exclusion is $19,000 per recipient. A married couple can split gifts.",
      given:[{s:"\\text{exclusion}",d:"$19,000"}],
      steps:["\\text{couple, per recipient} = 2 \\times 19{,}000 = 38{,}000","\\text{529 front-load (single)} = 5 \\times 19{,}000 = 95{,}000"],
      result:"A couple can give <b>$38,000</b> per person per year tax-free, or front-load a 529 with <b>$95,000</b> ($190,000 jointly) at once.",
      chart:{ type:"bars", unit:"$", title:"Gift-tax-free amounts (2025)", data:[{label:"Single, annual",value:19000,color:"#5b9dff"},{label:"Couple, annual",value:38000,color:"#46d39a"},{label:"529 front-load (single)",value:95000,color:"#8b7cff"}] } } ],
  memory:"Annual exclusion is per RECIPIENT per year; 5&times; it to front-load a 529.",
  trap:"Gifts above the exclusion don't trigger tax immediately &mdash; they draw down your large <b>lifetime exemption</b>. Tax is only due once that's exhausted." },

"niit":{
  equation:{ latex:"NIIT = 3.8\\% \\times \\min\\big(NII,\\; MAGI - T\\big)", where:[
    {s:"NII", d:"net investment income (interest, dividends, capital gains)"},
    {s:"MAGI", d:"modified adjusted gross income"},
    {s:"T", d:"the threshold ($200k single, $250k married filing jointly)"} ]},
  examples:[
    { title:"The surtax on a high earner", scenario:"A single filer has MAGI of $250,000 (threshold $200,000) and $40,000 of net investment income.",
      given:[{s:"MAGI",d:"$250,000"},{s:"T",d:"$200,000"},{s:"NII",d:"$40,000"}],
      steps:["\\min(40{,}000,\\; 250{,}000 - 200{,}000) = \\min(40{,}000, 50{,}000) = 40{,}000","NIIT = 0.038 \\times 40{,}000 = 1{,}520"],
      result:"<b>NIIT = $1,520</b> — an extra 3.8% on top of regular and capital-gains taxes." } ],
  memory:"3.8% on the LESSER of investment income or the amount over the threshold.",
  trap:"Thresholds are $200k single / $250k MFJ. It stacks <b>on top of</b> ordinary and capital-gains rates &mdash; it is not instead of them." },

"capital-gains-netting":{
  equation:{ latex:"\\text{Deduct up to } \\$3{,}000 \\text{ of net loss; carry the rest forward}", where:[
    {s:"\\$3{,}000", d:"the maximum net capital loss usable against ordinary income each year ($1,500 if married filing separately)"} ]},
  examples:[
    { title:"Using a big loss", scenario:"After netting short- and long-term results, you have a net capital loss of $8,000 this year.",
      given:[{s:"\\text{net loss}",d:"$8,000"}],
      steps:["\\text{This year: deduct } \\$3{,}000 \\text{ vs ordinary income}","\\text{Carry forward: } 8{,}000 - 3{,}000 = 5{,}000"],
      result:"You deduct <b>$3,000</b> now and carry the remaining <b>$5,000</b> forward indefinitely to future years.",
      chart:{ type:"stack", unit:"$", title:"$8,000 net loss", segments:[{label:"deduct now",value:3000,color:"#46d39a"},{label:"carry forward",value:5000,color:"#ffcf5c"}] } } ],
  memory:"Net ST and LT; up to $3,000 of leftover loss offsets ordinary income; rest carries forward.",
  trap:"The $3,000 cap is against <b>ordinary</b> income. When harvesting losses, watch the wash-sale rule (no rebuy within 30 days either side)." },

"covered-call":{
  equation:{ latex:"\\text{Max gain} = (Strike - Cost) + Prem \\quad BE = Cost - Prem", where:[
    {s:"Cost", d:"the price you paid for the stock"},
    {s:"Strike", d:"the strike of the call you sold"},
    {s:"Prem", d:"the premium you received for the call"},
    {s:"BE", d:"breakeven stock price"} ]},
  examples:[
    { title:"Income with a capped top", scenario:"You buy stock at $50 and sell a $55 call for $3.",
      given:[{s:"Cost",d:"$50"},{s:"Strike",d:"$55"},{s:"Prem",d:"$3"}],
      steps:["\\text{Max gain} = (55 - 50) + 3 = 8","BE = 50 - 3 = 47","\\text{Max loss} = 47 \\text{ (stock to zero)}"],
      result:"<b>Max gain $8, breakeven $47, max loss $47.</b> The $3 premium cushions the downside but caps your upside at $55." } ],
  memory:"Income now; upside capped at the strike + premium.",
  trap:"A covered call <b>caps upside</b> at the strike. Best when mildly bullish and genuinely willing to sell at the strike." },

"protective-put":{
  equation:{ latex:"\\text{Max loss} = (Cost - Strike) + Prem \\quad BE = Cost + Prem", where:[
    {s:"Cost", d:"the price you paid for the stock"},
    {s:"Strike", d:"the strike of the put you bought (your floor)"},
    {s:"Prem", d:"the premium you paid for the put"},
    {s:"BE", d:"breakeven stock price"} ]},
  examples:[
    { title:"Buying downside insurance", scenario:"You own stock bought at $50 and buy a $48 put for $2.",
      given:[{s:"Cost",d:"$50"},{s:"Strike",d:"$48"},{s:"Prem",d:"$2"}],
      steps:["\\text{Max loss} = (50 - 48) + 2 = 4","BE = 50 + 2 = 52","\\text{Max gain} = \\text{unlimited} - 2"],
      result:"<b>Max loss is just $4, breakeven $52, upside unlimited.</b> The put guarantees you can sell at $48 no matter how far the stock falls." } ],
  memory:"Insurance: caps your loss at the strike, costs you the premium.",
  trap:"Max loss = (cost &minus; strike) + premium; upside stays unlimited (minus the premium paid). Best when you want to hold but fear a near-term drop." }

});
</script>
<script>
/* ====================  ENHANCEMENT WAVE 3: bonds, options, stats, key rules  ==================== */
enh({

"coupon":{
  equation:{ latex:"NY = \\frac{C}{Par}", where:[
    {s:"NY", d:"nominal yield (the coupon rate)"},
    {s:"C", d:"the annual coupon in dollars"},
    {s:"Par", d:"par/face value (usually $1,000)"} ]},
  examples:[
    { title:"Coupon dollars from the rate", scenario:"A bond has a 5% coupon on $1,000 par.",
      given:[{s:"NY",d:"5%"},{s:"Par",d:"$1,000"}],
      steps:["C = 0.05 \\times 1000 = 50 \\text{ per year}"],
      result:"<b>$50 a year</b>, fixed for the life of the bond regardless of its price." } ],
  memory:"Coupon = annual interest as a % of par; fixed at issue.",
  trap:"The coupon never changes &mdash; it's the bond's <b>price</b> that moves so its yield keeps up with the market." },

"bond-price-rate":{
  examples:[
    { title:"Why an old bond loses value", scenario:"You own a 4% bond. New bonds are now issued at 6%. Why does yours fall in price?",
      steps:["\\text{Buyers won't pay full price for 4\\% when they can get 6\\%}","\\text{Your bond's price falls until its yield} \\approx 6\\%"],
      result:"<b>Rates up &rarr; price down.</b> The price drops just enough to make the old 4% coupon yield a competitive 6%.",
      chart:{ type:"numberline", unit:"%", min:0, max:8, marks:[{value:4,label:"old coupon",color:"#ffcf5c"},{value:6,label:"new market",color:"#ff6b6b"}] } } ],
  memory:"Rates up, prices down &mdash; always inverse.",
  trap:"It's the existing bond's <b>price</b> that adjusts so its yield matches new market rates. Longer maturity and lower coupon = bigger price swing." },

"premium-discount":{
  examples:[
    { title:"Which way does it trade?", scenario:"A bond carries a 4% coupon. Compare two markets: rates at 6%, then rates at 2%.",
      steps:["\\text{Market 6\\% > 4\\% coupon} \\Rightarrow \\text{trades at a DISCOUNT (below par)}","\\text{Market 2\\% < 4\\% coupon} \\Rightarrow \\text{trades at a PREMIUM (above par)}"],
      result:"Coupon above market &rarr; <b>premium</b>; coupon below market &rarr; <b>discount</b>." } ],
  memory:"Coupon above market &rarr; premium; below market &rarr; discount.",
  trap:"A premium bond drifts DOWN to par by maturity (a built-in capital loss); a discount bond rises UP to par (a built-in gain)." },

"ytm":{
  examples:[
    { title:"How price shifts YTM", scenario:"Think about whether YTM is above or below the coupon.",
      steps:["\\text{Discount bond: gain to par} \\Rightarrow YTM > \\text{coupon}","\\text{Premium bond: loss to par} \\Rightarrow YTM < \\text{coupon}"],
      result:"<b>Discount &rarr; YTM above coupon; premium &rarr; YTM below coupon.</b> YTM blends the coupon income with the gain or loss to par." } ],
  memory:"YTM = your all-in return if you hold to maturity (coupons + gain/loss to par).",
  trap:"YTM assumes you reinvest coupons at the YTM and hold to maturity. For callable bonds also check yield to call &mdash; report the <b>yield to worst</b>." },

"working-capital":{
  equation:{ latex:"WC = CA - CL", where:[
    {s:"WC", d:"working capital — the short-term cash cushion (a dollar amount)"},
    {s:"CA", d:"current assets (due to become cash within a year)"},
    {s:"CL", d:"current liabilities (bills due within a year)"} ]},
  examples:[
    { title:"The short-term cushion", scenario:"A company has $200,000 of current assets and $120,000 of current liabilities.",
      given:[{s:"CA",d:"$200,000"},{s:"CL",d:"$120,000"}],
      steps:["WC = 200{,}000 - 120{,}000 = 80{,}000"],
      result:"<b>$80,000 of working capital</b> — a positive buffer to cover the next year's obligations." } ],
  memory:"Current assets minus current liabilities = short-term cushion.",
  trap:"Working capital is a dollar amount; the current ratio expresses the same idea as a ratio. Negative working capital is a liquidity warning." },

"dividend-payout":{
  equation:{ latex:"Payout = \\frac{Div}{NI} \\qquad Retention = 1 - Payout", where:[
    {s:"Payout", d:"share of earnings paid out as dividends"},
    {s:"Div", d:"total dividends paid"},
    {s:"NI", d:"net income (or use dividend-per-share &divide; EPS)"} ]},
  examples:[
    { title:"How much is reinvested?", scenario:"A company earns $4.00 per share and pays a $1.00 dividend.",
      given:[{s:"Div",d:"$1.00"},{s:"EPS",d:"$4.00"}],
      steps:["Payout = \\frac{1.00}{4.00} = 25\\%","Retention = 1 - 0.25 = 75\\%"],
      result:"<b>25% paid out, 75% retained</b> for growth — a profile typical of a growth company.",
      chart:{ type:"stack", unit:"%", title:"Use of each $1 of earnings", segments:[{label:"dividend",value:25,color:"#46d39a"},{label:"reinvested",value:75,color:"#5b9dff"}] } } ],
  memory:"Payout = dividends &divide; earnings; the rest is reinvested.",
  trap:"High payout = mature/income stock; low payout = growth. A payout above 100% (paying more than it earns) is unsustainable." },

"total-return":{
  equation:{ latex:"\\text{Total Return} = \\frac{(P_1 - P_0) + Income}{P_0}", where:[
    {s:"P_0", d:"beginning price"},
    {s:"P_1", d:"ending price"},
    {s:"Income", d:"dividends or interest received"} ]},
  examples:[
    { title:"Income rescues a flat price", scenario:"A stock starts and ends the year at $100 but paid $4 in dividends.",
      given:[{s:"P_0",d:"$100"},{s:"P_1",d:"$100"},{s:"Income",d:"$4"}],
      steps:["\\text{Total Return} = \\frac{(100-100) + 4}{100} = 4\\%"],
      result:"<b>4% total return</b> even with zero price change — income counts." } ],
  memory:"Price change PLUS income &mdash; the complete picture.",
  trap:"A flat or even falling price can still be a positive total return once income is added. Never judge performance on price alone." },

"accrued-interest":{
  equation:{ latex:"AI = C \\times \\frac{days}{360}", where:[
    {s:"AI", d:"accrued interest the buyer pays the seller"},
    {s:"C", d:"the annual coupon in dollars"},
    {s:"days", d:"days since the last coupon (30/360 for corp/muni)"} ]},
  examples:[
    { title:"Paying the seller for held interest", scenario:"A corporate bond pays $50/year. It has been 90 days (30/360) since the last coupon.",
