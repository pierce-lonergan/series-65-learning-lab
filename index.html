ensation.<br><strong>C &mdash; Compensation</strong>: any economic benefit, direct or indirect, including fees, commissions, other consideration.<br><br><strong>If any one is missing, person is NOT an IA.</strong>"},{"sec":"IAA","front":"IA exclusions &mdash; LATE-BIPS","back":"<strong>L</strong>awyers, <strong>A</strong>ccountants, <strong>T</strong>eachers, <strong>E</strong>ngineers &mdash; if solely incidental to professional practice; no separate fee; no &quot;holding out&quot;<br><strong>B</strong>anks &amp; bank holding cos &mdash; NOT S&amp;Ls, NOT credit unions, NOT banks advising RICs<br><strong>B</strong>roker-dealers &mdash; if advice solely incidental AND no special compensation. Asset-based / wrap fee = special comp = MUST register<br><strong>I</strong>nsurance company advisers (federal exemption)<br><strong>P</strong>ublishers &mdash; bona fide regular &amp; general circulation; not personalized<br><strong>S</strong>ecurities limited to U.S. government securities"},{"sec":"IAA","front":"IA exclusion traps &mdash; what breaks each?","back":"<ul><li><strong>Lawyer/Acct/Teacher/Engineer</strong> who <em>holds out</em> as a financial adviser, OR charges separate fee for advice &rarr; IS an IA</li><li><strong>BD</strong> charging asset-based / wrap fee for advice &rarr; IS an IA (special comp)</li><li><strong>Newsletter</strong> offering <em>personalized</em> advice based on subscriber circumstances &rarr; IS an IA</li><li><strong>Hotline</strong> tied to specific market conditions w/ buy/sell signals to subscribers may not qualify for publisher exclusion</li></ul>"},{"sec":"IAA","front":"Federal IA exemptions from registration (Sec. 203(b))","back":"Advisers that meet IA definition but are exempt:<ol><li><strong>Intrastate</strong>: clients only in state of biz; no listed sec advice; no PF clients</li><li><strong>Insurance company</strong> adviser only</li><li><strong>Foreign private adviser</strong>: no U.S. place of biz; &lt;15 U.S. clients; &lt;$25M from U.S.</li><li><strong>Charitable orgs</strong></li><li><strong>Private fund adviser</strong>: solely PFs &lt;$150M AUM (ERA &mdash; Exempt Reporting Adviser)</li><li><strong>VC fund adviser</strong>: solely VC funds (any AUM); also ERA</li></ol>"},{"sec":"IAA","front":"Federal vs. State IA registration thresholds (Dodd-Frank)","back":"<ul><li><strong>&lt; $25M AUM</strong>: state(s) only; SEC prohibited</li><li><strong>$25M&ndash;$100M</strong>: state(s) (NOT SEC), unless state doesn't examine OR &ge; 15 states</li><li><strong>&ge; $100M</strong>: SEC eligible</li><li><strong>&ge; $110M</strong>: <strong>MANDATORY</strong> SEC (buffer prevents flipping)</li><li><strong>Drop back to state at &lt; $90M</strong></li></ul>Pension consultants $200M+ &rarr; SEC eligible. New advisers w/ reasonable expectation of $100M within <strong>120 days</strong>."},{"sec":"IAA","front":"Notice filing &mdash; what is it?","back":"Federal-covered adviser must <strong>notice file</strong> with each state in which it has clients (typically by paying a fee + filing copy of Form ADV).<br><br>State CANNOT examine or impose substantive regulation, but retains <strong>anti-fraud jurisdiction</strong>."},{"sec":"IAA","front":"Form ADV &mdash; structure","code":"","back":"<strong>Part 1A</strong>: regulatory info (check-the-box). All registrants.<br><strong>Part 1B</strong>: additional, <strong>state-registered only</strong>.<br><strong>Part 2A &mdash; The Brochure</strong>: narrative plain-English firm-level disclosure (18 mandatory items).<br><strong>Part 2B &mdash; Brochure Supplement</strong>: about each IAR (background, experience, discipline).<br><strong>Part 3 &mdash; Form CRS</strong>: retail investors only; max 2 pages (4 for dual registrants); plain-English summary."},{"sec":"IAA","front":"Brochure delivery &mdash; FEDERAL-covered adviser","back":"Under Rule 204-3:<ul><li>Deliver Part 2A <strong>before or at the time of entering into the advisory contract</strong></li><li><span class=\"hl\"><strong>NO 48-hour rule, NO 5-day right to rescind</strong></span> (those are state-level)</li><li>Annual delivery: within <strong>120 days of fiscal year end</strong></li></ul>"},{"sec":"IAA","front":"Brochure delivery &mdash; STATE-registered adviser","back":"Under NASAA Model Rule 203(b)-1:<ul><li>Deliver Part 2A at least <strong>48 hours before</strong> entering into contract, OR</li><li>Deliver at the time of contract WITH a <strong>5-business-day right to rescind without penalty</strong></li><li>Annual delivery: within <strong>120 days of fiscal year end</strong></li></ul><strong>Memory: &quot;48 / 5&quot;</strong>"},{"sec":"IAA","front":"Brochure delivery exceptions","back":"<strong>No brochure delivery required</strong> for:<ul><li>Registered investment companies (mutual funds, ETFs)</li><li><strong>Impersonal advisory services costing &lt; $500/yr</strong></li></ul>Form ADV <strong>annual updating amendment</strong>: within <strong>90 days</strong> of fiscal year end (don't confuse w/ 120-day brochure delivery)."},{"sec":"IAA","front":"Section 206 &mdash; the IA anti-fraud foundation","back":"<span class=\"hl\"><strong>Applies to ALL advisers &mdash; registered, exempt, AND excluded.</strong></span><ul><li><strong>206(1)</strong>: prohibits any device, scheme, artifice to defraud</li><li><strong>206(2)</strong>: prohibits any transaction/practice operating as fraud or deceit</li><li><strong>206(3)</strong>: principal/agency cross transaction rule (per-trade disclosure + consent)</li><li><strong>206(4)</strong>: empowers SEC to make rules (basis for Custody, Marketing, Pay-to-Play rules)</li></ul>"},{"sec":"IAA","front":"Section 206(3) &mdash; principal vs. agency cross transactions","back":"<strong>Principal transaction</strong> (IA trades from own account with client): requires <strong>per-trade written disclosure AND consent BEFORE completion</strong>.<br><br><strong>Agency cross transaction</strong> (IA acts as broker for both buyer and seller): requires <strong>written prospective consent + per-trade disclosure + annual statement</strong>; CANNOT recommend both sides."},{"sec":"IAA","front":"Custody Rule 206(4)-2 &mdash; what counts as custody?","back":"<strong>Custody</strong> = holding client funds/securities, directly or indirectly, OR having any authority to obtain possession. Includes:<ul><li>Physical possession</li><li>Authority to withdraw funds from client account</li><li>Acting as GP of a limited partnership</li><li>Acting as trustee</li><li><strong>Authority to deduct fees from client account</strong> (deemed custody &mdash; with relief when limited &amp; disclosed)</li></ul>"},{"sec":"IAA","front":"Custody Rule &mdash; required protections","back":"<ol><li><strong>Qualified custodian</strong> (bank, registered BD, FCM, eligible foreign FI)</li><li><strong>Notice to client</strong> when custody account opened (custodian, account info)</li><li>Qualified custodian sends <strong>account statements at least quarterly</strong> directly to clients</li><li><strong>Annual surprise verification</strong> by independent PCAOB-registered accountant (not for fee-deduction-only with limitations)</li><li>Pooled vehicle: alternative compliance via annual audited financials within <strong>120 days</strong> (180 for FoF)</li></ol>"},{"sec":"IAA","front":"Marketing Rule 206(4)-1 &mdash; effective when?","back":"<strong>Compliance date November 4, 2022.</strong> Replaced both prior Advertising Rule and Cash Solicitation Rule.<br><br>&quot;Advertisement&quot; = any direct/indirect communication offering advisory services to prospects, OR new services to current clients. Excludes most one-on-one. <strong>Includes paid testimonials &amp; endorsements.</strong>"},{"sec":"IAA","front":"Marketing Rule &mdash; 7 prohibitions","back":"<ol><li>Untrue statements of material fact or omissions</li><li>Unsubstantiated material statements</li><li>Untrue/misleading implications about adviser</li><li>Discussing benefits without fair &amp; balanced treatment of risks</li><li>References to specific advice not in fair/balanced manner</li><li>Misleading inclusion/exclusion of performance</li><li>Otherwise materially misleading</li></ol>"},{"sec":"IAA","front":"Marketing Rule &mdash; testimonials &amp; endorsements","back":"<strong>Testimonial</strong> = current client; <strong>Endorsement</strong> = non-client. <strong>Permitted</strong> with disclosures clearly &amp; prominently:<ul><li>Whether speaker is a current client</li><li>Whether speaker received compensation</li><li>Material conflicts of interest</li></ul>Compensated promoters need: written agreement + adviser oversight + bad-actor disqualifications.<br><br><strong>De minimis</strong>: no written agreement required if promoter compensated <strong>&le; $1,000 in any 12-mo period</strong>."},{"sec":"IAA","front":"Marketing Rule &mdash; performance presentations","back":"<ul><li><strong>Net of fees</strong> required (gross-only generally prohibited in retail ads)</li><li>Standardized <strong>1-, 5-, 10-year</strong> (or since-inception) periods required</li><li>Hypothetical performance only to specific intended audiences (not broadly disseminated)</li><li>Extracted performance must be presented with full portfolio performance</li></ul>"},{"sec":"IAA","front":"Performance-based fees &mdash; Rule 205-3 &amp; Qualified Client","back":"General prohibition (Sec. 205(a)(1)). Exception for <strong>Qualified Clients</strong>:<ul><li>&ge; <strong>$1.1M AUM</strong> with the adviser, OR</li><li>Net worth (excl primary residence) &gt; <strong>$2.2M</strong>, OR</li><li>Qualified Purchaser ($5M ind / $25M institution), OR</li><li>Knowledgeable employee of the adviser</li></ul>Last adjusted Aug 2021; next adjustment ~2026."},{"sec":"IAA","front":"Books &amp; Records Rule 204-2","back":"Required: journals, ledgers, order memoranda, confirmations, statements, trial balances, communications, client agreements, brochures, Form CRS, advertisements, personal sec transaction records, suitability docs, performance work papers.<br><br><strong>Retention: 5 years</strong> from end of fiscal year of last entry; <strong>first 2 years easily accessible</strong> at principal office.<br>Partnership records: 3 yrs after dissolution.<br>Electronic records permitted (non-rewritable, non-erasable, indexed, redundant)."},{"sec":"IAA","front":"Code of Ethics Rule 204A-1 &mdash; required elements","back":"<ol><li>Standards of business conduct reflecting fiduciary duty</li><li>Compliance w/ federal sec laws</li><li><strong>Personal sec transaction reporting by access persons</strong>: Initial holdings within 10 days (current within 45); Annual holdings (current within 45); Quarterly transactions within 30 days of qtr end</li><li>Pre-clearance for IPOs &amp; limited offerings</li><li>Reporting violations</li><li>Acknowledgment of receipt</li></ol>"},{"sec":"IAA","front":"Reportable securities &mdash; what is EXCLUDED?","back":"Excluded from access-person reporting:<ul><li>Direct U.S. government obligations</li><li>Money market instruments (CDs, BAs, commercial paper, high-quality short-term debt)</li><li>Money market funds</li><li>Open-end mutual funds (unless the IA is the adviser)</li><li>UITs invested exclusively in unaffiliated mutual funds</li></ul>"},{"sec":"IAA","front":"Privacy &mdash; Regulation S-P","back":"<ul><li><strong>Initial privacy notice</strong> at customer relationship inception</li><li><strong>Annual privacy notice</strong> (waivable in some cases if no changes &amp; limited sharing)</li><li><strong>Opt-out right</strong> before sharing nonpublic personal info with <strong>non-affiliated</strong> third parties (exceptions for service providers, joint marketing, legally required)</li><li><strong>Safeguards Rule</strong> &mdash; written info security program</li><li><strong>Disposal Rule</strong> &mdash; proper disposal of consumer report info</li></ul>"},{"sec":"IAA","front":"Pay-to-Play Rule 206(4)-5","back":"Prevents IAs from receiving advisory comp from a government entity for <strong>2 years</strong> after a &quot;covered associate&quot; makes a political contribution to an elected official who can influence selection.<br><br><strong>Covered associates</strong>: GPs, managing members, executive officers, employees who solicit gov't clients, and PACs they control.<br><br><strong>De minimis (natural persons only)</strong>:<ul><li><strong>$350</strong> per official, per election &mdash; if eligible to vote</li><li><strong>$150</strong> per official, per election &mdash; if NOT eligible to vote</li></ul>"},{"sec":"IAA","front":"Investment Counsel designation (Sec. 208(c))","back":"An IA can use the title <strong>&quot;investment counsel&quot;</strong> only if BOTH:<ol><li><strong>Principal business</strong> is acting as an investment adviser, AND</li><li>A <strong>substantial part</strong> of business consists of providing <strong>investment supervisory services</strong> (continuous and regular supervisory or management services)</li></ol>Frequently tested narrow point."},{"sec":"IAA","front":"Compliance Programs Rule 206(4)-7","back":"Each registered IA must:<ul><li>Adopt &amp; implement <strong>written policies and procedures</strong> reasonably designed to prevent violations</li><li>Review the policies <strong>annually</strong></li><li>Designate a <strong>Chief Compliance Officer (CCO)</strong></li></ul>"},{"sec":"USA","front":"USA &mdash; definition of &quot;Person&quot;","back":"Extremely broad: an individual, corporation, partnership, association, joint-stock company, trust, unincorporated organization, government, or political subdivision."},{"sec":"USA","front":"USA &mdash; what IS a &quot;Security&quot;?","back":"Notes, stocks, bonds, debentures, evidence of indebtedness, certificates of interest in profit-sharing/partnership agreements, <strong>investment contracts</strong> (Howey), voting trust certificates, fractional undivided interests in oil/gas/mining titles, options on securities, <strong>variable annuity and variable life contracts</strong>."},{"sec":"USA","front":"USA &mdash; what is NOT a security","back":"<ul><li><strong>Fixed annuity contracts</strong></li><li>Insurance contracts (whole life, term, etc.)</li><li>Commodity futures (the futures themselves)</li><li>Real estate (direct ownership)</li><li>Collectibles</li><li><strong>IRAs and Keoghs themselves</strong> (the underlying investments may be securities)</li><li>Currency</li></ul>"},{"sec":"USA","front":"Howey Test &mdash; the four prongs","back":"From <em>SEC v. W.J. Howey Co.</em>, 328 U.S. 293 (1946). All four required:<ol><li><strong>Investment of money</strong> (or other valuable consideration)</li><li>In a <strong>common enterprise</strong></li><li>With a <strong>reasonable expectation of profits</strong></li><li><strong>Derived predominantly from the entrepreneurial or managerial efforts of others</strong></li></ol>"},{"sec":"USA","front":"Broker-Dealer &mdash; definition &amp; exclusions","back":"<strong>BD</strong> = person engaged in business of effecting transactions in securities for own account or for others.<br><br><strong>EXCLUDED</strong>:<ul><li>Agents (individuals representing a BD)</li><li>Issuers (selling own securities)</li><li>Banks, savings institutions, trust companies</li><li>BD with no place of biz in state, dealing only with: existing customers temporarily in state (&quot;snowbird&quot;), other BDs, issuers, institutional clients</li></ul>"},{"sec":"USA","front":"Agent &mdash; definition &amp; exclusions","back":"<strong>Agent</strong> = individual representing a BD or issuer in effecting securities transactions. <strong>Always a natural person</strong>; never an entity.<br><br><strong>NOT an agent</strong> if individual is:<ul><li>Representing an issuer in transactions in <strong>exempt securities</strong></li><li>Representing an issuer in <strong>exempt transactions</strong></li><li>Representing an issuer in transactions w/ employees as compensation (no remuneration)</li></ul>"},{"sec":"USA","front":"Investment Adviser Representative (IAR)","back":"Individual employed by IA who:<ul><li>Makes recommendations or renders advice on securities, OR</li><li>Manages accounts/portfolios, OR</li><li>Determines what recommendations to give, OR</li><li>Solicits the sale of advisory services, OR</li><li>Supervises any of the above</li></ul><strong>Federal-covered IA's IAR</strong>: register only in states where IAR has a <strong>place of business</strong> in that state.<br><strong>State-registered IA's IAR</strong>: register where serving clients (with de minimis exceptions)."},{"sec":"USA","front":"Federal Covered Adviser vs. Federal Covered Security","back":"<strong>Federal Covered Adviser</strong> = adviser registered with the SEC.<br><br><strong>Federal Covered Security</strong> = listed on a national exchange (NYSE, Nasdaq), mutual fund shares, securities exempt under Reg D 506, etc. NSMIA preempts state registration of these."},{"sec":"USA","front":"USA Sec. 402(a) &mdash; exempt securities (by what they are)","back":"<ol><li>U.S. government, state, municipal securities</li><li>Foreign government securities (w/ U.S. diplomatic relations)</li><li>Banking and savings institution securities</li><li>Insurance company securities (excl variable contracts)</li><li>Public utility &amp; common carrier securities</li><li>Federal credit union securities</li><li>Securities listed on a recognized exchange (now subsumed under federal covered)</li><li>Non-profit organizations (Administrator can rescind)</li><li>Commercial paper (&le; 9 mo, denoms &ge; $50K, top 3 ratings)</li><li>Investment contracts in employee benefit plans</li></ol>"},{"sec":"USA","front":"USA Sec. 402(b) &mdash; exempt transactions (by how conducted)","back":"<ol><li><strong>Isolated non-issuer</strong> &mdash; sporadic resales</li><li><strong>Unsolicited brokerage</strong> &mdash; customer initiates (must be documented)</li><li>Underwriter transactions</li><li>Transactions w/ <strong>institutional buyers</strong> (banks, ICs, BDs, employee benefit plans &gt; $1M, QIBs)</li><li><strong>Private placements</strong>: &le; 10 non-institutional offerees / 12 mo; investment intent; no commissions for retail sales</li><li>Pre-org certificates: &le; 10 subscribers, no payment, no commission</li><li>Existing security holders (rights offerings)</li><li>Fiduciary transactions (executors, trustees in bankruptcy, etc.)</li><li>Bona fide pledge</li><li>Rule 506 (Reg D) &mdash; federal covered, state can require notice filing</li></ol>"},{"sec":"USA","front":"State registration of securities &mdash; 3 methods","back":"<ol><li><strong>Notification (Filing)</strong> &mdash; for &quot;seasoned&quot; issuers; simplified</li><li><strong>Coordination</strong> &mdash; used when registering federally simultaneously; effective when federal becomes effective (or state minimum)</li><li><strong>Qualification</strong> &mdash; full state-level merit review; longest; default for unregistered offerings</li></ol>Federal covered securities use <strong>notice filing</strong> instead."},{"sec":"USA","front":"NASAA IA financial requirements (state-registered)","back":"<ul><li>IA with <strong>custody</strong>: <strong>$35,000 net worth</strong> OR equivalent surety bond</li><li>IA with <strong>discretion only (no custody)</strong>: <strong>$10,000 net worth</strong> OR equivalent surety bond</li><li>IA accepting <strong>prepayment of fees &gt; $500 AND &ge; 6 mo in advance</strong>: <strong>positive net worth at all times</strong></li><li>If NW falls below min: <strong>notify Administrator by end of next business day</strong>; file financial report by end of following business day</li><li><strong>Federal-covered advisers NOT subject</strong> to state min net worth (NSMIA)</li></ul>"},{"sec":"USA","front":"Effective date / renewal / withdrawal of state registration","back":"<strong>Effective date</strong>: <strong>noon of the 30th day</strong> after a complete application is filed (if no proceedings pending). Administrator may shorten or extend.<br><br><strong>Renewal</strong>: <strong>December 31</strong> annually.<br><br><strong>Withdrawal</strong>: file <strong>Form ADV-W</strong>; effective <strong>30 days</strong> after filing.<br><br><strong>Administrator retains jurisdiction for 1 year</strong> after withdrawal effective date."},{"sec":"USA","front":"De minimis exemption &mdash; IA (USA Sec. 222)","back":"<strong>IA exempt from state registration</strong> if:<ul><li><strong>No place of business</strong> in the state, AND</li><li><strong>5 or fewer non-institutional clients</strong> in that state during any 12-month period</li></ul>&quot;Snapshot rule&quot; / &quot;national de minimis.&quot; <strong>6th client triggers state registration.</strong> Institutional clients don't count toward the 5."},{"sec":"USA","front":"De minimis &mdash; BD vs. IA (a critical trap)","back":"<strong>BD/Agent</strong>: <span class=\"hl\">NO 5-client de minimis.</span> A <strong>single retail customer</strong> in a state triggers BD/agent registration.<br><br>BDs only exempt if no place of biz AND dealing only with: existing customers temporarily in state (&quot;snowbird&quot;), other BDs, issuers, banks/insurance/institutional clients.<br><br><strong>IA/IAR</strong>: HAS the 5-client de minimis (no place of biz + &le; 5 retail in 12 mo)."},{"sec":"USA","front":"&quot;Place of business&quot; &mdash; defined","back":"An office where IA <strong>regularly</strong> provides advisory services, solicits clients, or meets clients.<br><br>NOT mere postal addresses. NOT rare visits."},{"sec":"USA","front":"State Administrator &mdash; powers","back":"<ol><li>Make rules and orders</li><li>Conduct investigations within or outside the state</li><li><strong>Subpoena power</strong> (enforced by courts via contempt)</li><li>Issue <strong>cease and desist orders</strong> (summarily in emergencies)</li><li>Deny, suspend, revoke, condition, limit registrations &mdash; for cause</li><li>Civil penalties &amp; refer for criminal prosecution</li></ol><span class=\"hl\"><strong>CANNOT issue injunctions</strong> &mdash; must seek a court order.</span>"},{"sec":"USA","front":"Causes for denial/suspension/revocation by Administrator","back":"<ul><li>Application incomplete or false</li><li>Willful violation of Act/rules</li><li><strong>Conviction of misdemeanor involving securities OR any felony within past 10 years</strong></li><li>Subject to court injunction for sec-related conduct</li><li>Insolvency</li><li>Fraud, dishonest, or unethical practices</li><li>Failure to supervise</li><li>Lack of qualifications</li><li>Suspension/expulsion from an SRO</li><li>Failure to pay filing fees</li></ul>Right to appeal: <strong>60 days</strong> from order to seek judicial review."},{"sec":"USA","front":"USA civil liability &mdash; Section 410","back":"Person who sells in violation of Act is liable to buyer for:<ul><li>Consideration paid + interest at legal rate</li><li>LESS income received</li><li>LESS attorney's fees + court costs</li></ul>Buyer may sue to recover or for damages if security no longer owned."},{"sec":"USA","front":"Statute of limitations &mdash; civil (1956 vs 2002 USA)","back":"<strong>1956 USA (heavily tested)</strong>:<ul><li><strong>3 years from sale OR 2 years from discovery, whichever is sooner</strong></li></ul><strong>2002 USA</strong>:<ul><li>5 years from sale OR 2 years from discovery, whichever is sooner</li></ul>"},{"sec":"USA","front":"State criminal penalties &mdash; the &quot;5-5-3&quot; mnemonic","back":"USA Section 409:<ul><li><strong>5</strong> years statute of limitations</li><li><strong>$5,000</strong> max fine</li><li><strong>3</strong> years max imprisonment</li></ul>per offense. <strong>Willful</strong> violation required (knowing the action was wrong).<br><br>Federal IAA criminal: max <strong>$10,000 + 5 years</strong>.<br><br>Civil liabilities <strong>survive the death</strong> of either party."},{"sec":"USA","front":"Insider trading penalties (1984 / 1988 acts)","back":"<strong>Civil</strong>: up to <strong>3&times; profit gained or loss avoided</strong> (treble damages).<br><br><strong>Criminal</strong>: up to <strong>$5 million for individuals / $25 million for entities</strong>; <strong>20 years prison</strong>.<br><br>Tipper-tippee liability. &quot;Contemporaneous traders&quot; can sue insiders for damages."},{"sec":"FED","front":"Securities Act of 1933 (&quot;Paper Act&quot;) &mdash; scope","back":"<strong>Primary market</strong> &mdash; issuance and registration of new securities.<ul><li><strong>Registration</strong> required (or exemption)</li><li>Disclosure via prospectus</li><li>Liability for misstatements (Sec. 11 &amp; 12)</li><li>Anti-fraud (Sec. 17)</li></ul>"},{"sec":"FED","front":"1933 Act &mdash; cooling-off period","back":"~20 days after filing registration statement. During cooling-off:<ul><li><strong>Red herring (preliminary prospectus)</strong> may circulate &mdash; orange/red disclaimer that price is not yet set</li><li><strong>Tombstone advertisement</strong> permitted &mdash; minimal info (issuer, security, amount, lead UW)</li><li><strong>NO sales</strong> permitted</li></ul>Effective date &rarr; sales may begin. <strong>Final prospectus</strong> delivered with confirmation (or before)."},{"sec":"FED","front":"1933 Act exemptions &mdash; securities","back":"<ul><li><strong>3(a)(2)</strong> &mdash; government and bank securities</li><li><strong>3(a)(3)</strong> &mdash; short-term commercial paper (&le; 270 days)</li><li><strong>3(a)(4)</strong> &mdash; non-profit organizations</li><li><strong>3(a)(11)</strong> &mdash; intrastate offerings (Rule 147 safe harbor)</li></ul>"},{"sec":"FED","front":"Regulation A &mdash; Tier 1 vs Tier 2","back":"Small public offerings:<ul><li><strong>Tier 1</strong>: &le; <strong>$20 million</strong> in 12 months</li><li><strong>Tier 2</strong>: &le; <strong>$75 million</strong> in 12 months &mdash; <strong>preempts state registration</strong></li></ul>"},{"sec":"FED","front":"Regulation D &mdash; Rules 504, 506(b), 506(c)","back":"Private placements:<ul><li><strong>Rule 504</strong>: up to <strong>$10 million</strong> per 12 months</li><li><strong>Rule 506(b)</strong>: unlimited $; up to <strong>35 non-accredited (sophisticated)</strong> + unlimited accredited; <strong>NO general solicitation</strong></li><li><strong>Rule 506(c)</strong>: unlimited $; <strong>only accredited</strong>; <strong>general solicitation OK</strong> with verification</li></ul>Memory: <strong>506b = behind-the-scenes; 506c = can advertise</strong>"},{"sec":"FED","front":"Rule 144 vs 144A","back":"<strong>Rule 144</strong>: resales of <strong>restricted/control stock</strong> (covered separately).<br><br><strong>Rule 144A</strong>: resales among <strong>QIBs</strong> (Qualified Institutional Buyers).<br><br><strong>Regulation S</strong>: offshore offerings."},{"sec":"FED","front":"Accredited Investor (Rule 501) &mdash; natural persons","back":"<ul><li>Net worth &gt; <strong>$1 million</strong> (excl primary residence) &mdash; ind. or w/ spouse</li><li>Income &gt; <strong>$200K (single) or $300K (joint)</strong> for 2 most recent years with reasonable expectation of same</li><li>Holders of <strong>Series 7, 65, or 82</strong> in good standing (SEC's 2020 expansion)</li><li>Knowledgeable employees of private fund issuer</li></ul>"},{"sec":"FED","front":"Accredited Investor &mdash; institutions","back":"<ul><li>Banks, BDs, insurance companies, RICs, BDCs</li><li>Employee benefit plans with assets &ge; <strong>$5 million</strong></li><li>Entities with assets &gt; <strong>$5 million</strong></li><li>Family offices managing $5M+</li></ul>"},{"sec":"FED","front":"Securities Exchange Act of 1934 &mdash; scope","back":"<strong>Secondary market</strong> &mdash; trading after issuance.<ul><li><strong>Created the SEC</strong></li><li>Regulates exchanges, BDs, transfer agents, clearing agencies</li><li>Reporting (10-K, 10-Q, 8-K)</li><li>Schedule 13D / 13G (5%+ ownership)</li><li>Proxy regulation (Sec. 14)</li><li>Tender offers (Sec. 14(d)-(e))</li><li>Insider trading (Sec. 16, Rule 10b-5)</li><li><strong>Sec. 28(e)</strong> soft dollar safe harbor</li></ul>"},{"sec":"FED","front":"Public company reporting forms","back":"<ul><li><strong>Form 10-K</strong> &mdash; annual (audited financials)</li><li><strong>Form 10-Q</strong> &mdash; quarterly (unaudited)</li><li><strong>Form 8-K</strong> &mdash; current report; material events; <strong>within 4 business days</strong></li><li><strong>Schedule 13D</strong> &mdash; beneficial ownership &gt; 5% (within 10 days)</li><li><strong>Schedule 13G</strong> &mdash; short-form for passive investors</li></ul>"},{"sec":"FED","front":"Section 16 insider trading rules","back":"<strong>Section 16(a)</strong>: officers, directors, 10%+ holders file initial <strong>Form 3</strong> + changes <strong>Form 4</strong> (within <strong>2 business days</strong>).<br><br><strong>Section 16(b)</strong>: <strong>short-swing profits</strong> (purchase + sale within <strong>6 months</strong>) recoverable by company.<br><br><strong>Rule 10b-5</strong>: general anti-fraud (insider trading enforcement basis)."},{"sec":"FED","front":"Section 28(e) Soft Dollar Safe Harbor &mdash; eligible items","back":"IA does not breach fiduciary duty by paying brokerage commissions in excess of competing brokers IF good-faith determined reasonable in relation to <strong>brokerage and research services</strong>.<br><br><strong>Eligible (within safe harbor)</strong>:<ul><li>Research reports &amp; analyses</li><li>Market data feeds</li><li>Substantive seminars/conferences</li><li>Software providing analyses</li><li>Proxy services</li><li>Clearance &amp; settlement services</li><li>ECNs (for execution)</li></ul>"},{"sec":"FED","front":"Section 28(e) &mdash; NOT eligible (hard dollars only)","back":"<ul><li>Travel, lodging, meals, entertainment</li><li>Office rent, equipment, computer hardware (general)</li><li>Salaries, employee compensation</li><li>Marketing materials and advertising</li><li>Accounting and legal services (general)</li><li>Telephone and internet (general)</li><li>Error correction</li><li>Some membership dues</li></ul><strong>Mixed-use</strong>: must allocate; written records required.<br><strong>Disclosure required even within safe harbor</strong>. <strong>Best execution</strong> obligation is independent."},{"sec":"FED","front":"Investment Company Act of 1940 &mdash; 3 classifications","back":"<ol><li><strong>Face-amount certificate companies</strong> &mdash; rare</li><li><strong>Unit Investment Trusts</strong> &mdash; fixed portfolio, no management</li><li><strong>Management companies</strong> &mdash; most mutual funds and ETFs:<ul><li><strong>Open-end</strong>: continuously issued/redeemed at NAV</li><li><strong>Closed-end</strong>: fixed shares, exchange-traded</li></ul></li></ol>"},{"sec":"FED","front":"Diversified fund &mdash; the 75/5/10 rule","back":"With respect to <strong>75% of total assets</strong>:<ul><li>No more than <strong>5%</strong> in any one issuer</li><li>No more than <strong>10% of voting securities</strong> of any one issuer</li></ul>The remaining 25% is unrestricted.<br><br><strong>Non-diversified</strong>: no such limits; concentrated funds."},{"sec":"FED","front":"1940 Act &mdash; other key provisions","back":"<ul><li>Open-end funds must redeem within <strong>7 days</strong></li><li>12b-1 distribution plans require board approval (incl majority of independent directors), annual reapproval, and majority shareholder vote at adoption</li><li>Advisory contracts: initial 2-year term; annual renewal by majority of independent directors AND majority of shareholders</li><li>Affiliated transactions require special approvals</li></ul><strong>3(c)(1)</strong>: &le; 100 owners; all accredited.<br><strong>3(c)(7)</strong>: qualified purchasers only; no count limit."},{"sec":"FED","front":"Trust Indenture Act of 1939","back":"<strong>Scope</strong>: corporate bond issues offered to the public <strong>&gt; $50 million</strong>.<br><br>Requires:<ul><li><strong>Trust indenture</strong> between issuer and a qualified independent <strong>trustee</strong> (typically a bank)</li><li>Indenture provisions protecting bondholders</li><li>Trustee acts on behalf of bondholders for default, restructuring</li></ul>Government, municipal, and 1940 Act&ndash;registered securities are exempt."},{"sec":"FED","front":"SIPC &mdash; coverage limits","back":"Protects customers of failed BDs (NOT failed advisers; NOT market losses).<br><br><strong>$500,000 total per separate customer</strong> (cash + securities).<br><strong>Cash sublimit: $250,000</strong>.<br><br><strong>Separate capacities</strong> each get full coverage at the same firm: individual, joint, IRA, Roth IRA, custodial each = separate $500K coverage."},{"sec":"FED","front":"SIPC &mdash; what's NOT covered","back":"<ul><li>Market losses</li><li>Commodity futures (unless in portfolio margining)</li><li>Currency</li><li><strong>Fixed annuities</strong></li><li>Commodity options</li><li>Fraud beyond the broker's failure</li></ul>SIPC funded by member assessments (not government). When member fails: liquidation proceeding; trustee appointed; customer property returned; shortfalls covered up to limits.<br><br><strong>SIPC is NOT the FDIC for securities &mdash; it's a customer-property-recovery scheme.</strong>"},{"sec":"FED","front":"Insider Trading theories of liability","back":"<strong>Classical theory</strong>: insider breaches duty to corp/shareholders by trading on MNPI.<br><strong>Misappropriation theory</strong>: outsider (e.g., investment banker) breaches duty to source by trading on it (Supreme Court adopted in <em>O'Hagan</em>).<br><strong>Tipper-tippee</strong>: tipper liable if breached duty for personal benefit; tippee liable if knew or should have known."},{"sec":"FED","front":"Rule 10b5-1 plans &amp; Rule 10b5-2","back":"<strong>Rule 10b5-1 plans</strong>: preset trading plans adopted in good faith when insider has no MNPI; provide affirmative defense against insider trading allegations.<br><br><strong>Rule 10b5-2</strong>: defines &quot;duty of trust or confidence&quot; for misappropriation theory (covers family members, business confidants)."},{"sec":"FED","front":"Sarbanes-Oxley Act of 2002 &mdash; key features","back":"Passed after Enron/WorldCom:<ul><li>Created <strong>PCAOB</strong> &mdash; regulates public company auditors</li><li><strong>CEO/CFO certifications</strong> of financial statements</li><li>Internal controls assessment (Sec. 404)</li><li>Enhanced criminal penalties for fraud</li><li>Audit committee requirements; auditor independence rules</li><li>Whistleblower protections</li></ul>"},{"sec":"FED","front":"Dodd-Frank Act of 2010 &mdash; key features","back":"<ul><li><strong>Restructured IA registration</strong> &mdash; small (state), mid (state w/ optional SEC), large (SEC)</li><li>Created <strong>Exempt Reporting Adviser</strong> category for PFs and VC funds</li><li><strong>Volcker Rule</strong> &mdash; restricts proprietary trading by banks</li><li>Created <strong>CFPB</strong> (Consumer Financial Protection Bureau)</li><li>Created <strong>FSOC</strong> (Financial Stability Oversight Council)</li><li>Enhanced derivatives oversight (SEC + CFTC)</li><li>Enhanced whistleblower bounties</li></ul>"},{"sec":"FED","front":"NSMIA (1996) &mdash; what did it do?","back":"<strong>National Securities Markets Improvement Act</strong>:<ul><li>Created &quot;federal covered securities&quot; (mostly exempt from state registration)</li><li>Created federal-state allocation of IA regulation</li><li>Limited state authority over BDs</li></ul>"},{"sec":"FED","front":"Federal Acts by year &mdash; the &quot;33-34-39-40-40-70-74&quot; mnemonic","back":"<ul><li><strong>1933</strong> &mdash; primary market (issuance, prospectus)</li><li><strong>1934</strong> &mdash; secondary market, SEC, BD/exchanges</li><li><strong>1939</strong> &mdash; Trust Indenture (&gt; $50M corp bonds)</li><li><strong>1940a</strong> &mdash; Investment Company Act</li><li><strong>1940b</strong> &mdash; Investment Advisers Act</li><li><strong>1970</strong> &mdash; SIPC (BD failures)</li><li><strong>1974</strong> &mdash; ERISA (retirement plans)</li></ul>"},{"sec":"AML","front":"AML framework foundation","back":"<strong>Bank Secrecy Act (1970)</strong> &mdash; foundation of U.S. AML framework. Applies to &quot;financial institutions&quot; including BDs and (effective 2024-2025) advisers.<br><br><strong>USA Patriot Act (2001)</strong> &mdash; substantially expanded AML requirements after 9/11."},{"sec":"AML","front":"Required AML compliance program components","back":"Written, reasonably designed:<ul><li><strong>Policies and procedures</strong></li><li><strong>Designated AML compliance officer</strong></li><li><strong>Ongoing employee training</strong></li><li><strong>Independent testing</strong> (annually for BDs)</li><li><strong>Customer Identification Program (CIP)</strong></li><li><strong>Customer Due Diligence (CDD)</strong> incl. beneficial ownership</li></ul>"},{"sec":"AML","front":"CIP &mdash; required information at account opening","back":"<ul><li><strong>Name</strong></li><li><strong>Date of birth</strong></li><li><strong>Physical address</strong> (residential or business; <strong>P.O. Box NOT sufficient</strong> as primary)</li><li><strong>Taxpayer ID</strong> (SSN for U.S.; passport/visa for foreign)</li></ul>Must verify identity within reasonable time (documentary or non-documentary). <strong>OFAC SDN list</strong> screening required."},{"sec":"AML","front":"CTR &mdash; Currency Transaction Report","back":"FinCEN Form 112:<ul><li>Required for cash transactions <strong>&gt; $10,000</strong> (or aggregated same-day)</li><li>Filed within <strong>15 days</strong> of the transaction</li></ul>"},{"sec":"AML","front":"SAR &mdash; Suspicious Activity Report","back":"FinCEN Form 111:<ul><li>Required (BDs) at <strong>&ge; $5,000</strong> when reason to suspect: money laundering, illegal activity, evasion of BSA, no business purpose, BD-facilitated criminal activity</li><li>Higher threshold (<strong>&ge; $25,000</strong>) when no suspect identified</li><li>Filed within <strong>30 days</strong> of detection</li><li><span class=\"hl\"><strong>Confidentiality</strong>: DO NOT notify the customer (felony)</span></li></ul>"},{"sec":"AML","front":"Structuring &mdash; what is it?","back":"Splitting transactions to avoid reporting (e.g., depositing $9,500 multiple times).<br><br><strong>Itself a federal crime</strong> regardless of whether the underlying source is legal.<br><br><strong>Form 8300</strong>: IRS form for cash receipts &gt; $10,000 from a single transaction. Filed within 15 days."},{"sec":"AML","front":"FinCEN vs. FATF","back":"<strong>FinCEN</strong>: Financial Crimes Enforcement Network &mdash; bureau of Treasury Department; receives BSA reports; administers AML rules.<br><br><strong>FATF</strong>: Financial Action Task Force &mdash; international AML/CFT standard-setting body; publishes lists of high-risk jurisdictions."},{"sec":"AML","front":"TCPA &amp; CAN-SPAM","back":"<strong>TCPA</strong>:<ul><li>Calling hours: <strong>8 AM &ndash; 9 PM local time</strong> of called party</li><li>Firm-specific Do-Not-Call list</li><li>National DNC Registry compliance</li><li>Auto-dialer rules (express written consent for prerecorded msgs to mobile)</li></ul><strong>CAN-SPAM (2003)</strong>:<ul><li>Commercial email &mdash; opt-out required</li><li>Accurate header/subject info</li><li>Physical postal address in message</li><li>Identification as advertisement</li></ul>"},{"sec":"REGBI","front":"Regulation Best Interest &mdash; effective &amp; scope","back":"<strong>Effective: June 30, 2020.</strong><br><br>Imposes &quot;best interest&quot; standard on <strong>broker-dealers</strong> when making recommendations to retail customers.<br><br><span class=\"hl\">Reg BI does NOT make BDs &quot;fiduciaries&quot; in the technical advisory sense. Does NOT apply to IAs.</span>"},{"sec":"REGBI","front":"Reg BI &mdash; the four obligations (D-C-C-C)","back":"<ol><li><strong>D</strong>isclosure &mdash; full and fair written disclosure of all material facts (relationship, conflicts, fees, scope, capacity)</li><li><strong>C</strong>are &mdash; reasonable diligence, care, skill: understand R/R/cost; reasonable basis some retail customer; reasonable basis particular customer</li><li><strong>C</strong>onflict of Interest &mdash; written P&amp;P to identify and disclose, mitigate, or eliminate</li><li><strong>C</strong>ompliance &mdash; written P&amp;P reasonably designed to achieve compliance with Reg BI generally</li></ol>"},{"sec":"REGBI","front":"Form CRS &mdash; format &amp; delivery","back":"<strong>Both BDs and IAs</strong> must give Form CRS to retail customers.<br><br><strong>Format</strong>:<ul><li>Max <strong>2 pages</strong> single registrants</li><li>Max <strong>4 pages</strong> dual registrants</li><li>Plain English</li></ul><strong>Delivery</strong>:<ul><li>Initial: at or before recommendation, account opening, or contract</li><li>Update: within 30 days when info becomes materially inaccurate</li></ul>Uses term <strong>&quot;best interest&quot;</strong> &mdash; not &quot;fiduciary.&quot;"},{"sec":"ETH","front":"Common prohibited trading practices","back":"<ul><li><strong>Churning</strong> &mdash; excessive trading to generate commissions</li><li><strong>Twisting</strong> &mdash; inducing replacement of insurance via misrepresentation</li><li><strong>Switching</strong> &mdash; unsuitable fund-to-fund swaps to generate sales charges</li><li><strong>Front-running</strong> &mdash; trading ahead of customer order or research recommendation</li><li><strong>Scalping</strong> &mdash; recommending then trading personally to benefit</li><li><strong>Market manipulation</strong> &mdash; matched orders, wash trades, painting the tape</li><li><strong>Late trading</strong> &mdash; accepting fund orders after market close at NAV</li><li><strong>Marking the close</strong> &mdash; manipulating closing price</li></ul>"},{"sec":"ETH","front":"Customer-relationship prohibited practices","back":"<ul><li>Misrepresentation or omission of material facts</li><li><strong>Guaranteeing against loss</strong> &mdash; ALWAYS prohibited</li><li>Unauthorized transactions</li><li>Unsuitable recommendations</li><li>Failing to deliver prospectus when required</li><li>Charging unreasonable fees</li><li>Backdating records</li><li><strong>Sharing in client accounts</strong> &mdash; only with written approval AND proportionate to contributions (BD/agent only); <strong>IARs may NEVER share</strong></li><li><strong>Borrowing/lending</strong> with clients &mdash; only if client is in lending business or affiliate</li><li><strong>Selling away</strong>, <strong>commingling</strong></li></ul>"},{"sec":"ETH","front":"IA-specific prohibitions (in addition to general)","back":"<ul><li><strong>IARs may NEVER share accounts</strong> with clients (no proportionate exception)</li><li>IA may borrow from a client only if client is in business of lending money</li><li><strong>Discretionary authority</strong>: IA may exercise on <strong>10 days oral authority</strong> while waiting for written; agents must have written BEFORE first trade</li><li><strong>Hedge clauses</strong> generally prohibited (cannot waive fiduciary duty)</li><li><strong>Assignment of contract</strong> requires client consent (incl change of &gt; 25% control of IA firm)</li><li>Use of <strong>&quot;RIA&quot;</strong> abbreviation discouraged</li></ul>"},{"sec":"ETH","front":"Outside business activity, gifts, senior protections","back":"<strong>Outside business activities</strong> &mdash; require written disclosure/approval.<br><br><strong>Gift limits</strong>: <strong>FINRA $100/year</strong> between firms (per individual). NASAA generally follows.<br><br><strong>Senior protections &mdash; NASAA Senior Model Act</strong>: permits delay of disbursement when reasonable belief of exploitation of vulnerable adults; immunity for good-faith reports.<br><br><strong>Advertising</strong>: must not be misleading, must not predict future returns."},{"sec":"ETH","front":"NASAA IAR Continuing Education","back":"Adopted Nov 2020; effective in adopting states from 2022.<br><br><strong>12 CE credits/year</strong>:<ul><li><strong>6 Products &amp; Practice</strong></li><li><strong>6 Ethics &amp; Professional Responsibility</strong></li></ul>1 credit = 50 min minimum. <strong>Both buckets required</strong> (no substitution).<br><br><strong>Dual registrants</strong>: FINRA Regulatory Element CE counts toward 6 P&amp;P, but Ethics 6 still required.<br><br><strong>2 consecutive years inactive</strong> &rarr; registration lapses. No carryover. New IAR begins requirement Jan 1 of year following first registration."},{"sec":"ETH","front":"Business Continuity / Cybersecurity / Privacy &mdash; key obligations","back":"<strong>BCP</strong>: NASAA Model Rule requires written, annually updated plans (natural disasters, key person succession, alt office, data backup, comms).<br><br><strong>Cybersecurity</strong>: written P&amp;P (Rule 206(4)-7); annual review; CCO designated. Reasonable safeguards: access controls, encryption, MFA, vendor mgmt, incident response.<br><br><strong>Privacy</strong>: Reg S-P initial + annual notice, opt-out, Safeguards Rule, Disposal Rule."},{"sec":"ETH","front":"Account-opening special types &mdash; what's required","back":"<strong>Joint</strong>: type of ownership (JTWROS/TIC/TBE/community), authorization for each, death notification.<br><strong>Trust</strong>: trust documents, trustees, beneficiaries identification.<br><strong>Corporate</strong>: corporate resolution authorizing the account.<br><strong>Partnership</strong>: partnership agreement and resolution.<br><strong>Fiduciary</strong>: held by executor, trustee, guardian, or conservator on behalf of another."},{"sec":"REF","front":"Exam mechanics","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>Total questions</td><td>140 (130 scored + 10 pretest)</td></tr><tr><td>Time</td><td>180 minutes</td></tr><tr><td>Passing score</td><td><strong>92/130 (~72%)</strong></td></tr></table>~77 sec/question. No penalty for guessing. Closed book. Pass also confers <strong>SEC accredited investor status</strong>."},{"sec":"REF","front":"NASAA IA net worth &amp; bonding","back":"<table><tr><th>Condition</th><th>Requirement</th></tr><tr><td>IA with custody</td><td><strong>$35,000</strong> NW or bond</td></tr><tr><td>IA with discretion only</td><td><strong>$10,000</strong> NW or bond</td></tr><tr><td>Prepayment &gt; $500 + &ge; 6 mo</td><td><strong>Positive NW</strong> always</td></tr><tr><td>NW shortfall notification</td><td>End of next biz day</td></tr><tr><td>Financial report after shortfall</td><td>End of following biz day</td></tr></table>Memory: <em>Custody $35K, discretion $10K, prepayment positive</em>."},{"sec":"REF","front":"Federal IA registration thresholds","back":"<ul><li><strong>&lt; $25M</strong>: state(s); SEC prohibited</li><li><strong>$25M&ndash;$100M</strong>: state(s) (SEC under specific conditions)</li><li><strong>&ge; $100M</strong>: SEC eligible</li><li><strong>&ge; $110M</strong>: <strong>MANDATORY</strong> SEC</li><li><strong>&lt; $90M</strong>: drop back to state</li><li><strong>15+ states</strong>: multi-state SEC eligibility</li><li><strong>$200M+</strong>: pension consultant SEC eligible</li><li><strong>120 days</strong>: window for new advisers to expect $100M</li></ul>"},{"sec":"REF","front":"IA exemptions / pay-to-play thresholds","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>Private fund adviser</td><td>&lt; $150M AUM (ERA)</td></tr><tr><td>Foreign private adviser</td><td>&lt; $25M from US, &lt; 15 US clients</td></tr><tr><td>De minimis IA</td><td>&le; 5 retail clients / 12 mo, no place of biz</td></tr><tr><td>Pay-to-play ban</td><td><strong>2 years</strong></td></tr><tr><td>P-T-P de minimis (eligible voter)</td><td><strong>$350</strong>/election</td></tr><tr><td>P-T-P de minimis (not eligible)</td><td><strong>$150</strong>/election</td></tr></table>"},{"sec":"REF","front":"Investor wealth thresholds","back":"<table><tr><th>Status</th><th>Threshold</th></tr><tr><td>Qualified Client (AUM)</td><td><strong>$1.1M</strong></td></tr><tr><td>Qualified Client (NW)</td><td><strong>$2.2M</strong> (excl primary res)</td></tr><tr><td>Qualified Purchaser (ind)</td><td>$5M investments</td></tr><tr><td>Qualified Purchaser (inst)</td><td>$25M investments</td></tr><tr><td>Accredited Investor (NW)</td><td>$1M (excl primary res)</td></tr><tr><td>Accredited Investor (single)</td><td>$200K income</td></tr><tr><td>Accredited Investor (joint)</td><td>$300K income</td></tr></table>"},{"sec":"REF","front":"Brochure / filing deadlines","back":"<table><tr><th>Item</th><th>Deadline</th></tr><tr><td>State IA brochure (option 1)</td><td>48 hr before contract</td></tr><tr><td>State IA brochure (option 2)</td><td>At contract + 5-biz-day rescission</td></tr><tr><td>Federal IA brochure</td><td>Before/at contract (no 48hr/5day)</td></tr><tr><td>Annual brochure</td><td>Within <strong>120 days</strong> of FYE</td></tr><tr><td>Form ADV annual updating</td><td>Within <strong>90 days</strong> of FYE</td></tr><tr><td>Books &amp; records</td><td>5 yrs total; 2 yrs accessible</td></tr><tr><td>State registration effective</td><td>Noon of 30th day after complete filing</td></tr><tr><td>Renewal</td><td>Dec 31 annually</td></tr><tr><td>Form ADV-W effective</td><td>30 days after filing</td></tr><tr><td>Admin post-withdrawal</td><td>1 year</td></tr></table>"},{"sec":"REF","front":"Penalties &amp; statutes of limitations","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>Civil SOL (1956 USA)</td><td>3 yrs from sale OR 2 from discovery, sooner</td></tr><tr><td>Civil SOL (2002 USA)</td><td>5 yrs from sale OR 2 from discovery, sooner</td></tr><tr><td>State criminal SOL</td><td>5 years</td></tr><tr><td>State criminal max</td><td>$5,000 + 3 yrs</td></tr><tr><td>Federal IAA criminal max</td><td>$10,000 + 5 yrs</td></tr><tr><td>Insider trading civil</td><td>3&times; profit/loss avoided</td></tr><tr><td>Insider trading criminal</td><td>$5M ind / $25M firm; 20 yrs prison</td></tr></table>"},{"sec":"REF","front":"Investor protections","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>SIPC total / separate customer</td><td><strong>$500,000</strong></td></tr><tr><td>SIPC cash sublimit</td><td><strong>$250,000</strong></td></tr><tr><td>FDIC limit (CDs at bank)</td><td>$250,000 per depositor / bank</td></tr></table>SIPC NOT for market losses. NOT FDIC for securities &mdash; it's a customer-property-recovery scheme."},{"sec":"REF","front":"Securities markets thresholds","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>Reg T initial margin</td><td><strong>50%</strong></td></tr><tr><td>FINRA maintenance (long)</td><td><strong>25%</strong></td></tr><tr><td>FINRA maintenance (short)</td><td><strong>30%</strong></td></tr><tr><td>Trust Indenture Act threshold</td><td>&gt; $50M corp bond issue</td></tr><tr><td>Commercial paper exemption</td><td>270 days, $50K denom</td></tr></table>Memory: <strong>50/25/30</strong>."},{"sec":"REF","front":"Investment company thresholds","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>Diversified (75/5/10)</td><td>75% of assets, &le; 5% / issuer, &le; 10% voting</td></tr><tr><td>Open-end redemption</td><td>Within 7 days</td></tr><tr><td>Max 12b-1 (combined)</td><td>1.00% (0.75 dist + 0.25 svc)</td></tr><tr><td>12b-1 cap to call &quot;no-load&quot;</td><td>0.25%</td></tr><tr><td>Max sales charge</td><td>8.5%</td></tr><tr><td>LOI period</td><td>13 mo (backdate up to 90 days)</td></tr><tr><td>3(c)(1) max owners</td><td>100 (all accredited)</td></tr></table>"},{"sec":"REF","front":"REIT thresholds","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>Required income distribution</td><td>&ge; <strong>90%</strong> of taxable income</td></tr><tr><td>Asset test</td><td>&ge; <strong>75%</strong> in real estate/cash/govt</td></tr><tr><td>Income test</td><td>&ge; <strong>75%</strong> from real estate</td></tr><tr><td>Min shareholders</td><td><strong>100</strong></td></tr><tr><td>5/50 test</td><td>5 or fewer can't own &gt; 50%</td></tr></table>"},{"sec":"REF","front":"Tax thresholds (2024-2025)","back":"<table><tr><th>Item</th><th>2024</th><th>2025</th></tr><tr><td>Annual gift exclusion</td><td>$18K</td><td>$19K</td></tr><tr><td>Lifetime estate exemption</td><td>$13.61M</td><td>$13.99M</td></tr><tr><td>Top federal estate rate</td><td>40%</td><td>40%</td></tr><tr><td>LTCG max (high income)</td><td>20% + 3.8% NIIT</td><td>same</td></tr><tr><td>Collectibles max LTCG</td><td>28%</td><td>28%</td></tr><tr><td>Cap loss vs ord inc limit</td><td>$3,000</td><td>$3,000</td></tr><tr><td>Wash sale window</td><td>30 days both sides</td><td>same</td></tr><tr><td>Kiddie tax (parent rate)</td><td>&gt; $2,600</td><td>&gt; $2,700</td></tr></table>"},{"sec":"REF","front":"AML thresholds","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>CTR threshold</td><td>&gt; <strong>$10,000</strong> cash</td></tr><tr><td>CTR filing</td><td>15 days</td></tr><tr><td>SAR (BD) with suspect</td><td>&ge; <strong>$5,000</strong></td></tr><tr><td>SAR (BD) without suspect</td><td>&ge; <strong>$25,000</strong></td></tr><tr><td>SAR filing</td><td>30 days from detection</td></tr></table>NEVER notify the customer about a SAR &mdash; <strong>felony</strong>."},{"sec":"REF","front":"Communications &amp; key dates","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>TCPA call hours</td><td>8 AM &ndash; 9 PM local</td></tr><tr><td>FINRA gift limit</td><td>$100/yr per individual</td></tr><tr><td>Marketing Rule promoter de minimis</td><td>&le; $1,000 in 12 mo</td></tr><tr><td>Reg BI / Form CRS effective</td><td>June 30, 2020</td></tr><tr><td>Marketing Rule effective</td><td>November 4, 2022</td></tr><tr><td>IAR CE annual</td><td>12 credits (6 P&amp;P + 6 Ethics)</td></tr></table>"},{"sec":"REF","front":"ERISA thresholds","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>Eligibility</td><td>Age 21 + 1 yr svc (1,000 hrs)</td></tr><tr><td>Long-term part-time</td><td>2 consecutive yrs 500+ hrs</td></tr><tr><td>DC vesting cliff</td><td>3 yrs</td></tr><tr><td>DC vesting graded</td><td>2-to-6 yr</td></tr><tr><td>DB vesting cliff</td><td>5 yrs</td></tr><tr><td>DB vesting graded</td><td>3-to-7 yr</td></tr><tr><td>QDIA capital preservation max</td><td>First 120 days only</td></tr></table>"},{"sec":"REF","front":"Distribution rules &mdash; quick reference","back":"<table><tr><th>Item</th><th>Value</th></tr><tr><td>RMD age</td><td><strong>73</strong> (rises to 75 in 2033)</td></tr><tr><td>Missed RMD penalty</td><td>25% (10% if corrected timely)</td></tr><tr><td>10% early withdrawal age</td><td>Before 59&frac12;</td></tr><tr><td>First-time homebuyer (IRA)</td><td>$10,000 lifetime</td></tr><tr><td>Birth/adoption exception</td><td>$5,000 per child</td></tr><tr><td>60-day rollover</td><td>Once per year per IRA</td></tr><tr><td>529-to-Roth lifetime</td><td>$35,000 (acct 15+ yrs old)</td></tr></table>"},{"sec":"MNEM","front":"ABC Test","back":"Investment Adviser Definition:<br><br><strong>A</strong>dvice + <strong>B</strong>usiness + <strong>C</strong>ompensation = Investment Adviser<br><br>If any one of A/B/C is missing &rarr; NOT an IA."},{"sec":"MNEM","front":"LATE-BIPS","back":"<strong>IA Exclusions</strong>:<ul><li><strong>L</strong>awyers</li><li><strong>A</strong>ccountants</li><li><strong>T</strong>eachers</li><li><strong>E</strong>ngineers</li><li><strong>B</strong>anks (and bank holding companies)</li><li><strong>B</strong>roker-dealers (incidental + no special comp)</li><li><strong>I</strong>nsurance company advisers</li><li><strong>P</strong>ublishers (bona fide)</li><li><strong>S</strong>ecurities &mdash; government securities advisers</li></ul>"},{"sec":"MNEM","front":"I-CEP","back":"<strong>Howey Test</strong>:<ul><li><strong>I</strong>nvestment of money</li><li><strong>C</strong>ommon enterprise</li><li><strong>E</strong>xpectation of profits</li><li><strong>P</strong>redominantly from efforts of others</li></ul>"},{"sec":"MNEM","front":"PRIME","back":"<strong>Systematic (non-diversifiable) Risks</strong>:<ul><li><strong>P</strong>urchasing power (inflation)</li><li><strong>R</strong>einvestment</li><li><strong>I</strong>nterest rate</li><li><strong>M</strong>arket</li><li><strong>E</strong>xchange rate (currency)</li></ul>"},{"sec":"MNEM","front":"BCLR + P","back":"<strong>Non-Systematic (diversifiable) Risks</strong>:<ul><li><strong>B</strong>usiness (management)</li><li><strong>C</strong>redit (default)</li><li><strong>L</strong>iquidity</li><li><strong>R</strong>egulatory</li><li><strong>P</strong>olitical</li></ul>"},{"sec":"MNEM","front":"LPDF","back":"<strong>ERISA Fiduciary Duties</strong>:<ul><li><strong>L</strong>oyalty</li><li><strong>P</strong>rudence (prudent expert)</li><li><strong>D</strong>iversification</li><li><strong>F</strong>ollow plan documents</li></ul>"},{"sec":"MNEM","front":"5-5-3","back":"<strong>State Criminal Penalties</strong>:<ul><li><strong>5</strong> years criminal SOL</li><li><strong>$5,000</strong> max fine</li><li><strong>3</strong> years max imprisonment</li></ul>"},{"sec":"MNEM","front":"&quot;Premium puts you down to par&quot;","back":"<strong>Premium bond</strong> (price &gt; par): Coupon &gt; Current Yield &gt; YTM &gt; YTC<br><strong>Discount bond</strong> (price &lt; par): Coupon &lt; Current Yield &lt; YTM &lt; YTC<br><strong>Par bond</strong>: All equal<br><br>Yields decline with price decline at maturity."},{"sec":"MNEM","front":"UQAD","back":"<strong>Auditor Opinions</strong>:<ul><li><strong>U</strong>nqualified (clean)</li><li><strong>Q</strong>ualified (except for...)</li><li><strong>A</strong>dverse (does not present fairly)</li><li><strong>D</strong>isclaimer (cannot express opinion)</li></ul>"},{"sec":"MNEM","front":"D-C-C-C","back":"<strong>Reg BI Four Obligations</strong>:<ul><li><strong>D</strong>isclosure</li><li><strong>C</strong>are</li><li><strong>C</strong>onflict of Interest</li><li><strong>C</strong>ompliance</li></ul>"},{"sec":"MNEM","front":"500 / 250","back":"<strong>SIPC Limits</strong>:<ul><li><strong>$500K</strong> total per separate customer (cash + securities)</li><li><strong>$250K</strong> cash sublimit</li></ul>"},{"sec":"MNEM","front":"&quot;48 / 5&quot;","back":"<strong>State IA brochure delivery</strong>:<ul><li><strong>48 hours</strong> before contract, OR</li><li>At time of contract WITH <strong>5-business-day rescission</strong></li></ul>"},{"sec":"MNEM","front":"&quot;Inversion Indicates recession&quot;","back":"<strong>Inverted yield curve</strong> &mdash; short-term yields exceed long-term yields. Has preceded every U.S. recession in the post-WWII era.<br><br>10Y &minus; 3M is most-watched indicator."},{"sec":"MNEM","front":"50 / 25 / 30","back":"<strong>Margin Requirements</strong>:<ul><li><strong>50%</strong> &mdash; Reg T initial margin (equity)</li><li><strong>25%</strong> &mdash; FINRA maintenance margin (long)</li><li><strong>30%</strong> &mdash; FINRA maintenance margin (short)</li></ul>"},{"sec":"MNEM","front":"33-34-39-40-40-70-74","back":"<strong>Federal Acts by Year</strong>:<ul><li>1933 &mdash; primary mkt (issuance, prospectus)</li><li>1934 &mdash; secondary mkt, SEC, BD/exchanges</li><li>1939 &mdash; Trust Indenture (&gt; $50M corp bonds)</li><li>1940a &mdash; Investment Company Act</li><li>1940b &mdash; Investment Advisers Act</li><li>1970 &mdash; SIPC (BD failures)</li><li>1974 &mdash; ERISA (retirement plans)</li></ul>"},{"sec":"MNEM","front":"&quot;Some Unfortunate Souls Pay Cash&quot;","back":"<strong>Order of Liquidation</strong>:<ul><li><strong>S</strong>ecured</li><li><strong>U</strong>nsecured</li><li><strong>S</strong>ubordinated</li><li><strong>P</strong>referred</li><li><strong>C</strong>ommon</li></ul>"},{"sec":"MNEM","front":"&quot;b for behind-the-scenes; c for can advertise&quot;","back":"<strong>Reg D Rule 506(b) vs 506(c)</strong>:<ul><li><strong>506(b)</strong>: 35 sophisticated + unlimited accredited; <strong>NO general solicitation</strong></li><li><strong>506(c)</strong>: ONLY accredited; <strong>general solicitation OK</strong> with verification</li></ul>"},{"sec":"MNEM","front":"&quot;Custody $35K, discretion $10K, prepayment positive&quot;","back":"<strong>NASAA Net Worth Requirements (state-registered IA)</strong>:<ul><li>Custody: $35K NW or bond</li><li>Discretion only: $10K NW or bond</li><li>Prepayment &gt; $500 + 6 mo+: positive NW always</li></ul>"},{"sec":"MNEM","front":"R-Right vs W-Way","back":"<strong>Rights vs. Warrants:</strong><br><br><strong>R</strong>ights are <strong>R</strong>eally short-term (30-60 days; ITM at issuance)<br><br><strong>W</strong>arrants are <strong>W</strong>ay longer (years; OTM at issuance; often a sweetener on bonds)"},{"sec":"MNEM","front":"M1 / M2 / M3 quick recall","back":"<strong>M1</strong> = Money you can spend immediately (currency, demand deposits, checkable, traveler's)<br><strong>M2</strong> = M1 + things you can convert quickly (savings, small CDs, retail MMFs)<br><strong>M3</strong> = M2 + larger institutional cash (large CDs, inst MMFs, repos, Eurodollars)"},{"sec":"TRAP","front":"Trap 1: Investment Counsel designation","back":"To use the title <strong>&quot;investment counsel&quot;</strong>, an IA must meet <strong>BOTH</strong>:<ol><li>Principal business is investment advice, AND</li><li>A substantial part is investment supervisory services</li></ol>Only meeting ONE is insufficient."},{"sec":"TRAP","front":"Trap 2: Bank exclusion is narrower than it sounds","back":"Banks excluded from IA definition, BUT:<ul><li>Bank holding companies advising <strong>registered investment companies</strong> are NOT excluded</li><li><strong>S&amp;Ls</strong> are NOT excluded</li><li><strong>Credit unions</strong> are NOT excluded</li></ul>"},{"sec":"TRAP","front":"Trap 3: BD exclusion lost by special compensation","back":"BD exclusion from IA definition only applies if advice is <strong>solely incidental</strong> AND <strong>no special compensation</strong>.<br><br>Charging an <strong>asset-based or wrap fee</strong> = special compensation = <strong>must register as IA</strong>."},{"sec":"TRAP","front":"Trap 4: Newsletter publisher exclusion","back":"Only applies to <strong>bona fide publications of regular and general circulation</strong>.<br><br><strong>Personalized advice</strong> tailored to individual circumstances <strong>breaks the exclusion</strong>.<br><br>A &quot;hotline&quot; with buy/sell signals tied to subscriber circumstances may not qualify."},{"sec":"TRAP","front":"Trap 5: Lawyer/Accountant/Teacher/Engineer exclusion","back":"Must be <strong>solely incidental</strong> to professional practice.<br><br><strong>Separate adviser fee</strong> or <strong>&quot;holding out&quot;</strong> as a financial adviser <strong>breaks the exclusion</strong>."},{"sec":"TRAP","front":"Trap 6: De minimis &mdash; IA only, NOT BD","back":"De minimis exemption (no place of biz + &le; 5 retail clients in 12 mo) applies to <strong>IAs/IARs only</strong>.<br><br><strong>NOT</strong> available to BDs/agents. A <strong>single retail customer</strong> in a state triggers BD/agent registration."},{"sec":"TRAP","front":"Trap 7: Sharing in client accounts &mdash; IAR vs Agent","back":"<strong>Agents</strong>: may share with BD approval and proportionate to contributions.<br><br><strong>IARs may NEVER share accounts</strong> with clients. No proportionate exception."},{"sec":"TRAP","front":"Trap 8: Discretion authorization &mdash; IA vs Agent","back":"<strong>Agents</strong>: need <strong>WRITTEN authorization BEFORE first discretionary trade</strong>.<br><br><strong>IAs</strong>: may operate on <strong>oral authorization for up to 10 days</strong> while waiting for written."},{"sec":"TRAP","front":"Trap 9: IA borrowing/lending with clients","back":"IA may borrow only if client is in business of lending money.<br><br>Otherwise prohibited. Specific exception language matters."},{"sec":"TRAP","front":"Trap 10: Federal-covered brochure delivery","back":"Federal-covered adviser brochure: <strong>before or at time of contract</strong>.<br><br><span class=\"hl\"><strong>NO 48-hour rule. NO 5-day rescission.</strong></span> Those are <strong>state-level</strong> NASAA Model Rule."},{"sec":"TRAP","front":"Trap 11: 90 vs. 120 days","back":"Don't confuse:<ul><li><strong>Annual brochure delivery</strong>: within <strong>120 days</strong> of fiscal year end</li><li><strong>Form ADV annual updating amendment</strong>: within <strong>90 days</strong> of fiscal year end</li></ul>"},{"sec":"TRAP","front":"Trap 12: Principal vs. Agency cross transactions","back":"<strong>Principal</strong> (IA trades from own account with client):<ul><li><strong>Per-trade</strong> written disclosure + per-trade consent</li></ul><strong>Agency cross</strong> (IA acts as broker for both sides):<ul><li>Written <strong>prospective</strong> consent OK</li><li>Per-trade disclosure</li><li>Annual statement</li></ul>"},{"sec":"TRAP","front":"Trap 13: Section 206 applies to ALL advisers","back":"Section 206 (anti-fraud) applies to ALL investment advisers &mdash; <strong>registered, exempt, AND excluded</strong>.<br><br>Don't assume excluded persons escape anti-fraud rules."},{"sec":"TRAP","front":"Trap 14: Soft dollars &mdash; eligible vs. not","back":"<strong>Eligible</strong>: research, brokerage services, market data, substantive seminars, software/analyses, proxy services, ECNs.<br><br><strong>NOT eligible (hard $ only)</strong>: travel, lodging, meals, entertainment, office equipment/rent, salaries, marketing, accounting/legal (general), telephone/internet, error correction.<br><br><strong>Mixed-use</strong> items must be allocated; written records required.<br><strong>Disclosure required even within safe harbor.</strong>"},{"sec":"TRAP","front":"Trap 15: Best execution is independent of soft dollars","back":"Existence of a soft-dollar arrangement does <strong>NOT</strong> relieve the IA of the best-execution obligation.<br><br>Best execution must be sought separately, even when soft dollars are within the Section 28(e) safe harbor."},{"sec":"TRAP","front":"Trap 16: Annuity types &mdash; security or not?","back":"<strong>NOT a security</strong>:<ul><li><strong>Fixed annuities</strong> (insurance product)</li><li><strong>Equity-Indexed Annuities</strong> &mdash; insurance product federally; state varies</li></ul><strong>IS a security</strong>:<ul><li><strong>Variable annuities</strong></li><li><strong>Variable life</strong></li></ul>"},{"sec":"TRAP","front":"Trap 17: Real estate / collectibles / currency / futures","back":"NOT securities under USA:<ul><li>Real estate (direct ownership)</li><li>Collectibles</li><li>Currency</li><li>Commodity futures (the futures themselves)</li></ul>(But <strong>options on commodities</strong> sometimes are.)"},{"sec":"TRAP","front":"Trap 18: IRAs and Keoghs themselves are NOT securities","back":"<strong>IRAs and Keoghs themselves are NOT securities.</strong><br><br>The <em>underlying investments</em> often are."},{"sec":"TRAP","front":"Trap 19: Administrator powers &mdash; injunctions","back":"<span class=\"hl\"><strong>Administrator CANNOT issue injunctions.</strong></span><br><br>Must seek a court order for an injunction.<br><br>Administrator <em>can</em> issue cease &amp; desist orders (summarily in emergencies)."},{"sec":"TRAP","front":"Trap 20: Administrator post-withdrawal jurisdiction","back":"<strong>1 year</strong> &mdash; the period the Administrator retains jurisdiction over an IA after Form ADV-W effective date."},{"sec":"TRAP","front":"Trap 21: Civil SOL under 1956 USA","back":"<strong>3 years from sale OR 2 years from discovery, whichever is sooner.</strong><br><br>NOT &quot;longer of.&quot; NOT &quot;2/3 the other way.&quot; (2002 USA: 5/2.)"},{"sec":"TRAP","front":"Trap 22: Yield hierarchy under time pressure","back":"<strong>Premium bond</strong>: Coupon &gt; Current &gt; YTM &gt; YTC<br><strong>Discount bond</strong>: Coupon &lt; Current &lt; YTM &lt; YTC<br><br>Easy to flip under time pressure. Anchor on the rule:<br><strong>&quot;Premium puts you down to par.&quot;</strong>"},{"sec":"TRAP","front":"Trap 23: Zero-coupon bond duration","back":"<strong>Zero-coupon bond duration = its maturity.</strong><br><br>Highest interest-rate sensitivity for a given maturity (no coupons to weight earlier dates)."},{"sec":"TRAP","front":"Trap 24: TIPS phantom income","back":"TIPS principal adjusts annually for inflation. The annual increase is <strong>taxable as interest income in the year of accrual</strong> &mdash; even though no cash is received.<br><br><strong>Best held in tax-deferred accounts.</strong> (Same trap for STRIPS &mdash; OID treatment.)"},{"sec":"TRAP","front":"Trap 25: Class A vs. Class C choice","back":"<strong>Class A</strong>: appropriate for <strong>long-term, large-dollar</strong> (lower 12b-1, breakpoints available).<br><br><strong>Class C</strong>: appropriate for <strong>short- to medium-term</strong> (no front load but ongoing 12b-1)."},{"sec":"TRAP","front":"Trap 26: LOI vs. ROA","back":"<strong>Letter of Intent</strong>: 13 months <em>forward</em>; can be <strong>backdated up to 90 days</strong>.<br><br><strong>Rights of Accumulation</strong>: combines current holdings + new purchase; <strong>NO time limit</strong>."},{"sec":"TRAP","front":"Trap 27: Breakpoint sale","back":"Recommending a purchase <strong>just below</strong> a breakpoint to avoid the lower charge is <span class=\"hl\"><strong>unethical regardless of investor instruction</strong></span>."},{"sec":"TRAP","front":"Trap 28: Sharpe vs. Treynor","back":"<strong>Sharpe</strong> uses standard deviation (<strong>total risk</strong>) &rarr; use when portfolio = entire holdings.<br><br><strong>Treynor</strong> uses beta (<strong>systematic risk only</strong>) &rarr; use when portfolio is one piece of larger diversified whole."},{"sec":"TRAP","front":"Trap 29: CAPM uses systematic risk only","back":"CAPM prices <strong>only systematic risk</strong> (beta).<br><br>Doesn't price non-systematic risk because it's diversifiable."},{"sec":"TRAP","front":"Trap 30: Wash sale &mdash; cross-account version","back":"Wash sale window is <strong>30 days BEFORE AND AFTER</strong> (61-day total).<br><br><span class=\"hl\">Crosses accounts</span> &mdash; selling in taxable and buying in IRA still triggers the wash, AND the basis adjustment is <strong>lost permanently</strong> in this case (worst-of-both-worlds outcome)."},{"sec":"REF","front":"Bond math &mdash; quick formulas","back":"<table><tr><td>Nominal yield</td><td>Coupon / Par</td></tr><tr><td>Current yield</td><td>Coupon / Mkt price</td></tr><tr><td>TEY</td><td>Tax-free / (1 &minus; t)</td></tr><tr><td>After-tax yield</td><td>Yield &times; (1 &minus; t)</td></tr><tr><td>$D_{mod}$</td><td>$D_{Mac}$ / (1 + y/m)</td></tr><tr><td>$\\Delta P/P$</td><td>&minus; $D_{mod}$ &times; $\\Delta y$</td></tr><tr><td>Conv ratio</td><td>Par / Conv price</td></tr><tr><td>Conv parity</td><td>Bond price / Conv ratio</td></tr><tr><td>Conv value</td><td>Stock price &times; Conv ratio</td></tr></table>"},{"sec":"REF","front":"Risk-adjusted return &mdash; formulas","back":"<table><tr><td>CAPM</td><td>$R_f + \\beta(R_m - R_f)$</td></tr><tr><td>Sharpe</td><td>$(R_p - R_f) / \\sigma_p$</td></tr><tr><td>Treynor</td><td>$(R_p - R_f) / \\beta_p$</td></tr><tr><td>Alpha</td><td>$R_p - [R_f + \\beta(R_m - R_f)]$</td></tr><tr><td>Sortino</td><td>$(R_p - R_f) / \\sigma_d$</td></tr><tr><td>Info ratio</td><td>$(R_p - R_b)$ / Tracking err</td></tr><tr><td>Portfolio beta</td><td>$\\sum w_i \\beta_i$</td></tr><tr><td>Correlation</td><td>Cov(X,Y) / ($\\sigma_X \\sigma_Y$)</td></tr></table>"},{"sec":"REF","front":"Returns &mdash; formulas","back":"<table><tr><td>HPR</td><td>(P&#8321; &minus; P&#8320; + Inc) / P&#8320;</td></tr><tr><td>Annualized</td><td>$(1 + R_{cum})^{1/n} - 1$</td></tr><tr><td>Real (approx)</td><td>Nominal &minus; Inflation</td></tr><tr><td>Real (Fisher)</td><td>(1+nom)/(1+inf) &minus; 1</td></tr><tr><td>After-tax (ord)</td><td>Pre-tax &times; (1 &minus; $t_{ord}$)</td></tr><tr><td>Expected return</td><td>$\\sum p_i R_i$</td></tr><tr><td>Geo vs arith</td><td>$G \\approx A - \\sigma^2/2$</td></tr></table>"},{"sec":"FED","front":"Sec. 28(e) &mdash; mixed-use items, the rule","back":"Items used <strong>partly for client benefit + partly for the IA's own purposes</strong> (e.g., terminal that does both research and back-office).<br><br>Must be <strong>allocated</strong> between hard-dollar and soft-dollar use; <strong>written records required</strong>. Disclosure required even within safe harbor."},{"sec":"USA","front":"Successor firm registration","back":"When a registered IA or BD becomes a <strong>successor firm</strong>:<ul><li>The successor's registration is effective for the unexpired portion of the year</li><li>If the successor is not yet registered, must file Form ADV (or BD)</li><li>Existing client agreements typically continue, but assignment-of-contract triggers may apply for IAs</li></ul>"},{"sec":"USA","front":"Consent to service of process","back":"Filed by every BD, agent, IA, IAR, and securities issuer at registration.<br><br>Designates the Administrator as the registrant's <strong>attorney for service of process</strong> in any noncriminal action arising from the Act.<br><br>Consent is permanent &mdash; outlives the registration."},{"sec":"FI","front":"Bond &mdash; coupon vs price relationship (memorized scenario)","back":"<strong>Rates &uarr;</strong> &rarr; existing bonds (with lower coupons) less attractive &rarr; <strong>prices &darr;</strong> until YTM = new market rate.<br><br><strong>Rates &darr;</strong> &rarr; existing bonds (with higher coupons) more attractive &rarr; <strong>prices &uarr;</strong> until YTM = new market rate.<br><br>Long-duration bonds move most."},{"sec":"POOL","front":"Sales charge calculation worked example","back":"Mutual fund: NAV = $9.30, POP = $10.00.<br><br><strong>Sales charge %</strong> = (POP &minus; NAV) / POP = (10.00 &minus; 9.30) / 10.00 = <strong>7.0%</strong><br><br>Note: sales charge is computed on POP, not NAV."},{"sec":"TAX","front":"Net Investment Income Tax (NIIT)","back":"Additional <strong>3.8% tax</strong> on the lesser of:<ul><li>Net investment income, OR</li><li>MAGI over threshold</li></ul><strong>Thresholds</strong>:<ul><li>Single: $200K</li><li>MFJ: $250K</li><li>MFS: $125K</li></ul>Applies on top of ordinary income tax / LTCG rate."},{"sec":"RET","front":"Roth IRA &mdash; 5-year rules (two of them)","back":"<strong>Rule 1 (qualified distribution)</strong>: 5 years from <em>first</em> Roth contribution + age 59&frac12; (or death/disability/$10K first home). Earnings tax-free.<br><br><strong>Rule 2 (conversions)</strong>: each conversion has its own 5-year clock for the 10% penalty (does not apply if 59&frac12;)."},{"sec":"EQ","front":"Voting trust certificate","back":"Certificate issued by a voting trust &mdash; an arrangement in which shareholders transfer their voting rights to a trustee (often during corporate restructuring).<br><br>VTCs are <strong>securities</strong> under USA. Holders retain economic rights but not voting."},{"sec":"INS","front":"Section 1035 &mdash; one-way street recap","back":"<strong>OK</strong>: Life&rarr;Life, Life&rarr;Annuity, Annuity&rarr;Annuity.<br><strong>NOT OK</strong>: <span class=\"hl\">Annuity &rarr; Life</span>.<br><br>Cost basis carries over. Used to avoid recognizing gain when switching products. Surrender charges may still apply on the old contract."},{"sec":"DERIV","front":"Equity option settlement","back":"Standard listed equity options:<ul><li>Settle <strong>physically</strong> &mdash; underlying shares change hands</li><li>Standard contract = <strong>100 shares</strong></li><li>Expire <strong>3rd Friday</strong> of expiration month</li><li>OCC (Options Clearing Corp) is the central counterparty</li></ul>Index options typically settle <strong>cash</strong>."},{"sec":"MPT","front":"Beta of bonds and cash","back":"<ul><li><strong>Cash / risk-free asset</strong>: $\\beta = 0$</li><li><strong>Most bonds</strong>: low or even slightly negative beta vs. equities</li><li><strong>Equities</strong>: $\\beta \\approx 1$ on average</li></ul>Adding low- or zero-beta assets reduces portfolio beta."},{"sec":"USA","front":"Cancellation vs. Withdrawal vs. Termination","back":"<strong>Cancellation</strong> (by Administrator): registration cancelled when registrant is dead, dissolved, or otherwise no longer in existence; not a disciplinary action.<br><strong>Withdrawal</strong> (by registrant): file Form ADV-W (IA) or U-5 (agent); 30 days to effective; Admin retains 1-year jurisdiction.<br><strong>Termination</strong>: ordinary end of registration year without renewal."},{"sec":"IAA","front":"Solicitor disclosures &mdash; subsumed into Marketing Rule","back":"Pre-Nov 2022: Cash Solicitation Rule required separate solicitor disclosure document.<br><br>Post-Nov 2022: rules folded into the <strong>Marketing Rule 206(4)-1</strong>. Promoters (formerly &quot;solicitors&quot;) treated as testimonials/endorsements w/ written agreement, oversight, bad-actor disqualification, and de minimis exception ($1,000/12 mo)."},{"sec":"REGBI","front":"Reg BI applies to whom?","back":"<strong>Broker-dealers and their associated persons</strong> when making a <strong>recommendation</strong> of any securities transaction or investment strategy involving securities to a <strong>retail customer</strong>.<br><br>Does NOT apply to:<ul><li>Investment advisers (still subject to fiduciary duty under IAA)</li><li>Institutional customers</li><li>Mere advice without a recommendation</li></ul>"},{"sec":"ETH","front":"Common conduct edge cases","back":"<ul><li><strong>Late delivery</strong> of confirmations / statements &mdash; prohibited</li><li><strong>Misrepresentation of registration as endorsement</strong> &mdash; prohibited; registration is NOT government approval</li><li><strong>Hedge clauses</strong> attempting to waive fiduciary duty &mdash; generally prohibited for IAs</li><li><strong>Use of &quot;RIA&quot; abbreviation</strong> discouraged (suggests credential or acronym)</li></ul>"},{"sec":"TAX","front":"Marginal vs. effective tax rate","back":"<strong>Marginal</strong> = rate on the next dollar of income. Used in TEY calculations and most planning decisions.<br><br><strong>Effective</strong> = total tax / total income. Always lower than marginal in a progressive system.<br><br>Exam: when in doubt, use the <strong>marginal</strong> rate for TEY and after-tax yield calculations."},{"sec":"RET","front":"Inherited IRA rules &mdash; SECURE Act 10-year rule","back":"<strong>Non-spouse beneficiaries</strong> inheriting after 12/31/2019:<ul><li>Generally must distribute the <strong>entire account within 10 years</strong></li><li>No annual RMD requirement during the 10 years (for now &mdash; final regs may add)</li></ul><strong>Eligible designated beneficiaries</strong> (spouse, minor child of decedent, disabled, chronically ill, &lt; 10 yrs younger): can stretch over their life expectancy."},{"sec":"FED","front":"&quot;Free-writing prospectus&quot;","back":"A written communication that constitutes an offer to sell a security after the registration statement is filed. Permitted under <strong>Rule 433</strong>:<ul><li>Must be filed with SEC if substantially different from prospectus or first published</li><li>Includes electronic communications, road shows in some cases</li></ul>"},{"sec":"USA","front":"Surety bond purpose &amp; amount","back":"Surety bond may
