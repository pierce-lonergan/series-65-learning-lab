  eli5:"An account where the adviser can trade without asking first. IAs can act on 10 days of oral consent; agents need written consent BEFORE the first trade.",
  full:`<p><b>Discretion</b> = authority to choose security, amount, or action without prior client approval each time. <b>IAs</b>: may use oral authorization for up to 10 days while awaiting written. <b>Agents (BD)</b>: need <b>written</b> authorization before the first discretionary trade.</p>`,
  related:["investment-adviser","agent","prohibited-practices","custody-rule"] },
"statute-of-limitations":{ term:"Statute of Limitations (USA)", group:"Laws", aliases:["statute of limitations"],
  eli5:"The deadline to sue or prosecute. Civil under the old USA: the sooner of 3 years from sale or 2 from discovery. Criminal: 5 years.",
  full:`<p><b>Civil (1956 USA)</b>: sooner of <b>3 years from sale</b> or <b>2 years from discovery</b>. <b>Criminal</b>: 5-year SOL, max $5,000 fine + 3 years prison (the '5-5-3' rule). Civil liability survives death of either party.</p>`,
  related:["administrator","uniform-securities-act"] }
});
</script>

<script>
/* ====================  CHUNK: PRODUCTS & TAX DEEP DIVE  ==================== */
Object.assign(GLOSSARY_DATA, {
"annuity":{ term:"Annuity", group:"Insurance", aliases:["annuity","annuities"],
  eli5:"A contract with an insurance company: you pay in, and later it pays you back — often for life. Grows tax-deferred.",
  full:`<p>An <b>annuity</b> swaps a premium for future payments. Money grows <b>tax-deferred</b>; withdrawals come out earnings-first (LIFO), taxed as ordinary income, with a 10% penalty before 59½. Types differ by investment risk (fixed vs. variable) and timing (immediate vs. deferred).</p>`,
  related:["fixed-annuity","variable-annuity","annuity-payout","exchange-1035","ordinary-income"] },
"fixed-annuity":{ term:"Fixed Annuity", group:"Insurance", aliases:["fixed annuity"],
  eli5:"An annuity with a guaranteed interest rate from the insurer. It's NOT a security — it's an insurance product.",
  full:`<p>A <b>fixed annuity</b> pays a guaranteed rate; the insurer bears the investment risk. Because there's no investment risk to the buyer, it's <b>not a security</b> — insurance-regulated only.</p>`,
  related:["annuity","variable-annuity"] },
"variable-annuity":{ term:"Variable Annuity", group:"Insurance", aliases:["variable annuity","variable annuities"],
  eli5:"An annuity where your money is invested in market subaccounts. You bear the risk — so it IS a security and needs a securities license to sell.",
  full:`<p>A <b>variable annuity</b> invests in separate-account subaccounts; the holder bears market risk, so it <b>is a security</b> (and an insurance product) — requiring Series 6/7 + insurance license. The AIR (assumed interest rate) sets the first payout; later payments rise/fall vs. it.</p>`,
  related:["annuity","fixed-annuity","annuity-payout"] },
"annuity-payout":{ term:"Annuity Payout Options", group:"Insurance", aliases:["payout options","life only","straight life","period certain","joint and survivor"],
  eli5:"How an annuity pays you out. 'Life only' pays the most but stops at death; adding survivor/period-certain protection lowers each check.",
  full:`<p>Settlement options: <b>Life only</b> (highest payment, stops at death), <b>Life with period certain</b> (continues to a beneficiary for a set term), <b>Joint & survivor</b> (two lives, lower payment), and <b>Unit refund</b>. More protection = smaller checks.</p>`,
  related:["annuity","variable-annuity"] },
"exchange-1035":{ term:"1035 Exchange", group:"Insurance", aliases:["1035 exchange","1035"],
  eli5:"A tax-free swap of one insurance/annuity contract for another. You can go life→annuity, but NOT annuity→life.",
  full:`<p>A <b>1035 exchange</b> moves cash value between contracts without triggering tax: life→life, life→annuity, annuity→annuity are allowed; <b>annuity→life is NOT</b> (a one-way street). Cost basis carries over.</p>`,
  related:["annuity","life-insurance"] },
"life-insurance":{ term:"Life Insurance Types", group:"Insurance", aliases:["whole life","term life","universal life","variable life insurance"],
  eli5:"Term = pure cheap coverage for a period. Whole/universal = lifelong with cash value. Variable life invests the cash value (and is a security).",
  full:`<p><b>Term</b>: pure death benefit, no cash value, cheapest. <b>Whole life</b>: lifelong, guaranteed cash value. <b>Universal</b>: flexible premiums. <b>Variable life</b>: cash value in subaccounts — holder bears risk, so it's a <b>security</b>.</p>`,
  related:["exchange-1035","variable-annuity"] },
"401k":{ term:"401(k) Plan", group:"Retirement", aliases:["401(k)","401k"],
  eli5:"A workplace retirement plan where you contribute from your paycheck (pre-tax or Roth), often with an employer match.",
  full:`<p>A <b>401(k)</b> is an employer defined-contribution plan. Employee defers salary (pre-tax Traditional or after-tax Roth); employers may match. Higher contribution limits than IRAs. 403(b) is the non-profit equivalent; 457(b) is for government.</p>`,
  related:["traditional-ira","roth-ira","defined-benefit","rmd"] },
"defined-benefit":{ term:"Defined Benefit vs. Defined Contribution", group:"Retirement", aliases:["defined benefit","defined contribution","DB plan","DC plan","pension"],
  eli5:"DB (pension) promises a set payout and the employer bears the risk. DC (like a 401k) just defines contributions — you bear the investment risk.",
  full:`<p><b>Defined benefit</b> (pension): promises a formula-based benefit; employer bears investment risk; PBGC-insured. <b>Defined contribution</b> (401k, etc.): only inputs are defined; the participant bears the risk and the final balance varies.</p>`,
  related:["401k","erisa"] },
"sep-ira":{ term:"SEP & SIMPLE IRAs", group:"Retirement", aliases:["SEP IRA","SEP","SIMPLE IRA","SIMPLE"],
  eli5:"Retirement plans for small businesses and the self-employed — simpler and cheaper to run than a 401(k).",
  full:`<p><b>SEP IRA</b>: employer-funded, up to 25% of comp (high cap) — popular with the self-employed. <b>SIMPLE IRA</b>: for small employers (≤100 employees), employee deferrals + mandatory employer contribution, lower limits.</p>`,
  related:["traditional-ira","401k"] },
"mbs":{ term:"Mortgage-Backed Security (MBS)", group:"Fixed Income", aliases:["mortgage-backed securities","MBS","pass-through"],
  eli5:"A bond made from a pool of home mortgages. Homeowners' monthly payments 'pass through' to you — but they can prepay early.",
  full:`<p>An <b>MBS</b> bundles mortgages; principal + interest pass through monthly. Risks: <b>prepayment</b> (rates fall, homeowners refinance, you get cash back early) and <b>extension</b> (rates rise, prepayments slow). CMOs slice these into tranches.</p>`,
  related:["cmo","agency-securities","reinvestment-risk"] },
"cmo":{ term:"CMO & Tranches", group:"Fixed Income", aliases:["CMO","collateralized mortgage obligation","tranche","tranches","PAC","TAC","companion tranche"],
  eli5:"A mortgage bond sliced into layers ('tranches') with different risk. PAC tranches are safest/most predictable; companion tranches absorb the chaos.",
  full:`<p>A <b>CMO</b> splits MBS cash flows into <b>tranches</b>. <b>PAC</b> (Planned Amortization Class): most predictable, lowest risk/yield. <b>TAC</b>: protects against prepayment only. <b>Companion/support</b>: absorbs volatility, highest risk/yield. <b>Z-tranche</b>: accrues, paid last.</p>`,
  related:["mbs","agency-securities"] },
"agency-securities":{ term:"Agency Securities (Ginnie/Fannie/Freddie)", group:"Fixed Income", aliases:["Ginnie Mae","Fannie Mae","Freddie Mac","GNMA","FNMA","FHLMC"],
  eli5:"Mortgage bonds from government-linked agencies. Ginnie Mae has full U.S. backing; Fannie and Freddie only have implied backing.",
  full:`<p><b>Ginnie Mae (GNMA)</b>: full faith and credit of the U.S. <b>Fannie (FNMA)</b> and <b>Freddie (FHLMC)</b>: government-sponsored enterprises with only <i>implicit</i> backing. All are federally and (unlike Treasuries) state/locally taxable.</p>`,
  related:["mbs","cmo","treasury"] },
"tips":{ term:"TIPS (Inflation-Protected)", group:"Fixed Income", aliases:["TIPS","Treasury Inflation-Protected"],
  eli5:"Treasury bonds whose principal grows with inflation. Catch: that yearly growth is taxed even though you don't get the cash until maturity.",
  full:`<p><b>TIPS</b> adjust principal with the CPI, so coupons rise with inflation. The annual principal increase is <b>taxed as phantom income</b> each year — best held in tax-deferred accounts. Protects purchasing power.</p>`,
  related:["treasury","strips","inflation"] },
"strips":{ term:"STRIPS / Zero-Coupon Bonds", group:"Fixed Income", aliases:["STRIPS","zero-coupon","zero coupon bond"],
  eli5:"Bonds that pay no interest along the way — you buy them cheap and they grow to face value. The 'phantom' interest is still taxed yearly.",
  full:`<p><b>Zero-coupon</b> bonds (incl. Treasury <b>STRIPS</b>) are sold at a deep discount and pay everything at maturity. No coupons means no reinvestment risk — but the imputed interest is taxed annually (OID/phantom income). Their duration equals their maturity (max rate sensitivity).</p>`,
  related:["tips","duration","reinvestment-risk","treasury"] },
"convertible-bond":{ term:"Convertible Bond", group:"Fixed Income", aliases:["convertible bond","conversion ratio","conversion parity"],
  eli5:"A bond you can swap for a set number of the company's shares — a bond with a built-in stock upside, so it pays a lower yield.",
  full:`<p>A <b>convertible bond</b> can convert into common stock at a set <b>conversion ratio</b> (par ÷ conversion price). It offers equity upside, so it yields less than a comparable straight bond. Conversion parity = bond price ÷ conversion ratio.</p>`,
  related:["bond","common-stock"] },
"reit":{ term:"REIT (Real Estate Investment Trust)", group:"Pooled", aliases:["REIT","REITs","real estate investment trust"],
  eli5:"A company that owns income real estate and trades like a stock. It must pay out 90% of income, so dividends are high (and taxed as ordinary income).",
  full:`<p>A <b>REIT</b> pools real estate. To avoid corporate tax it must distribute <b>90%+</b> of taxable income, hold 75% in real estate, and have 100+ shareholders. Distributions are mostly <b>ordinary income</b> (not qualified dividends). Equity vs. mortgage vs. hybrid REITs.</p>`,
  related:["common-stock","ordinary-income","dpp"] },
"dpp":{ term:"Direct Participation Program (DPP)", group:"Pooled", aliases:["DPP","direct participation program","limited partnership"],
  eli5:"A limited partnership that passes income, losses, and tax deductions straight to investors. Illiquid, complex, and tax-driven.",
  full:`<p>A <b>DPP</b> (limited partnership) flows income, gains, losses, and deductions through to investors — no entity-level tax. <b>Passive losses</b> can only offset passive income. Common in real estate and oil & gas. Illiquid; suitability is key.</p>`,
  related:["reit","hedge-fund"] },
"hedge-fund":{ term:"Hedge Fund", group:"Pooled", aliases:["hedge fund","hedge funds","2 and 20","qualified purchaser"],
  eli5:"A lightly-regulated private fund for wealthy investors. Uses aggressive strategies (leverage, shorting, derivatives) and charges high fees ('2 and 20').",
  full:`<p>A <b>hedge fund</b> is a private pool exempt from the Investment Company Act via <b>3(c)(1)</b> (≤100 accredited investors) or <b>3(c)(7)</b> (qualified purchasers only). It can use leverage, short-selling, and derivatives, with lockups and a typical <b>'2 and 20'</b> fee (2% of assets + 20% of profits).</p>`,
  related:["dpp","accredited-investor","qualified-client","short-selling"] },
"529-plan":{ term:"529 Plan", group:"Strategies", aliases:["529 plan","529"],
  eli5:"A tax-advantaged account for education. Money grows tax-free and comes out tax-free for school costs. Counted as a parent asset for aid.",
  full:`<p>A <b>529 plan</b> grows tax-deferred; qualified education withdrawals are tax-free (incl. up to $10K/yr K-12 tuition). High contribution limits, 5-year gift front-loading, donor keeps control. Low financial-aid impact (parent asset). SECURE 2.0 allows a $35K lifetime rollover to a Roth.</p>`,
  related:["coverdell","ugma-utma","roth-ira","gift-estate-tax"] },
"coverdell":{ term:"Coverdell ESA", group:"Strategies", aliases:["Coverdell","Coverdell ESA"],
  eli5:"A small education savings account ($2,000/yr cap) with tax-free growth, usable for K-12 and college — but with income limits.",
  full:`<p>A <b>Coverdell ESA</b> allows $2,000/year per beneficiary (income-limited), tax-free growth for K-12 and higher-ed expenses. Must be used by age 30. More investment flexibility than a 529 but a much lower contribution cap.</p>`,
  related:["529-plan","ugma-utma"] },
"ugma-utma":{ term:"UGMA / UTMA Custodial Accounts", group:"Strategies", aliases:["UGMA","UTMA","custodial account"],
  eli5:"An account an adult manages for a minor. It's an irrevocable gift — it becomes the child's at adulthood — and hurts financial aid a lot.",
  full:`<p><b>UGMA/UTMA</b> are custodial accounts: an irrevocable gift to a minor, managed by a custodian until the age of majority, then the child's outright. Subject to the <b>kiddie tax</b>; heavy financial-aid impact (~20% — it's the student's asset).</p>`,
  related:["529-plan","coverdell","kiddie-tax","gift-estate-tax"] },
"wash-sale":{ term:"Wash Sale Rule", group:"Strategies", aliases:["wash sale","wash-sale"],
  eli5:"You can't claim a tax loss if you rebuy the same security within 30 days before or after selling it. The IRS blocks the fake loss.",
  full:`<p>The <b>wash sale rule</b> disallows a loss if you buy a substantially identical security within <b>30 days before or after</b> (a 61-day window). The disallowed loss adds to the new shares' basis. It even applies across accounts (e.g., selling in taxable, rebuying in your IRA — where the basis benefit is lost forever).</p>`,
  graphic:"wash-sale-timeline", related:["capital-gains","basis"] },
"gift-estate-tax":{ term:"Gift & Estate Tax", group:"Strategies", aliases:["gift tax","estate tax","annual exclusion","lifetime exemption"],
  eli5:"Taxes on giving wealth away. You can give a yearly amount per person tax-free ($19K in 2025), with a large lifetime exemption beyond that.",
  full:`<p>The <b>annual gift exclusion</b> ($18K in 2024, $19K in 2025) is gift-tax-free per recipient per year. Above that uses the <b>lifetime exemption</b> (~$13.99M in 2025). Top estate tax rate is 40%. Assets get a <b>step-up in basis</b> at death.</p>`,
  related:["step-up-basis","529-plan","ugma-utma"] },
"step-up-basis":{ term:"Step-Up in Basis", group:"Strategies", aliases:["step-up in basis","step-up","stepped-up basis"],
  eli5:"When you inherit an asset, its cost basis resets to the value at death — wiping out the capital-gains tax on all prior growth.",
  full:`<p><b>Step-up in basis</b>: an heir's basis becomes the asset's value at the decedent's death. Decades of appreciation escape capital-gains tax. A major reason to hold appreciated assets until death rather than gifting them during life.</p>`,
  related:["basis","capital-gains","gift-estate-tax"] },
"qualified-dividend":{ term:"Qualified Dividend", group:"Strategies", aliases:["qualified dividend","qualified dividends"],
  eli5:"A dividend taxed at the low long-term capital-gains rate instead of your higher ordinary rate — if you held the stock long enough.",
  full:`<p><b>Qualified dividends</b> (from U.S. or qualified foreign corporations, held >60 days around the ex-date) get the favorable 0/15/20% rate. <b>Non-qualified</b> (REITs, MLPs, money-market funds) are taxed as ordinary income.</p>`,
  related:["capital-gains","ordinary-income","reit"] },
"niit":{ term:"Net Investment Income Tax (NIIT)", group:"Strategies", aliases:["NIIT","Net Investment Income Tax"],
  eli5:"An extra 3.8% tax on investment income for higher earners (over $200K single / $250K married).",
  full:`<p>The <b>NIIT</b> adds <b>3.8%</b> on the lesser of net investment income or MAGI over the threshold ($200K single, $250K joint). It stacks on top of capital-gains and ordinary rates for high earners.</p>`,
  related:["capital-gains","qualified-dividend"] },
"kiddie-tax":{ term:"Kiddie Tax", group:"Strategies", aliases:["kiddie tax"],
  eli5:"Stops parents from parking investments in a child's name to dodge taxes: a child's investment income above a threshold is taxed at the parent's rate.",
  full:`<p>The <b>kiddie tax</b> taxes a child's unearned income above ~$2,600 (2024) at the <b>parent's</b> marginal rate. Applies to children under 18 (or students under 24). It blunts the benefit of UGMA/UTMA income-shifting.</p>`,
  related:["ugma-utma","ordinary-income"] },
"margin":{ term:"Margin Account (Reg T)", group:"Strategies", aliases:["margin account","margin","Reg T","Regulation T","maintenance margin"],
  eli5:"Borrowing from your broker to buy more securities. Reg T requires you to put up 50%; if your equity falls too far you get a margin call.",
  full:`<p>A <b>margin account</b> lets you borrow against securities. <b>Reg T</b> initial margin is <b>50%</b>. FINRA maintenance is <b>25%</b> long / <b>30%</b> short — fall below and you get a margin call. Leverage magnifies gains and losses.</p>`,
  graphic:"margin-call", related:["short-selling","common-stock"] },
"short-selling":{ term:"Short Selling", group:"Strategies", aliases:["short selling","short sale","selling short"],
  eli5:"Betting a stock will fall: you borrow shares, sell them now, and hope to rebuy cheaper later. Losses are theoretically unlimited.",
  full:`<p><b>Short selling</b> borrows shares to sell now, aiming to buy back lower. Risks: <b>unlimited</b> loss (the stock can rise forever), a forced buy-in, and owing dividends to the lender. Requires a margin account and a locate (Reg SHO).</p>`,
  related:["margin","option"] },
"dca":{ term:"Dollar-Cost Averaging (DCA)", group:"Strategies", aliases:["dollar-cost averaging","DCA"],
  eli5:"Investing a fixed dollar amount on a schedule. You automatically buy more shares when prices are low, fewer when high.",
  full:`<p><b>Dollar-cost averaging</b> invests equal dollar amounts at regular intervals. The math result: your average <b>cost</b> per share ends up below the average <b>price</b> per share, because fixed dollars buy more shares when cheap.</p>`,
  related:["mutual-fund","standard-deviation"] },
"intrinsic-time-value":{ term:"Intrinsic Value & Time Value", group:"Derivatives", aliases:["intrinsic value","time value","moneyness"],
  eli5:"An option's premium = intrinsic value (how much it's already 'in the money') + time value (extra for the chance it moves further before expiry).",
  full:`<p>Option premium = <b>intrinsic value</b> (the in-the-money amount, never negative) + <b>time value</b> (premium for remaining time/uncertainty, which decays to zero at expiration). <b>Moneyness</b>: a call is in-the-money when stock > strike.</p>`,
  related:["option","strike-price","straddle"] },
"futures":{ term:"Futures & Forwards", group:"Derivatives", aliases:["futures","forwards","forward contract"],
  eli5:"Contracts to buy/sell something at a set price on a future date. Unlike options, both sides are OBLIGATED. Futures trade on exchanges; forwards are private.",
  full:`<p><b>Futures</b> are standardized, exchange-traded, marked-to-market daily. <b>Forwards</b> are customized private (OTC) contracts with counterparty risk. Both are firm <b>obligations</b> (unlike options, which are rights). Used to hedge commodities, rates, currencies.</p>`,
  related:["option","short-selling"] }
});
</script>

<script>
/* ====================  CHUNK: ECONOMICS & ANALYSIS  ==================== */
Object.assign(GLOSSARY_DATA, {
"gnp":{ term:"GNP vs. GDP", group:"Economics", aliases:["GNP","Gross National Product"],
  eli5:"GDP counts everything made INSIDE a country. GNP counts everything made by a country's people/companies, wherever they are in the world.",
  full:`<p><b>GDP</b> = output produced within the borders. <b>GNP</b> = output produced by the country's residents/firms anywhere. Example: a Toyota plant in Kentucky adds to U.S. GDP but Japanese GNP.</p>`,
  related:["gdp","business-cycle"] },
"cpi-ppi":{ term:"CPI & PPI (Inflation Gauges)", group:"Economics", aliases:["CPI","PPI","Consumer Price Index","Producer Price Index"],
  eli5:"Two inflation thermometers. CPI tracks prices consumers pay; PPI tracks wholesale prices producers get (a leading hint for CPI).",
  full:`<p><b>CPI</b> measures a basket of consumer prices — the headline inflation number. <b>PPI</b> measures wholesale/producer prices and often <i>leads</i> CPI. Demand-pull inflation = too much money chasing goods; cost-push = rising input costs.</p>`,
  related:["inflation","leading-indicators"] },
"monetary-aggregates":{ term:"Money Supply (M1, M2)", group:"Economics", aliases:["M1","M2","money supply","monetary aggregates"],
  eli5:"Ways to measure how much money exists. M1 = cash you can spend now; M2 = M1 plus savings you can convert quickly.",
  full:`<p><b>M1</b> = currency + checking/demand deposits (spendable now). <b>M2</b> = M1 + savings, small CDs, and retail money-market funds. The Fed influences these to steer the economy.</p>`,
  related:["federal-reserve","inflation"] },
"balance-of-payments":{ term:"Balance of Payments", group:"Economics", aliases:["balance of payments","current account","trade deficit"],
  eli5:"A country's financial scorecard with the rest of the world — all the money flowing in and out from trade and investment.",
  full:`<p>The <b>balance of payments</b> tracks all cross-border transactions. The <b>current account</b> covers trade in goods/services; a <b>trade deficit</b> (importing more than exporting) must be financed by foreign capital inflows. Exchange rates and a strong/weak dollar shift these flows.</p>`,
  related:["gdp","currency-risk"] },
"technical-analysis":{ term:"Technical Analysis", group:"Analysis", aliases:["technical analysis"],
  eli5:"Predicting prices by studying charts — past price and volume patterns — rather than the company's financials.",
  full:`<p><b>Technical analysis</b> assumes prices move in trends and history repeats (investor psychology). It uses charts, support/resistance, moving averages, and indicators like RSI. Contrast with fundamental analysis (which studies value).</p>`,
  related:["fundamental-analysis","support-resistance","moving-average","rsi","dow-theory","emh"] },
"support-resistance":{ term:"Support & Resistance", group:"Analysis", aliases:["support and resistance","support","resistance"],
  eli5:"Price floors and ceilings. 'Support' is where buyers tend to step in; 'resistance' is where sellers do. Breaking through signals a new trend.",
  full:`<p><b>Support</b> is a level where buying historically halts a decline; <b>resistance</b> is where selling caps a rally. A breakout above resistance (or below support) is read as a trend change.</p>`,
  related:["technical-analysis","moving-average"] },
"moving-average":{ term:"Moving Averages (Golden/Death Cross)", group:"Analysis", aliases:["moving average","moving averages","golden cross","death cross","50-day","200-day"],
  eli5:"A smoothed line of average price. When the short-term average crosses above the long-term one it's a 'golden cross' (bullish); below is a 'death cross' (bearish).",
  full:`<p>A <b>moving average</b> smooths price noise. The 50-day is short-term, the 200-day long-term. <b>Golden cross</b> (50 above 200) = bullish; <b>death cross</b> (50 below 200) = bearish.</p>`,
  related:["technical-analysis","support-resistance"] },
"rsi":{ term:"RSI (Relative Strength Index)", group:"Analysis", aliases:["RSI","Relative Strength Index"],
  eli5:"A 0–100 momentum gauge. Above 70 means 'overbought' (maybe due to fall); below 30 means 'oversold' (maybe due to bounce).",
  full:`<p><b>RSI</b> oscillates 0–100. Above <b>70</b> = overbought; below <b>30</b> = oversold. Technicians use it to spot momentum extremes and possible reversals.</p>`,
  related:["technical-analysis","moving-average"] },
"dow-theory":{ term:"Dow Theory", group:"Analysis", aliases:["Dow Theory"],
  eli5:"A classic idea that a market trend is only 'confirmed' when both the industrial and transportation averages move the same way.",
  full:`<p><b>Dow Theory</b> says a primary trend is confirmed when the Dow Industrials and Dow Transports both reach new highs (or lows) together. Without confirmation, the move is suspect.</p>`,
  related:["technical-analysis"] },
"emh":{ term:"Efficient Market Hypothesis (EMH)", group:"Analysis", aliases:["Efficient Market Hypothesis","EMH","random walk"],
  eli5:"The theory that prices already reflect available information, so you can't reliably beat the market. Comes in weak, semi-strong, and strong forms.",
  full:`<p><b>EMH</b>: <b>Weak form</b> — prices reflect past price/volume (technical analysis useless). <b>Semi-strong</b> — prices reflect all public info (fundamental analysis useless too). <b>Strong</b> — prices reflect even insider info. Implies passive index investing is rational.</p>`,
  related:["technical-analysis","fundamental-analysis","diversification"] },
"fundamental-analysis":{ term:"Fundamental Analysis", group:"Analysis", aliases:["fundamental analysis"],
  eli5:"Valuing a company by its actual business — earnings, assets, growth — using financial statements, instead of chart patterns.",
  full:`<p><b>Fundamental analysis</b> estimates intrinsic value from financial statements, the economy, and the industry. Top-down starts with the macro picture; bottom-up starts with the individual company.</p>`,
  related:["balance-sheet","income-statement","financial-ratios","eps","technical-analysis"] },
"balance-sheet":{ term:"Balance Sheet", group:"Analysis", aliases:["balance sheet"],
  eli5:"A snapshot of what a company owns and owes at one moment. Assets = Liabilities + Equity, always.",
  full:`<p>The <b>balance sheet</b> follows: <b>Assets = Liabilities + Shareholders' Equity</b>. It's a point-in-time photo. Current assets/liabilities are due within a year; the difference (working capital) measures short-term health.</p>`,
  related:["income-statement","cash-flow-statement","financial-ratios"] },
"income-statement":{ term:"Income Statement", group:"Analysis", aliases:["income statement"],
  eli5:"The 'did we make money?' report over a period: revenue minus costs equals net income (the bottom line).",
  full:`<p>The <b>income statement</b> runs Revenue − COGS = Gross Profit − Operating Expenses = Operating Income (EBIT) − interest/tax = <b>Net Income</b>. It covers a period, unlike the balance sheet's snapshot.</p>`,
  related:["balance-sheet","cash-flow-statement","eps","ebitda"] },
"cash-flow-statement":{ term:"Statement of Cash Flows", group:"Analysis", aliases:["statement of cash flows","cash flow statement"],
  eli5:"Tracks actual cash moving in and out — because a profitable company can still run out of cash. Split into operating, investing, financing.",
  full:`<p>The <b>cash flow statement</b> reconciles net income to real cash across three sections: <b>operating</b> (running the business), <b>investing</b> (buying/selling assets), and <b>financing</b> (debt, equity, dividends).</p>`,
  related:["income-statement","balance-sheet"] },
"financial-ratios":{ term:"Financial Ratios", group:"Analysis", aliases:["financial ratios","current ratio","quick ratio","ROE","P/E ratio"],
  eli5:"Quick math checks on a company's health: liquidity (can it pay bills?), profitability (ROE), and valuation (P/E).",
  full:`<p>Key <b>ratios</b>: Current ratio = current assets ÷ current liabilities (≥1 is healthy). Quick ratio excludes inventory. <b>ROE</b> = net income ÷ equity (profitability). <b>P/E</b> = price ÷ EPS (valuation). Debt-to-equity gauges leverage.</p>`,
  related:["balance-sheet","income-statement","eps","fundamental-analysis"] },
"eps":{ term:"EPS (Earnings Per Share)", group:"Analysis", aliases:["EPS","earnings per share"],
  eli5:"A company's profit divided by its shares — the slice of earnings behind each share you own.",
  full:`<p><b>EPS</b> = (net income − preferred dividends) ÷ weighted average shares. <b>Diluted EPS</b> assumes all convertibles/options convert (always ≤ basic EPS). It drives the P/E ratio.</p>`,
  related:["financial-ratios","income-statement","ebitda"] },
"ebitda":{ term:"EBIT & EBITDA", group:"Analysis", aliases:["EBIT","EBITDA","operating income"],
  eli5:"Measures of operating profit. EBIT = earnings before interest & taxes; EBITDA also adds back depreciation & amortization (a rough cash-earnings proxy).",
  full:`<p><b>EBIT</b> (operating income) = earnings before interest and taxes. <b>EBITDA</b> adds back depreciation and amortization — a proxy for cash operating earnings, though it ignores the capex needed to keep the business running.</p>`,
  related:["income-statement","eps","depreciation"] }
});
</script>

<script>
/* ====================  CHUNK: MARKETS, MONEY MARKET & PORTFOLIO  ==================== */
Object.assign(GLOSSARY_DATA, {
"money-market":{ term:"Money Market Instruments", group:"Fixed Income", aliases:["money market","money market instruments"],
  eli5:"Super-short, super-safe places to park cash for under a year — T-bills, CDs, commercial paper. Low risk, low return, high liquidity.",
  full:`<p><b>Money market</b> instruments are short-term debt (≤1 year), highly liquid and low-risk: T-bills, negotiable CDs, commercial paper, banker's acceptances, repos, and Eurodollars. Where investors hold 'cash.'</p>`,
  related:["commercial-paper","negotiable-cd","repo","treasury"] },
"commercial-paper":{ term:"Commercial Paper", group:"Fixed Income", aliases:["commercial paper"],
  eli5:"A short-term IOU big companies issue to fund day-to-day needs. Unsecured, sold at a discount, matures in 270 days or less.",
  full:`<p><b>Commercial paper</b> is unsecured corporate short-term debt, max <b>270 days</b> (which keeps it exempt from registration). Sold at a discount by strong, highly-rated companies for working capital.</p>`,
  related:["money-market","bankers-acceptance"] },
"bankers-acceptance":{ term:"Banker's Acceptance (BA)", group:"Fixed Income", aliases:["banker's acceptance","bankers acceptance","BA"],
  eli5:"A short-term IOU used in international trade that a bank guarantees — so it's as good as the bank's credit.",
  full:`<p>A <b>banker's acceptance</b> is a time draft a bank 'accepts' (guarantees), used to finance imports/exports. Typically 30–180 days, sold at a discount.</p>`,
  related:["money-market","commercial-paper"] },
"repo":{ term:"Repurchase Agreement (Repo)", group:"Fixed Income", aliases:["repurchase agreement","repo","reverse repo"],
  eli5:"A very short-term loan secured by securities: sell now, agree to buy back slightly higher tomorrow. The price gap is the interest.",
  full:`<p>A <b>repo</b> is a collateralized loan — one party sells securities and agrees to repurchase them at a higher price (the implied interest). The <b>Fed</b> uses repos to manage short-term rates.</p>`,
  related:["money-market","federal-reserve"] },
"negotiable-cd":{ term:"Negotiable CD (Jumbo)", group:"Fixed Income", aliases:["negotiable CD","jumbo CD","Eurodollar"],
  eli5:"A big bank CD ($100K+) that can be traded before maturity, unlike the small bank CDs you get as a saver.",
  full:`<p><b>Negotiable (jumbo) CDs</b> are $100K+ and trade in a secondary market. <b>Eurodollars</b> are U.S.-dollar deposits held in banks outside the U.S. — not 'European,' just offshore dollars.</p>`,
  related:["money-market"] },
"accrued-interest":{ term:"Accrued Interest", group:"Fixed Income", aliases:["accrued interest"],
  eli5:"The interest a bond has earned but not yet paid. A bond buyer reimburses the seller for the days they held it since the last coupon.",
  full:`<p><b>Accrued interest</b> is interest earned since the last coupon. The buyer pays it to the seller at settlement. Corporates/munis use a 30/360 day count; Treasuries use actual/actual.</p>`,
  related:["coupon","bond"] },
"anticipation-notes":{ term:"Municipal Anticipation Notes", group:"Fixed Income", aliases:["anticipation notes","TAN","RAN","BAN","TRAN"],
  eli5:"Short-term muni IOUs repaid from money the government expects soon — like upcoming taxes (TAN) or a future bond sale (BAN).",
  full:`<p>Short-term munis repaid from anticipated revenue: <b>TAN</b> (taxes), <b>RAN</b> (revenue), <b>BAN</b> (bond proceeds), <b>TRAN</b> (tax & revenue), <b>GAN</b> (grants). A cash-flow bridge for issuers.</p>`,
  related:["munis","go-revenue-bond"] },
"sinking-fund":{ term:"Sinking Fund", group:"Fixed Income", aliases:["sinking fund"],
  eli5:"Money an issuer sets aside over time to repay a bond, lowering the risk that it can't pay at maturity.",
  full:`<p>A <b>sinking fund</b> requires the issuer to retire portions of a bond issue on a schedule, reducing default risk and reassuring investors.</p>`,
  related:["bond","callable-bond"] },
"modern-portfolio-theory":{ term:"Modern Portfolio Theory (MPT)", group:"Portfolio", aliases:["Modern Portfolio Theory","MPT","Markowitz"],
  eli5:"Markowitz's big idea: judge an investment by what it does to your WHOLE portfolio's risk and return, not on its own. Mix smartly to cut risk.",
  full:`<p><b>MPT</b> says investors should optimize the portfolio as a whole. By combining assets that don't move together, you reduce risk without sacrificing return — the heart of diversification. Use the tool below.</p>`,
  graphic:"diversification", related:["efficient-frontier","diversification","correlation","capm"] },
"efficient-frontier":{ term:"Efficient Frontier", group:"Portfolio", aliases:["efficient frontier"],
  eli5:"The set of 'best' portfolios — each offering the most return for its level of risk. You want to be ON this curve, not below it.",
  full:`<p>The <b>efficient frontier</b> is the curve of portfolios giving maximum return for each risk level. Adding a risk-free asset creates the <b>Capital Market Line</b>; the tangent point is the market portfolio.</p>`,
  graphic:"diversification", related:["modern-portfolio-theory","diversification","capm","sharpe"] },
"sortino":{ term:"Sortino Ratio", group:"Portfolio", aliases:["Sortino ratio","Sortino"],
  eli5:"Like the Sharpe ratio, but it only counts DOWNSIDE volatility — because investors don't mind upside surprises.",
  full:`<p><b>Sortino</b> = (return − risk-free) ÷ <i>downside</i> deviation. It refines Sharpe by penalizing only harmful (negative) volatility, useful when investors care about downside risk specifically.</p>`,
  related:["sharpe","standard-deviation","information-ratio"] },
"information-ratio":{ term:"Information Ratio", group:"Portfolio", aliases:["information ratio"],
  eli5:"Measures how consistently a manager beats their benchmark, per unit of how much they stray from it.",
  full:`<p><b>Information ratio</b> = (portfolio return − benchmark) ÷ tracking error. High values mean steady, repeatable outperformance — a scoreboard for active skill versus a benchmark.</p>`,
  related:["sharpe","sortino","alpha"] },
"r-squared":{ term:"R-Squared", group:"Portfolio", aliases:["R-squared","R2"],
  eli5:"How much of a fund's movement is explained by its benchmark, 0–100. High R² means beta is meaningful; low R² means other factors drive it.",
  full:`<p><b>R-squared</b> (0–100) shows how closely a fund tracks its index. Above ~70, beta is meaningful; below, market beta tells you little. An index fund has R² near 100.</p>`,
  related:["beta","capm"] },
"monte-carlo":{ term:"Monte Carlo Simulation", group:"Portfolio", aliases:["Monte Carlo"],
  eli5:"Running thousands of random 'what-if' market scenarios to estimate the odds your plan succeeds — like retirement lasting your whole life.",
  full:`<p><b>Monte Carlo</b> simulation runs many randomized return paths to produce a <i>probability</i> of outcomes (e.g., 'an 85% chance the portfolio lasts 30 years'), rather than a single guess.</p>`,
  related:["standard-deviation","time-value-of-money"] },
"holding-period-return":{ term:"Holding Period & Annualized Return", group:"Performance", aliases:["holding period return","HPR","annualized return"],
  eli5:"Your total gain over the time you held something, including income, divided by what you paid. Annualizing puts different periods on the same yearly scale.",
  full:`<p><b>HPR</b> = (ending price − beginning + income) ÷ beginning. <b>Annualized return</b> restates a multi-year result as an equivalent yearly rate so investments are comparable.</p>`,
  related:["time-weighted-return","real-nominal-return"] },
"time-weighted-return":{ term:"Time-Weighted vs. Dollar-Weighted Return", group:"Performance", aliases:["time-weighted return","dollar-weighted return","TWR","DWR"],
  eli5:"Two ways to score returns. Time-weighted judges the MANAGER (ignores your deposits/withdrawals); dollar-weighted judges YOUR actual experience (timing matters).",
  full:`<p><b>Time-weighted return</b> strips out the effect of cash flows — right for judging a manager's skill. <b>Dollar-weighted return</b> (an IRR) reflects the investor's actual result, including the timing of deposits and withdrawals.</p>`,
  related:["holding-period-return","npv-irr"] },
"real-nominal-return":{ term:"Real vs. Nominal Return", group:"Performance", aliases:["real return","nominal return","real vs nominal"],
  eli5:"Nominal return is the headline number; real return subtracts inflation to show your TRUE gain in buying power.",
  full:`<p><b>Nominal return</b> is the stated rate. <b>Real return</b> ≈ nominal − inflation — what your money can actually buy more of. A 6% return with 4% inflation is only ~2% real.</p>`,
  related:["inflation","holding-period-return"] },
"benchmarks":{ term:"Benchmarks & Indexes", group:"Performance", aliases:["benchmark","S&P 500","Russell 2000","DJIA","index"],
  eli5:"Yardsticks to measure performance against. The S&P 500 tracks 500 big U.S. firms; the Russell 2000 tracks small caps; the Dow is 30 names (price-weighted).",
  full:`<p><b>Benchmarks</b>: S&P 500 (500 large caps, cap-weighted), Russell 2000 (small caps), DJIA (30 names, price-weighted), Nasdaq (tech-heavy), MSCI EAFE (developed ex-US). You judge a manager against the right index.</p>`,
  related:["information-ratio","etf"] },
"time-value-of-money":{ term:"Time Value of Money (PV/FV)", group:"Performance", aliases:["time value of money","present value","future value","PV","FV"],
  eli5:"A dollar today is worth more than a dollar later, because today's dollar can be invested and grow. The core of all finance math.",
  full:`<p><b>Time value of money</b>: Future value = PV × (1 + r)ⁿ; present value discounts a future sum back to today. It's why compounding matters so much — drag the tool to feel it.</p>`,
  graphic:"compound-growth", related:["rule-of-72","npv-irr","compound-growth-concept"] },
"rule-of-72":{ term:"Rule of 72", group:"Performance", aliases:["Rule of 72"],
  eli5:"A mental shortcut: divide 72 by your interest rate to estimate how many years it takes your money to double.",
  full:`<p><b>Rule of 72</b>: years to double ≈ 72 ÷ rate. At 8% money doubles in ~9 years; at 6%, ~12 years. A fast way to grasp the power of compounding.</p>`,
  graphic:"compound-growth", related:["time-value-of-money","compound-growth-concept"] },
"compound-growth-concept":{ term:"Compounding", group:"Performance", aliases:["compounding","compound interest","compound growth"],
  eli5:"Earning returns on your past returns, not just your original money. Over time it snowballs — the curve bends sharply upward.",
  full:`<p><b>Compounding</b> means your gains themselves earn gains. The longer the horizon, the more dramatic — which is why starting early matters far more than picking the perfect investment.</p>`,
  graphic:"compound-growth", related:["rule-of-72","time-value-of-money"] },
"npv-irr":{ term:"NPV & IRR", group:"Performance", aliases:["NPV","IRR","net present value","internal rate of return"],
  eli5:"Tools to judge an investment's cash flows. NPV = today's value of all future cash minus the cost (accept if positive). IRR is the rate that makes NPV zero.",
  full:`<p><b>NPV</b> sums all discounted cash flows; accept the project if NPV > 0. <b>IRR</b> is the discount rate where NPV = 0 — accept if IRR exceeds your required return. Both rest on the time value of money.</p>`,
  related:["time-value-of-money","time-weighted-return"] }
});
</script>

<script>
/* ====================  CHUNK: ACCOUNTS, ESTATES & SUITABILITY  ==================== */
Object.assign(GLOSSARY_DATA, {
"jtwros":{ term:"Joint Tenants (JTWROS)", group:"Accounts", aliases:["JTWROS","joint tenants with rights of survivorship","joint tenancy"],
  eli5:"A shared account where, if one owner dies, their share automatically goes to the survivor — skipping the will and probate.",
  full:`<p><b>JTWROS</b>: equal co-ownership with <b>right of survivorship</b> — at death, the deceased's share passes directly to the surviving owner(s), bypassing probate. Common for spouses.</p>`,
  related:["tenants-in-common","tod-pod","probate"] },
"tenants-in-common":{ term:"Tenants in Common (TIC)", group:"Accounts", aliases:["tenants in common","TIC","tenancy in common"],
  eli5:"Co-ownership where each person owns a defined share that passes to THEIR heirs (not the other owner) when they die.",
  full:`<p><b>Tenants in common</b> can own unequal shares, and a deceased owner's portion passes through <b>their</b> estate — not to the co-owner. Common for unrelated partners.</p>`,
  related:["jtwros","probate"] },
"tenants-by-entirety":{ term:"Tenants by the Entirety", group:"Accounts", aliases:["tenants by the entirety","tenancy by the entirety"],
  eli5:"A married-couple-only form of joint ownership with survivorship AND protection from one spouse's creditors.",
  full:`<p><b>Tenants by the entirety</b> (available to married couples in some states) adds creditor protection: one spouse's creditors can't reach the property, plus full survivorship.</p>`,
  related:["jtwros","community-property"] },
"community-property":{ term:"Community Property", group:"Accounts", aliases:["community property"],
  eli5:"In 9 states, most assets acquired during marriage are owned 50/50 — and both halves get a step-up in basis when one spouse dies.",
  full:`<p>In <b>community property</b> states, marital assets are owned equally. A key perk: a <b>full step-up in basis</b> on both halves at the first spouse's death (vs. half in common-law states).</p>`,
  related:["step-up-basis","jtwros"] },
"tod-pod":{ term:"TOD / POD Designations", group:"Accounts", aliases:["TOD","POD","transfer on death","pay on death"],
  eli5:"A beneficiary you name on an account so it passes directly to them at death — no will, no probate needed.",
  full:`<p><b>Transfer-on-death</b> (securities) and <b>pay-on-death</b> (bank) designations let an account skip probate and go straight to the named beneficiary.</p>`,
  related:["probate","jtwros"] },
"revocable-trust":{ term:"Revocable Living Trust", group:"Estates", aliases:["revocable trust","revocable living trust","living trust","inter vivos"],
  eli5:"A trust you create while alive and can change anytime. It avoids probate, but the assets still count in your estate for taxes.",
  full:`<p>A <b>revocable living trust</b> can be amended or revoked by the grantor. It <b>avoids probate</b> (private, fast) but offers no estate-tax savings — assets remain in the estate. Becomes irrevocable at death.</p>`,
  related:["irrevocable-trust","testamentary-trust","probate"] },
"irrevocable-trust":{ term:"Irrevocable Trust", group:"Estates", aliases:["irrevocable trust"],
  eli5:"A trust you can't take back. You give up control, but the assets leave your estate — saving estate tax and shielding from creditors.",
  full:`<p>An <b>irrevocable trust</b> can't be changed once made. The trade-off: you lose control, but assets are <b>removed from your estate</b> (potential tax savings) and may gain creditor protection.</p>`,
  related:["revocable-trust","charitable-trust","gift-estate-tax"] },
"testamentary-trust":{ term:"Testamentary Trust", group:"Estates", aliases:["testamentary trust"],
  eli5:"A trust created by your will that springs into existence only after you die — so it must go through probate first.",
  full:`<p>A <b>testamentary trust</b> is written into a will and takes effect at death. Because it's part of the will, it goes <b>through probate</b> (unlike a living trust).</p>`,
  related:["revocable-trust","probate"] },
"charitable-trust":{ term:"Charitable Trusts (CRT / CLT)", group:"Estates", aliases:["charitable remainder trust","charitable lead trust","CRT","CLT"],
  eli5:"Trusts that split benefits between you/your heirs and a charity. A CRT pays you income now, charity gets the rest; a CLT is the reverse.",
  full:`<p><b>CRT</b> (charitable remainder trust): donor gets income for life/term, charity gets the remainder. <b>CLT</b> (charitable lead trust): charity gets income first, heirs get the remainder. Both blend giving with tax planning.</p>`,
  related:["irrevocable-trust","gift-estate-tax"] },
"qtip-trust":{ term:"QTIP & Bypass Trusts", group:"Estates", aliases:["QTIP","QTIP trust","bypass trust","credit shelter trust"],
  eli5:"Marital-planning trusts. A QTIP gives a spouse lifetime income while you control who inherits next; a bypass trust shelters the first spouse's estate exemption.",
  full:`<p>A <b>QTIP trust</b> provides the surviving spouse income for life while the grantor names the final beneficiaries — qualifies for the marital deduction. A <b>bypass (credit shelter) trust</b> preserves the deceased spouse's estate-tax exemption for the next generation.</p>`,
  related:["charitable-trust","gift-estate-tax","irrevocable-trust"] },
"probate":{ term:"Probate", group:"Estates", aliases:["probate"],
  eli5:"The court process of validating a will and distributing an estate. It's slow, costly, and public — which is why people plan to avoid it.",
  full:`<p><b>Probate</b> is the court-supervised process of settling an estate. It can take 6–18 months, cost 3–8%, and is public. Avoidance tools: living trusts, JTWROS, TOD/POD, beneficiary designations.</p>`,
  related:["revocable-trust","jtwros","tod-pod","power-of-attorney"] },
"power-of-attorney":{ term:"Power of Attorney", group:"Estates", aliases:["power of attorney","POA","durable power of attorney"],
  eli5:"A document letting someone act for you. A 'durable' POA keeps working if you become incapacitated; all POAs end at death.",
  full:`<p>A <b>power of attorney</b> authorizes an agent to act for you. <b>Durable</b> survives incapacity (key for planning); <b>springing</b> activates on a trigger. All POAs terminate at the principal's death.</p>`,
  related:["probate","per-stirpes-capita"] },
"per-stirpes-capita":{ term:"Per Stirpes vs. Per Capita", group:"Estates", aliases:["per stirpes","per capita"],
  eli5:"Two ways to split an inheritance if a beneficiary dies first. Per stirpes passes their share to their kids; per capita splits only among survivors.",
  full:`<p><b>Per stirpes</b>: a deceased beneficiary's share flows to their descendants (by family branch). <b>Per capita</b>: surviving beneficiaries split equally regardless of generation.</p>`,
  related:["probate","power-of-attorney"] },
"suitability":{ term:"Suitability & Best Interest", group:"Suitability", aliases:["suitability","suitable","best interest"],
  eli5:"The rule that a recommendation must fit the specific client — their goals, risk tolerance, and situation. Advisers must put the client first.",
  full:`<p><b>Suitability</b> means a recommendation reasonably fits the client's profile. Investment advisers owe a <b>fiduciary</b> 'best interest' duty; broker-dealers owe Reg BI's best-interest standard. Built on the client's objectives, horizon, and risk tolerance.</p>`,
  related:["investment-objectives","time-horizon","behavioral-finance","fiduciary-duty"] },
"investment-objectives":{ term:"Investment Objectives", group:"Suitability", aliases:["investment objectives","capital preservation","current income","growth","speculation"],
  eli5:"What the client wants their money to do, ranked by risk: preserve capital, generate income, grow, or speculate.",
  full:`<p>Objectives run from low to high risk: <b>capital preservation</b> → <b>current income</b> → <b>growth</b> → <b>aggressive growth</b> → <b>speculation</b>. Plus total return and tax minimization. The objective drives suitable products.</p>`,
  related:["suitability","time-horizon","investment-adviser"] },
"time-horizon":{ term:"Time Horizon & Liquidity", group:"Suitability", aliases:["time horizon","liquidity needs","liquidity"],
  eli5:"How long until the client needs the money, and how fast they might need cash. Short horizons or high liquidity needs mean safer, more accessible investments.",
  full:`<p><b>Time horizon</b>: short (<3y) → money market/short bonds; long (10y+) → growth equities. <b>Liquidity needs</b> push toward easily-sold assets. Both are core suitability inputs.</p>`,
  related:["suitability","investment-objectives"] },
"behavioral-finance":{ term:"Behavioral Biases", group:"Suitability", aliases:["behavioral finance","loss aversion","anchoring","herding","overconfidence"],
  eli5:"Predictable mental shortcuts that lead investors astray — like fearing losses far more than valuing gains, or following the crowd.",
  full:`<p><b>Behavioral biases</b> include <b>loss aversion</b> (losses hurt ~2× as much as gains feel good), <b>anchoring</b>, <b>herding</b>, <b>overconfidence</b>, and <b>recency bias</b>. Advisers manage these to keep clients on plan.</p>`,
  related:["suitability","emh"] },
"order-types":{ term:"Order Types", group:"Trading", aliases:["market order","limit order","stop order","stop-loss","GTC"],
  eli5:"Instructions for a trade. A market order fills now at any price; a limit order only at your price or better; a stop order triggers once a price is hit.",
  full:`<p><b>Market</b>: fill immediately at the best price. <b>Limit</b>: only at your price or better. <b>Stop (stop-loss)</b>: becomes a market order once the stop price trades. <b>GTC</b>: good till cancelled. Day orders expire at close.</p>`,
  related:["margin","short-selling"] },
"rights-warrants":{ term:"Rights & Warrants", group:"Equity", aliases:["rights","warrants","preemptive rights","subscription rights"],
  eli5:"Ways to buy stock at a set price. Rights are short-term and let existing holders keep their ownership %; warrants are long-term sweeteners on bonds.",
  full:`<p><b>Rights</b> are short-term (30–60 days), letting existing shareholders buy new shares at a discount to protect their ownership % (preemptive rights). <b>Warrants</b> are long-term, often attached to bonds as a 'sweetener,' usually issued above market.</p>`,
  related:["common-stock","convertible-bond"] },
"ex-dividend":{ term:"Ex-Dividend Date", group:"Equity", aliases:["ex-dividend","ex-date","record date","dividend dates"],
  eli5:"The cutoff for dividends. Buy ON or AFTER the ex-date and you DON'T get the next dividend; the stock price drops by the dividend that morning.",
  full:`<p>The <b>ex-dividend date</b> is the cutoff: buyers on/after it don't receive the declared dividend, and the price drops by roughly the dividend amount that morning. Key dates: declaration → ex → record → payment.</p>`,
  graphic:"dividend-timeline", related:["common-stock","qualified-dividend","stock-split"] },
"stock-split":{ term:"Stock Split", group:"Equity", aliases:["stock split","reverse split","forward split"],
  eli5:"Slicing shares into more (or fewer) pieces. A 2-for-1 split doubles your shares and halves the price — your total value is unchanged.",
  full:`<p>A <b>forward split</b> (2-for-1) multiplies shares and divides the price proportionally; total value and your cost basis-per-share adjust, but total basis is unchanged. A <b>reverse split</b> does the opposite (often to stay exchange-listed).</p>`,
  related:["common-stock","basis"] },
"rule-144":{ term:"Rule 144 (Restricted/Control Stock)", group:"Laws", aliases:["Rule 144","restricted stock","control stock"],
  eli5:"Rules for reselling stock that wasn't bought on the open market — like shares from a private deal or held by company insiders.",
  full:`<p><b>Rule 144</b> governs resale of <b>restricted</b> (privately acquired) and <b>control</b> (insider-held) stock: a 6-month holding period, volume limits (greater of 1% of shares or avg weekly volume), and Form 144 if over 5,000 shares/$50,000.</p>`,
  related:["common-stock","reg-d","accredited-investor"] }
});
</script>

<script>
/* ====================  CHUNK: PRODUCT DEPTH (Area 2)  ==================== */
Object.assign(GLOSSARY_DATA, {
"vertical-spread":{ term:"Vertical Spreads (Bull/Bear)", group:"Derivatives", aliases:["vertical spread","bull call spread","bear put spread","credit spread","debit spread"],
  eli5:"Buying one option and selling another of the same type to bet on direction with a capped cost AND capped profit.",
  full:`<p>A <b>vertical spread</b> uses two same-expiration options at different strikes. <b>Bull call spread</b> (buy lower call, sell higher) profits modestly if the stock rises; <b>bear put spread</b> profits if it falls. Spreads cap both your cost and your max gain.</p>`,
  related:["option","covered-call","straddle","collar"] },
"collar":{ term:"Collar", group:"Derivatives", aliases:["collar"],
  eli5:"Own a stock, buy a protective put for downside insurance, and sell a call to pay for it. Cheap protection — but your upside is capped.",
  full:`<p>A <b>collar</b> = long stock + protective put + short call. The call premium funds the put, so downside protection is cheap or free — at the cost of capping your upside at the call strike.</p>`,
  related:["protective-put","covered-call","option"] },
"index-option":{ term:"Index & Cash-Settled Options", group:"Derivatives", aliases:["index option","cash settlement"],
  eli5:"Options on a whole index (like the S&P 500). Instead of delivering shares, they settle in cash for the difference.",
  full:`<p><b>Index options</b> track a basket, not a single stock, and <b>settle in cash</b> (no shares change hands). Useful for hedging an entire portfolio's market risk.</p>`,
  related:["option","benchmarks","systematic-risk"] },
"corporate-bond-types":{ term:"Corporate Bond Types (Secured/Unsecured)", group:"Fixed Income", aliases:["mortgage bond","equipment trust certificate","collateral trust bond","debenture","subordinated debenture"],
  eli5:"Corporate bonds ranked by what backs them. Mortgage bonds (real estate) and equipment trust certificates are secured; debentures are backed only by the company's promise.",
  full:`<p><b>Secured</b>: mortgage bonds (real estate), equipment trust certificates (transport equipment), collateral trust bonds (other securities). <b>Unsecured</b>: <b>debentures</b> (general credit) and <b>subordinated debentures</b> (junior, higher yield). Secured holders get paid first in default.</p>`,
  related:["bond","liquidation-priority","credit-rating"] },
"international-bonds":{ term:"Eurobonds, Yankee & Samurai Bonds", group:"Fixed Income", aliases:["Eurobond","Yankee bond","Samurai bond","foreign bond"],
  eli5:"Bonds issued across borders. A Yankee bond is a foreign issuer borrowing in U.S. dollars in the U.S.; a Eurobond is issued outside its currency's home country.",
  full:`<p><b>Eurobond</b>: issued in a currency outside that currency's home country. <b>Yankee</b>: foreign issuer, USD, sold in the U.S. <b>Samurai</b>: foreign issuer, yen, in Japan. Foreign-currency bonds add <b>currency risk</b>.</p>`,
  related:["bond","currency-risk","treasury"] },
"savings-bonds":{ term:"Series EE & I Savings Bonds", group:"Fixed Income", aliases:["Series EE","Series I","savings bond"],
  eli5:"Government bonds for individuals. EE bonds are guaranteed to double in 20 years; I bonds add an inflation adjustment. Both are state-tax-free.",
  full:`<p><b>Series EE</b>: fixed rate, guaranteed to double in 20 years. <b>Series I</b>: fixed rate + inflation adjustment. Both are nonmarketable, capped at $10K/year, federally taxable (deferrable), and state/local tax-exempt, with an education tax exclusion.</p>`,
  related:["treasury","tips","inflation"] },
"etn":{ term:"ETN (Exchange-Traded Note)", group:"Pooled", aliases:["ETN","exchange-traded note"],
  eli5:"Looks like an ETF but is actually an unsecured IOU from a bank. If the bank fails, you can lose everything — even if the index did fine.",
  full:`<p>An <b>ETN</b> is unsecured <b>debt</b> of an issuer (usually a bank) that promises an index's return. It owns no assets, so it carries <b>issuer credit risk</b> — unlike an ETF, which holds a real portfolio.</p>`,
  related:["etf","credit-risk","structured-products"] },
"leveraged-etf":{ term:"Leveraged & Inverse ETFs", group:"Pooled", aliases:["leveraged ETF","inverse ETF","2x ETF","3x ETF"],
  eli5:"ETFs that multiply (2x, 3x) or flip an index's DAILY move using derivatives. They 'decay' over time, so they're unsuitable for holding more than a day or two.",
  full:`<p><b>Leveraged/inverse ETFs</b> aim to multiply or reverse an index's <i>daily</i> return. Because they reset daily, compounding causes <b>decay</b> over longer holds — built for short-term tactical use, not buy-and-hold.</p>`,
  related:["etf","systematic-risk"] },
"structured-products":{ term:"Structured Products", group:"Alternatives", aliases:["structured product","principal-protected note","reverse convertible"],
  eli5:"Engineered investments combining a bond with an option-like bet on an index. Complex, often illiquid, and exposed to the issuer's credit.",
  full:`<p><b>Structured products</b> bundle debt with embedded derivatives. <b>Principal-protected notes</b> guarantee your money back (if the issuer survives) plus index-linked upside; <b>reverse convertibles</b> pay high coupons but can repay you in falling stock. Watch issuer credit and complexity.</p>`,
  related:["etn","option","credit-risk"] },
"commodities":{ term:"Commodities & Precious Metals", group:"Alternatives", aliases:["commodities","precious metals","gold"],
  eli5:"Physical goods like oil, grain, and gold — often used as an inflation hedge, usually accessed through futures or ETFs.",
  full:`<p><b>Commodities</b> (energy, metals, agriculture) and <b>precious metals</b> are real assets, historically inflation hedges. Accessed via futures, ETFs, or producer stocks. Collectibles are taxed at a higher 28% max capital-gains rate.</p>`,
  related:["futures","inflation","digital-assets"] },
"digital-assets":{ term:"Digital Assets (Crypto)", group:"Alternatives", aliases:["digital assets","cryptocurrency","Bitcoin","crypto"],
  eli5:"Crypto and tokens. The SEC uses the Howey test to decide which are securities; the IRS taxes them as property (every sale is a taxable event).",
  full:`<p><b>Digital assets</b>: Bitcoin is generally treated as a commodity; many tokens are securities under the <b>Howey test</b>. For tax, the IRS treats crypto as <b>property</b> — sales trigger capital gains/losses with short/long-term holding periods.</p>`,
  related:["howey-test","commodities","capital-gains"] },
"air":{ term:"Assumed Interest Rate (AIR)", group:"Insurance", aliases:["AIR","assumed interest rate"],
  eli5:"The benchmark used to set a variable annuity's payments. If the account beats the AIR, your next check rises; if it lags, your check falls.",
  full:`<p><b>AIR</b> is the assumed return used to compute a variable annuity's first payout. Afterward: account return above AIR → next payment rises; equal → unchanged; below → falls. It's the yardstick, not a guarantee.</p>`,
  related:["variable-annuity","annuity-payout"] },
"surrender-charge":{ term:"Surrender Charge", group:"Insurance", aliases:["surrender charge","surrender period"],
  eli5:"A penalty for pulling money out of an annuity (or some insurance) too early — usually a percentage that shrinks each year.",
  full:`<p>A <b>surrender charge</b> is a back-end fee for early withdrawal from an annuity, on a declining schedule (e.g., 7% year 1, down to 0% after several years). It discourages quick exits.</p>`,
  related:["annuity","variable-annuity"] },
"face-amount-certificate":{ term:"Face-Amount Certificate Company", group:"Pooled", aliases:["face-amount certificate"],
  eli5:"A rare type of investment company that promises to pay a fixed amount at a future date in exchange for periodic payments.",
  full:`<p>A <b>face-amount certificate company</b> is one of the three Investment Company Act classifications (with management companies and UITs). It pays a stated sum at maturity for installment or lump-sum payments. Largely historical.</p>`,
  related:["uit","mutual-fund","investment-company-act"] }
});
</script>

<script>
/* ====================  CHUNK: STRATEGY DEPTH (Area 3)  ==================== */
Object.assign(GLOSSARY_DATA, {
"capital-market-line":{ term:"CML vs. SML", group:"Portfolio", aliases:["Capital Market Line","CML"],
  eli5:"Two cousin lines. The CML plots return against TOTAL risk for efficient portfolios; the SML (from CAPM) plots return against MARKET risk (beta) for any asset.",
  full:`<p>The <b>Capital Market Line</b> uses total risk (standard deviation) and applies only to efficient portfolios. The <b>Security Market Line</b> (CAPM) uses beta and applies to any security. Same idea, different risk measure on the x-axis.</p>`,
  related:["capm","efficient-frontier","beta","standard-deviation"] },
"asset-allocation":{ term:"Asset Allocation & Rebalancing", group:"Strategies", aliases:["asset allocation","strategic allocation","tactical allocation","rebalancing"],
  eli5:"How you split money among stocks, bonds, and cash — the biggest driver of long-run results. Rebalancing trims winners back to your targets.",
  full:`<p><b>Strategic</b> allocation sets long-term target weights; <b>tactical</b> makes short-term tilts; <b>dynamic</b> shifts by rule (e.g., target-date funds). <b>Rebalancing</b> periodically restores targets — a built-in 'sell high, buy low.'</p>`,
  related:["diversification","investment-styles","modern-portfolio-theory"] },
"investment-styles":{ term:"Investment Styles (Growth/Value)", group:"Strategies", aliases:["growth investing","value investing","GARP","blend","sector rotation"],
  eli5:"Different ways to pick stocks. Growth chases fast-rising earnings (high P/E); value hunts cheap, overlooked companies (low P/E).",
  full:`<p><b>Growth</b>: above-average earnings growth, higher P/E, low dividends. <b>Value</b>: undervalued, lower P/E, higher dividends. <b>Blend/GARP</b> mixes both. <b>Active</b> tries to beat a benchmark; <b>passive</b> (indexing) just matches it cheaply.</p>`,
  related:["asset-allocation","market-cap","fundamental-analysis"] },
"market-cap":{ term:"Market Capitalization", group:"Strategies", aliases:["market cap","large cap","small cap","mid cap","micro cap"],
  eli5:"A company's total stock value (share price × shares). Large caps are big and stable; small caps are riskier but can grow faster.",
  full:`<p><b>Market cap</b> = price × shares outstanding. Rough bands: large cap ($10B+), mid ($2–10B), small ($300M–$2B), micro (<$300M). Smaller caps carry more risk and potential reward.</p>`,
  related:["investment-styles","common-stock","benchmarks"] },
"value-averaging":{ term:"Value Averaging", group:"Strategies", aliases:["value averaging"],
  eli5:"Like dollar-cost averaging but stricter: you adjust each contribution to hit a target portfolio value, so you buy more after drops and less after gains.",
  full:`<p><b>Value averaging</b> sets a target portfolio value each period and invests whatever's needed to reach it — buying more when prices fall, less (or selling) when they rise. A more aggressive contrarian cousin of dollar-cost averaging.</p>`,
  related:["dca","asset-allocation"] },
"cost-basis-methods":{ term:"Cost Basis Methods (FIFO/Specific ID)", group:"Strategies", aliases:["FIFO","specific identification","average cost","cost basis method"],
  eli5:"Rules for deciding WHICH shares you sold, which changes your taxable gain. FIFO sells oldest first; specific ID lets you pick the lots.",
  full:`<p>When you sell part of a holding: <b>FIFO</b> (default) sells oldest shares first; <b>specific identification</b> lets you choose lots (often best for taxes — sell high-basis shares); <b>average cost</b> (mutual funds/ETFs) averages everything.</p>`,
  related:["basis","capital-gains","wash-sale"] },
"capital-gains-netting":{ term:"Capital Gains/Loss Netting", group:"Strategies", aliases:["capital loss","loss netting","carryforward","tax-loss harvesting"],
  eli5:"You net gains against losses each year. Extra losses can offset up to $3,000 of ordinary income, and the rest carries forward forever.",
  full:`<p>Net short-term and long-term gains/losses separately, then against each other. A net capital loss offsets up to <b>$3,000</b> of ordinary income per year; the remainder <b>carries forward</b> indefinitely. 'Tax-loss harvesting' deliberately realizes losses (mind the wash sale rule).</p>`,
  related:["capital-gains","wash-sale","cost-basis-methods","ordinary-income"] },
"erisa-vesting":{ term:"ERISA Vesting & Eligibility", group:"Retirement", aliases:["vesting","cliff vesting","graded vesting","404(c)","QDIA"],
  eli5:"Vesting is how you earn full ownership of employer contributions over time. Your OWN contributions are always 100% yours.",
  full:`<p><b>Eligibility</b>: age 21 + 1 year of service. <b>Vesting</b> of employer money: 3-year <b>cliff</b> (all at once) or 2–6-year <b>graded</b>. Your own deferrals vest immediately. <b>404(c)</b> + <b>QDIA</b> rules protect plans that let participants direct their own investments.</p>`,
  related:["erisa","401k","defined-benefit"] },
"secure-act":{ term:"SECURE Act 2.0", group:"Retirement", aliases:["SECURE Act","SECURE 2.0"],
  eli5:"Recent laws that improved retirement rules — raising the RMD age to 73, cutting the missed-RMD penalty, and adding a 529-to-Roth rollover.",
  full:`<p><b>SECURE 2.0</b> raised the RMD age to <b>73</b> (75 by 2033), cut the missed-RMD penalty to 25% (10% if fixed promptly), eliminated Roth 401(k) lifetime RMDs, added a $35K lifetime 529→Roth rollover, and a 'super catch-up' for ages 60–63.</p>`,
  related:["rmd","roth-ira","529-plan","401k"] },
"rollover":{ term:"Rollovers & 60-Day Rule", group:"Retirement", aliases:["rollover","60-day rollover","trustee-to-trustee","backdoor Roth"],
  eli5:"Moving retirement money between accounts. A direct (trustee-to-trustee) transfer is cleanest; a 60-day rollover must be completed in time or it's taxed.",
  full:`<p>A <b>direct/trustee-to-trustee transfer</b> moves funds with no limit and no withholding. A <b>60-day (indirect) rollover</b> puts cash in your hands — redeposit within 60 days or it's taxable, and you're limited to one per 12 months (IRA-to-IRA). The <b>backdoor Roth</b> uses a nondeductible IRA + conversion.</p>`,
  related:["traditional-ira","roth-ira","rmd"] },
"72t":{ term:"72(t) / Early-Withdrawal Exceptions", group:"Retirement", aliases:["72(t)","SEPP","substantially equal periodic payments","early withdrawal exception"],
  eli5:"Ways to tap retirement money before 59½ WITHOUT the 10% penalty — like a fixed schedule of equal payments (72(t)), disability, or first-home costs.",
  full:`<p>The <b>10% early-withdrawal penalty</b> (before 59½) has exceptions: <b>72(t)</b> substantially equal periodic payments, death/disability, big medical bills, first home ($10K), higher education, and birth/adoption ($5K). 457(b) plans skip the penalty on separation.</p>`,
  related:["traditional-ira","roth-ira","401k"] },
"donor-advised-fund":{ term:"Donor-Advised Fund (DAF)", group:"Strategies", aliases:["donor-advised fund","DAF"],
  eli5:"A charity account: you donate (and deduct) now, the money grows, and you recommend grants to charities over time.",
  full:`<p>A <b>donor-advised fund</b> gives an immediate tax deduction when you contribute (cash or appreciated securities), invests the balance tax-free, and lets you recommend grants to charities later. Popular for bunching deductions.</p>`,
  related:["charitable-trust","gift-estate-tax","capital-gains"] },
"qdro":{ term:"QDRO", group:"Retirement", aliases:["QDRO","qualified domestic relations order"],
  eli5:"A court order in a divorce that splits a retirement plan between spouses without triggering taxes or the early-withdrawal penalty.",
  full:`<p>A <b>QDRO</b> (qualified domestic relations order) divides ERISA retirement benefits in a divorce. The receiving ex-spouse (alternate payee) is treated as a participant for tax purposes — no early-withdrawal penalty on the transfer.</p>`,
  related:["erisa","401k","rollover"] },
"risk-taxonomy":{ term:"Systematic Risks (PRIME)", group:"Portfolio", aliases:["PRIME","purchasing power risk","reinvestment risk","political risk","legislative risk","business risk"],
  eli5:"A memory aid for market-wide risks you can't diversify: Purchasing power, Reinvestment, Interest rate, Market, Exchange rate.",
  full:`<p><b>PRIME</b> systematic risks: <b>P</b>urchasing-power (inflation), <b>R</b>einvestment, <b>I</b>nterest-rate, <b>M</b>arket, <b>E</b>xchange-rate. Non-systematic (diversifiable) risks include business, financial, credit, liquidity, political, and legislative risk.</p>`,
  related:["systematic-risk","diversification","inflation","interest-rate-risk","currency-risk"] }
});
</script>

<script>
/* ====================  CHUNK: LAW DEPTH (Area 4)  ==================== */
Object.assign(GLOSSARY_DATA, {
"ia-net-worth":{ term:"IA Net Worth & Bonding", group:"Laws", aliases:["net worth requirement","minimum net worth","surety bond"],
  eli5:"Financial cushions state advisers must keep. Holding client assets requires $35,000 net worth; just having trading discretion requires $10,000.",
  full:`<p>State-registered IA minimums: <b>$35,000</b> net worth with <b>custody</b>; <b>$10,000</b> with <b>discretion</b> (no custody); advisers taking prepaid fees over $500 / 6+ months must keep positive net worth. A surety bond can substitute. Federal-covered advisers are exempt (NSMIA).</p>`,
  related:["custody-rule","discretionary-account","investment-adviser","federal-covered"] },
"books-and-records":{ term:"Books & Records Rule", group:"Laws", aliases:["books and records","recordkeeping","Rule 204-2"],
  eli5:"How long advisers must keep their files. The rule: 5 years total, with the first 2 years easily accessible at the office.",
  full:`<p>The <b>books and records rule</b> (204-2) requires advisers to keep journals, communications, advertisements, and client agreements for <b>5 years</b> (first <b>2 years</b> readily accessible). Electronic storage is allowed with safeguards.</p>`,
  related:["form-adv","investment-adviser","compliance-program"] },
"investment-counsel":{ term:"Investment Counsel Title", group:"Laws", aliases:["investment counsel"],
  eli5:"A title an adviser may use ONLY if advising is its principal business AND it mainly provides ongoing portfolio management.",
  full:`<p>To call itself <b>'investment counsel,'</b> a firm must meet BOTH tests: its <b>principal business</b> is giving investment advice, AND a <b>substantial part</b> is continuous investment supervisory (portfolio management) services. Meeting just one isn't enough.</p>`,
  related:["investment-adviser","fiduciary-duty"] },
"compliance-program":{ term:"Compliance Program & CCO", group:"Laws", aliases:["compliance program","Chief Compliance Officer","CCO","Rule 206(4)-7"],
  eli5:"Every registered adviser must have written compliance policies, review them yearly, and name a Chief Compliance Officer.",
  full:`<p>Rule <b>206(4)-7</b> requires each registered IA to adopt written policies and procedures reasonably designed to prevent violations, review them <b>annually</b>, and designate a <b>Chief Compliance Officer</b>.</p>`,
  related:["code-of-ethics","books-and-records","reg-s-p"] },
"reg-s-p":{ term:"Privacy (Regulation S-P)", group:"Laws", aliases:["Regulation S-P","Reg S-P","privacy notice","Safeguards Rule"],
  eli5:"The rule protecting clients' personal financial info — requiring privacy notices, an opt-out before sharing with outsiders, and data safeguards.",
  full:`<p><b>Reg S-P</b> requires an initial and annual <b>privacy notice</b>, an <b>opt-out</b> right before sharing nonpublic personal info with non-affiliated third parties, a written <b>Safeguards Rule</b> program, and proper disposal of records.</p>`,
  related:["compliance-program","aml"] },
"iar-ce":{ term:"IAR Continuing Education", group:"Laws", aliases:["IAR CE","continuing education"],
  eli5:"NASAA's requirement that advising reps complete 12 CE credits a year — split between products/practice and ethics.",
  full:`<p>The <b>IAR CE</b> rule requires <b>12 credits/year</b>: 6 in Products & Practice and 6 in Ethics & Professional Responsibility. Two consecutive years of non-completion makes the registration CE-inactive.</p>`,
  related:["iar","code-of-ethics"] },
"agency-cross":{ term:"Principal & Agency Cross Transactions", group:"Laws", aliases:["agency cross transaction","principal transaction","Section 206(3)"],
  eli5:"Special trades where the adviser is on the other side, or brokers both sides. They require disclosure and consent because of the conflict.",
  full:`<p>Under <b>Section 206(3)</b>: a <b>principal transaction</b> (adviser trades from its own account with a client) needs written disclosure and consent <i>before</i> completion, per trade. An <b>agency cross</b> (adviser brokers both buyer and seller) needs prospective written consent, per-trade disclosure, and an annual statement.</p>`,
  related:["fiduciary-duty","investment-adviser","soft-dollars"] },
"registration-methods":{ term:"Securities Registration Methods", group:"Laws", aliases:["registration by coordination","registration by qualification","registration by notification","registration by filing"],
  eli5:"Three ways a security gets registered in a state: coordination (alongside a federal filing), qualification (full state review), or notification (for seasoned issuers).",
  full:`<p>State registration methods: <b>Coordination</b> (filed simultaneously with the SEC; effective together), <b>Qualification</b> (full state-level review; for intrastate or unregistered offerings), and <b>Notification/Filing</b> (streamlined for established issuers). Federal covered securities just notice-file.</p>`,
  related:["securities-act-1933","federal-covered","exempt-security"] },
"reg-a":{ term:"Regulation A (Mini-IPO)", group:"Laws", aliases:["Regulation A","Reg A","Tier 1","Tier 2"],
  eli5:"A lighter path for smaller public offerings — a 'mini-IPO' with less paperwork than a full registration.",
  full:`<p><b>Reg A</b> allows scaled public offerings: <b>Tier 1</b> up to $20M and <b>Tier 2</b> up to $75M in 12 months (Tier 2 preempts state registration). Lighter disclosure than a full S-1 registration.</p>`,
  related:["securities-act-1933","reg-d","rule-144"] },
"rule-144a":{ term:"Rule 144A & QIBs", group:"Laws", aliases:["Rule 144A","QIB","qualified institutional buyer"],
  eli5:"Lets big institutions ('QIBs') trade unregistered securities privately among themselves — a wholesale market for the pros.",
  full:`<p><b>Rule 144A</b> permits resale of unregistered securities among <b>qualified institutional buyers (QIBs)</b> — institutions managing $100M+ in securities. It creates liquidity for private placements without public registration.</p>`,
  related:["rule-144","reg-d","accredited-investor"] },
"reporting-forms":{ term:"SEC Reporting Forms (10-K, 8-K, 13D)", group:"Laws", aliases:["Form 10-K","Form 10-Q","Form 8-K","Schedule 13D","Schedule 13G"],
  eli5:"Required filings by public companies and big shareholders: annual (10-K), quarterly (10-Q), breaking news (8-K), and 5%+ ownership stakes (13D).",
  full:`<p><b>10-K</b>: audited annual report. <b>10-Q</b>: unaudited quarterly. <b>8-K</b>: material events within 4 business days. <b>Schedule 13D/13G</b>: filed when crossing 5% beneficial ownership. These power the 'public information' the markets price in.</p>`,
  related:["securities-exchange-act-1934","section-16","insider-trading"] },
"section-16":{ term:"Section 16 (Insider Reporting)", group:"Laws", aliases:["Section 16","short-swing profit","Form 4"],
  eli5:"Rules for corporate insiders: they must report their trades, and any quick (under 6 months) buy-sell profit goes back to the company.",
  full:`<p><b>Section 16</b> covers officers, directors, and 10%+ owners: they file Forms 3/4/5, and any <b>short-swing profit</b> (a purchase and sale within 6 months) must be returned to the company. Aims to deter insider abuse.</p>`,
  related:["insider-trading","reporting-forms","rule-10b5"] },
"sarbanes-oxley":{ term:"Sarbanes-Oxley (SOX)", group:"Laws", aliases:["Sarbanes-Oxley","SOX"],
  eli5:"A 2002 law passed after big accounting scandals (Enron) to make corporate financial reporting honest — with CEO/CFO sign-offs and auditor oversight.",
  full:`<p><b>Sarbanes-Oxley</b> (2002) created the <b>PCAOB</b> to oversee auditors, required CEO/CFO certification of financials, mandated internal-control assessments, and added whistleblower protections — all to restore trust after Enron/WorldCom.</p>`,
  related:["securities-exchange-act-1934","balance-sheet"] },
"gramm-leach-bliley":{ term:"Gramm-Leach-Bliley (GLBA)", group:"Laws", aliases:["Gramm-Leach-Bliley","GLBA"],
  eli5:"A 1999 law that let banks, brokers, and insurers combine — and created the financial privacy rules (the basis for Reg S-P).",
  full:`<p><b>Gramm-Leach-Bliley</b> (1999) repealed barriers between banking, securities, and insurance, and established financial <b>privacy</b> protections that underpin Regulation S-P.</p>`,
  related:["reg-s-p","aml"] },
"tcpa":{ term:"Telemarketing Rules (TCPA)", group:"Laws", aliases:["TCPA","telemarketing","Do-Not-Call","cold calling"],
  eli5:"Rules for cold-calling: you can only call between 8am and 9pm, must keep a do-not-call list, and honor the national registry.",
  full:`<p>The <b>TCPA</b> restricts telemarketing to <b>8 a.m.–9 p.m.</b> (called party's time), requires firm-specific and national <b>Do-Not-Call</b> compliance, and limits autodialed/prerecorded calls. CAN-SPAM sets parallel email rules.</p>`,
  related:["marketing-rule"] },
"senior-protection":{ term:"Senior Investor Protection", group:"Laws", aliases:["senior protection","vulnerable adult","financial exploitation"],
  eli5:"Rules letting firms pause suspicious withdrawals and notify a trusted contact when they suspect an elderly client is being financially exploited.",
  full:`<p>The NASAA <b>Senior Model Act</b> lets firms delay disbursements and notify authorities/trusted contacts on suspected <b>financial exploitation</b> of vulnerable adults, with immunity for good-faith reports. Many firms require a 'trusted contact' at account opening.</p>`,
  related:["suitability","prohibited-practices"] },
"finra-gift-limit":{ term:"Gift Limit & Outside Activities", group:"Laws", aliases:["gift limit","$100 gift","outside business activity"],
  eli5:"Reps can't give business gifts worth more than $100 per person per year, and must disclose outside jobs to their firm.",
  full:`<p>The <b>gift limit</b> caps business gifts at <b>$100 per person per year</b>. Reps must also disclose <b>outside business activities</b> and get approval, preventing hidden conflicts and 'selling away.'</p>`,
  related:["prohibited-practices","code-of-ethics"] },
